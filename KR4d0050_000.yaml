body:
  text: 提要鄖溪集二十八卷别集類二宋臣等謹案鄖溪集二十八卷宋鄭獬撰獬字毅夫安陸人皇祐五年進士第一通判陳州入直集賢院知制誥英宗即位數上疏論事出知荆南還判三班院神宗初召拜翰林學士權知開封府以不肯行新法忤王安石出知杭州徙青州又力言青苖之害引疾提舉鴻慶宫卒事跡具宗史本傳初獬以進士較試於廷舍人劉敞得獬卷曰此文似皇甫湜獬嘗與敞書亦言韓退之時用文章雄立一世者獨李翶皇甫湜張籍耳然翺之文尚質而少工湜之文務實而不肆張籍歌行乃勝於詩至於他文不少見計亦在歌詩下使之質而工竒而肆則退之作也云云觀其所言知文章宗㫖實源出韓門矣宋志載鄖溪集五十卷淳熙十三年秦焴嘗序而刋之今已久佚惟從永樂大典內裒輯編次又以宋文鑑兩宋名賢小集諸書所載分類補入勒為二十八卷王得臣塵史稱鄭內翰久逰場屋詞藻振時唱名之日同試進士皆歎曰好狀元仁宗為慰悅本傳亦稱其文章豪偉峭整議論剴切精練民事今以所存諸作核之殆非虛美秦焴序稱於論綏州見其計深慮遠於論毁譽見其居寵思危辨楊繪救祖無擇則特立不詭隨今其文雖不盡傳然大槩亦可想見矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序本朝鄭獬為人俊邁不羣舉進士第授將作監丞通判陳州召試直集賢院修起居注遂以右司諫知制誥京師大雨水詔求直言獬上疏曰臣竊觀陛下發德音下明詔以求忠言然臣愚未知陛下將欲實用之邪抑欲因災異舉應故事以文之邪苟欲文之則固無可議必欲實用之則于此時四方交章纍疏繁叢委至而陛下以一日萬幾之餘未能周覽亦不過如平時章疏關機密者則留中不出繫政體者則下中書屬兵機者則下樞密院兩府覆奏又以下羣有司及郡邑卒無所施行而後止如是則有求諫之名而無求諫之實所為應故事者等耳以臣所見謂宜選官置屬令專掌羣臣所上章疏日許兩府及近臣番休更直便殿坐與之從容條講其可者則熟究而行之不可則罷之有疑焉則廣詢而後决之使羣言得而衆事舉此應天之實也出知荆南府神宗即位除翰林學士知開封府王安石參知政事不悅獬宰相富弼在告遂除獬翰林侍讀學士知杭州府徙青州以疾提舉鴻慶宫卒右內相鄭公毅夫鄖溪集五十卷公之才行出處具見志銘焴假守安陸得公集讀之其氣節髙邁議論精確可考不誣於論綏州見其計深慮逺於論毁譽見其居寵思危若夫辨楊繪救祖無擇則特立不詭隨蓋曉然矣昔孔文舉謂盛孝章要是天下有名人如公之聲名赫然于世固不在孝章下而臨事實用復表表如是者使天假之年究其施設當如何哉安陸公鄉里而公之文集不傳為郡者得無恧乎乃嗇公帑之用刋而置諸校官將俾此邦人士知鄉之先逹所立如此因以勸慕興起其於風教抑有補云淳熙丙午秋七月郡守建康秦焴書鄖溪集原序考證原序第二頁前六行盛孝章盛原本作成案孔融集有薦盛孝章書成字誤今据改正
