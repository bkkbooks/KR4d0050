body:
  text: 鄖溪集卷一宋鄭獬撰制觀文殿大學士富弼除依前尚書左僕射門下侍郎同中書門下平章事昭文館大學士兼譯經潤文使鄭國公制門下秉籙膺圖將繼配天之大業銓時論道必資名世之元臣以言乎體貌則舊德之英以言乎望實則羣材之表爰立作相宜莫如公丕昭寵數之殊孚告治朝之聽具官富弼智資大雅德懋碩膚學足以造聖人之微幾足以通天下之變繇賢科之得雋攄逺業以奏功在仁祖時則首冠廟堂有弼諧九德之美在英考世則再登樞府有折衝萬里之謀庶績已熙太平將洽屬留侯之多病容裴度以為藩愷悌所宜神明自復方王家之不造固賢者之有為昔居畎畝而志猶在於愛君今處朝廷而義豈忘於憂國是用召從方守進拜元台仍左揆之舊班兼東臺之茂秩爰田衍賦盟府易勳茲實異恩庸昭注意於戲上理乎天工則日月星辰以之順下遂乎物宜則山川草木以之蕃近則諸夏仰德以承流逺則四夷傾風以待命凡豫欲治惟爾責成勉盡嘉猷用光丕訓可皇子和州防禦使樂安郡公仲糾可觀察使封國公仍賜名皓制朕既即位賜封諸子下國褊陋厥名不稱非所以安強王室而厚吾仁愛之意也皇子某生而頴秀敏行日聞出就外傅不煩師訓是宜推擇名都以建爾于北方而進之以亷車之任俾長侯國嗚呼維善人乃可以為藩維宗子乃可以為城爾惟寵至益戒毋作棐德則庶乎為藩之固而城之不壞矣仍易之美名併示優異可皇子博州防禦使大寧郡公仲格可觀察使封國公仍賜名頵制具官某昔周文王之子孫蓋為之宗者皆百世而不絶朕維吾子之孝悌幼而有美志思所以蕃大本枝之屬乃詔丞相考圖按籍以定厥封崇之以連帥之任進之以上公之爵可為優渥矣爾維敏于學愼于習毋好佚豫毋侮老成惟時戒哉勿貽後羞仍賜令名庸示我休嘉之命可三司使工部尚書可邉鎮節度使制門下金鼓作乎昏明雷霆類乎威罰撫師以處則大國勢以銷未萌仗鉞而行則耀天誅而征不譓屬之統帥我有能賢俾盡護於邉屯用交修於戎警輟吾司會往奠要藩咨爾羣工明聽嘉命具官某天資俊偉國所倚毗隤然文武之兼才展矣朝廷之重器純忠自立華髮不渝頃由起部之崇專蒞大農之政萬貨畢入九賦咸均金錢演於泉流紅粟腐於露積蔚有美績暴於衆聞將大任於賢謀宜專司於將閫是用前諏嘉日誕布徽章建六纛以啓行擁萬兵而開府茲為異數併示優恩於戲授以中權蓋重腹心之寄控其逺馭無圖首級之功勉盡壯猷遲聞殊效可龍圖閣直學士知諫院趙抃可右諫議大夫參知政事制鄭國之政創始於禆諶定論於世叔成文於子産舉而措諸民故無悔事况夫履四海之籍圖回萬變以佐豫丞相之治者宜有通方亮直之臣為之參二具官某純明不雜金玉自昭至行足以美俗雅材足以經世建斾坤維有愷悌之化蜀民歌之伏蒲中禁嘉言諤諤以時而入告朕識其公器可屬大事不謀於左右升之諫輔俾佐廟堂以與夫二三舊德坐而環議或善謀以先之或能斷以後之質於古而不謬行於今而不跲相須而成施之天下遂無悔事豈惟鄭國之陪臣與之爭烈哉可户部尚書張方平可參知政事制參議大政雖下丞相一等至於坐斷廟堂之論上則斡元化以調四時下則鬯至仁以澤萬類近則羣元仰首以承德逺則殊俗交臂以待命蓋與丞相之職業均焉具官某德性沖深撓之不濁髙風秀氣灑落乎塵外在仁祖時發明大册竦動天下結紳禁闥擁節藩垣出入三朝最為先進遊談之助不至於前斷自朕心擢陪宰席書曰寧王遺我大寶龜紹天明即命夫龜以兆吉凶猶足以為寶况仁祖遺豫以雋老哉往踐厥位汝其勿辭可樞密直學士邵亢可樞密副使制昔大禹受命伯益臯陶皆帝舜舊臣故禹有天下拱手而無救弊之政今豫不敏猥承大器二三論議之臣皆先皇帝所以遺豫藉之成太平之業者也具官某髙文奧學竦聞當世風力徑邁足以經乎萬務佐豫春坊忠論亹亹屬厭於上聽俾尹王府豪右屏迹豫之求舊宜擢樞庭諫垣進拜可無訓言維髙宗之命説曰股肱惟人良臣惟聖此上勉下之辭也維説之復王曰木從繩則正后從諫則聖此下諷上之辭也上下相飭至於大治爾其伏念髙宗之訓而豫亦不忘傅説之言庶乎合謀同力拱揖乎穆清之上豈不休哉可三司使吏部侍郎韓絳可樞密副使制先皇帝付豫以大器四海內外至於夷貊昆蟲之類莫不仰首傾耳以需朕之號令德澤其可懼哉其可畏哉維是一二夾輔之臣謀謨左右共濟太平則庶夫有以副先皇帝之遺志耳具官某髙材敏識善斷而不回試之劇要風采益峻大農之政飫乎衆聞固足以入贊樞廷以成萬機之務夫為君難為臣不易豫以先皇帝付之大器而又擇爾以共持之其不為難且不易哉爾其以仁恕公忠佐天下俾豫無疵政則孰能間爾之功哉可工部郎中知制誥王安石可翰林學士制文王有四友孔子曰自吾得回門人益親亦有四友焉維豫之翰林先生文章議論以輔不逮者蓋為先後左右之臣矣具官某學為世師行為人表亷於自進優處於東藩茲有僉言宜還中禁俾夫左右先後以道義輔於豫豈特專文墨視草而巳哉可知制誥可翰林學士制昔漢武帝尊儒學問子虗而歎息於是嚴助徐樂之徒攝袂而起我仁考皇帝以文章取將相故英傑豪偉之士釋芒屩解裋褐而摩肩乎玉堂之上今爾某乃吾仁考用文章選中甲科既亦試吏風績蔚然及在掖垣代豫號令訓辭深厚有西漢之風格宜置之金鑾以備謨議爾其以古之賢人君子事業以開道豫于治豈特為嚴助徐樂文章諷議而已哉可翰林學士給事中王圭可承旨制唐學士六人而年德最茂者遷為承旨深謀祕論率得預聞當時諸公由此以攝大柄者踵相躡也具官某風華秀整處謙履順文章雄駛如羣馬之四馳更直玉堂已踰一紀比之數子乃為舊德進承密詔僉曰然哉朕方以乾剛斷天下又得爾老筆輔之風飛霆擊以令四方其孰有不從哉可知制誥制號令所以鼓舞萬民一言為慶賞則天下莫不砥名礪節矯然思所以為善也一言為刑戮則天下莫不刳心剔慮悚然思所以去惡也天何言哉惟豫左右之臣實代豫言某官某績文育德為世望人珥筆螭陛之下以書言動蓋亦勤矣乃召試于政事堂訓辭深厚可用為余代言之任揚子曰商書灝灝爾周書噩噩爾俾豫之誥命灝灝而且夷大也噩噩而且明察也兼商周之美而成之書屬汝而後備焉可侍讀制二首入則聞正言出則行正道此古聖王所以闓切約束自致于善也况朕之涉道未深思得宏博通敏之士為之講解以爾禁林舊老學有師法宜入侍帷幄發明大義俾朕究知古聖王塞亂致治之源庶幾聞正言行正道由爾之勸講成之也可朕嘗觀古史自聖帝明王暴亂之君莫不具載燦然如觀星火然多聞闕疑孰從而質問宜有博碩之師明其大義以爾儒林之老通於古學久直禁闥朕所倚重其入侍金華以誦古史為朕講明前世聖帝所以致治之源而暴君所以傾亂之繇以昔鑒今日之得失可不勉與可太子家令率更令制家令治刑獄榖貨率更令治殿門刻漏皆屬詹事府以備司存以爾謹善老於儒學並次新秩進之然則鼂錯嘗居此官以政術顯是不獨專於沉務而已可祕書丞制魏置祕書令及丞以待文學博通之士故前世謂之天下清官今者亦自蘭臺著作之局乃得領職猶足以異乎常選者矣惟爾材業明茂嘗以治邑有聲使者言狀遂掌史氏三載奏課復授以清官其不為榮寵乎可太子賓客制朕既擇其師傅皆鼎鉉調元之臣乃朕碩德之老然而位尊德重燕見有時至於逰衍相講習則宜得端士為之賓從具官某道德深醇有不肅之訓嘗侍禁闥老而彌謹其令與吾子遊以備四客調護之義可太子司議郎制進善有旌誹謗有木記過有史徹膳有宰則尚何職於司議哉蓋道太子之善者欲其起居左右前後無不得其正也具官某致忠於國守節不傾屢更朝綴人稱其能今以為司議用典針誡昔馬周恨不居此官今爾之被選可以無太息矣可東宫官制士之生未有不須友以成之者今吾子幼而向學方有立志以爾諄諄耆艾行方而學醇可謂有師友之法矣俾夫與吾兒遊言而聞正道動而行正事少而習焉長有成德非爾之功誰邪可雜學士制濯濯之麟儀儀之鳯集我靈囿以為王者之嘉瑞惟朕之有文章議論之臣有在豫左右者若某道業精深通於治國家之體某祖德師經明於古人之變並處禁垣蚤夜不懈寖成挾維之功朕甚嘉之其遷某以某官遷某以某官以德詔爵孰謂不然方朕之憂得賢者以為嘉瑞詎比夫濯濯之麟儀儀之鳯而已哉可學士出鎮制爾以文章諷議出入玉堂之署燕見紬繹詭辭密對飫聞于朕聽而厭直承明之廬拜章懇懇願以試郡自效惟東平之區南負梁山北並巨野土衍而民淳足以卧治乃易金華之美號而往蒞焉昔嚴助請守會稽數年不聞問武帝以璽書讓之以爾之才固足以辦一郡勉樹休績朕當以璽書褒之以詘夫漢之侍從之臣有不能者矣可起居舍人制前世謂左右史正用第一流其選大精於尚書郎蓋執筆天子庭下以記言動較之古人則史佚董狐之職業也今爾某文詞清奧得雋甲科入直西掖以王言鼓動天下揆其才美宜以右史處之與夫前世之論第一流者吾無所愧耳可頴王府翊善守太常少卿直昭文館齊恢可守尚書左司郎中依前直昭文兼太子左諭德諸王府記室參軍尚書司封員外郎直集賢院陳薦可工部郎中依前直集賢院太子右諭德制唐制左右諭德掌諭太子以道德其內外庶政有司為規諷者隨事而贊論焉則處其官者其選可以不重哉以爾恢清謹亷正不失其常以爾薦質直和厚可任以事而或入道經訓或贊為書記使王有聞繄爾能力屬儲闈之肇啓擇郎曹而並進夫語道者非序而安取論德者惟行之為艱毋或易言以墜豫訓可龍圖閣直學士知河南府韓贄知鄭州祖無擇應奉山陵加恩制英考皇帝馭飛龍以升真藏衣冠於橋山萬國攬涕竭蹶以趨事而一二藩輔之臣實奮厥績豫嘉爾勞茲有優數維汝贄敏於行實濟之以夙給而司洛都之管籥維汝無擇老於辭學將之以仁厚而擁圃田之麾節各率所部協力以赴功米鹽精密無所漏遺廟祔已安宜酬慶典增國舊封衍之真食以庸制祿茲非懋賞之公乎可給事中可禮部侍郎制朕即政之初思欲考禮之文與其古今損益之數著為大典副於有司其孰能任豫之事而為小宗伯者哉丞相以爾某性寬而莊重居簡而有亷隅老成之德可以為世師鄉以序擢入拜青瑣而間燕賜對數有嘉論據經引義皆究本元宜可以奉明詔司大禮為少宗伯朕曰俞哉夫禮失久矣三代之純懿朕不得揖讓乎其間爾其摘去訛俗附以古文俾不詭於時義朕將執之以從事焉可給事中可工部侍郎制臯陶之謨九德曰日宣三德夙夜浚明有家謂能行三德則可任卿大夫以爾純忠徑節剛強而有立合臯陶之慮是可以為卿大夫矣起部副郎亦古之卿職也嵗次序遷往踐爾位無忘浚明之誡焉可右正言知制誥滕甫可右諫議大夫擢御史中丞制漢武不冠不見汲黯以萬乘之威而猶尊禮之况淮南之叛王乎然朕竊怪漢武不任黯以御史大夫止於主爵都尉而已豈真直道之難行獨見遺於盛世邪具官某閎才徑氣獨立無朋演訓西垣兼資諫列引議慷慨動中事機俾朕聰明徹乎萬里宜進秩於東臺以長憲府夫猛獸在山藜藿為之不採爾其奮勵骨鯁橫身朝廷助獨斷之大權闢衆正之夷路思報殊恩無憚後害如是則朕豈遺歎於汲黯哉可中書舍人除御史中丞制昔貢禹為御史大夫忠言蹇蹇書數十上時稱其質直傅宣為御史中丞明法繩下朝廷震肅人服其有威朕嘗重此二人以為真稱其職矣以爾某學純行修騫然介立不為利訹不為勢懾有古君子之操向處西掖典治誥命俾朕之言雷行而風動取信於四方者惟爾之能今擢之執憲以長乎烏府僉曰俞哉夫雖舜之聖猶上下相戒飭爾其拂邪納忠於內如貢禹焉夫雖堯之明猶賢不肖雜處爾其摧擊姦豪於外如傅宣焉俾朕不為受印之羞豈不休哉可諫官制五首拾遺品雖微而任莫重焉朝廷之得失天下之利病皆得以抗言而論夫舉朝廷天下之事以責之非為任重者邪才能勝其責則其施設於當然者猶有餘力否則官雖在七品猶為髙位矣以爾忠直介立侃然不回宜可以任其責其以某為右正言可某嘗以直言極諫對䇿於大廷下忠論亹亹陳指世政直出諸生之右朕嘗志之今諫列有缺擇之於衆豈可先他人而後汝邪既以直言極諫充其科又以正言踐其職可謂有名實矣爾其發憤吐悶披露得失毋忝爾科毋隳爾職以稱朕之夙志焉可朕嘗怪武帝以汲黯之質直而不用為諫大夫俾之出入禁闥補過拾遺以副黯之所願乃出為淮陽守朕甚少之以爾性寬而莊重居簡而有亷隅入直西掖發其辭令數有駮議今茲遷次又以諫大夫處之既授以紫垣之秩而兼以議論之職庶乎朕於帷幄之臣可謂無遺歎矣可舜為漆器禹雕其俎諫者十餘人漆器雕俎小過也何其諫者之相屬也然不若是不足以為舜禹後世之過有甚雕俎者然其折檻引裾蓋亦曠世而一有焉况朕之不明不敏猥承大器豈自必於無過哉此朕之所以蚤夜而懼恐者也以爾俊茂修潔濟之以經術命以司諫以補不逮朕之過失有如雕俎者爾其引義極言無有所諱夫以舜禹之心事於君其有不為忠臣者耶可古之聖王懼其不逮必求骨鯁之士俾之盡言於是有引裾折檻叩頭丹墀之士以致其直某官某深於儒學明悟強正可以處諫列以司朕過無為默默以取愧於古人也可侍御史制朕以某方正有經術能處大事乃任以為御史中丞朝廷以直為宜今中丞言爾介立無朋不畏強禦可中侍御史朝廷亦以為宜夫以朕之知某遂為稱職中丞繇中丞之言從而任卿其亦為稱職御史邪可御史制侍御史國之司直督視不法以肅朝廷以爾骨鯁盡節心不外顧可以執白簡以任御史之職昔侯文為東部督郵京兆尹劾之以為鷹隼始擊當取姦惡以成嚴霜之威况為朕之司直者邪秋氣至矣御史亦可以擊矣勉哉毋為東部督郵之羞可御史知雜制御史冠法冠以察不法蓋巳為雄重矣而知雜事獨據南牀衆御史下之不得抗席則其風采之震薄尤可憚巳某禔身檢行折而不撓向在言職引義慷慨愕愕有爭臣之風今擢處憲府總其雜事可謂有素節矣爾其據正彈畫肅清京師以稱御史之職焉可
