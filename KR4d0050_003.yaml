body:
  text: 鄖溪集卷三宋鄭獬撰制郎官制某官某精明能斷而人服其才某官某通博有文而世稱其孝各以風績列於郎署有司奏課謂宜賜秩惟職方氏掌九州之圖惟中都佐司𨽻以察不法並為前世之要官亦足以為寵數矣可户部郎中天章閣待制劉元瑜可左司郎中制爵賞之公自貴者始今夫文章諷議迭居乎內外者皆為士大夫之望閲歲寖久濡滯而未遷則何以勸于下哉具官某風力開濟動必解其理踐服衆職雅為先進計其功狀蓋有藩輔宣化之勞俾升都公以二左轄庶乎朕之爵賞仁于貴者以示于下其亦有勸者乎可發運使可兵部郎中制劉晏典漕事常曰一粒不運願負米以先趨其自任如此今京師之餉畢出于東南故擇爾領使粟行數千里而無膠舟之害京師充實可謂有勞矣歲滿遷秩其以七兵郎處之勉思職業自任之重如劉晏朕何患無宿飽之師哉可屯田郎中祝咨作坊酬奬可都官郎中制甲不堅密與袒裼同射不中逺與亡矢同汝以才敏總治衆巧齊金煆革莫不精利畜之武庫足以待國事而威四方古者治不去兵安不忘戰兹朕所以進爾以美秩也可三司度支判官兵部員外郎祕閣校理李大臨可工部郎中制爾以文辭中第遂更事任佐吾大司農之職取贏化滯本用强而不屈有司稽其最于法當遷起部清曹事膺寵命凡汝之强學力行將致其所有于人者已嘗志之矣尚煩朕之為訓邪可禮部員外郎御史知雜事龔鼎臣可吏部郎中制先帝以爾敦敏有經術不為豪勢所屈擢居御史府以知雜事持重守義務通大體時有所發則中外莫不憚服豈惟先帝為知人哉雖朕亦以汝為識所任矣夫仕至尚書郎皆為顯官而多不得居首曹今汝以御史之重兼首曹之選以榮制祿可謂充其德矣可近侍加吏部郎中制晉文帝嘗求吏部郎或以裴楷王戎進然而獨用楷則戎者猶以為少耶今吏部郎雖不領職以其冠左曹之首非道德侍從之臣不得參焉以某淹通有雅識出入禁林高文大册為朝廷光歲次宜遷乃以吏部郎處之使之在晉文之朝亦必置戎而授矣可吏部郎中制尚書郎皆為妙選然多不得居首曹惟才哲之美委于事任者乃得居之以爾明徑不撓屢更器使付以淮右百城震懾嶄然益見其風力齎課來上乃用吏曹郎處之可謂才與職稱矣可度支郎中致仕李宗易可司封郎中制壽祺之老以年引去超然自遂乎逍遙之境者雖寵辱之不能及逮豫之履位可無泛澤以嘉其素尚乎具官某履夷處順風塵不雜解紱而歸嘯詠乎樽酒之樂適兹大賚進秩名曹寵命儻來尚不為鄉里之榮乎可水部郎中劉緬四人改官制尚書郎更直建禮門奉常博士出導乘輿是皆古之美官廉俊喬雅之士多居之今爾等宿道修方見於治狀以時次補宜選之美官既已加賜又需汝之奏功焉耳可職方員外郎周革可屯田郎制先帝遷玉座于壽陵羣司奔走以率厥職暴露草次夙夜之勞兹亦久矣以汝懇心奮力敏以趨事復土告成相府上其功豫惟汝嘉賜秩田曹祗復優數以昭我大孝之烈可司門員外郎分司李微之可庫部員外郎制爾有嘉材敏識服次郎省年髮未衰屏處乎廬阜之下可尚也哉朕之即政澤漸乎動植况兹留務易退之臣得無增秩之賜乎介爾壽祺以永我之榮命可都官員外郎謝鴻知瓊州可職方員外郎制瓊管距中土萬里環以大海孤居於風濤絶險之間朝廷嘗飭使者擇本道能吏以為之守及其罷歸則又第其功狀而加秩一等今汝任職三歲為治有條次馴伏黎蠻逺人蘇息顧汝之勞應詔條可遷且明吾賞罰之功不遺乎萬里之外矣可屯田員外郎任逸可都官員外郎制尚書謂之文昌天府漢選孝廉之能文者以為郎隋始置外郎或釐其曹事今考次而升者蓋異乎古法而特以歲遷爾然爾之敦實清修治官有善狀課在有司亦不可以掩程能授職是猶不為高選者哉可比部員外郎知濰州蕭渤可駕部員外郎制汝以精明達于為政遂佩左符以長乎北海阡陌靜安無桴鼓之警有司較年遷以司駕漢世二千石有殊績者咸被褒異勉爾職業增秩賜金行復至矣可太常博士祕閣校理雍子方可祠部員外郎制豪雋之士羣居於册府講究藝文養其美德兹所以備天下之器使也以爾資性端敏秀于西州以文中科遂逰東觀尚書典詞今為名曹此纍日之遷也如其器使則朕將為爾圖之可知西山保州董允仲可檢校户部尚書制朕之初踐阼德澤浸於無垠東漸乎日域西浹乎月竁罔有不及而况蜀土之徼縻我爵號歲奉琛賮而來庭者哉具官某以才武之雄授節西土綏撫族類不渝不震胥附而面內適兹大賚思被寵光將誇美于有衆朕甚嘉之夫賞籯金而賜龜綬蓋倣古焉宜用進秩以榮我之休命可綿州録事參軍杜鎬加檢校水部員外郎制先帝躬執豆籩以饗上帝斂時福禧用錫于天下汝惟服宷為郡紀綱掾請如詔書俾均優澤水曺視秩往其祗踐毋怠可少府監劉允中可司農卿制舜之命稷曰黎民阻饑播時百穀司農之任也蓋自舜時已在二十有二人之列今雖失其職而挈名在籍猶居三品可不謂之尊顯哉以汝服勞王采治行有聞剖符西土吏民服其教豫維汝嘉遷汝農正勉思祗服以永來譽可大理少卿制舜為君臯陶為士其用刑可謂明矣猶曰欽哉欽哉况朕之眇末敢不盡心故常擇通恕之君子為之讞議大理卿言爾明允詳刑罔不協中既已試功宜用遷陟爾其體朕之訓言終厥績焉可荆湖南路轉運使衛尉少卿杜植可光祿少卿制汝出於名家以才能自奮數更事任美績發聞惟湖湘之南薄于蠻徼蟠亘數千里汝為部刺史相府上其課宜有遷次光祿古官維司少列凡南道之利害汝蓋以精心懇力講求之矣於朕之訓辭可略焉可宗正寺丞制先皇帝初即位時宗屬之在玉牒者才百人本支蕃衍結佩而仕朝者今餘八百員矣親疏之序隆殺之節有丞有卿以統之以爾器質端雅通於文理可用典治以序九族祗率明訓以副朕之甄擢焉可蘄州廣濟縣令張安雅等二人可著作佐郎制仲由宰蒲三年孔子入其境而善之今汝為朕治邑亦三年矣而部刺史交薦其能夫吾民之所仰法者刺史縣令而已朕方將進循吏以懷吾民其可不為之增秩耶可華州下邽縣令李元瑜等可著作佐郎制詩有之芃芃棫朴薪之槱之言賢者多而國家得以採用之也夫萬官之列于下猶山木之蕃茂廉按牧守之臣歲得以擢其高第者進補於朝惟爾等履忠樂職皆以高第聞宜疏優澤俾佐祕省所以申棫朴之詠而為國家之用也可西頭供奉官常用之可右清道率府率致仕右侍禁李襄可率府副率致仕古之仕者量其可任則受至於不能而止所以逺殆辱也朕嘉斯人之徒故於謝事而歸者必增秩以遣之往欽茂恩以安末路可內殿常班永寧寨都監石炳可內殿承㫖制爾奮身于絶塞之地以乘一障圖忠報國真壯士也訓兵秣馬戎備以修考之成績宜用酬賞勉厲武節以遲爾之來效也可內殿崇班梁從政可內殿承㫖制某以强敏見稱通于戎務久次內朝厥有的效稽之官簿宜在升秩往承詔㫖汝惟欽哉可兵部員外郎天章閣侍講知諫院傅卞可寶文閣待制制惟豫之仁祖皇帝以人文陶一世雲章炳炳下燭乎萬物藏之內閣以與夫伏羲堯舜氏之遺書並傳乎無窮宜得閎雅敦敏之士以需詔命具官某禔身檢行不愆於義勸講金華授學有師法與於諫列數進忠言蓋有夙夜挾維之勞首被兹選孰不為宜惟其執經便坐發明聖人之義者則不易汝職可劔南節度推官張士澄等可大理寺丞制萬官之才豈朕一耳一目之可盡之哉然而卒所以能盡之者寄朕之耳目於嶽牧連帥推而進之耳維汝修方宿業以廉治日顯薦牘交上可勿聽乎宜寵以廷尉丞以示我擇材之公可陜州司理參軍柳說等二人可大理寺丞制本道使者曹元舉等言爾亷謹治官有善狀章下有司有司亦以為績效明白如章所言可用進秩乃升爾以廷尉丞爾其祗踐以稱我懋功之意可高麗國進奉使可大理寺丞制朕聞太䝉之人仁太䝉東方之國也爾等奉其國琛踰不測之海以集于此其忠孝之心其得於太䝉之仁者耶朕嘉乃誠俾有真命丞於廷尉仍賜腰章歸而佩之足以夸榮於逺人矣可延陵縣令監原州折博務王頥可大理寺丞制爾以幹敏被薦掌貨於邊積幣通發歲用登衍第其成課法應賞次丞佐卿曹是為優渥往踐乃服益圖報塞可國子監直講可大理寺丞制太學有材之地必有英豪卓異之士羣處焉講之以詩書勸之以道德聳之以名譽至於成人而後已此國子先生之所職也某經明行修為時儒師朝夕誨導厥功茂焉其選大理之屬丞以厲夫教育之勤可常州司法參軍監汾州永利鹽監柳真公可大理寺丞制煮水為鹽征而積之以佐元元之賦其可廢哉爾以幹潔謹司鹽策美利增衍溢於萬鍾歲滿齎課薦者又言其能進秩廷尉庸非酬勞之公乎可河東節度推官胡朝宗可大理寺丞制才能之士落於郡縣猶遺金之在通衢俯而取之其有不顧者耶如汝之學通行周動而敏於事自帥臣而下薦書交屬乃用廷尉丞以勸其功朕之此授可謂得士矣可永寧軍判官鈕華國可大理寺丞制荀子稱賢能者不待次而舉以汝之才實暴炙於羣士間奚須曠日月而后進耶蓋甲令所著必其考言試功乃得以遷秩焉然而士之絶蹤而逺到者莫不由此而進則汝之奮翼騰上蓋亦自今日始焉可刑部法直官夏侯圭可大理寺丞制刑部以汝持議明恕罹文法者皆稱其平已閲再歲請賜以優秩此故事也宜升之廷尉丞夫于公為郡法曹陰德乃逮于子孫况其寵祿之及身者庸可辭耶可合州巴川縣令張仲容等二人可大理寺丞制有地方百里以行仁政此仲由冉有之事而汝等皆為百里長廉達信愛其民宜之賫其閥閲以上有司謂當遷秩顧朕何所愛哉將以勸夫善為政者耳可山南西道節度推官孫亞夫可大理寺丞制真宗皇帝時嘗較天下士以汝祖暨為第一及仁宗臨試汝又中甲科何其不相逺耶然汝父暨早世以殁未能宄其功烈今汝方發其軔而馳未見其止也則汝祖之志儻可以伸乎可䖍州信豐縣令鄭晉獲盜可大理評事制羣盜剽奪伏於林谷間汝親帥吏士以搗其巢穴績效明著合於甲令其遷廷尉六百石用酬其勞朕之賜賞可謂當功矣可太常博士龎元英將屯田員外郎回授弟元直光祿寺丞制朕以汝父先帝之大臣既已淪謝乃均其遺澤以及諸子而汝兄篤於友愛願上一官易以授汝朕何有不從哉將以成汝兄之美志爾可大理評事朱初平可光祿寺丞制汝以文得雋擢次科甲主畫幕府蔚有成績進見庭下稍遷京寺丞佐司宰厥維茂恩勉爾清修以需光顯可袐書監可左散騎常侍制天子之乘輿出則以散騎陪乘處則以散騎侍左右故屬車之間便殿之燕未嘗不與散騎遊也所以聞正言見正道將成乎聖德朕之初御天下思得賢者與之遊其不為慎柬耶具官某潔白高雅飾之以儒術至于華髮玉節不渝向處袐府典治圖籍有考合校讎之勞朕甚器之其以左貂金蟬𨽻於門下以侍宸極昔文王有四友孔子曰自吾得回門人益親則朕之命爾亦將為左右先後也可追官人孫亢等二人可文學制爾忽于官針自底于罰已更赦令與之自新稍遷散秩以觀其後可靈臺郎制荀子曰天行有常不為堯存不為桀亡然則日月之經㑹天星之隱見至於虹霓冠珥凌蝕之變不可不察也具官某考步天路窮其精藴占測祥祲咸有經驗稽其歲勞可用遷次靈臺之正俾之專領可原州司户陳汝玉可司天監丞制禆竈言鄭火子産以為人道邇則朕奚取於占天者哉誠不欲廢薦者之論俾之奏伎聊觀其所學爾因能授職蒞於太史必先正名兹非為政之要乎可曹察曹煜並可太常寺奉禮郎制朕舉天下以養皇太后猶歉然懼不足稱而况外家之親以時加澤其可獨靳哉屬朕誕辰萬國䝉慶其以皇太后近屬二人升秩京寺以表朕蒸蒸大孝之道焉可太子太師致仕張忭奏醫人張舜民可國子四門助教制朕之舊德之臣言爾習于黃帝俞跗之術丐以一命將旌其能可不聽哉國庠試職爾維祗踐庸示我之優恩焉可晉州醫博士武泰等二人可國子四門助教制日者下書以搜能醫守藩之臣以爾治術頗精疑可以應詔既以名聞何愛一命不為之甄采耶可殿中丞張太寧可太常博士制博士為秦官常擇通古今者處之今雖以次升然非詞學中科則猶不得與焉有司比課言汝以文取勝蘊藉有雅才閲其治實應法可遷夫爵祿公器惟能者得之勉爾職業豈特為博士而已哉可翰林醫官少府監宋永昌可殿中省尚藥奉御制汝以醫名家而精於金匱玉版之術久籍禁林稽其治驗蓋一二之失者鮮矣以事制祿其遷以殿省六尚之局益修汝職用祗服我寵命可職方郎中馮沆致仕一子可試校書郎制爾之父以忠潔自修白首不懈引章抗言請佚其餘年詔音財及而奄已淪謝加賜一子庸示朕之茂恩可敦遣人韓盈可試校書郎知縣制敕吏言爾行義甚高鄉里師之善積于家而賞行于朝古之道也其以某試蘭臺校書爾其勉敕不懈以師其民俾至於為善而後已則於時豈小補也哉可
