body:
  text: 鄖溪集卷六宋鄭獬撰制登極覃恩轉官制朕伏涕几下勉受英考之遺訓以御大器顧兹庶尹百辟共熙天縡宜霈榮恩顯示維新之命其飭有司具為條次按籍序遷以應戊午赦令稱朕意焉可翰林書畫等待詔覃恩轉官制天下之士能以一藝自名者咸列乎翰苑以需詔令肆朕之初厚澤霈然漸乎四海則于爾之服勤可無寵秩以示我維新之命乎可屯田貟外郎王善長等可轉官制爵祿公器也非朕所敢專蓋在乎賢能者有之維爾志潔行廉盡瘁于所職歷歲滋久有司受其會宜用褒進懋官懋賞兹非天下之公歟可南安軍大庾縣令程博文等可轉官制爾等以銅章墨綬秩六百石為朕治邑得仁恕篤誠吾民服其政齎課吏部在詔條宜遷蘭臺佐著寵命為著周之法曰以庸制祿則民興功勞而獲祿固可以勸有功矣可比部郎中孫周等可轉官制司駕為乘輿之職而中都官掌督軍事是皆古尚書俊乂之選今汝等秉心方潔出為郡刺史考其能最又進以尚書之屬官禹曰明試以功車服以庸朕之賜秩庶乎及有功者矣可虞部員外郎章延之等四人轉官制廉能者上過纍而不任事者下或遷焉或斥焉此有司比羣吏之大法也某等端靖祇肅敏于為治有司言其廉能應詔條可遷差籍序次並加優秩可供備庫副使王繼遠等二人轉官制蠻戎屈膝而面內中國無風塵之警才武之臣畜力懷勇不得暴其所長以取不次之賞乃用歲月歷級而敘進雖然朕亦嘉爾等通敏有壯志不撓法以圖功恂恂相與垂紳于多士之列則彼逢時不寧攝弓而疾馳以求首級之效者又何足貴哉可虞部貟外郎陳世卿等六人轉官制文昌之司計貟外奉常成均之博士與夫殿省之屬丞皆著籍禁中委佩而預朝謁者也汝等咸奮嘉績課在有司歲月之勞率用次補勉圖忠力以副我懋官之意可都官貟外郎翁彥升等五人轉官制本朝之制凡秩滿三歲有司考其治狀而進之加次一等焉今有司言爾等砥節首公以蒞所職第其年績宜用彚升朕惟祖宗之甲令何敢有失哉可比部貟外郎孫慶祖等四人轉官制有功者進則羣臣勸不能者退則庶工熙三載黜陟古今之常制也爾等樂職秉義治行有聞兹惟奏課咸用增秩夫尚書六曹其屬二十四司皆所以進有功者也勉爾嘉績無忘我寵命可左藏庫副使知丹州王懷勳西京左藏庫副使充岢嵐軍使王懿並轉官制控弦之不鳴戰士偃旗而息鼓無漸襟蹀血之勞然而封疆之臣於無事時能撫循吾士大夫明分部逺斥候以待彼之不來亦可為善守者矣爾等才武自奮通于兵略乘鄣絶塞當夷狄之衝校以歲月宜酬厥庸夫惟竭忠致力以圖爾之厚報焉可大藩通判轉官制大鹵之鎮為西北巨屏嘗以道德元老為之牧帥則其關治大政别乘之任亦宜有以稱之具官某文學深博緣飾吏事佐大府有勞歲滿當遷酬庸制爵乃以中都副郎進之以稱元老之副焉可朝臣轉官制匠石之林無軸解不材之木者匠石擇之則吾明庭之下結紱而朝者何嘗不考實而進之邪維爾清約靖恭顯幹庶職比其歲課功狀明白則朕之所擇明庭之士皆可以為嘉材矣可集慶軍節度使張孜遺表男內殿崇班諷等轉官制朕惟仁宗皇帝為太子時左右舊臣顧亡一人在者惟汝父孜以才自顯在國有勞夀考富貴煒然獨見于後今復淪謝兹朕所以慨歎之無巳故加賜其子若孫凡十人遺澤之盛殆與諸家異矣然朕亦聞汝之兄弟忠謹有立能守其業則朕之兹授又不為幸恩矣可翰林醫官李居中等可轉官制朕既授天下大賚于爾庶工而禁林上醫針盲起廢並以其術顯宜比其名數以次加賜爾惟欽哉祗服我之休命可職方貟外郎萬及等五人轉官制具官某等咸以廉明祗于事事舍君命而不渝者也程能會課按籍而遷乃以中臺之司田郎中都虞曹之外郎與上庠之博士差其秩以進之夫有功不勸謂之止善朕何敢止羣吏之為善耶某可殿中丞鄭才等三人轉官制周變舜之法三歲則大計羣吏之治而誅賞之今士大夫之進亦用三歲爾等秉節在公恂恂不懈會其行事宜用進律夫無功不徒廢必罪之有功不徒置必賞之朕于廢置可謂明白矣某可梓州觀察推官陳安仁等轉京官制小宰之正羣吏以敘進其治今吏部核其功狀而敘進于上正小宰之職也爾等廉方奉法佐幕有成吏部言其最宜進秩京寺懋官懋賞兹非至公之論歟某可太常博士徐師旦等三人轉官制大舜之治三載考功三考而黜陟至神宗迹其舊法比羣臣之功狀閲三載而進秩焉爾等皆以方潔服勤王家有司第其課而上之宜加爵一等朕惟大舜神宗之定論其敢少易哉某可簽判轉官制日者朕以將軍鈇鉞賜丞相某俾鎮關中爾以辟書實參其軍事丞相之政既成則合謀同力以濟厥務非爾而誰耶可進秩殿省以酬其左右之功可比部貟外郎孫勳等轉官制今之郎官雖不領職而尚書北斗之司諸曹猶爾高選爾等志潔行廉以能任事奏課來上法當遷次司駕中都虞衡之掌並為懋官勸功樂進兹朕所以馭羣吏之術也可殿中丞致仕申陟等登極轉官制古之禮高年所以逹孝悌于天下今朕之膺駿命凡辭榮而里居者咸俾增秩升于舊次詎惟示恩榮以優吾老者哉是亦將勸夫孝悌者焉可登極覃恩致仕轉官制華髮之老致吾事而去雖寵之不能及而屬豫之襲天祿豐澤浸乎毫芒宜增秩次以嘉其素履維爾沖尚遺榮于時我有褒章猶不為鄉里之榮乎可英宗南郊今上即位加恩轉官制先帝薦鬯于中壇澤被方內錫命未究而登真逮朕之纂武復用大賚恩榮可謂隆矣賜勳增秩并示寵嘉往維祗踐以光于朝次可立太子賜為人後者勳一轉官制漢之立元子賜為人後者爵一級所以正大本凡為人後者錫以勳官蓋有古之成憲是豈為幸恩者哉可駕部貟外郎顧元六人轉官制羔羊之詩曰羔羊之皮素絲五紽謂大夫之在位者羔裘以居其節儉正直皆如羔羊也惟爾等並升朝序履正奉公不以私汙義有羔羊之德朕豈不與其進也哉次其功狀賜秩有差服我寵章無為古大夫之羞可六宅副使葛宗晟等可轉官制列使之有介所以待才武之臣而為等級之漸某等並以忠力勉于事任有司稽其閥閲宜有敘進圖乃勳效以稱我陟明之典可沿邊都監轉官制訓貔虎之士聞鼓聲而進金聲而退左右折旋而不可亂者其職在都護耳爾以開敏強毅御下有理積歲纍功樞府言其當遷如有鳴弦之警者當責爾之成功可沿邊巡檢轉官制爾奮身于絶塞之地以乘一障圖忠報國真壯士也暴露歲月邊警不作考之治功宜進優秩勉勵武節以觀爾之後政可邊將轉官制古者得一首而賜金得一級而𨽻五家功與賞相值焉然則朕豈樂為哉蓋吾封疆之臣牧圉于外敵人之為冦不敢南向而馳朕得以視聽乎昭曠之外兹非爾禦捍之力耶宜其進爵加等以明夫任德而勝不責戰功之意也可武臣轉官制三首爾勳閥之後以才武自奮服于內朝率職無廢今復進之華敘以介諸使我之勸賞蓋不為濫寵矣可爾通籍于禁闥而護朝那之兵亦為顯列矣今又課最當用遷擢俾列內朝以奉制旨夫奮身于戎馬之間機變之生間不容髮宜思所憂以永終譽可朕宿兵于回中擇爾為之都護訓勵以時士樂而勇鉤考功狀宜進厥官賜之內帑之秩以介諸使此歲遷之常也宜思竒績以取不次之賞可郎官轉官制傳曰忠信重祿所以勸士惟爾之端誠近義可謂有忠信矣文昌天府升以郎次可謂重祿矣而盈庭企之而思進者某亦有以為勵乎可朝官轉官制京房之議曰日蝕久青陰霧不精此以毁譽取人而致也考課之法不明遂干乎天地之變邪然大舜嘗重之朕何敢疑某或以才選或以言進皆朕熙百工之臣也各試其功並著明效宜進序朝次以擬大舜之法焉可天道之行三歲一閏于是四氣序而萬物成則夫代天工而凝庶績者亦用三載考其治否而升黜之于是百職序而萬化平汝等清方廉正並攢于朝夙夜之績載于功狀而當一閏之期宜用增秩以序百職而平萬化焉可登極致仕官可轉官制先帝屬豫以大器思以澤浸周乎土域而序之耆艾挂車而家處者得無增秩以慰夫高年者耶有司較籍咸用加等豈惟及人之老哉亦將勸夫鄉閭孝悌之士以事其親者焉可國子監直講轉官制孟子稱樂得天下英才而教育之王者不與焉朕闢太學以待四方之英俊而又擇明師為之講解則王者何嘗不與此樂哉具官某以經行聞于世橫席喻學者于兹再歲矣宜有以酬其勤以畢諸生之業然則教育英才其亦有孟子之樂乎可殿前馬步軍諸班廂禁軍指揮使巳下兩經恩加勳階制仁宗皇帝躬饗乎明堂天下蒙福封拜未畢而屬朕纂承復加大賚于此將及歲矣宜令有司趣行褒命懋勳優級咸與均及以稱朕之意焉可諸班直廂禁軍指揮使已下一次經恩加勳階制朕既受神器德澤被天下凡相臣將臣至于在庭之士咸蒙寵命王師內外有屬有正可無加賜以為軍中之榮乎可英宗南郊百官加勳制繇上柱國而下至武騎尉凡十有二轉雖無所治職而用以酬有功是亦榮名存焉爾先帝既親事于南郊燔柴薦鬯熙事備成嘉與士大夫共饗其福慶賜未畢倐駕升真其趣有司務行詔令差次而授焉可殿中丞分司南京馬淵可國子博士加勳落分司制朕之初授神器推其德澤以及于士大夫而汝以疾恙分務留都今既巳完壯則亦欲引吾之德澤復出以就職其可不從乎成均博士與其勳品皆為新恩以光舊服可西平州進奉都部押石光陳等加保順郎將制朕方承天序以臨萬國汝奉其琛賮凌涉海嶠而來稱慶乎闕下豈無渥恩以嘉爾之勞乎郎將古官往惟祗踐庸示我柔逺之義焉可登極賜為人後者勳一轉官制朕之眇末猥傳聖考之業維吾之士大夫蓋有刻行立名能顯其親者焉故深詔有司凡親在而為之後者以悉賜勳官兹豈私恩哉將以明豫道勉夫承家幹父之難耳可登極賜為人後者勳一轉官制朕既受先帝之神器亦思天下之為子者將以均澤焉而汝勵節登朝乃父在堂安几而就養既巳為人後宜錫勳閥以應赦令往哉欽豫之嘉命可德順軍副知客蕭德等進奉登極加恩制先帝履位爾嘗奉幣而來涉道之逺未有以嘉其勞今其自言宜用均澤是亦先帝之著令耳可客省承受謝應期等加恩制朕既繼大統灑澤乎天下罔有不均而汝等𨽻職于兹以待四方蠻夷之會蓋已勤矣得無遷次以示吾湛恩之及可諸州衙前押登極進奉加恩制朕初繼大統連帥嶽牧之臣擇其屬校奉土貢以慶于闕下水陸間關涉履之逺兹亦勤矣可無渥澤以慰其來乎可中書主書吳溉等加恩制朕即政之初大賚于四海罔有不暨兹惟衆史服勞相府蓋已舊矣宜較乃籍以次遷授庸示朕之茂恩可英宗南郊致仕官可加恩制先帝既見天神泛澤于下未及周洽乘鼎龍而去肆朕之纂承不敢怠廢其敕有司趣行褒命則引年耆俊之老其可後乎宜增勳閥以為鄉閭之榮可御前忠佐周德等加恩制朕初踐阼思沛其德澤下浸乎萬物况吾衆忠力之士嘗提虎旅以備軍衛者哉惟汝等趫武被選有此勇爵服勞宿夜至于白首疏恩之及豈宜遺汝之遲暮耶可太樂局院官鄭永和授金城縣主簿制太常言汝祗服大祭祀閲歲最久無有咎罰宜在序遷以酬其勞視秩勾稽其往無怠可集賢院楷書成永泰可江陵府公安縣主簿制汝以勤敏𨽻于册府者久矣纍加歲月訖無過咎今出佐一邑將觀其成慎爾所守以祗服我渥澤可稅户張政年一百歲可本州助教制古之高年咸得賜爵以汝期頥之夀安養田廬霈澤之及特升一命告爾鄉人庶知吾之老老焉可賜出身制將相之胄多陵遲于世固非其世德之薄蓋膏梁厚味不能自立誠可惜哉爾讀書業文枤然獨秀用其遺澤俾試于禁林辭律可採遂升以造士之第勉修道義以繼于先烈可屯田郎中致仕王希男博古可試祕書省校書郎制國之甲令自尚書外郎引年而祈去者咸得官其一子今爾用是試以藝閣之校讎不為優澤乎爾其佩服深恩思其肯構之難無自怠焉可廣西轉運使董詢遺表男基可試袐書省校書郎制日者爾父詢持使節出南粵蒙犯乎海煙嶺霧之間卒以不幸聞朕甚憫之故雖爾幼子眇然在襁負者亦得以推恩焉庶乎爾父之魂知朕不遺其家世也可故户部侍郎致仕周沆親孫孜可試祕書省校書郎制乃祖沆請老而歸顧其諸孫頎然尚未有在仕者即以孜徹聞願賜之一命藝閣試秩吏選差高往服明命無忽貽謀之訓可
