body:
  text: 鄖溪集卷七宋鄭獬撰制治平寨楊奘川蕃部極勒薩等獻土地可本族軍主制爾等相率欵塞挈地而來附朕以四海為疆埸奚取乎尋尺之田哉蓋嘉爾面內誠信明白宜申顯命以主其軍事爾其奮勵忠節綏緝夷部永為我保塞之臣可西南蕃附進蕃王龍以嶽十九人推恩制爾以豪武薦居南徼之外發其珍幣嚮風而來獻忠孝之心萬里洞見宜被爵號以誇勞於殊俗可親進部轄龍以烈三十一人推恩制汝等獻琛奉贄絶不測之險俯首交臂並見於天子庭下其誠心蓋有足嘉者夫賞籯金而賜龜綬古之制也宜加寵命以慰其來享之勤可押伴衙前陶稱二人推恩制汝𨽻於逺服與其蕃酋奉土來庭凌絶險艱道途之遼蓋亦勤矣俾膺渥澤以奬其誠可皇長女封延禧公主制門下在昔帝女之尊髙擬列侯之貴服之以紫綬辟邪之玉珮重之以青絡厭翟之軿車蓋將端本于王風豈特增華于禮采其居則嚴奉公宫之訓其行則懋成爾室之宜載降寵名用基美化皇長女瑜華初秀蘭茁浸芳夙開右帨之祥首兆塗椒之慶教未行於保傅性已見于柔嘉方昭寶裔之蕃宜霈徽恩之異非顓私愛具有故常賜以列封未啓蘭陵之大邑冠之美號將主同姓之諸公於戲踐王姬之上儀席天孫之貴胄甫當妙齒特渙豐章期秀質之夙成與淑聲而永著佩我明戒保兹寵靈可太子太傅梁適妻封兖國夫人制仁祖之輔臣以老告歸肆朕之初既已加賜則于其小君獨可闕乎具官某妻某氏柔嘉有禮淑聞藹然出于髙華作配丞弼魚軒象服數被褒封考之四履盍以為益眷兹東魯聖人之國益為脂澤庸非優渥者哉可昭德軍節度使梁適曽祖母陳國太夫人鄒氏可追封楚國太夫人制先皇帝既授朕以大器沛然發澤下漸乎萬物雖至于神靈之幽逺亦思有以綏安之則襚章蜜印所以下逮夫臣工矣具官某曾祖母鄒氏幽間靜専躬履四教積其餘慶再世而顯推仁而上蓋嘗有湯沐之賜夫楚大國也江漢之域紀於南方裂為新封以告其第兹不為配廟之榮乎可梁適祖母燕國太夫人衛氏可追封楚國太夫人制致恭于祖者所以致孝于父母而移忠于君兹世之賢子孫能奮耀于盛時而推其渥澤以榮乎先烈者蓋亦有移忠之訓焉具官某祖母衛氏柔嫕處正以佐君子畜德在原愈久而愈發有子有孫咸以文章謀議再世而俱顯餘慶之及可無信乎宜用褒章易以大國神靈不昧亦知夫積善之效歟可皇伯祖東平郡王允弼母光國太夫人耿氏追封楚國太夫人制春秋之義母以子貴所以重本反始昭後嗣之觀況余之尊屬雄兼兩鎮榮列王爵位則據師保之隆極內史之貴而褒親之封尚食小國蓋失春秋聖人之法焉具官某母某氏柔懿靜専有均一之愛履懷既茂生子必賢處謙秉哲為宗室老永懷大孝之美請益以湯沐眷兹南楚軫翼上遊衍為四履不其盛歟豈特為禰廟祇配之榮亦足以慰孝子北向之悲矣可母沛國夫人段氏可追封衛國太夫人制名臣之後能以才美自列于世豈惟身享之乂將追顯于其親則褒章告第寧不為榮耀者耶具官某母段氏柔明莊淑承祀不失職內治以成奄忽蚤世慈懿之訓施及賢子屬朕繼明乃以衛之故封衍為湯沐夫存則安其養沒則時其享轉轂百乘不如負粟之為樂兹雖不逮猶有大國之賜足以慰其孝思可母越國太夫人閻氏可追封魯國太夫人制奮嘉謀以輔世者人臣之大忠施厚澤以顯親者人子之至孝士之逢時以富貴震發而遂能兼忠孝之享者亦以鮮矣具官某母閻氏恭以事其長順以友其夫既有淑德生子必賢起而登庸佐豫先皇帝以熙乎庶工屢更大慶褒章纍屬而下今復有請願易以東魯永維慈訓朕何有不從哉可集慶軍節度使同中書門下平章事宗諤適母劉氏追封祁國太夫人制位兼將相爵為國公王族之貴莫踰于此而九原之賢榮號未及追賁之典庸可闕乎具官某母劉氏幽間成德姆教醇備佐餕于爾家降齡不淑先朝露而化兹有令子為之請封其以冀北之祁列為湯沐庶乎祗配禰廟以時薦享不為世室之榮乎可繼母宋氏可追封崇國太夫人制孝治之君不遺人之親況朕之尊屬兼丞弼之貴者慈闈早世榮祿不逮其可獨遺之哉具官某繼母宋氏出于鼎門來嬪君子婦德母訓蔚有令譽壽非金石久已棄養嗣子引章請加封國口澤雖存宿草已秀聲容曖然尚能欽我之休命可皇后乳母賈氏可封遂寧郡君制賈氏保育中宫有夙夜顧復之勞無德不酬宜錫以榮號郡田裂封用備脂澤優異之寵惟其祗飭以安爾之壽康可屯田員外郎王廣淵弟太常博士臨亡母嘉興縣太君朱氏追封真定縣太君制孝子之於親既不逮於養則雖欲報其覆育撫視之恩豈可得哉此曾子所以對乘車而隕涕痛其親之不克見也惟汝之母氏恭順匪懈勤勞于而家壽非金石早世而沒獨有令子乃為之請襚雖無以追三牲之養其猶足以慰孝子欲報之心可繼母福昌縣太君許氏進封永安縣太君制有子以仕於朝慈顔而白髮就養乎髙堂之上私門之榮莫踰於此某官某母某氏柔潔端莊治內有法二子既以才能顯於時則脂澤之封宜有以均及昔仲由負米為養猶足以致樂況夫以尚書郎太常屬官之祿以奉其親則其為樂不猶侈於為仲由乎可韓國公從約女封縣君制朕之誕辰內戚之諸女得以裂邑而賜之蓋甲令也今以汝四德之修結褵于盛族宜飭有司按籍視封擇以美號以稱吾展親之義焉可屯田員外郎王廣淵弟太常博士臨妻太和縣君盛氏進封天興縣君制某氏德成於閨門而仁及於宗族蘋藻豆籩不失時祀俾其夫能専治於外而無私憂者蓋其有助焉及兹霈澤宜錫以封君之美號以榮養於其姑以恭事於其先廟則王氏之家其亦浸盛矣可宗室女封縣君制朕之誕辰而玉牒之尊屬率有惠澤以及之而其諸女柔嫕成性姆教純備長而從人共成其家宜有湯邑表之嘉號爾惟欽哉毋失婦職以隳我之休命可千牛衛將軍世榮等妻可封縣君制朕誕彌之日海宇蒙福顧豫內宗之婦未及加賜甚非睦族之義其令有司考合故實擇美邑以錫之勉爾令淑以承而家以顯我之孚命可集慶軍節度使宗諤所生母朱氏可追封永嘉郡太夫人制生而褓負三年免於懷及其能冠知所以反哺之報慈闈已掩不逮乎致養銜悲茹歎遂為終身之戚具官某母朱氏令淑有儀勞於夙夜積善之效是生賢德引言故事願均追賁之恩夫松檟已成列萬鍾之粟乃至將以慰爾孝思則非褒章告第何以榮及幽壤哉可贈父制昔之負米百里嘗歎夫不足以為養至其賜粟萬鍾列鼎而食則親闈就掩而榮祿不逮其為感痛何如哉故朕推其孝思於訪政之初悉用追賁以顯教忠之訓存而不能饗沒則褒命及之餘慶之榮猶足慰乎九原矣可都虞候指揮使已下贈父制以忠教其子服力以衛上頎然武辨董正乎師徒屬朕繼照沈恩下浹亦念夫天性之愛以逮其親焉宜申顯命以次褒遷夫榮祿及養世之所共樂今兹追賁得無昔人過隙之感乎可宗室贈官制生而享榮祿沒而加厚贈此親親之義也具官某恭慎恂恂樂善而不倦遽兹物化朕甚悼之其以環列之上將并加公封以為襚典庶幾申朕慘惻之懷也可追贈宫人制爾以良家入選久侍內掖幽間靜淑不違女史之訓逝水不留遂與萬物而化去兹可增歎其襚以象服闕翟之衣以賁其泉壤可仁壽郡太君李氏可追封嘉興郡太君制詩有之欲報之德昊天罔極蓋痛夫顧復劬勞之恩已往而不可報也雖然生不得刲牛列鼎以具其養至於沒也則密章襚服猶足以致孝子之思耳具官某母李氏黽勉婦事成乎而家有子才武顯發於後世請錫榮號以易舊封庶乎欲報之心于此而有獲焉可追封京兆郡李太君制蓼莪思親也昔之感痛於此而涕洟豈其罔極之恩無以為報乎則豫之孚號天下士大夫咸得褒命其親詎惟旌徙鄰斷織之訓亦以慰後嗣追養之心耳具官某母某氏藴德靜専治內有婦道今其令子作我藎臣推其孝思宜有以追賁維是秦雍之疆古之王府疏封告第以示褒榮庶幾蓼莪之感可以掩卷而輟泣矣可追封樂安郡張太君制本朝真拜三司使褒贈之澤推其禰而上及於皇考視大丞相之貴蓋下其一廟矣至于他官雖登三品猶或不得與焉歷世尊顯豈不為大榮者耶具官某祖妣某氏肅雍慈懿以宜其家盛德昭發乃有令孫為朕之名卿長於計府參考故事宜加襚禮乃以趙之樂安以為湯沐邑永惟幽壤歆此異數可安康郡太君盧氏進封太寧郡太君制朕既已褒顯其先正為之慘惻而愴懷知夫榮祿之不逮也則又聞其壽親之在堂慈顔白髮以見其子之榮耀乃復釋然以喜疏封進律其可闕乎具官某母某氏柔明履正治家有法作嬪良族是生令嗣今為吾大司農益著風迹是非由賢母之訓也哉宜擇其名都以為湯沐邑昔毛義為守令得檄而喜蓋欲其祿之及親也今某之仕固貴於守令而其親又有郡封歲時拜慶佩魚擁笏奉巵酒以稱壽豈比於義而已哉可謂榮於為養矣可治平登極覃恩百官敘封父制夫生而處膝下成童而就傅既壯而從仕此義方之訓漸纍習貫而成就之故其居家則以孝悌稱登朝則以忠實顯駢然佩組悉為朕之能臣屬兹履位既已加賜則流根之澤獨可不至乎美官豐秩躐次而升豈惟及人之老以成吾仁政而已哉亦將勸夫善於教子者焉可南郊百官贈父制英考郊見上帝四海蒙福頒慶未究委裘而登仙肆豫纂服敢忘繼志之美乎具官某父某躬履吉德善迹可師以忠教子能世其家宜申襚典慰爾營魂則豫英考之遺澤猶漸於九泉矣可南郊百官贈父母制仲由稱從車百乘纍茵而坐願負米百里其可得乎此言孝子之祿痛夫不得逮乎其親也故椎牛而葬不若雞豚之為養良可慨歎日者朕躬執圭瓚以見於仁考漼然以泣恨慈顔之不復問安也亦念夫吾之士大夫其亦有霜露之感風樹之嘆者乎以爾之考妣賢哲之後有此令子綴於朝列宜推漏泉賁于幽宅雖不足追仲由負米之樂亦庶乎慰康公下泉之感云耳可贈母制君子履霜露則怵然而懷創以為牲祭雖豐不若釡粟之為樂也朕之繼大業慶行于士大夫亦念乎北堂之賢母祿養不能及乃飭有司裂邑而封之庶乎以時承祀榮號在列執籩進享猶足以慰霜露之悲乎可封母制夫啜菽飲水甘於東鄰之牲蓋樂夫髙堂之壽親得以安於禮養方朕之授神器大賚庶尹亦欲褒命及其慈闈則湯沐疏恩足以表擇鄰之善昔之得賜羮猶以遺其母今朕以邑土之封遺之不亦榮乎可封妻制古之正家所以正天下朕已襲休命恩章駢纍榮及乎私門則主饋於內成爾室家者可獨遺之哉其飭有司按圖考次賜封脂澤無失爾職以儀我正家之美可封妻制某妻某氏朕獲神之嘏敷錫在廷宜有恩章逮于家室往承新命其亦榮哉可敘封妻制朕既加賜于庶位推而上之以及其親則又將均澤于爾室家詔函重纍而至第顧不為厚哉蓋正位乎內以柔德佐君子不可以不及豈惟湯沐之為榮以誇美於鄉閭是將風天下而正夫婦兹亦有周南之意乎可
