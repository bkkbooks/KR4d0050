body:
  text: 鄖溪集巻八宋鄭獬撰詔登極訓飭諸臣詔古者禹稷相稱不為朋黨孔顔相譽不為比周葢夫聖賢之人秉天下之公議推仁恕以待物故其樂道人之善光華擬乎日月機智通乎神明措民治國同迹乎伊尹周公不為過言也公議而已今夫攬大權處貴仕其有所譽也則皆諂言諛色蒲伏逶迤嘗卑役以事之矣其有所為也則皆詭論怪行以驚動流俗而嘗被寵矣其有所毁也皆其履道自髙而不為隂附者矣向已者榮之背已者辱之朕何望乎公道之化行也縉紳之士相與議朝廷之政幸而有賢者不次而進焉則莫不囂然相訾以謂不足以與進也暴其瑕釁顯於岳牧諷動臺諫以力圖排斥至於沉溺而不用則又相與嗟戚私怪朝廷之不進也葢其進則與已之相軋其不用則無累於已是非相貿黒白相渝洶如波濤無有止息之期言者不公聽者不明無切磋規戒之美有翕訿讒搆之謀首公奉上之節廢徇已死黨之義成於是賢不肖相乗更相陵奪雖有師曠之聰聽之安得不惑哉朕初嗣位涉道甚淺當朝奏議惟三數大臣而已至于百執事之列才否邪正昧然不知故於朋比所宜深曉小毖之詩曰莫予荓蜂自求辛螫謂成王初授政以戒夫懐諼而罔上將置於法焉咨爾具寮深圖善道無干朕之有司故茲訓勵體朕意焉訪逸書詔朕惟先聖人之書不傳則後世無以見其迹故古之網羅遺逸雖山巖屋壁之藏皆搜抉而出上藏之以金馬石渠之署延閣祕室之深自仲尼之所論著至於諸子雜説天文地理術數方伎兵農之書罔不畢集又擇明博通辨文章之士以羣居講解刊正其繆戾朕甚慕焉日者常飭有司増葺儒林之舍置校文之官更為善本以充四部而遺編墜簡漫滅歳月亡者不補缺者不完校其舊藏十失四五其令有司具為條例購之束帛訪於天下庶乎淹中之逸禮汲冢之遺史金匱之竒經名山之祕牒亦源源而來上矣戒諭郡國舉賢良詔漢氏以災異詔策賢良將以圖過失以答天譴然則賢良者宜國家素具諮訪講摩消伏未萌奚至乎天變地震山壊川溢驚動人耳目然後懇懇詔諭以索其大對耶朕甚不取今朕初授政涉道未深萬事之源未能洞徹此正宜博攬豪傑之士以新大政之時也故謀預慮則不蹶事預脩則不撓賢者素具則禍亂弭而善祥來朝廷已治百姓已安則雖有天地之異孰為神怪哉其令郡國搜舉賢良助朕不逮至于蒿萊巖石之間深藏而不市者亦宜以厚禮聘之且告朕之意曰與其樂於畎畆曷若推其澤於天下哉豐祿厚爵非汝而誰居乎下州縣勸農詔朕憫夫四民之務而農者之為廑也闢土而耕暴於烈日既溉既種手足為瘡西成之日吏賦民逋曾不得充腹而食囷窖益空杼軸益廢執耒之民由此而去南畆游手於末業遂使天下之疇化為荼莠此葢刺史縣令不務勸督之過也夫五畆之桑植之為帛可以無寒一㕓之田耨之為粟可以無飢元元免於寒飢則仁義可行故曰既富矣又何加焉曰教之葢王道之本也方東作時其令郡縣躬之阡陌以勸耕桑稱朕劭農之意焉求直言詔惟成王初即政懼不能承父之業乃訪羣言於廟中故其詩曰訪予落止率時昭考訪謀也落始也昭考武王也以成王之賢猶恐懼以謀於下况朕之不敏處乎深宫之中未嘗試諸艱難猥受神器之重可不懼哉今萬事之初未能徧燭其果有偏謬而悖理者耶大則動天地來災變以害元元次則傷教化戾仁義以萌禍亂其令羣工百辟皆得上封事刺朕過失朕非惟用其言固能以崇秩厚祿尊寵其人矣夫成王懼其不能此所以為能也則朕庶乎可以守先帝之業矣傳曰武王以諤諤昌桀紂以黙黙亡則亦庶乎賴爾士大夫以昌也宜告天下俾識朕意戒勵求訪猛士詔齊湣以技擊强魏惠以武卒奮以齊魏之褊陋猶以勇士詘諸侯况朕之兼有天下哉今夫寇盜滅跡行萬里而不持兵荒忽之場獸言鳥舌蒲伏而請吏可謂得不戰之術矣然士不素練不可應卒雖甚盛德不可去兵故朕於預備之謀豈敢忘哉於内則羽林佽飛交㦸而倚侍以宿衞乎京師於外則材官騎士屬鞬而乗邊以折衝乎夷狄武衞之威赫然震懾四夷猶慮夫鷙强之士伏而未出顧必有抃牛扛鼎超乗拔距之徒􅀈弛於屠釣之間者其令郡縣精加采獲咸以實聞國有勇爵朕與爾縻之凡百吏民當體朕意戒諭天下廣儲蓄詔古之豐年皆有露積以為收入故其詩曰曽孫之庾如坻如京於是乎求千倉以處之萬車以載之乃厚賜農夫而休息之故其詩曰黍稷稻粱農夫之慶如此則雖有水旱民不狼狽以其有素備也今夫刺地而耕者徧於阡隴歳或大收則未嘗葢畜或糜而為酒醪委其餘以食犬彘水旱之來於是乎鳥驚獸駭弱者委骨乎溝壑而强者轉而為盜賊此由刺史縣令不務教民以儲畜之過也今秋實以登畆皆倍入其許公上之賦與終歳之食及夫賔客祭祀送死養生弔慶之具外皆聚之囷窖無得妄費其令郡縣常察其不率者庶乎家給人足以强富視天下西成之日亦當有以勞賜爾之勤也故茲詔示當體朕懐求賢詔昔髙宗宅憂三年不言思求賢以共天禄至誠感發厥惟見夢乃得傅説於巖險之間舉而為相遂享大治後世之君思賢之心不篤不能通於潛伏故寤寢之間莫能召致朕惟不敏猥承大器深慕髙宗恭黙之德而蚤莫起居亦未嘗不以進賢為念隠顯之應寥寥無聞非天下無才傑之士葢朕致誠之未至耳其令郡國務加搜訪無以勢媒無以譁譽擇其實德朕將尊用之庶幾乎胥靡之下有以輟板築而至矣安撫沿邊將士詔王者居細旃之上披繡黼之裘則思夫民之有寒者焉列九鼎之味享大牢之珍則思夫民之有飢者焉况吾荷干戈之士竭忠力以衞國奔王命以乗邊日月遷貿客寄之久朕憫夫去其里廬捐其妻子其有不念逺而懐歸者耶持兵以出夙夜警衞其不有勤勞之歎者耶氷雪之域風沙暴露野宿而草次其不有飢渴而苦寒者耶此朕之所以投餐輟寢而為之動心者也其詔將臣務加優恤時其番休而毋俾乎不均厚其餉賜而毋俾乎不周羸病疾苦咸用省視凉風晩矣踐更有期朕將歌枤杜之詩以遲汝之歸也秋凉汝比安好否遣書指不多及賜中書門下詔勅中書門下朕以為欲致治於天下者必富之而後可今縣官之費不給而民財大屈雖焦勞昃食之間其将何所施哉故特詔輔臣置司於内用以革其大弊而使美利之原通流而不竭則庶乎孔子適衛之言朕有所冀焉夫事專於所習則能明乎失得之原今将權天下之財利葢亦宜資之于有司能習知其事者焉則其所得必精所言必通聚而求之固足以成吾富民之術若夫苛刻之論務欲朘削于下而歛怨于上者斯亦朕之所不取宜令三司判官置制發運諸路轉運使副判官及提舉輦運便糴市舶𣙜場提㸃鑄錢制置解鹽等臣寮限受詔後兩月内各具所知本職財用利害事聞奏仍令三司勘㑹逐官姓名直牒催促令依限聞奏如違限不奏即檢舉施行故茲詔示想宜知悉勅中書門下詔朕惟理財之臣失于因循其法遂至于大壊而天下之貨流積而不通故特詔輔臣俾之置司以講求其利病将救其宿弊而更張之上以禆于國下以足于民而或者不察以為專務苛碎刻削以趨公家之急茲豈朕之意哉然商天下之利者必致天下之衆智而集成之則理盡而不悖事行而不跲于是利源通而富庶之俗成矣其令内外臣僚有能知財用利害者詳具事状聞奏其諸色人亦具事理經置制三司條例司陳状在外者即經所屬州軍投状逐處繳申制置三司條例司夫有言不酧不足以申勸事如可行何吝于賞如諸色人所言財利有可採録施用者朕當量其事之大小而加甄賞之故茲詔示想冝知悉賜于闐國王詔朕兼覆天下至於日出月没海外之國辮髪卉衣氈裘之長莫不絶不測之險奉琛獻幣交臂乎魏闕之下茲豈朕之能致哉葢上天之顧饗祖宗之盛烈然耳今于闐距京師萬餘里在疏勒之西而王以忠勇繼世用惠愛以撫其國人境内咸乂以謂夫方貢之禮久而不講思所以覿中國之盛以修舊職故遣其酋豪奉其寳玉珠璣與夫竒畜駔駿之馬連屬乎道涂背葱嶺越流沙譯十數國踰再歳而乃至可謂勤矣朕嘉王之誠欵不忘世見之儀委摯而載來朕亦思王之享中國之賜也故於旋使亦用寵答治民之餘王其善食飲以自輔養賜岐王顥辭免南郊亞獻行事不允詔勅顥省所劄子奏舉奉勅差充亞獻行事欲乞寝罷事具悉朕尊配烈祖祗見天神畢四海以駿奔㑹百靈而裒對卿親惟介弟位冠英藩屬越紼以報功宜重觴而薦絜相成縟禮均厚繁禧毋用執辭往欽嘉命所乞宜不允賜皇弟髙密郡王頵賀南郊禮畢答詔勅頵介弟之重列藩之英屬越紼以恭祠迨徹籩而已事遽形奏牘來上公車叙慶惟勤歎言于再賜楚國保寧安徳夫人景氏等賀南郊禮畢答詔勅景氏等乆服禁庭率循内職屬燔柴之成禮遽飛牘以致恭載閱誠辭不忘嘉欵賜左右直御侍邢氏巳下賀南郊禮畢答詔勅邢氏巳下備數掖庭參聨女御欵圜丘而甫畢抗方牘以函來載省忠勤良深嘉尚賜西蕃邈川首領保順軍節度使檢校太傅董戩加恩勅詔勅董戩朕望柴㤗壇天地並貺嘉與四海均鬯靈釐卿忠勇兼資珪符傳世外圉不庭實維屏翰宜渙龎恩用嘉而績茂對寵靈永綏西土今賜卿加恩告勅賜皇弟岐王顥乞免行冊命允詔勅顥省所上表乞免所司備禮册命事具悉古之封侯王皆選日㑹朝臨軒賜冊所以嚴王命裒有徳今朕圗爾於政宜襲故常以榮異數寵至益戒避之弗處且言方在哀疚非金石奏庭之時載挹來章乃懐增惻其勿奪王之志所乞宜允賜新除守司徒檢校太師兼侍中判相州韓琦乞免冊禮允詔勅韓琦省所上表乞免所司備禮冊命事具悉朕之丞相舉大軸而辭乃以司徒公出鎮于鄴方飭尚書郎奉璽綬引拜庭下疇功録徳顯示四方亟聞衷言復避優數履謙獲吉仲尼贊之宜輟策授以成吾丞相之美所乞冝允賜樞密使文彦博乞免行冊禮詔勅彦博省所上表乞免所司備禮冊命事具悉冊拜三公古禮也雖世乆缺而不講方朕褒寵元臣位以大司空蒐綴漏文一臨軒陛以觀夫古禮之行胡為不察抗書而力辭竟不能為朕引紱庭下勉強而為之耶嗚呼茲典何時而可復雖從衷請予亦憮然所乞宜允賜䕶葬使錢公輔等茶藥并傳宣撫問詔勅公輔公族送終王臣銜命顧爾遵途之逺諒多将事之勤載示諭言式昭至意賜絳州團練使羅榮進奉賀冬馬詔勅羅榮省所進奉賀冬馬一疋事具悉一陽協宇萬國奉珍嘉上駟之逸羣執右綏而來獻載圗勤藎彌切嘆嘉賜景靈宫使昭徳軍節度使檢校太尉兼侍中曹佾生日詔親惟元舅位實上台星占大火之中神降維嵩之秀寵茲蕃錫祝爾耆齡豈特增戚里之榮将以表勲門之慶賜叅知政事趙抃生日詔元精維粹碩輔載生屬玉琯以生陽表桑弧而襲慶厥有頒式以佑誕祥膺予寵嘉祝爾耆艾今賜卿生日羊酒等具如别録至可領也賜樞密副使居諫議大夫邵亢生日詔攀鱗横騖竦翼絶羣月推三統之成氣協四寅之貴神靈來相雋哲誕生優君賜以載蕃助天祥而彌熾茂延耆齒上輔琛圗今賜卿生日羊酒等具如别録至可領也恩州賜大遼皇太后賀同天節大使茶藥詔勅卿聘玉交馳夙敦於隣好使騑言邁適冒於春陽顧將命之良勤宜申頒而特厚露芽靈劑併示恩殊恩州賜大遼皇太后賀同天節副使茶藥詔勅卿甫屆誕辰來脩驩聘簉車夙駕方冒於夷涂珍劑載頒俾資於靈氣即宜欽受庸表眷懐恩州賜大遼皇太后同天節大使茶藥詔勅卿擁旜將命屬誕月之開辰結轍在途適杪春之次律念茲跋履彌切眷懐爰申命於珍頒庶養和於冲氣恩州賜大遼皇帝賀同天節副使茶藥詔勅卿來脩鄰睦出貳使華驛騎遵塗念此遄征之永寶函錫命用頒珍品之殊茲實優恩庶伸嘉矚恩州賜大遼皇帝賀正旦大使茶藥詔勅卿通歡二國講㑹三元氣栗烈以乗寒道逶遲而遄邁載嘉勤勣特示匪頒今差入内侍省西頭供奉官李輔堯賜卿茶藥具如别録至可領也恩州賜大遼皇帝賀正旦副使茶藥詔勅卿參㑹王正薦修鄰聘方墐扉於嚴氣爰結轍於中塗載示深衷用申寵錫恩州賜大遼皇太后賀正旦大使茶藥詔勅卿拭圭講好擁節遵行方偃薄於寒威宜輔綏於靈氣爰申嘉惠庸示豐恩恩州賜大遼皇太后賀正旦副使茶藥詔勅卿敦講隣歡輔承使指顧折膠而増凜適竦轡以遐征爰命寵頒庶將至意賜黔州觀察使涇原路副都總管盧政赴闕茶藥詔勅盧政卿夙擁師屯久臨邊鎖特促鋒車之召還司蘭錡之嚴凌此祁寒駕言逺道載加寵錫以示勤歸賜宣徽南院使判延州郭逵朝見茶藥詔勅郭逵卿就更帥閫甫涉王圻抗大斾以前驅奉介圭而來覲儀刑方竚寵賚爰頒宜體眷懐益隆注意今差某官賜卿茶藥賜侍衞親軍馬軍副都指揮使賈逵茶藥詔勅賈逵卿顯被召音復歸環列征驂涉逺適冒餘寒靈劑繼頒庶均茂氣膺茲優渥併示至懐今差某官賜卿茶藥賜觀文殿大學士尚書左僕射判河南富弼赴闕茶藥詔勅富弼恭趨召節來覲嚴宸載惟夙駕之勤甫次中畿之㑹爰加珍貺用表至懐今差某官賜卿茶藥賜西京并汝州路祔葬隨䕶世岳等茶藥詔勅世岳等逺日有期長途方涉言念送終之禮固多如慕之懐特示珍頒用符深眷
