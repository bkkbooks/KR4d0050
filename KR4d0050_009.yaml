body:
  text: 鄖溪集卷九宋鄭獬撰詔賜觀文殿學士刑部尚書知亳州歐陽修乞致仕不允詔敕歐陽修省所上表并劄子乞致仕事具悉古之七十而還君事不得謝則賜之几杖卿儒學之師歷事三朝近辭國政之繁聊從便藩之樂乃復需奏願歸乎田廬夫老而引年挂車故里兹雖恬退之髙致而卿顔髮猶壯未及傳家遽以印綬來上無乃太早計乎年雖至也朕猶且賜之几杖以為士大夫表儀況其未至乎所乞宜不允賜觀文殿學士刑部尚書知亳州歐陽修乞致仕不允詔敕歐陽修省所上劄子奏乞致仕事具悉卿文章之老陪議廟堂竭誠奉國以熙大任引紱便藩已非所處挂車故里豈得遽歸剡章疊至深避謗誣苟行已之不愆奚浮言之可恤至於衰疾早徵艱於蒞事則勉圖醫藥神明自還閉閣髙卧猶足以成治也所乞宜不允賜守司徒兼侍中韓琦辭免恩命不允詔敕韓琦省所上表辭免加功臣食邑事具悉三嵗而郊躬見上帝及其竣事大均慶澤自丞弼而下至於庀事之臣咸有以蒙被兹皇祖之成訓朕何敢有失焉卿秉鈞舊老勒勳三朝聊擁帥節偃息故鄉是宜稽參茂制錫之以優數所以表神釐之貺而增藩輔之榮在德為稱又奚煩乎固辭所辭宜不允賜樞密院使守司空檢校太師兼侍中文彥博辭免恩命不允詔敕彥博省所劄子奏辭免恩命事具悉爵賞非朕之有維天下之賢者處之將符相印上公之衮與實相副豈曰侈哉則朕付卿以右樞之柄而加賜以大司空酬庸茂德非爵賞之私也朕方咨爾元老共圖太平公其亟起就位拜之勿辭所乞宜不允賜新除守尚書左僕射觀文殿大學士判河陽富弼不允詔敕富弼省所上劄子奏蒙恩授臣尚書左僕射觀文殿大學士依舊判河陽非便郡養疾之所敢當也即望授臣右僕射事具悉卿以疾辭將相之印易以文昌左揆還守盟津比德課功不為幸位制爵以賢安用辭為卿國之老成白首一節左攝大均之柄右秉洪樞之軸仁祖英宗嘗動容而尊禮之施及沖人庸何不式宜體朕懷往其祗踐所乞宜不允賜新除守司空兼侍中富弼辭免恩命不允詔敕富弼省所劄子辭免恩命事具悉朕惟列聖之遺業以次相授乃屬於眇末邈如登天豈不難哉故思夫老謀碩德之臣同心協力乃能勝克卿才完器周國之舊老登翼兩朝功名爛著嬰以末疾遂去近藩神明相之所履復寧在朕虛懷尤所欽待廟堂魁柄首以付卿天下顒顒實望復起而乃徇曲士之節為辭謝之髙懇惻纍牘畏避過甚朕之用卿蓋為天下宜體朕意亟受印紱眷眷之懷豈能殫極所乞宜不允賜户部尚書參知政事張方平乞免起復不允詔敕方平省所上表乞免起復恩命事具悉朕方履天下之籍疇咨大臣以共天職以卿雋茂老德久鬱而未奮斷自朕志擢佐鼎軸將觀夫深謀祕議倓然起廟堂而澤四海未及踰月而遽罹艱棘釋位而去已畢哭踊之期宜從墨縗還從舊府深謀祕議遂卒其功烈此朕所以拱袂以俟卿之來耳所乞宜不允賜醴泉觀使定國軍節度使李端願乞致仕不允詔敕端願省所劄子具悉卿出於貴胄以忠義自奮丹心炳炳時見於嘉論乃緣屬疾欲上齋鉞而去夫愷悌君子神明之所相顧兹微疹安能遂困爾耶勉近醫藥行復大庭之朝挂車歸第無煩纍辭也所乞宜不允賜邊將乞朝覲不允詔省表具悉爾以純忠大節為朕虎臣金鉞繡旗建車而出控扼乎夷塞搜兵牧馬斥堠嚴謹氊裘引弓之俗服鳴鏑而引去可謂國之長城善守而屈人者也而丹誠欵欵結戀紫闥屢馳奏牘願覲彤庭此誠忠臣在外乃心乎王室而朕亦欲識卿以慰傾想之懷然而漢關之北畛域相接霜髙弓徑胡馬肥健方藉賢守以捍侵軼豈宜釋藩垣之重寄而述職乎闕下哉三年奉計顧亦不逺合符擁節及瓜而歸則朕當歌出車之詩以勞爾之旋也今兹勤請難徇來章所乞宜不允賜宣徽南院使判延州郭逵乞京西一郡不允詔敕郭逵省所劄子奏乞京西一郡事具悉西羌旅拒為日滋久今雖馳使欵塞來賔狼子難馴豈能終保朕方遴柬才傑俾鎮邊衝畜馬搜兵用防侵軼故輟卿於右樞付卿以齋鉞獨當方面庶無顧憂何為遽上封函懇求便郡引保身之深戒陳責帥之大經専徇嫌疑將圖引避非所以體本朝注意之誠慕良將忘家之義毋煩過計疊有露章已勑有司勿令通奏勉旃從事以副朕懷所乞宜不允賜宰臣曽公亮乞免退不允詔敕公亮省所劄子以雨雪愆亢乞從黜免事具悉維我烈祖以至仁鬯天下之化卿實佐其成維我文考以至明應天下之變卿實輔其行以先聖人之盛德猶需卿以濟況豫眇末初履政機若涉交岐罔知攸適而卿乃欲因災引咎上印綬而去夫亢沴踰時皆蒙其害此上帝之警豫耳奚煩輔臣纍牘而請避書雖十百上朕亦不聽也所乞宜不允賜樞密副使諫議大夫邵亢乞出不允詔敕邵亢省所上表乞出事具悉漢宣帝嘗以博士諫議大夫補郡蕭望之以為憂末而忘本非成康致太平之意卿純忠厚淑亹亹而不倦先皇帝擇以遺豫乘時撫翼遂參樞府方兹肇祀四海蒙福且將都俞賡歌共濟乎太平之務遽自抑損請麾藩國夫以博士諫大夫猶為不可又況豫之大臣乎所乞宜不允賜觀文殿學士知徐州趙槩乞致仕不允詔敕趙槩省所奏上表乞致仕事具悉露章屢上辭意懇惻眷言耆德之舊實為朝廷之望豈無安車駟馬蓋惜老成之去耳夫彭城近藩土風甚美惠愛在民獄訟自息固足以頥神沖漠抗志逍遙何必挂冠林下追東洛角巾之遊然後為得哉所乞宜不允賜觀文殿學士吏部尚書知徐州趙槩乞致仕不允詔敕趙槩省所上表乞致仕事具悉卿股肱舊德陪論宰庭懇言請藩遂奠近服朕眷猶惜其去況欲引年祈謝君事賢哉大夫雖可嘉尚國之元老豈宜告歸副此虛懷勉綏吉履所乞宜不允賜新除吏部尚書充觀文殿學士知徐州趙槩辭免恩命不允詔敕趙槩省所劄子只乞守本官知徐州事具悉古之卿大夫出封必加一等所以進有德褒有功也卿將明肅艾允參槐鼎之論引年佩符獨無錫命以寵吾藩垣之老哉茲非私恩是亦古之顯德褒功之數耳所乞宜不允敕南郊御札敕朕蒙先帝之烈履四海之尊恭循列聖大孝之醇躬服三年通喪之義出則素冠􅎭衣以御事入則苴杖衰麻以宅憂雖祥祭之巳除追仙遊而增慕洪惟禋祀實在諒隂深懷情禮之異殊博采古今而參議近臣合奏大典可稽在昔執文考之憂雖居廬而終制維是饗天神之貴將越紼而講儀於晉則踰年而命郊在漢則即位而見廟既葬可以加冠卒哭於是大蒸况茲章聖之時亦講圜丘之制顧惟眇德敢越舊聞至於羽衛之繁文金石之雅奏自朕躬之所奉俾有司之蕝儀務在協中以參往制故茲札示想宜知悉賜右諫議大夫知瀛州李肅之奬諭敕書敕肅之省所奏勒瀛州分析到地震倒塌城壁樓櫓十月二十日終已修了當事具悉坤德不寧朔陲連震顧河間之奠壤控北漠以開藩城堞蕩搖樓櫓摧仆隳金湯之重險失屏翰之巨防卿懇力經營疚心夙夜大庀工徒之衆亟興板築之勞役不踰時事無愆素復據三關之奧載完百雉之雄丕績肇成露章薦至惟忠勤之可尚在鑒寐以無忘特遣史華往申言諭茗腴靈劑兼示寵頒賜御侍夫人魏氏以下敕書敕御侍夫人魏氏以下祗奉園寢夙夜良勤日月驟馳巳踰禫祭宜承詔使還歸禁庭今差司簿武氏賫敕書往彼到日並可發來赴京賜御侍夫人以下守陵回京沿路茶藥并撫問敕書敕御侍夫人魏氏以下陵寢衣冠爾惟嚴事甫除素韠被詔言還冒履修途諒多勞勩乃增懷念特示寵頒今差使臣沿路各賜臘面茶三斤縛子茶三斤藥物一銀合合重二十兩至可領也並傳宣撫問賜入內副都知石全育等守陵回沿路茶藥並撫問敕書敕石全育國陵之奉霜露再期夙駕言歸跋履方永特馳使指寵錫惟優仍示撫存體豫嘉矚賜淮南王三軍將吏僧道百姓等敕書敕淮南王三軍將吏僧道百姓等朕以韓琦秉均元宰定䇿老臣上相印以懇辭即將壇而往拜載瞻督撫南據靈淮維我新恩蓋爾舊治有勞定國方均逸以便藩遺愛在民想歡闐於成命今特授韓琦守司徒檢校太師兼侍中行揚州大都督府長史淮南節度揚州管內觀察處置營田等使判相州軍州事同羣牧使兼管內觀農使加食邑一千户食實封四百户仍改賜推誠保德業仁守正協恭贊治亮節翊戴功臣散官勳封如故故兹示諭想宜知悉冬寒將士等各得平安好參佐官吏僧道耆夀百姓等並存問之賜劍南西川三軍將吏僧道百姓等敕書敕劍南西川三軍將吏僧道百姓等朕以文彥博器包文武位冠機衡方履祚於元符宜褒功於哲輔眷維井絡舊擁魚符遺風未衰故老猶在想聞嘉命益沸歡聲今特授文彥博守司空依前檢校太師兼侍中充樞密使兼羣牧制置使行成都尹充劍南西川節度使管內觀察處置橋道等使加食邑一千户食實封四百户功臣散官勳封如故賜五臺山十寺僧正順綰已下敕書敕順綰等省所進同天節功德疏到闕事具悉靈峰特秀寶剎對開翻西竺之祕言獻南山之善祝再惟忠欵良用歎嘉今賜順綰等紫僧衣一對絹二十匹故兹示諭想宜知悉賜西南蕃龍異閣等敕書敕龍異閣等省所附進馬一匹朱砂八兩事具悉汝奠居絶徼久服外藩瞻北闕以馳風旅大庭而來享載嘉勤藎宜有賚頒今回賜汝江中錦旋欄衫一領八兩渾鍍銀腰帶一條衣著二十匹至可領也故兹示諭想宜知悉賜梓州路轉運使趙誠奬諭敕書敕趙誠省所奏誠去一路冗占兵士及立到定額事具悉朕比申飭監司考核兵籍或奉私而妄占俾責實以罷歸仍立嚴科庶懲末弊卿宣風左蜀勵節東朝首奉詔音具為條奏悉按列城之數並除羡卒之餘創以定規減於舊貫眷言忠藎深切嘆嘉仍示頒恩用褒成效仍賜汝銀五十兩絹五十匹已劄與梓州支賜訖奏故兹奬諭想宜知悉批答賜宰臣曽公亮乞免罷第二表不允批答省表具知成湯之禱旱則曰政不節與使民疾與何以不雨之至斯極也周宣王之憂旱則曰耗斁下土寧丁我躬謂天下之被害不若身當之也是二君者曷嘗移咎於下哉固不聞伊尹有去位之辭仲山甫有免官之議蓋遇天地之災變而䇿罷宰相者此衰漢之制非盛德之舉庸何取焉君其勉修政績以𨗳和氣則嘉澤之應斯亦拱而俟之矣所乞宜不允賜文武百寮曽公亮已下乞皇帝御正殿復常膳不允批答省表具知朕圖治不明上纍三光之變乃以正月朔日王者統事之初蒙氣湛掩蝕于太陽考諸古義為咎莫大焉故朕虛虎門之朝徹牢鼎之膳思有以恐懼修省少謝上天之譴告而二三輔臣暨百辟庶尹亦宜協心相勵以輔不逮至於面天庭之正寧享四食之燕羞爾言雖忠顧豈朕之欲聞耶所請宜不允第二表不允批答省表具知鮑司隸有言正月之朔小民猶恐敗毁物器況日虧乎蓋皇極之不建則日月側匿其甚則交蝕乃復譴見於三朝之會上帝聰明鑒觀甚邇災祥之見如虛谷之傳響豈不懼哉是以引避户牖之坐損去秩膳側躬省咎庶期消伏詩不云乎畏天之怒不敢戲豫朕畏天者也則雖虛大昕之朝徹燕食之羞又奚為過哉所請宜不允賜宰臣曽公亮巳下賀夀星出見批答省表具知春仲氣分珠躔效祉出乎丁位潤澤而明太史發占以符萬夀卿等股肱一德共代天工觀此騰文志在歸美俾存信牒傳之無窮載閲需章良增嘉愧所賀知仍依奏宣付史館賜樞密使文彥博等賀夀星出見批答省表具知維彼見象天極之南參驗靈編實資夀歷星官動色來告休符卿等登翊萬樞協成元化形於中悃慶牘繼來頌歎嘉祥俾書史氏循讀於再深愧乃懷所賀知賜禮部尚書參知政事趙槩乞致仕第一表不允批答省表具知卿以懿文擢鼎科淳德佐槐府順承帝載得坤厚安正之吉顧朕不明方倚卿以天下事馴致美化直趨乎太平之域乃引古義欲藏其車蓋而去兹豈朕之望卿耶勉爾謨明以經王室無以耋耄而自嫌之所乞宜不允賜趙槩乞致仕第二表不允批答省表具知七十而還君事蓋有不得謝者焉以卿之耆明秉哲參論乎廟堂以維持乎巍巍之業者乃必欲抗其髙躅而去耶雖將自佚乎紱冕之外其如士大夫之議朕何所乞宜不允賜文武百寮富弼以下上尊號第一表不允批答省表具知古之帝王未有美號嘗以火食教民者則曰燧人氏取犧牲以為庖厨者則曰庖犧氏始耕以粒食者則曰神農氏至於有熊氏髙辛氏髙陽氏則皆以所興之地名之唐堯虞舜大禹雖都帝王之位而天下直斥之而巳又何嘗取尊美之稱以冠其上哉孔子曰若聖與仁則吾豈敢以孔子而不敢當仁聖之目而公卿百執事乃猥以奉元憲道文武仁孝之號而加於豫豫何德以堪之夫皇者君也大也帝者配德于天地者也合是二義而兼有之蓋巳嘗缺然自愧況又欲加隆於此者乎其亟罷議毋以虛名凂豫也所請宜不允第三表不允批答省表具知奉元所以體天憲道所以稽古文以起制度武以消姦軌仁者澤含四海而不殊孝者光大祖宗之業而日新今天之方艱變怪屢出謂之奉元可乎聰明未屬動而繆戾謂之憲道可乎禮樂衰缺而不完則文之所致者陋夷狄桀慢而屢警則武之所制者狹生靈憔悴而祖宗之業不加焉則仁孝之實將安所施號者功之表也其功茂者其號美惟豫之所施如此尚何敢冒乎功茂之稱哉雖欲強之天下其將謂豫何所請宜不允第五表不允批答省表具知災異之未息政治之未明黎元之未乂此朕嗛嗛而不遑公卿庶人藩衛之臣蠻夷老耋乃日伏大庭厥角仰顙章五上而不止必欲致朕以徽稱羣言之迫安能固拒夫有其實有其名君子享之名浮而實不充君子以為恥惟爾二三股肱洎內外列辟同心協德共濟大治人事緝於下則天道叶於上朝廷修飭則諸道順軌元元之衆咸得蒙福俾豫襲其名而安其實豈不休哉所請宜不允賜文武百寮請皇帝聽樂第一表不允批答省表具知昔者子夏既除豫之琴撫之而不成聲曰先王制禮不敢過也子張既除豫之琴撫之而成聲曰先王制禮不敢不及也然則二子者均於得禮而子夏有哀心焉故孔子謂孟獻子加於人一等是子夏之未忘哀不猶愈於子張乎朕之宅憂三年甫畢餘日永念聖考之愛雖終天而猶存豈可朝釋纎縞暮奏金石巨創未夷巳臨燕衎是誠何心哉必欲行禮則孟獻子設而不樂朕將有取焉所請宜不允第二表不允批答省表具知昔堯之崩而舜思之坐則見堯於牆食則見堯於羮蓋未之忘也禮曰父沒而不能讀父之書手澤存焉耳朕之失先帝三年周旋于其居則先帝之宫闕在焉于其出則先帝之都邑在焉左右視聽之間皆先帝之舊也纍纍焉繭繭焉何嘗不悽愴以驚懷徘徊而攬涕而四時忽焉不知縞素之巳終哀痛未盡思慕未衰而遽欲撞萬石之鐘列九成之奏以娛心悅耳為樂乎兹朕之所不忍也重煩羣公之言深用愧腆所請宜不允第三表不允斷來章批答省表具知王之執憂不以二事而宗室之諸老暨于勝衣而朝者咸以書聞覬王之還職以董正屬籍正有以表儀而仰法焉則奚獨豫一人強欲奪王之哀乎且踐膺茂册以慰兄弟渠渠之意所辭宜不允仍斷來章賜新除參知政事唐介辭免恩命不允斷來章批答省表具知古之君子願乎仕者非謂紱冕之足以美乎服輿馬之足以侈乎御也蓋欲行其志焉耳朕選卿于衆以參論國政質之羣言而皆合斷之朕心而不疑乃命以位疇能間之是亦欲行卿之志耳胡為沖執拜言而請辭兹豈明朕之意而務行古君子之願哉所辭宜不允仍斷來章賜參知政事趙抃唐介辭免恩命不允斷來章批答省表具知朕之齋明祗栗大享帝于圜丘維是二三股肱之老相成熙事天人歆德休光下集而錫豫之福如阜如陵兹豈朕之専饗哉是亦二三股肱之老有以共之也為俎之惠猶貴乎及下若是者尚何辭焉賜皇伯集慶軍節度使檢校尚書左僕射宗諤辭免恩命第一表不允批答省表具知朕覽縉紳之議越紼而郊亦既右饗錫之神䇿嘉與伯父叔父均釐於下此上帝列祖之賜朕承而恭授之又曷足以抗辭哉所辭宜不允賜皇弟岐王皓辭免恩命第一表不允批答省表具知朕升禋合祭謁欵天神推其福貺被之四極垂紳在次罔不均休而況豫之介弟爵為真王朝踐之獻實陪祀事宜錫恩章以答雍肅尚何謙畏抗言弗處往即欽拜庸體朕之至意所辭宜不允賜曹佾辭免恩命第一表不允批答省表具知朕遵列祖之遺業三嵗而郊霈其天澤繇廟廷而薄四海而豫之元舅出陪清蹕入上嚴奏宜有嘉命以均神貺發於朕志孚告在廟渙乎如汗其不可及已雖欲行意詎得從乎所辭宜不允賜宗諤辭免恩命第二表不允斷來章批答省表具知祭之有澤者為政之術也下而甲吏守門之賤猶且及之況夫雍肅藩戚之臣委綏結綬祗事以助祭者耶故兹孚命所以均神明之貺曷為纍言而懇避詩不云乎烈文辟公錫之祉福爾亟受之無辭所辭宜不允仍斷來章賜岐王皓第二表不允斷來章批答省表具知古之大祭歸脤膰于兄弟之國所以示親親之意而同神靈之祚朕既薦璧嘉壇上帝錫之純嘏豈敢専饗宜與兄弟共有之乃欲懇避而為辭爵之髙是非古之為祭而厚骨肉之義也所辭宜不允仍斷來章賜曹佾第二表不允斷來章批答省表具知朕以眇躬獲薦黍稷報功於上帝而侑以烈祖天人顧饗福祿來介故嘉與士大夫共拜神靈之賜則褒章顯號積重而均及者非有私元舅也其為朕倡率士大夫往即拜之所辭宜不允仍斷來章賜參知政事趙槩乞致仕不允斷來章批答省表具知古之尚齒七十者君問則席所以尊耆哲而風孝悌卿以寬懿敦實之姿佐金鼎以調元氣其齒則老矣其神明之外發者豈有衰哉朕初履祚方且布席以咨國政需大化之隆洽然後議其去顧不美歟所乞宜不允仍斷來章賜宗檏辭恩命第二表不允斷來章批答省表具知朕之初蒞祚豐恩不浹涵蒙乎萬物而獨伯父有所不及兹豈篤親興仁之義哉衮衣金鉞登拜已晚乃復引章雖三揖而未進往宜欽踐以祗奉先王之祀所辭宜不允仍斷來章賜樞密使文彥博辭免恩命不允斷來章批答省表具知懋官懋賞古今之通誼卿以純忠首國共濟於艱虞之辰定䇿禁中義貫乎金石大業一定若泰山之四維是用進拜上公以稱厥德奚為自疑露章引避昔舜命臯夔一辭而止卿乃五辭矣亦可以巳乎所辭宜不允仍斷來章賜新除檢校尚書左僕射同中書門下平章事彰德軍節度使宗檏第一表辭免恩命不允批答省表具知封植戚藩以強王室此古治世之成法伯父天屬之尊恂恂謹禮樂善而不厭是宜有師鉞之雄鼎席之拜孚號朝發懇章暮辭伯父其承之以光顯我親親之愛所辭宜不允賜新除守司徒兼侍中充淮南節度使判相州韓琦辭免恩命第二表不允斷來章批答省表具知卿既還兩鎮節朕已歉然不滿於懷而又以司徒辭遂將潔身而去耶古之三公無其人則闕今有人矣奚為而闕乎卿趣受印歸榮故鄉無俾天下議朕謂於定䇿元老有所薄焉所辭宜不允仍斷來章賜皇伯祖允弼上表辭免起復恩命不允批答省表具知古者遭金革之變於是以墨縗即戎今朝廷無插羽之警而起王於廬次者誠以王春秋髙氣血益衰扶杖泣血恐有以傷其生故以大將軍印俾還其舊服以義奪情殆謂此乎無為執辭重貽沖人之憂所辭宜不允賜新除守司空依前樞密使文彥博辭免恩命不允批答省表具知朕前已發詔加賜卿大司空庶尹在位俯聽於大庭下孰不動色謂之當然曷為固稱匪德執謙弗回繡裳衮衣委而未拜夫有功不圖為善者廢大號復還譬之反汗致朕於此其何以示天下所辭宜不允
