body:
  text: 鄖溪集巻十一宋鄭獬撰表賀冬表律次黄鍾日躔南極尊一王之履至舉萬國以来同亞於歲朝著在甲令中賀恭惟皇帝陛下陶成庶類照臨四方推神䇲以授時奉天元而御統觀陽氣之升則以進賢者之類鑒陰爻之剥則以斥小人之羣庶求大端用資明徳臣等叨榮表位趨慶大庭適及嘉辰共期善祝賀正表臣某言伏以春重三朝尊明辟履端之始禮嚴元㑹謹諸侯受計之初品物逹新萬邦獻祉臣誠懽誠忭頓首頓首恭惟皇帝陛下緝熈民極恵廸天元福與衆均慶光華日月之旦物㳺澤茂萃清明玉燭之和大業延洪懽誠同向臣限以守麾遐土引領中宸瞻雲闕之觚稜逺虎罇之㪺挹徒深頌祝莫極傾馳天慶節謝内中露香表炎精御厯大帝錫符孚嘉號以紀辰協靈文而瑞世㡬及冲渺敢怠欽承維是羣生悉歸洪造燎好香而升薦祝美貺以来膺天祺節謝内中露香表珍符薦瑞佳節紀辰恭祓精𠂻宻升寳炷叢霄在望靈鑒可期冀錫茂祥以昌皇祚同天節内中露香表膺顧上靈繼明大統属長贏之首月紀震夙之嘉辰洽此億寧實繇右序庶格緝熈之福丕承桓撥之期冬節内中露香表天元統紀神䇲吿符維上帝之佑民執大鈞而播物恭燃寳炷宻薦精𠂻凡在羣靈悉䝉嘉福年節内中露香表玉儀改度寳典推元茂履之朝總綏四極恭燎寳薰之薦式孚丹欵之𠂻圎極炳靈函生隤祉中書賀夀星見表乾厯紀元適開於景祚星符見象爰示於嘉祥中外具瞻遐邇均慶中賀恭惟皇帝陛下躬膺寳籙祗遹先猷大孝通乎神明至誠格乎天地上帝申錫瑞物荐臻燦若休光發乎景緯出離方而動色俯南極以騰精考以經躔不失仲春之夕見言其驗證盖符人主之夀昌臣等備位宰司獲觀靈貺将延洪於睿筭彌聳躍於丹悰又樞宻院賀夀星見表玉琯分秋珠躔見象對拱北辰之逺迥臨西位之髙馮相發占靈基紀瑞中賀恭惟皇帝陛下繼明如日至意通神衍協氣以旁流總美祥而翕受燦然靈貺發於乾文昏曉互推獨騐一星之次天人合應兹為萬夀之符臣等誤列近司獲逢熈旦将益無期之筭彌增交抃之誠賀皇太后表體包坤順道配天元絶外舍之私恩服中宫之儉徳輔佐先帝夙聞陰教之修保䕶聖躬益著母儀之愛請建夀聖節表樞星炳耀華渚流祥盖神靈之吿期兹帝王之應運是為慶節適在聖時蔚有舊章敢申䖍請中賀恭惟皇帝陛下授堯厯數邁舜聰明踐祚云初庶務兹始惟發春之首月實誕聖之嘉辰逺夷奉琛以来庭華封交手而獻祝将昭嘉㑹宜紀鴻名臣等不勝大慶請以正月三日為夀聖節舉體道之徽稱演後天之遐筭庶使需雲報燕罄四海之驩心北斗浮觴上萬年之眉夀集禧觀鴻福殿祈雪道場表地媪不宻壮陽泄溫民癘愆和農疇匱澤求愆謝咎徧走羣祠加精致誠未昭美證載循禬法祗絜齋場震發靈休庶㡬嘉應飛霙灑潤延首以需集禧觀洪福殿開啟宰鵞祈雨道場表薰風首序甘澤愆期慮嘉種之将蕪結老農之浩歎載臨靖館肅啟清場陳舒雁以封牲象神龍而作繪冀零嘉霔竚應䖍誠恐懼側身庶消咎證知杭州謝到任表剡章初上願乗一障以衛藩䟽寵過優更奠三吴而出牧擁連檣之華艦戲綵服於親闈不失家居俄臨治境磅礴湖山之秀繁華郛郭之雄已見吏民甫宣威徳中謝伏念臣踈愚自信樸陋無堪厲鎩羽於鸞鵠之羣託危根於芝蘭之圃動多得咎誰肯為容苟非科級之使然安得仕宦之至此惟陛下廓無私之鑒知臣孤立而無朋惟陛下推不報之恩俾臣偷安而乆處日虞蹇薄恐負奨提方衆賢引類以並升宜拙者懐慙而逺去重以食口之衆窘於京華之居瀝懇冒聞俞音報可改經帷之宻侍徙民版之清曹仍領東藩兼督一道矧武林之名部實母氏之故鄉井舍猶存松楸未改㫖甘易具豈惟啜菽以承歡親戚至前時得稱觴而上夀此人子之所樂亦當世之至榮不料便安出於意望此盖伏遇皇帝陛下仁包覆載知燭幽深在蟲魚則未甞有涸澤之傷在草木則未甞有童山之暴况朝紳之舊列參翰苑以叨榮曲沛天慈俯從人欲付之都府寵以帥權敢不益勵初心勤求善治詔條具在唯當承命以恭行訟牒雖繁亦冀清心而少息緩以歲月之乆效此㳙塵之勞仰副清𠂻少酬鴻造謝翰林學士表天光下燭帝語親聆恩不他歸命由上出孤生得路榮遇最多臣某中謝竊以翰苑參華儒林劇選詎獨玩其詞藻蓋欲觀其器能謀足以破天下之疑文足以鼔天下之動兹為内相乃無間言伏念臣庸瞀無能聱牙少合結髪而知事主登朝絶不因人在仁祖時初自諸生擢在羣豪之首於英考世還從右史次居西掖之嚴将卜兆於先疇遂佩符於南國松阡未列芝檢促還惟慙補報之未能敢以遲晚之為嘆寒葵有意獨傾向日之心頑植何知不入大鈞之手蘭無人而自秀鶴在陰而必聞不圗陛下知其至愚察其寡援面加奨借力賜提攜墜蓬俄奮於九霄寒熖立增於萬丈遽承詔節入直禁林驛馬驟来榮生里巷綵衣拜慶喜動親闈華組馭乎名駒渾金炫乎寳帶愧已深而汗浃感至極以涕零伏惟皇帝陛下獨持帝王之大權復見祖宗之雄斷號令四發耳目一新日月不開開則及逺雷霆不發發則驚人咨棟梁以柬求兼椽櫨之采拾敢不益殫忠藎少效㳙埃義有可為必思於圗報死如得所敢憚於捐生謝知制誥表西掖代言儒生榮遇猥䝉序擢震懼惟深中謝竊以皇帝陛下繼丕天之業方發政之初縉紳延頸以希采獲内自朝廷外及林藪金馬石渠之羣秀飯牛版築之遺彦奮袂相趨聳冠相属思欲入侍太微之座日直西省之闥奮其鴻筆攄其嘉論以快一時之遇而取不次之賞以駭四海之望而成非常之蹟者顒顒於下曽不得吐其憤懣而少瞻斧幄之末光乃用常格首及陋愚塞賢豪之来徑招衆口之沸言黒白倒置士不竦勸殆非陛下考核名實以新庶政之意然臣在先帝時誤以文墨擢之上第漸列儒館遂直螭階適㑹缺員例當次補而陛下順守累聖人成憲仰遵先帝之餘烈謂後来之薪既以居上而下體之葑不忍棄遺特發明詔俾掌絲綸生育成就恩踰天地惟當盡節以報洪私謝賜對衣鞍轡馬表主恩何厚雖私在笥之衣臣徳未昭復辱康侯之馬惟寵榮之曲被顧驚靦之彌增竊以詞苑宏開洛門宻召實冠邇寮之選爰須超世之英如臣匪才敢此非望詔寳衣於内府頒駿産於天閑爛若寵光合兹蕃錫雖衮冕而下存采菽之舊文在繁纓以朝有丘明之致誚盖器與名非假人之物而負且乗乃致冦之資永惟濡翼之羞徒切刻肌之感謝賜飛白書表寳軸初傳雲章交燭驟若奎鈎之見象忽如綠字之成圗賜自明廷榮增蔀屋中謝恭惟尊號皇帝陛下精探聖奥欽述先猷敞秘府以宏開詔羣工而肆閱因飛寳墨縱落輕綃觀聖作以駭驚絢神蹤而妙絶龍騰鳳躍自成王者之書雲布星陳兼得諸家之體猥煩使指特貺陋居既捧拜以增光敢秘藏而為永代漕臣賀收復表虎士鷹揚屈人於不戰羌戎鳥竄交臂而来臣遐荒震驚四國交慶蠢爾吐蕃之種世為西夏之雄螳怒當前鴟張弗茹豢成封豕之惡乆逃京觀之誅迨兹舜徳之誕敷始効苖頑而来格連雲瘠野千里桑麻被髪遺黎一日冠帶此盖伏遇皇帝陛下淵泉溥博聖武布昭莫敢不来繼湯孫之遺緒無思不服廣文考之休聲臣四被明恩謬持使節悵捧觴之無路徒向日以傾葵盡復故封行謝玉闗之質吿成清廟傒聞天馬之歌奏疏請聴政納言疏案此首從名臣奏議中補入伏見陛下初即位四方傳聞以謂陛下聰明英斷同符太祖也有志之士莫不投袂嘆息傾望陛下之風采然自授政以来號令所發蹈常習故不聞赫然有以鼓動天下者始以聖躬微疾猶足以為辭玉膳既復尚恭黙而不言者實未知所諭将以陰拱自晦徐觀天下之動而后出而制之耶則於此殆将周歲萬機之變槩可見已将以慕商宗之節思得聖人而后用以為政耶傅説何可數有哉果無之則遂一世而不言耶将以左右牽制動有畏憚而不敢明為之耶則二府大臣與禁庭侍從皆足以寄腹心又何疑而不與之謀耶是三者皆非所以為術也非帝王南面聴斷之大權也先皇帝時純用仁徳以涵育萬物及其乆也盖有偏而不舉者矣夫仁主愛義立斷猶春之為生而秋之為殺也生而不殺則萬物潰爛而不成其如歲功何陛下承先皇之仁愛宜用義斷以整齊天下所謂義斷者主柄也今夫唯唯而不斷可否决於輔臣則主柄屈而不尊如輔臣樸忠不敢亂大法而為陛下奉行條例止可閱日月而已一旦有􅀈甈誰可横身而為陛下當大事者乎萬一奸人朋比參厠於其間則天下之大勢去矣陛下眂今日為治耶亂耶必以為亂則邉兵不試境内無䟦扈強臣孰謂之亂必以為治則威令寖削大綱解而不緝孰謂之治是治與亂正在陛下留意之秋也左顧則為治右視則為亂盖陛下一舉首而天下之勢分矣陛下何不日求賢者與之圗議今所與共大政者不過七八輔臣則所聞所見盡於此而已烏能窮天下之聰明哉古者謀及卿士清問下民詢於芻蕘於是羣言集而治道成乃欲以七八輔臣之言而望大治豈不為濶略哉臣願陛下特詔天下許盡所言有可採者與之召對至於臣下進見少賜數刻之景訪以得失虚意以求之精察以審之明斷以行之庶㡬天下之勢将亂而復治矣如其優㳺冺黙日復一日有志之士解體而去士望去則民從而去陛下尚欲恃四海之衆而保萬世之安乎臣實不勝愚者之慮請罷河北夫役疏案此首從名臣奏議中補入臣竊聞河北繕城塹儲粟藁以支北冦諸郡奔走怵惕以從事至有帥臣躬督役夫以穿濠池殊可怪笑北敵雖遼逺其舉動亦顧曲直今無釁隙何縁遽有南牧之計比者黥兩地税户手背兹雖事生亦未為踰盟之大失臣素知幽燕間鄉民皆黥之非顓以為兵也無屯兵營火伍糧糗器甲之制惟将迎漢使歲役之三月又其黥之者似聞非北主意乃其酋豪妄為之既已黥之則可移文訊其所以然彼如自屈則宜約以不可再補苟能聴我則又何求議者或為敵乗我與西羌有嫌欲用此為牽制此亦非也其聲勢不足以為牽制耳西羌之嫌奚與於彼必未能棄六十年聘好而為弱羌絶盟其利害固可較也今不計其虚實而想像乎沙磧萬里之外風揺草動則以為朔騎已挟弓而羣至矣於是繕城塹儲粟藁奚其易動哉河北歲連旱既動力役則不免斂率於民是未見敵人之一迹而先已自擾其民因虚聲而受實弊是豈為静勝者耶而必使敵人真入冦我遂不戰而獨城守乎攻城者非敵人之長且将直驅而南則奈何乎廟堂之上哉日者廣州妄奏交趾之入而遽為之易帥調兵以驚動南方之民今又無故而備河北無他将帥不擇兵衆不練財力不充直出於畏怯而已亦何足以明方略之成敗乎臣欲乞陛下宻下河北勿令繕修務在安養其民如平時而已則我中國之持重不為敵人所窺亦可以有成筭矣論种諤擅入西界疏案此首從名臣奏議中補入臣伏見十月二十四日召兩府大臣入議外言竊皆傳种諤已提兵入據綏州横山豪酋挈族内附審如是是豈朝廷之福耶聚謀累日䇿将安出事雖隠秘不漏針芒然趣賈逵竇舜卿就道以毋沆為轉運使發京師兵及銀數十萬兩備芻餉出錦袍銀帶賜降者觀此則殆将兩持首尾未有决然判安危之至䇿也臣前言不可納横山及見手詔以諒祚順向深戒邉臣無得生事臣以為信今廼知朝廷外示綏静内包陰計兹豈帝王之大畧哉尊用變詐之士務為掩襲之謀乃戰國強暴之君所為也况陛下初履天位猶處諒闇宜念祖宗䝉成太平之業以淵静鎮海内仁澤結天心不及慮此而過聼一二邪臣之説欲以竒譎幸邉功此天下盡知其不可而陛下獨以為可冒而行之聞者莫不寒心然种諤之奪綏州若不奉陛下之風指安敢一日不俟上報徑驅數千卒直𢷬夏境乎不然則擅興有罪陛下何為而不行誅夫中國以信義撫四夷既約束邉臣無得生事詔墨未乾而奪其地信義俱棄其曲在我彼将謾辭以請罪則朝廷何以報之如彼懐不順袵氊裘而犯邉我不得已而起應之則士卒雖肝腦塗野而不辭盖舉天下之怨在彼也今無故而先擾之彼将率其一國之衆而来争則士卒有旅拒躊躇而不行者矣盖舉天下之怨在我也豈惟士卒之不樂哉府庫之空乏此四海所共患千金之費不給則必賦諸民則将見隳産壊家棄父母鬻子孫以供軍期者矣萬一有奸雄之徒窺隙而乗之嘯為盜賊小則剽屋廬大則跨郡縣於此之時潰爛而不救則於社稷生靈得無有負乎事有謀小而妨大者正為此也而种諤不顧國家始末之大計乃欲以一螻蟻之命以天下為兒戲苟貪微功以邀富貴此正天下之姦賊若不誅之則無以厲其餘臣以為陛下必欲逆折禍亂之機牙使不為異日之悔則莫若下詔聲諤之罪誅於塞下及薛向髙遵裕楊定張穆之等皆付有司次第以治其罪然後遣一介之使持手詔還諒祚以綏州及横山之降民遂明吿以諤等生事已次第伏罪則彼又将何求於我如此則顯示中國履信之美而復收逺人向化之心無遺鏃折㦸之費而事立解矣如有言者希望猶以為不然此皆非忠臣豈敢以犬馬之餘生而保天下之事乎臣以太白經天四方地震皆為兵象竊恐兵禍起於横山之議今見其端矣無使臣言之騐則朝廷之福也伏望陛下上觀天戒下察人事以宗廟社稷為念以四海生靈為意無令天下無罪之民為姦臣所誤今誅一姦臣而天下定其利害較然可見陛下决意行之無疑臣不勝區區之懇論水災地震疏臣竊見去歲自京師西南至於海隅地皆震今歲自京師而北至於朔方又大震迄今不已城郭䧟入地民廬悉摧仆長河決溢灌深冀間兹豈細故哉震者陰盛而廹於陽其發必有所肇而不為虚應考之古而騐於今似可究其涯略漢和帝永元二年郡國十三震説者謂竇太后由房闥而制天下今二宫非竇氏之比則不為宫闈發也安帝建光元年郡國三十五震或地拆裂壊城郭説者謂中常侍江京樊豐擅天子權今内省非江京樊豐之比則不為寺人發也晉元帝太興元年一震説者謂王敦擁兵陵上哀帝興寧二年震説者謂桓溫䟦扈顓朝今大臣非王敦桓温之比則不為執政者發也是數者無所當則殆将有兵禍乎光武時郡國四十二地震而武谿蠻反晉成帝時豫州震而蘇峻亂近者仁宗時忻代間大震而元昊不庭用此以較之則非兵而何臣之所憂不在河北而在陕西何者河北雖被災而南方大稔流離之民相擕而南亦可就榖此惟煩朝廷戒敕所在務為存恤不令餒死於草莽則無慮矣至於陕西則自城綏以来至今兩議不决首尾一年凡自京師所餉縑金已費四百萬至於發卒乗器甲轉芻糧雜出於民者尚不在此數即不知國家以四百萬縑金而與羌人争何事耶雖得一綏州而所費如此其利害亦可槩見矣事不早决何止於此則将見國力殫於内民財屈於外怨黷並起姦人揺之其将奈何此不可不深慮也如聞羌人率其螻蟻之衆窺我境土料其裹糧畜牧必未能乆駐殆将遁矣然而數出兵而無所攻取者此所以困我彼来則我不可不應兵師既發糧芻既集彼復解而去異時則又来使我犇走為備之不暇此正墮其術内也則朝廷亦宜破其姦謀以静自守不為之動彼無所得而退我無所失而守若是者彼来雖數而我備有餘也夫世之治乆而之亂不過百年世之亂乆而之治亦不過百年此大勢也本朝自藝祖平定四方已来将百年矣治亂之際正在陛下臣以為治今之難難於祖宗之時何則自安史之亂至於五代之末四方之強諸侯已沒其立者皆孱子弱孫勢與數俱窮故太祖太宗一起而掃刈之若去菅草然易於為力也至於真宗仁宗之初民已離兵革喜見太平故收功報成垂拱而天下治亦甚易也今陛下非開基之日過已盛之時萬事寖以衰弊此所以難於為力而甚於祖宗之時也則豈得不深思逺慮講求所以致治之術乃欲以玩夷狄取武功苟有蹉跌則遂成衰亂之勢可不慎哉如羌人引衆而遁則陛下斷之正論早與通好涵養生靈俾之安處則天災自息雖有震揺亦不能以勝我矣論臣寮極言得失疏臣伏見詔書以京師大水為沴壓溺者衆許中外臣寮極言得失者兹實陛下側身求過思有以消復之天𠂻懇懇至於魚蟲草木莫不感動况於能言者哉臣竊伏思今陛下發詔以求忠言将欲用之耶将欲因災異舉故事而藻飾之耶苟藻飾之則固無可議者必欲用之則臣願陳其方臣觀前世之君因變異而求諫者甚衆書之史冊張以為美事及考其實則能用其言而載於行事者盖亦鮮矣徒使後世襲蹈以為帝王之值災異者於此空言而足矣曷足謂之罪已修徳耶今詔音一發天下忠義之士必有極其所蘊以薦諸朝者此當有益於治道不為妄作然而疊章累疏繁委而並集則陛下果能環復而究覽之耶計陛下一日萬㡬必未能爾而将欲入平時章疏事闗深宻者則留中不出事繫政體者則下中書事属兵要者則下樞宻院兩府覆奏則又下羣有司及郡邑至於無所行而後止如此則是有求諫之名而無求諫之實與前世之為空言者等耳臣竊謂陛下萬㡬之繁既未能徧覽則宜選置官属令専掌之今之羣臣所上章疏日許兩府及近臣番休更直便殿賜坐與之從容條陳講貫其可者則熟究而行之不可則罷之有疑焉則廣詢而後决之羣言得而衆事舉此應天之實也夫下之為言甚難而上之聴者常忽焉自非忠憤激於心則孰敢隳肝膽而冒忌諱者古之能建立功業者未甞不好諫也好之者繇其能褒進而招徕之也太祖太宗時言事者多被甄賞自近年以来兹事寥濶仁宗寛仁最能容直言而不能甄賞也願陛下采羣臣之章疏如其宏謀偉論可施於當時者則召見之與之共議不惟質其言且以觀其材大者擢之以職任次者加賜金帛無取焉報罷之如此則陛下下詔有實言得言有實用且使史冊書之以為某年大水詔求直言用某人言行某事以絀夫前世之為空言者則無令陛下詔書藏於有司復為數幅空紙而已惟乞陛下斷而行之則臣不勝大願論人材疏案此首從名臣奏議中補入臣比因賜對論及房喬杜如晦陛下問臣今世有此人否臣對以房杜者曠世無之苟所見未至則安知今世無有如房杜者哉臣退思陛下思得房杜用之此唐太宗之用心也而在陛下求之至與未至耳自古帝王何甞求異世之士而用之當大業之際富貴乎廟堂之上者天下止知有宇文述虞世基而已又孰知有房杜也則房杜者乃隋室之棄士也及太宗龍躍乎太原於是二人者攀鱗而起左攜右挈遂定天下當是時天下灑然始知有房杜焉則今之處幽約甘藜糝者焉知其人不及房杜者耶顧陛下網之未宻捜之未至耳夫天下之士有材在已者思有為於世猶寒者之欲衣飢者之欲食其求用之心尢切於世主求賢之意而其迹無繇而至前或湮廢而不遂者可勝言哉惟有道之士以義自勝則雖老死於巖穴間無憾也至於雄傑之士則不然如其差跌則潜心世變幸有風埃之警遂躡而擾之故劉備乆不跨馬而髀肉生見而流涕此其志豈斯須忘功業哉而欲漢室之不揺豈可得乎故世主必渠渠懇懇欲得賢而為我用者正為此也虚懐屈已以訪之髙爵厚禮以来之上之所好其下必有應者好之而未至不可遽曰今世無房杜髙宗思賢其精誠乃通乎夢寐於是得傅説焉此用心之顓也臣願陛下推此心繼之以不倦則必有如房杜者杖䇿而至矣言陋意拙惟陛下裁赦論薦士求直言疏案此首從名臣奏議中補入臣聞舉天下之事者不患乎知不及而常患乎力不足則舉而不勝其勢必屈故知之而不能窮天下之理必任羣力而舉之兹所以汲汲而求賢也自陛下即位以来未聞卓然褒進一賢者天下之事猶如前日而欲起太平之治者難矣然陛下深拱九重固未能周知羣臣之能否夫天子所以寄耳目者公卿大夫也公卿大夫日與庶官接宜熟知其所為其下固有豪偉非常之士而未奮者臣願陛下降明詔俾按察官及兩制正刺史已上各許特薦文武官之有才能者舉如不實令御史劾奏請論以法如此則宜得實才陛下按其籍眂其所舉者衆則兹人必有過人者美官有缺因而次補之績效既明則又顯擢之不下席天下之賢能積於此矣臣又聞天下之事無窮雖堯舜之明而欲盡無窮之事臣知其必殆然卒所以能為堯舜者以其能兼聴無窮之言也事機出於彼羣言㑹於此雖至深至隠皆可羅列而陳於前矣傳曰舜好問其弗信已乎臣亦願陛下降明詔許中外臣僚草莱之士皆得上封事極言無諱陛下總羣䇿而處之則明徹乎萬里之外矣豈惟得言哉又将以得士矣言如詣理或可賜對柔顔懌色以索其所蘊則天下之才何逃乎二者皆陛下基命之初急務也如可施用則乞付翰林草詔中書具為條約詔下之日必有畜才而待用者翹然而出矣敢冀陛下留意
