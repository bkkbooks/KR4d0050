body:
  text: 鄖溪集卷十二宋鄭獬撰狀乞罷青苗法狀案此首從名臣奏議中補入臣竊見青苗之法朝廷非不丁寧不欲強民而使其自便也故臣奉行亦不敢強以率民榜於諸邑召其所願請至於纍月而無一人至者此其所以不願也明矣常潤蘇秀類皆如此近自提舉官入境所過諸郡方以次支散且將及杭州杭民聞之皆相告以為憂張榜纍月而無一人願請一日提舉官入境則郡縣更相希合舉民以與之此非強民而何是豈朝廷立法之意兩浙方今荒歉處處食糟溫台大疫十死七八將來豐凶未可知兼為增和買絹及置場市絹商賈阻絶物價不登若更散青苗錢則取於民者毋乃太甚乎民得數百錢隨亦費盡不計後日之輸納苟納之不足則陛下若貰之邪必期於盡取也必期盡取則非酷吏苛法不能行於是鞕撻纍錮以督之則將見徹屋廬賣妻子計甚窮則棄鄉里而逃矣當此之時陛下安忍以飢羸之赤子加箠以求債邪若緩而不理則是朝廷無故捐數百萬緡於糞壤間虧損國用亦非細故未覩青苗之為利而其害巳如此宜其天下之致論多也臣初不論奏者以臣在杭必能為陛下守立法之意不敢強民以徇時今既易守青州方將去此而提舉官到且與諸邑合議而行臣實不忍杭州之民將有無辜而陷刑網者所以不能自巳也伏乞陛下指揮兩浙路如已散支處則依條施行未支散處特賜寢罷庶使一路疲民逺沾聖澤臣無任傾竭待罪之至乞罷兩浙路增和買狀臣檢會本州和買絹自嘉祐已前歲不過二十萬其后歲有所增今所市乃二十八萬每匹給錢一貫文省及收斂之際下户輸約不逮催科人吏頗有倍費已為煩撓去冬發運司以為兩浙罷糴民間乏錢將以通民用遂又增市十萬每匹給錢一貫一百文省凡兩浙一路共增五十萬又於本州富陽縣置場收買五萬新城餘杭􅀢頭曹橋各數千臣一州之地不知所出絹幾何今官所取乃四十四萬匹又有正稅絹二十餘萬匹如此是杭州之民盡不得衣帛發運司又謂絹多難出今本州酌中立定絹價許民情願納錢去嵗本州蠶不登今年亦薄蠶出既少新絹必貴若將來定價每匹不減一貫數十文足始以民間乏錢遂散和買以濟其用及其斂也俾納絹價取其贏錢是以惠民為名其實窺小利而已今民輸絹一匹費錢一貫二三百文足既不可使輸又變而為錢亦宜然定價過於本錢不免有誅剝之議兩浙纍年以來大乏泉貨民間謂之錢荒若納絹價亦不易出兼本路飢饉官出廩米賑救溫台之民或至相食其將何物易錢納官臣以為額定和買二十八萬即合依舊送納所增十萬匹只令納元錢一貫一百文省其富陽等處置場並宜停市不惟臣之一州兩浙諸郡類皆如此伏望陛下憐念疲民特賜開允如臣所奏下兩浙一路除遞年合行和買外所有發運司增買絹數更不立定絹價許令百姓只納所請元錢如願納絹者亦聽其諸處置場收買並乞停罷論冗官狀臣竊見言者患入官之冗故有省任子之議臣輒條其一二者昔之兩制至宰相正刺史至節度使歲補一人出入特恩不預焉今二府郊祀則補二人兩制及正刺史而上一人是省於舊三之二矣帶職貟外郎至諸司使以上舊郊祀一人今兩郊祀一人是省於舊已半矣昔之遷官以三年今遷以四年及其至可以任子時已六七十矣人而至六七十其心覬一子承家豈不惓惓可憐哉今誠再省之恐太刻薄有以傷陛下仁愛之心其猶有可省者嬪御而巳或有一二而不在此也雖然患入官之冗者奚不擇焉而後仕今無黑白一槩以入官雖有司試以格詩類皆倩人茲與不試同如欲省任子則莫若有擇焉凡任子已補欲出身仕者從其所能而試之或以一經或以禮學或以法律或以文辭武臣則試武伎或以策略每歲二月集于有司如試進士武舉法差官糊名較實中程乃得仕如此則得仕者必少而所取者才子弟各相勉強於學又有勸焉如有不能文墨而獨可以才幹者則請家一人不試而得入官此所以盡人之能而且不及其世祿也至於俱無能焉則終身不得仕是不才而巳又何憾焉臣又以臣下至病眊不欲去者顧祿而巳至不得巳乃求宫觀留臺監榷是終無去意臣欲乞分司致仕官其俸錢皆勿奪俾終其身病眊者有所養則必有相引而去彼居閭里待次纍年俸錢亦不絶也縣官何惜一二十千錢俾之得以禮而引退且有優遇老臣之恩至於貪贓酷吏一有所犯此可終身勿令仕茲亦有省官之術焉臣誠不欲陛下初即位德澤未及宣究而遽有刻薄之更制此臣所惜也如臣議可采欲乞付中書與衆人之奏論定其可者焉伏候進止論縣令改官狀臣伏見引見磨勘選人內有六考者多被黜不得遷官羣議未能猒服蓋六考選人悉係舉縣令初仁廟時患縣令非材不能通曉民事故詔用薦者三人方得選令令滿三考無過咎又用薦者五人已上乃得轉京官以其為親民之任故差減其考第有出身通為六考無出身通為七考皆得磨勘其他選人有出身七考無出身八考方許磨勘蓋縣令者已經兩次薦舉共用舉者八人比之常調已為精擇今不問舉令與不舉令有出身與無出身應七考已上一槩得選遷官如此則有出身舉令不如無出身舉令若有出身六考不合改官即無出身七考亦當罷去二者相形殊為未平大抵選人自入仕至磨勘雖成六考通計待闕及候磨勘引見最速者已十年稍為差跌則至十五二十年近雖蒙聖旨更令候二年無過犯令與改官則在任二年及其待次又須三四年方可改官州縣吏動有罣誤萬一纎過在身則又改官無期是縣令者於選人中最為不幸如此則孰肯求為縣令洗手奉公為陛下愛養赤子者但隨衆養資得及七考者自可轉官此非奬勸良吏之意也然臣不識陛下之法向有汚纍者亦復改官是豈陛下欲賞罰之大權顓於已俾天下若不可測度者乎則臣未見其善若賢能者不待次而舉罷不能者不待次而廢此當持之不可以假人故天下悚然而歸服焉若選人磨勘乃有司之成法法行已久天下信之一旦不先告而臨時變更茲豈能服天下之心哉州縣之間固有賢豪竒偉之士陛下方且兼收並采不宜壅遏之萬有一賢者被黜則所失多矣今選人六考者決知不得改官故多謁告居外不敢引見以待陛下之盛澤臣欲乞陛下且依舊法凡舉官合選格許引見者並與改官所兾選人均被聖澤臣之所言縣令者親民之官朝廷優待縣令者乃所以為民也則陛下何惜一京官不為民乎論定武臣遷官條例狀案此首從名臣奏議中補入臣近蒙降到詞頭除東上門門使果州團練使李定為遙郡防禦使臣雖進草竊怪議者籍籍不已熟究其然誠為濫寵何則諸司使副在祖宗朝例無磨勘天聖中方許四年一遷至昭宣使止閣門使副四年一遷至客省使止皇祐中擴行始有定貟不得溢數近時橫行遷者以謂貟既有定則更授以遙郡及諸司使遷至皇城使者又惜昭宣使不除亦授以遙郡但恐數十年間帶遙郡防禦觀察者比比皆是則所顧者小而所失者更大正任團防有十餘年不遷者觀察使有終身不遷者心覬其遷則謂非有戰功則不可平時息兵從何而求戰功哉朝廷愛惜名器如此之重何為遙郡則接踵而授人計之自刺史纍十二年便可至觀察使一日有橫恩解其使名即為真拜豈重於彼而獨輕於此邪屬者劉永年為團練使十餘年以邊任方除防禦使既除而言者指為非是於時即行追罷今定團練使才四年以磨勘轉遙郡防禦使又四年則遂為觀察使非濫寵而何宜議者之不已也此弊不可遂長於此猶可以為救宜詔兩府更定武臣遷官條例使淹速各得其敘以革前失如欲定之此授亦宜追還庶幾清朝官無幸位論免丁身錢狀臣任荆南府日江陵枝江縣人户正稅外有丁身鹽麴錢此錢自髙氏以前增出無名橫賦真宗時雖曽除放而二邑餘數尚有存者兼本户人丁多已亡沒只是催科户長及地鄰人均陪代納臣尋究本末頗得詳悉兩曽仔細條析事理敷奏乞行蠲免雖蒙朝旨追索勘會至今未見施行兼聞湖南北及諸路亦有似此丁錢未經除減今陛下初踐祚正是推恩布澤之時欲乞檢會臣前來奏狀特賜詳察與行除放論安州差役狀伏見安州衙前差役最為困弊其合差役之家類多貧苦每至差作衙前則州縣差人依條估計家活直二百貫已上定差應是在家之物以至雞犬箕帚七筋巳來一錢之直苟可以充二百貫即定差作衙前既巳充役入於衙司為吏胥所欺縻費巳及百貫方得公參及差著重難綱運上京或轉往别州腳乘關津出納之所動用錢物一次須三五百貫又本處酒務之類尤為大弊主管一次至費一千餘貫雖重難了當又無酬奬以至全家破壞棄賣田業父子離散見今有在本處乞丐者不少縱有稍能保全得些小家活役滿後不及年歲或止是一兩月便却差充不至乞丐則差役不止蓋本州土人貧薄以條貫滿二百貫者差役則為生計者盡不敢滿二百貫雖歲豐穀多亦不敢收蓄隨而破散惟恐其生計之充以避差役以此民愈貧差役愈不給雖不滿二百貫亦差作衙前一丁既充衙前巳令主管場務或有差押送綱運則又不免令家人權在場務其正身則親押綱運及本州或有時暫差遣則又别令家人應副是一家作衙前須用三丁方能充役本家農務則全無人主管兼家人在場務生疏動是失陷官物及界滿則勒正身陪填近時朝廷雖罷衙前而綱運役次猶不減則見充衙前者其病愈甚本州最所重難者紬絹錢綱其入京錢綱或可直給與衙前召保約以日限許令直便入京送納其轉江綱運風濤遼逺動經半年則許令真州發運司送納真州别附綱入京如此則所費稍得減損重難滿日亦許作分數指射不係酬奬酒坊或三五名併作一處以為優饒其已經一次衙前者亦乞立作年限方得再差兼自來條貫衙前與免科配及本户稅皆納本色而本州科率折變並亦不免亦乞今後與依條施行臣所親見止於安州訪聞湖北一路類皆如此欲乞聖旨下寬恤民力所令差去湖北路臣寮子細相度裁定其場務利害繫自州縣亦乞令就本處訪聞擘畫以從寬簡謹具狀奏伏候勑旨進鮑極注周易狀易與天地俱出而隱於視聽之表伏羲始鈎而得之象之以卦經文王孔子然後其道益完以顯故其為書最古最為宏衍幽深魁卓而不可窮後世學者雖終身窮考而欲究其奧極常患不至故其注釋者比他經為最多如康成之博學其所解經莫不傳於世至於注易則學者所不齒晚乃有王弼者自弼而降有陸希聲劉牧此最可稱道然弼為義多老莊無用之説希聲削文王孔子繫象而著以巳説茲非罪人耶然其注差勝弼牧之注本沿蹈於希聲而又益以茫昧荒虛不可究之象數茲數子者俱不免於詆訾則宜説者之不息也臣伏見某官強力積學深於易義致思十年别為注解斥諸家之浮雜抗聖經而獨騖包羅大義橫穿直貫其有髙處超然出於學者之意外臣實惜其堙鬱而未能光明於世輒令繕寫編成五册共一十卷謹隨狀進呈乞下儒臣看詳特賜施行庶幾傳經之士有所聞益矣繳陳汝玉詞頭狀今月二十八日中書送到原州司户參軍陳汝玉除奉禮郎致仕詞頭臣竊知汝玉本成都術士因近臣論薦遂授原州司户參軍巳為優幸今又許上殿從容賜對復授以優秩外庭傳聞莫不謂非蓋其所學不過言災祥而巳設使億中又何補於治今巖穴負竒之士欲少望陛下之清光逺如天日乃不如一術士自草茅而來遽得引對又加之恩誠恐四方觀聽有以謂陛下輕公爵好小數所損不細欲乞陛下追還成命以厭輿議所有詞頭已具狀繳納中書訖論舉遺逸狀臣伏見日者嘗詔諸郡敦遣遺逸之士致之闕下者蓋二十餘人覆試袐閣皆命之以官於時猥有謬舉者士論譁沸於是不獲再舉古之薦士以謂拔十失五猶得其半向之所失未至十五而遽以浮言罷之夫所舉謬則宜坐舉者今釋舉者不問而并以罷薦士是豈理邪今問年以進士擢第者二百餘人其所失者不為不少矣而士大夫不以為怪一為敦遣而疵謗百出蓋進士習熟之久而敦遣特起於一日此論者未足以為輕重而亦有媢嫉者問之也臣以為敦遣者正所以兼收並采網羅遺滯者也不宜因而就廢臣欲乞復置此科而稍為增損蓋孔子為政必先正名漢之聘士不應召者則令敦遣就道豈有朝入科場暮為敦遣者哉宜正其名謂之舉遺逸間歲隨科場發解後有不預薦者開封國學及諸路舉一人又至禮部奏名後有不預薦者許主文共舉五人並至御試時試䇿三兩道中第者别為一榜命官入仕則與正進士同如以為歲增中第者差多則却乞於進士數內減不合格者二十人以均之庶幾郡縣豪俊不至遺於草萊矣伏望聖慈特令近臣參定施行論求遺逸狀臣兩奉詔音俾推舉可任繁劇及過纍沉廢之士此陛下思得天下賢豪並采而並用欲使朝廷內外遂無遺材真帝王之舉也然猶有未及者蓋亦有布衣士竒材異行逸於網羅之外則不宜遂濶略而不收臣欲乞陛下復詔兩府及內外大臣自待制巳上武臣自觀察使巳上各舉一人轉運使提刑獄於本路各舉一人其所舉不須専名一行或經術博通或節義明著或智謀足以達事變或辭學足以通古今或髙才不羈而有負俗之纍或隱德自晦而鮮當世之譽至於兵鈐武略縱橫之家咸得以聞俾薦者明言其所長候到京師則各隨其所長而試之量其髙下而授之官無能者賜以束帛而罷或有謬舉則令御史彈奏如此則草萊之間又見得遺士矣比之䇿試方略則為清舉如愚言可采幸陛下行之薦李抃狀伏見前隨州司理參軍李抃皇祐中進士及第嘉祐二年因父阮毆殺佃客於時抃請納出身及所居官以贖父罪朝廷遂減阮罪免其決編管道州後來纍逢赦令已放逐便而抃至今廢官已十五年不得齒仕路臣竊謂阮之殺佃户其法當讞奏亦得減死而所贖之罪止免真決今來又已逐便則抃之純孝亦宜褒貸不可遂廢終身抃見居襄州履行益修鄉里髙其義前後近臣及本路轉運提刑知州纍有薦論惜其沉廢未見收采如陛下復抃一官不惟振舉淹滯兼足以厚風化於天下臣今同罪保舉堪充牽復升擢任使薦汪輔之狀臣伏見守京兆府法曹參軍前充陳州教授汪輔之進士出身纍舉南省國學第一第二人奏名及應才識兼茂明於體用科策試已中選為臺官沈起妄有彈奏遂不蒙朝廷推恩後來纍有前宰相侍從臣寮知州轉運使論薦其人材通學博該練古今經術文藝為世稱伏名迹彰著近三十年而剛介亷正不能趨附遂致隂纎之徒憎忌排陷昨因丁父憂日復遭知陳州王贄羅織百端誣陷及置院推勘並無顯過特蒙依衝替人例施行合入逺官退居纍年衆所憤惜天下遺材淹廢之久無復甚於此者臣今保舉堪充館閣校勘及編校書籍國子監直講薦隨翊吳孜狀同錢公輔奏臣等伏見將仕郎試袐書省校書郎隨翊將作監主簿吳孜並以文行著稱鄉里昨來本路各敦遣以聞其隨翊即獲就試例得授官仍令守選今巳經兩次霈恩同時被命及守選者並巳補吏而去獨翊盤桓未就銓調近聞淮南及本郡咸有薦章乞就除一官其吳孜雖不曽赴試而朝廷亦以其行義之髙特推褒澤近亦有臣僚乞召為國子監直講茲二人者臣等實知其經行修明久滯場屋既被一命且未得仕進殆非朝廷始議敦遣之本意也欲乞賜甄采並與特除一差遣庶幾國家招徠遺逸將以用其實不獨為空發也薦劉摯管師常狀臣伏見江陵府觀察推官劉摯為學開敏所守醇正觀其器能必須逺到昨因朝廷選擢文雅以備館閣如摯之材不見收采臣甚惜之欲望陛下稍賜進擢俾充三館編校或國子監直講及見本府教授進士管師常講學為文動有師法履行明著士人共知纍舉不第實謂遺才臣欲乞依敦遣人例特許召試授以一命緣臣在荆南日熟知二人之所為苟不如所舉臣甘伏罔上之誅薦陳舜俞狀右臣等伏見國子博士知鄧州南陽縣事陳舜俞學術政事見稱於時在仁宗朝應制科策入優等而至今淹屈尚在散地衆論惜之臣等備位禁林思有補報竊謂如舜俞者在於聖世實為遺才欲乞早賜召還處之臺閣以備器使干冒宸慈伏深戰栗薦陳求古狀臣伏奉勑舉官一員堪充錢穀繁難任使者臣竊詳敇意蓋務求才能之士將加器使至於文章髙行不適於時用者咸不預于此今臣所舉駕部郎中陳求古實有才幹臣之所熟知在通判以上少有及求古者然與宰臣曽公亮沾親而求古為人剛方未嘗厯權貴之門與公亮雖親知聞其不甚協好若以宰臣親戚不舉則臣誠惜求古之才堙鬱淹倒終不得徹於冕旒之下欲望陛下許應詔書俾之引對委以煩劇必有能名如其敗事臣甘罔上之誅薦錢公輔狀右臣伏奉聖恩召充翰林學士巳稱謝訖緣臣於嘉祐八年內與天章閣待制兵部貟外郎知鄧州錢公輔同日除知制誥次年公輔以封還樞密副使王疇辭頭責授滁州團練副使首尾四年兩經恩霈方遷鄧州而臣巳被采擇入登翰苑在臣之分實有未安公輔辭學登科俱在臣前志節堅方勇於事為論事得罪原情可恕近西掖缺貟縉紳竦望以為宜當還職於今寂寥未聞詔音欲乞陛下赦過用才召還舍人院依舊供職舉張司封自代狀臣竊見司封郎中知福州張伯玉冰玉挺操涅之不緇錦繡摛文老而益壯顧丹心之雖在益白髮之巳衰獨遇明時宜登近綴如使少攄底藴獲奉清光必能辨對鬼神副陛下前席之問思頃河海應陛下倚馬之求臣實非材不及逺甚論減仁宗山陵制度狀案此首從名臣奏議中補入今國用空乏近賞軍巳見橫斂富室嗟怨流聞京師先帝節儉愛民蓋出天性凡服用器玩極於朴陋此天下所共知也而山陵制度乃欲效乾興最盛之時獨不傷儉德乎願飭有司損其名數
