body:
  text: 鄖溪集巻十四宋鄭獬撰書投巻書竊惟耕者不可一日而廢耒耜工者不可一日而廢繩墨士君子之道豈可一日而廢學哉然則耕者之不廢耒耜是必良於為耕彼雖有百金之伎不願以耒耜易之則終其身為耕而已矣工不廢繩墨是必良於為工彼雖有百金之田亦不願以繩墨易之則終其身為工而已矣士君子之道貧賤必於學富貴必於學況以百金之間而遽然易哉是亦必終其身為學而已矣某既以治學進干於時天子賜之上第及其補吏來亦不敢廢所守讀書講道時就筆札作為辭説非其性然蓋猶耕者之耒耜工者之繩墨乃其職耳日月之間遂盈巾衍擇其可録者纔得十軸既薦之於吾君其可得以沈酣漸漬乎簡策之間而不治他能以力學為專然其所作意陋辭拙索然無膏澤之容譬夫菖蒲羊棗其何足以備公鼎之正味亦或有嗜之者耳伏覬原其用心而略其干凂之罪不勝恐悚劉舍人書敞迺者某以進士較試於天子廷下是時閤下以文章論議被選為考試官得某之巻獨以為可冠羣進士諸公或難之而閤下爭曰此文似皇甫湜今朝廷用文取士為期廷得一皇甫湜豈不善也於是諸公不能奪而竟處為第一他日放榜士大夫籍籍皆傳道閤下之語如此其始聞之則愧曰在韓退之門下用文章雄立於一世者獨李翺皇甫湜張籍耳然翺之文尚質而少工湜之文務實而不肆張籍歌行乃勝於詩至於他文不少見計亦在歌詩下使之質而工奇而肆則退之作也如某者望退之之門不知幾百千里則安敢望似皇甫湜邪既又自喜曰某學文舉進士十餘年而未嘗有以文章期之者又恥以編軸自鬻於貴人之門意謂雖舉世不見知則亦何病脱有一人能知之則勝於舉世之常人見譽今乃始遇閤下知之其得不發平生之積憤而為快喜者哉然而世之譽人者多矣或以其禮卑而迹疎謬為好辭以慰安之或私於附已欺於人而過詫之或苟相諛悦而漫美之此皆未足以為精賞而公言也至於某之見知於閤下則方在糊名較試雜然於羣衆之中閤下不知其誰何直愛其文而遂稱之其不為精賞而公言者邪某也何足當之由補吏來閑隙無事時亦頗覺今古之得失著為辭説今編成一軸謹附於門下以獻孔子曰今吾於人也聽其言而觀其行閤下既已知其言矣願徐觀其所為而終始之不勝幸甚滄州張守書存某羇拙不偶兩黜廷下世俗聽聞業指衆笑嘗所交往者皆解臂而去之雖其素所餘者一跋一俯或摇足而上下憫憫默默亦自信其連蹇顛躓不復有立於世矣飛帆遊豫章進謁麾下而明公一見之咨嗟賞激許其逺到且勉且慰渠渠不已使仆朽之枿坌然復有發生之意雖古號知已無以易此夫物之表乎外然後著其内精識之所先也故騏驥之異肉鬛虎脊汗或沬血伯樂易知其為駿足楩柟之榦撓雲參天匠石易知其為嘉材也吐氣如白虹卞氏易知其為美璞也發光衝牛斗雷氏易知其為良劍也如某者文不耀於世行不作於衆聲采未嘗落明公之耳辨論未嘗發明公之前不知明公從何知之此某之所以服佩感戢之無量迺者誤入科甲亦嘗具謝幅及署吏宛邱日思通記快道胸中不勝怫鬱之懷而慢惰輒廢至於今日先荷明公惠教罪戾愈久愈厚幸明公終賜之史館劉相公書沆近者客有自都下來傳明公拜章願賜郡去意甚確某聞之起立𢥠歎輒用誇於座曰賢乎哉劉公果不苟於進也人之辭㪷升粟靳靳有不忍色況捐宰相印乎或曰然劉公衷於請邪其漫為之也某應之曰不劉公明決軒闢豈若翦翦者陽著其讓而陰固其利邪或者出某伏思之曰明公一時而罷上意必不爾也不爾則且留且留則明公實貯夷齊心其何能自辨於天下是果中或者之料而某亦為之譁笑也雖主上公天下用而不能遂明公之私而明公可不牽主上意因之不果行也故輒進鄙言以干下執事伏惟明公垂聽焉夫自有君臣來即有宰相宰相之顯無如周公周公嘗難其位矣文王之子武王之弟成王之叔父又負大聖人之才誅商之業與焉可謂安且牢矣而召公疑之管蔡叛之躐前跲後挈挈而東召公賢也管蔡親也賢與親而不知信況愚陋且疎賤者乎故穹穹者易撓也赫赫者易滅也據髙憑峻其不有伺望􅎱嫉者乎以周公處之而難則繼周公者欲久固利之愈難前日大丞相出亳而明公恬然不揺者非朝廷闗舌帖帖以伏明公也其意方在亳亳已行則好言者固將以明公市名矣雖堤捍補塞用以無恐而萬一僅有毛髪隙漏人得乘而攻穴之亦足為累事固有出無形而不可逆備者有之矣兹豈明公不能自辨哉明公一辭而不獲則願再辭焉再辭而猶不免則願三辭焉期於有得而後已不宜泯默遽以自罷也苟上意必堅而不得請則明公觀天子即位來豈嘗有不去之相固不然也惟明公果於一退無成好言者之名而無中或者之料則某之為人之所譁笑固不較也從之拒之在明公所擇運使王密學書贄某晩生官治外不當横語他事又未嘗趨伏麾下以望拜光采孔子稱未見顔色而言謂之瞽某輒有言者迫於悃至猶之救溺不暇取佩玉之節也伏惟明公矜恕焉明公繩墨所畫徑繞數千里地以吏補者莫不檢絜濯礪以㬥其所長於此有人焉掌書記趙唐廉介幹敏更吏事指摘弊病動中其根穴究訟處法特為審密幕中賴焉特其家苦貧母老髪白登科十有四年扼不得進最為窮屈日覬改一官以豐旦夕養而被薦者有缺一二今盡二嵗滿即明年三月當罷又恐明公一日趨召遂委之而去此所以尤為汲汲也某誠惜其美材丹渥不施故敢外官治而進焉夫嘉穀生於腴田無不遂楙長大者至有槁落不得秀以實者蓋人力有所不至焉今唐誠嘉穀也且處明公之腴田而尚未能自奮者意亦有人力所不至云耳此在明公一引臂耘而溉之既使其槁落而得就於實因穫畜之以備囷窖之用則唐也兹必有補於門下矣辭不充意恐悚以俟進退發運使王司書鼎某始學為進士時即聞賢老先生稱誦明公之徳自恨未能一識光采如咸池大韶瞥入躄者之耳而不得趨前以觀其傾想向慕當如何也幸待親來楚適明公駐斾山陽乃得履幕下布席賜之坐溫乎其顏其可親也棣乎其言其可樂也誨指周切如十年前舊出門下而被教育者至於以采賢擇善為報國此益見明公之用心萬萬於他人昔樂正子為政孟子聞之喜而不寐以樂正子好善也且使孟子而在聞明公之言其將吐飱投枕起而抃躍又豈特於不寐者哉兹愚陋益所以稱歎悚服之不暇惟明公早膺大用推此心被天下使一世遂無遺材而不獨伸於東南十數人而已某不勝慺慺之願石屯田書輅環陳之地西華為庳邑東㵶宛丘南漬商水窳然為大窾六河蟠貫畫溝如奕道累日視按亦頗窺其閾如積雨緜注旁大水猥至齧堤而逸溝與河通漫數百里積為大川此非人力所捍雖井溝不能泄人適見此故以為修之為無益也然至其雨已止旁大水復循河而落則田中有停水得深溝亦趨於河不為留蓄雖見稼或不收而後日速得就耕大水大旱不常有尋常積潦得濬溝即入河此豈修之為無益哉其所疚者蓋一嵗大較功廣夫狹苟欲滿其數又督視不謹故庳者補之不厚堙者決之不深不厚則易潰不深則易積潰者無以禦積者無以歸需其自涸乃可耕此與不修同今若計之實功且急其害深者修之他宜一切斥罷以遲再嵗如宛丘宜鑿古溝其生溝可罷古溝上有源下有歸古溝濬則田潦不須生溝而可泄西華宜完河堤其他溝可罷今嵗水病根於河溢又以嘗鑿溝較他邑頗濬自可通以是角之則似或有畔矣夫不見其實而逆斷是否人之通病居齊而談楚之楚則審矣足下今之楚矣而損書教誨及之甚善且試觀此議以為如何三兩日亦歸可能來境上同歸否代人上丞相書里語有之有車可以踰太行有舟可以絶吕梁貴人不可以義干豈其然哉太行吕梁天下之絶險處也而峭崖峻壁之顛危將以摧吾輈洪濤巨浪之奔駭將以破吾楫貴人之門有同有異同則夷狄猶堂上也異則堂上猶夷狄也豈與太行吕梁為比哉某以義干相公者也惟加察焉某老大蹭蹬雖不足比擬然與楚國太夫人有葭莩之親用此為自進計伏念自相公進用以來今二十年矣内外宗族姻婭之家下至伎人醫師走趨之僕皆得以䝉巨蔭易短褐被朝紳而仕矣豈止是哉坐於廊廟之上凡卿大夫百執事之人角其才賢而進之侁侁然佈於朝廷矣隂陽和風雨時則草木魚蟲鳥獸之類亦皆䝉厚澤矣豈今太夫人羅氏之甥不得被德哉羅氏之後止今供奉一人而已次則某也行年五十餘髮已半白雖至七十能餘幾日所以勤於一命之榮者將逃死於寒餓之域耳尚何望於起家顯大哉相公得不哀之乎昔者靈輒餓於桑下趙文子哀而食之文子非有賢於靈輒耳直以其欲餓死而食之今某亦非敢妄託太夫人之親牽强以希進直以桑下之急以叩相公願相公急食之不則委棄溝壑於此時相公雖欲為之力亦已遲矣至於論報盛徳則願附於桑下之士序御製狄公祭文序熙寧元年五月戊寅上御延和殿西上閣門使狄諮以職事進上曰若之先父青有勞於國征南之事亦有遺書存乎宜盡搜其所有以聞諮即以平蠻記及歸仁舖戰陣二圖進上覽之於是拊髀而歎息思雲臺之故將今不復見也乃發乎昭回之光披而為文遣昭宣使入内内侍押班張若水持上尊大官之饌即所居祭之上曰圖中見乃父遺像恨不及識之如聞當時亦有讒之者朕為愴然諮頓首再拜謝臣謹按青在仁宗時奮於戎馬間捍西羌連取奇功及為樞密副使於時峒蠻儂智高出廣源州以驚南徼屢擇名臣以往迄無成績賊鋒瀰漫繞邕廣數干里民舍無遺堵天子側席而謀疇議將臣青即進言小醜猖獗請為陛下平之天子歎其忠乃以大將軍鈇鉞出行天討既就道下令諸將毋得亂發兵禆將陳曉輒率所部出崑崙闗與賊戰軍覆青以軍法誅之諸將皆震懾不敢後遂至邕敗賊於歸仁舖賊窮犇海而遁進青以樞密使久之有飛語不復自辨遂請解機軸而去天子加賜丞相印出奠淮揚明年遂薨齎其謗言歿於地下矣方夷狄之暴横公躬提桴鼔厲三軍於鋒鏑之間北面以報功世皆稱其忠勇及解甲而還邊境無所事或者起而攻之而世亦未能盡辨也及上親為製文以祭之又以一言明其讒則青之功烈表表明白亘乎無窮而不可磨其平生鬱積之氣齎之於九原者亦已爆然破壞矣於此之時仗鉞之臣冠鶡之夫伏讀而傳誦之莫不竦首頓足却立而四顧思為國家横戈擐甲争先以鞭撻四夷足雖未馳而憤勇之氣已衝薄乎瘴海之南與大漠之北矣諮且欲侈大君之賜明先臣之烈於是刻之金石表於墓次俾夫來者觀之不待鐘鼔玉帛之賜而有以勸之矣熙寧二年正月初六日翰林學士尚書兵部外郎知制誥鄭某謹序文瑩師詩集序文瑩師自荆州訪我於鄖溪之上出其所為歌詩一巨軸方予之躬事先壟攬涕松下而未能盡閲也及兹北歸道出白雪闗蒼山峭立左右如連壁溪流其下聲不絶耳行之凡三日累一百七十里乃盡因得馬上盡觀瑩師之詩得其佳句則必回復而長吟窈若么絃瞥若孤翻遂與夫溪山之靈氣相扶揺乎雲霞縹緲之間而亦不知履危石而涉寒淵之為行役之勞也浮屠師之善於詩自唐以來其遺篇之傳於世者班班可見縛於其法不能閎肆而演漾故多幽獨衰病枯槁之辭予嘗評其詩如平山逺水而無豪放飛動之意若瑩師則不然語雄氣逸而致思深處往往似杜紫㣲絶不類浮屠師之所為者少之時蘇子美嘗稱之欲挽致於歐陽永叔以發其名而瑩辭不肯往遂南遊湖湘間今已老矣其詩比舊愈遒愈健窮之而不頓使子美而在則其歎服之又何如也瑩字道溫錢塘人嘗居西湖之菩提寺今退老於荆州之金蠻荆州無佳山水又鮮有知之者安得擕之以歸吳俾日吟哦於湖山之間豈不遂其所樂哉送方元中序聖人之教明其性分而不强人以所不能孔子之門可謂多賢矣而皆不得為孔子乃有七十人者又有十人者十人之賢又别之以徳行言語政事文學則知聖人之道大且周而能并容成就之而不能遺也故顏淵之性仁教之充其仁而足矣仲由之性義教之充其義而足矣子貢之性智教之充其智而足矣中庸所謂以人治人改而止者其此之謂乎然而顔淵雖性於仁不得孔子之道正之則將失而為柔懦而不治者矣仲由雖性於義不得孔子之道正之則將失而為㬥悍而自用者矣子貢雖性於智不得孔子之道正之則將失而為夸譎而不制者矣故又曰好仁不好學其蔽也愚好勇不好學其蔽也亂好智不好學其蔽也蕩譬之為器者丹則磨之角則醳之金則冶之埴則旊之物雖不相同各期於成器而已矣今元中頎然有壯氣喜遊於賢傑間既舉進士黜於有司乃曰吾聞東南有佳山水世之皦厲奇跱汙世而不市者多遊焉疑其有賢老先生伏其間其可以師友之剔去邪雜而充吾之不足者謂之如何予聞之而喜且觀其論甚高而行意甚壯而以元中之資性近乎有義者故舉是說以贈之如果能踐予説則異日元中將廓然偉然其為能義人也必矣送連君錫分司歸安陸序連公分司之歸安陸予有以謂之賢也蓋賢夫世之有歸者焉世之有老且病目眊而耳塞至不能落筆署字者則有歸焉貪懦不治或落勢苟避以脱者則有歸焉家厚禄庳得不足以補失者則有歸焉猶靳靳不忍一決以至於老且死因抵罪而後罷去者豈連公有是哉連公年六十齒髪利完非以老且病也處官廡與僚友上下如季孟無絲毫可怪者非以為貪懦不治也家甚貧官為外郎尊夫人春秋高無可歸之勢非以家厚而禄庳也而直以厭苦世俗不能較聲利於蹄嚙之間欲遺其韁勒而馳出乎轍跡之外用是而歸得非為賢乎哉應山之下有田一㕓繞廬樹桑足以為衣引泉種稻足以為食霜亁而林可樵水落而魚可餌親戚故老嵗時相還往野蓛山肴白酒相對放懷乎烟霞之表亦足以致樂乎連公之歸淮揚士大夫皆嗟嘆其去競為之詩以耀其行況予與連公為鄉里之丈人且嘗同治官於此固所以知公之為賢也而豈獨予與淮揚之士大夫以為之賢將四方之羣公聞之亦必曰荆楚之間有以賢而歸者安陸之連公也朝賢送陳職方詩序康定元年尚書外郎陳君以殿中丞出貳福州於時朝中羣公故人咸作詩以美之陳君家於興化而福為鄰州又親侍太夫人以行故其詩皆樂道其孝養而張以為榮事陳君既之官且侈羣公之有是言也刻之石凡七十二篇今樞密直學士蔡公為之序後二年陳公移守潮州坐誤用詔書謫官海陵已又丁太夫人憂至和初迺上書自訟始得以職方員外郎佐淮揚幕由康定距於今凡十七年而職未嘗一遷焉因閱前之羣公詩則蛟翺虎躍盡為偉人坐明堂佐天子以鎚鑪天下者十一二腰金魚列玉陛以文章議論者十三四功名姓字明耀光白若披星圖而數二十八宿何其盛哉陳君以謂已雖窮而羣公之奮勵如此是亦足以為已榮者矣則又掇其著者二十篇再斵石刻之其官次悉用其舊而以新秩髙下焉存其本而大其顯也然陳君以十七年間官始例進為郎昔為郡刺史今顧居諸侯幕下齒益高髪蒼然向白矣惟其心豈特分為殪蟄仆朽然不復有望於飛榮者哉當其東歸時羣公既能以詩稱美之今老且齟齬又得不有哀之者邪集高齋之逸韻増黄堂之故事宿承貺授辱命冠篇綴大雅穆如之章慚末學斐然之累謹序
