body:
  text: 鄖溪集巻十五宋鄭獬撰記襄州宜城縣木渠記木渠襄沔舊記所謂木里溝者也出於中廬之西山擁􅋣水走東南四十五里徑宜城之東北而入于沔後漢王寵守南郡復鑿蠻水與之合於是溉田六千餘頃遂無饑歳至曹魏時夷王梅敷弟兄於其地聚民萬餘家據而食之謂之柤中故當時號柤中為天下膏腴吳將朱然嘗兩提精兵爭其地不得其後渠益廢老農輟耒而不得耕治平二年淝川朱君為宜城令治邑之明年按渠之故道欲再鑿之曰此令事也安敢不力即募民治之凡渠之漸及之家悉出以授功投鍤奮杵呼躍而從之惟恐不及公家無束薪斗粟之費不三月而數百歳已壞之迹俄而復完矣其功蓋起於靈堤之北築巨堰鄣渠而東行蠻􅋣二水循循而並來南貫于長渠東徹清泥間附渠之兩涘通舊陂四十九渺然相屬如聯鑒高畜下泄其所治田與王寵時數相若也餘澤之所及浸滛中廬南漳二邑之遠異時之耕者窮力而耨之不得槁苖則得稗穗今見其苕然嶷然皆秀而並實也刈熟之日囷廥之容則委而為露積雖然此猶未足以見惠也至於歲大旱赤地焚裂而如赬則木渠之田猶豐年也於是民始知朱君之惠爲深也穫而食之曰此吾朱令之食我也以其餘發之於他邑亦曰此吾朱令之食汝也然而朱君之為是邑纔踰歲而去經始之作其美利未盡發如其來者繼緝之則地力可無遺而襄沔之間厭食香稻矣則將委藉而有不及斂者矣則將腐朽而燔燒之矣夫如是木渠之利詎可較邪予既爲之作記且將鑱之於石則又欲條其事附於圖志王寵之下庶乎其後世復有修木渠之利者於此又可考也已朱君名紘字某嘉祐中登進士第江寧縣思賢堂記自太祖皇帝得天下命曹冀王以舟師取江南拔其都以為江寧府當時之富貴繁華隨而磨滅乎荒壟斷塹之間然其左江右山龍虎蟠蜛猶有故都之氣象故東南爲㑹府江南以東諸郡皆屬焉朝廷選用刺史常以宿德老儒俊乂之臣以鎮故其施設條教皆有美蹟以見於時及其既去則遺風餘烈猶灑然在人耳目樵子耕夫里巷之老或能稱道之好事者又圖其像藏之於家濮陽吳仲庶以龍圖閣直學士來奠是邦一之日吏畏二之日民懐事無鉅細從容辦於尊酒笑談之間遂能於閒暇時搜訪前人爲治之遺迹恐其零落而不復傳􅒺然思以表襮之因得民間所藏畫像自給事中賈公而下凢二十有二人命善工悉圖於翠光亭而易其牓曰思賢堂卬卬如大圭振振如白鷺纓冠束帶𣺌然有愛君澤民之意登是堂者則必想像乎其爲人遂從而知向之治行得失之效以襲以革與時而弛張之則庶乎於此亦可以謀政矣以仲庶之才懿美守金陵固足以爲良刺史而猶惓惓愛慕昔賢之不巳且以告來者兹非樂善之君子哉仲庶嘗爲御史諌官數更藩府朝廷益知其能不乆當去此則郡人又將圖其像以綴其次異時來者思仲庶猶今日之思衆賢也無疑熈寧二年三月鄭某記黄州重建門記治平二年予佩荆州印浮舟跨長江而南道出于黄往見刺史陳侯入其南門傍扶下支隤然其將顛引鞚疾驅而後過之予意陳侯甚有才而敏於爲政是將緝之矣而不以告也明年春果有書來新作州門幸遺我數十百字以識之奚予之料之必耶葢陳侯之爲治有所緩急而後先之必有獲於黄人環境之内皆若家視而人撫之庭下肅然遂至於無事乃始爲之檢察内外之隳仆而募工斂財稍繕治之由是壊者徹完者立賓有館燕有亭粟得新廪馬得新廐遂作州門盡易其腐朽而一掃之其隅言言其楹業業赫然甚壯黄人改觀焉然而作者之意其特以郡邑之尊雄而誇大之耶而以闗鑰啓閉之爲嚴固耶是亦有意於爲刺史者耶葢夫刺史之治其美惡必繇此而出焉坐乎黄堂之上操方尺之紙挾筆而裁之作爲符約以令乎民民莫不環起繳繞而奔走之其出也甚美則黄人欣然相告而喜焉其出也甚惡則黄人怵然相顧而病焉其甚美與甚惡在乎人而何所累於斯以其寓之而出也必有表焉者耳故曰兩觀灾魯侯有不職焉若陳侯者猶有歉然者邪予知陳侯者也嘗恨其所處未能窮其材如得其大且衆者而治之則固若强弩之發振機未絶而其所當者忽以破壊矣然後以為得意今老於尚書郎而於窮淮之南治一奕棊地其蹂躪民事顧不易爲力哉况若門者耶謦欬之餘可以立辦矣春秋之説動於衆者必書新作南門者譏不時也則陳侯之作起於九月霜降之後而訖於十一月大雪之初斯其於時得矣可美不可譏於是爲文以遺之治平三年十一月十七日右司諌知荆南軍府事安陸鄭某記養生記茅山隱君子示予以攝生圖并書數軸閲之累日其摩按偃屈熊蹲鳥躍之形與夫鼓漱呼納存思左日右月龍虎之氣及採鍊金石草木雄黄丹砂芝术之訣莫不備焉考其要歸則本於順天地四時寒燠晦明之節黜其思慮不妄起居飲食以時無暴喜怒無大哀樂以畜其氣以持其神春夏之時縱衣解髪旦作而歩趨以助乎蕃毓秋冬之時早卧宴起避寒趨温以固守閉藏此雖雜於黄帝書而亦頗與禮之月令者合又其言曰天地之運日月之明山川之高深而能亘乎無窮而無仆壊者非夫渾淪之氣寒暑晝夜升降上下有休息而然邪至於鳥獸魚蟲之類處乎陽則動振鳴呼出而走飛暑甚則擇乎深林茂樹之棲凉泉深淵之游處乎隂則或引而潛伏不相孕字以全其真以順天地四時寒燠晦明之節惟其飲啄之適固無有計慮營畫之撓其心故得終其天年而長肥息焉惟機穽網罟彈射縶縛之所中害而未嘗有以疾病而死者至於馬牛服役於人爲之羈縶爲之鑿燒爲之鞭叱蹄而渉者無險易無遠邇一不得有肆焉則天下之馬牛病且死者嘗多焉予以是益知天地四時寒燠晦明之節而信其生之可攝也然予之泊於世務者繇幼及壯夜誦而晝書考評古人之是非得失歴世之治亂間爲辭章辨説動累編簡又爲吏來修辭檄理獄訟校民之利害盜賊甲兵庫庾粟帛之務日連屬於其懐加之素踈愚醉酒飲食哀哭歌樂之過奔走衝薄風露之苦所以撓其生者萬塗而出故世之好生者兹皆一切棄絶之以謂一蚊蠅之動猶將害其養也乃遠逃於山巖林壑絶迹之境以致其術焉則予安得從事於此書哉雖然予方盡心於子思中庸之説務誠其意以通於物意誠則神定神定則慮精而物可以通也則是書也庶乎其亦有以佐吾浩然之氣者乎若夫按摩鼓潄採鍊金石之術則予未之逹也既歸其圖與書因録其要者而記其後云福源觀大殿記玉仙女真也葢炎帝時人爲神仙之術能飛鍊九丹躡凌雲氣嘗居於仙都山山在大海之南高麗之域山有玉仙峯峯有玉仙溪因其所居遂號為玉仙而洛陽之東南山亦為玉仙山而溪爲玉仙溪其上有玉仙祠豈爲神靈之别都耶道士陳景顥始作玉仙祠於都城之南前作方池取玉仙溪水而貯之於其東别爲大殿塑玉仙像及靈官侍衛左右嚴列肅如也都人皆往祠焉嘉祐六年夏予疾甚家人禱踰秋疾良已始謁于祠下與陳君䕃綠藤而坐出書一巻曰此玉仙傳也我方圖爲殿而君適至其遺我以文予諾之其傳不著撰者名氏而蜀道士杜光庭編集之傳又言玉仙武陽人少時欲嫁之不可乃乗舟浮大溟爲風所引至於仙都山黄帝時嘗廵于海上築壇而請見之光庭博於道家之學其言必有所出而於予無所考然則玉仙古仙人也莊生所謂吸風飲露御飛龍遊者耶其威靈福應葢有感動於世者故世人共祠之而不厭也然陳君初來此獨處于荒莾空野之間無尺柱寸瓦爲之資人笑之以爲張空説必不能有所成就而陳君不悔也丐取收拾凡三十年於是祠成又作真君殿及道院齋館庖房廥畜之室皆具其南闢爲花圃植雜花數千株則向之腐壊汚塹狐鼠之徑俄而爲飛亭曲閣修林翠竹之美觀也都人之來遊者恍然相顧不知物境從何而來者也豈天地變怪之忽有之邪葢世之人惟見其成而不知陳君經營之勞而持之堅也故有爲於世者未必盡爲材材者未必能有所立惟其强力能乆固執而不懈者乃克有立焉予既有所祈而嘉陳君之用心由是作記以遺之安州重修學記慶厯初仁宗皇帝欲以人文陶一世乃下書俾郡邑立學藩守之臣震慄犇走以經以度罔敢不䖍督工伐材斷之削之其聲肱肱繇京師而薄四海于是天下葢多學矣而安陸瀕大湖之北去京師才千里而遠當時守臣獨恬安而不立學長老先生抱經而嘆息里巷之童不聞絃誦之聲邦人恥焉於後六年得秘閣校理孫君甫且將作之下隨漢之材匠者執繩以待奮未及程功而孫君去環梁桀棟散而爲粟廪馬廐吏胥之舍不復有遺札矣嘉祐初司農少卿魏君琰慨然圖之乃於州域之南門外東偏作夫子殿及東西二堂八齋室安陸之民始適然相與環聚而觀之而喜我邦之有學也而猶未覩教育之盛及職方郎中張君先始集諸生鼔箧而升堂講明六經之奥今虞部郎中司馬君旦又絶壕爲梁通朔望㕔入于學徹其舊講堂而新之挾以兩廊門之右爲藏書之室其左爲泉榖之府庖厨沐浴皆具焉凡増七十五楹昕鼓作先生登座抗首而談經學者侁侁恂恂相與揖讓乎丈席之間發疑解難虛來而實歸安陸之學于此而大備夫庠序之不修長民者之過也既修而不能教鄉先生之過也教而不能入學者之過也上焉者有以道之下焉者有以從之日劘月鍊至于有所成就則高才軼足于是轢羣豪而出焉遂而進之天子小用之則小利大用之則大利以其所學措之于事業而施澤乎當世則吾刺史之功豈不博哉某里人也嘗得告南歸謁諸生於學顧不能倡率諸生朝夕從事於其間而猶得爲文託名於巨石之末竊有喜焉葢學之成在仁宗下書之後二十六年歴四刺史乃克大備其難也如此來者幸無以廢之爲易則吾鄉之學雖與鄖溪夢澤並存可也熈寧元年七月十五日記三司續磨勘司題名記題名舊有記龕於西壁天禧巳未歲彭城錢易始爲之自贊善大夫劉式而降訖于太常丞直集賢院馮京合六十有八人石盡不復録嘉祐壬寅九月安陸鄭某再斵石刻其名氏以補于後賦圜丘象天賦圜丘就陽上憲天體為韻案此首從宋文鑑中補入禮大必簡丘圎自然葢推尊於上帝遂擬象於高天必在國南燔宏基之高厚用符陽體取大運之周旋王者揆禮之文爲民之唱脩明大禘導迎景貺有祭焉格神于下有祀焉享帝於上謂丘也其形特異我所以貴其自成葢天也其體亦圎我所以法之相尚爾乃旋仲冬之序迎至日之長掃以除地升而詔王是必肇靈壤以高峙模圎清而上當擇吉土之成基乃定其位倣高穹之大體以就乎陽由是懽然神意交穆然天貺授徧羣靈以從之祀嚴太祖以爲之侑煥爾盛容配乎大就成非人力聳寳勢以下蟠仰合乾儀環太虛而高覆然則禮有物也其制可象天無形也其端可求故我相法于厚地取類于重丘崇崇其高隱若積土之固浩浩其大渾如洪覆之周是故有藁秸以藉誠有陶匏以薦禮大裘焉以彰其質蒼璧焉以象其體固異周朝授政築層級之三成漢祀命郊兆重階之八陛是則事至神者物無以稱其德接至高者丘所以表其䖍與地居上如天轉圜對方澤之成形乃殊其象規大儀之冥運自貴其全聖人所以明禮大原建邦茂憲兆其成迹符於至健夫然因天事天得先民之至論勵志賦慶厯皇祐間予兩㸃於廷下躓而不得收者將十年矣間仍苦疾一病更寒暑血氣耗􅒒顔癯而髮踈目花翳然其已衰矣因竊自感悼平居時學古人事業口誦心記俯讀仰思根其得失存亡之原葢亦勤矣而揆之古人尚有以愧之即遂病已於此則何異一草木螻蟻之偃仆哉得非天之將有警於余乎夫天地變動日月之凌蝕五行之𤯝沴鳥獸魚蟲之孽皆所以告戒人君而爲之恐懼也則布衣之士既窮且病獨不爲上天之警與安知吾不得之於桑榆之下哉猶懼其懈也因作賦以自誨曰嗟予之愧於古人兮増翹翹而自惻騖駛景以㡬時兮猥憂病之來蝕因倚伏之相轍兮未始根乎倪極立端以靜俟兮尚有渉岐而中惑力進蹈於往脩兮豈一跌而乃畫孔不容於隘世兮孟見傷於讒國彼皆豪聖兮卒窮老而無得幸予齒之完利兮載以燠而以熈嘗剽名於薦書兮非棄放於當時天既厚予之生兮或以顛而復馳雖葅䵄之品兮尚可登宗廟之祠豈生之至然兮靳吾道而獨私前闢一涂兮不可逆窺哲人優處兮隘者厄悲惟伏誦之無忘兮願蚤暮以自思登山臨水送將歸賦以題中四字為韻安定梁天機歸岢嵐予同汪正夫作此賦以送之登秋山之翠微澹寒水兮晩煙霏鬰予懐之不開送遊子兮從此歸馬躑躅以顧影風蕭寥而滿衣來已遲兮屢更約去太速兮復相違獨羣峯兮顧予留不如滄波兮與歸塵而並飛嗟子之去兮何所止鶩晉陽兮行故里朝升大行兮短草埋雪暮絶清汾兮白沙浸水堂有親兮髪如黳入門拜慶兮方宴喜紫穗繁兮葡萄熟玉乳肥兮酥酪美人間之樂兮無以樂於此方予之失朋兮獨怊悵而傷心又自痛夫艱棘兮淚溢下而沾衣襟駕羸驂兮出郭傷落照兮登臨俯游魚兮戯舊浦仰啼鳥兮安故林兹殊類之不相失撇有慕乎飛沉山將暝兮望欲絶水轉遠兮意踰深惟車轍之印路隱紅塵兮不可尋倚蒼崖兮如待遶寒汀兮獨吟予願跨白鱗兮俾子之乗丹鳯頓汗漫之修翮兮縱青冥之飛鞚寤不聞於笑言兮寐無求於見夢奚有煩於賦言兮酌别酒而相送劒池賦皇祐初元秋九月予解帆豐城迹寳劔之遺事得故穴焉夫神物靈不能自用也當其幽壤潛伏其氣激烈乃上燭於天是必思有以奮於世者焉遇匪其人昵而見佩雖濯之以紫淵礲之以碣石姦血不濡豈劒之意哉於是晉室晻晻豺狼滿朝老龍弭首蟠于一匣寂寞雄鋩終以飛去烏乎其可悲也予以謂至精神變雖亡而存疑其尚潛於天地間顧未躍珌而再出爾不然則周鼎不薦於漢廟荆璧不傳於秦璽孰謂斯劒之不伸於浮者哉因賦云弛予橈兮晨泊岸晴沙兮少息巋頽城之遺封摉劒池之故蹟若臼若缶窳然䫜黒靈光邈兮注雄心而増惻昔之老龍蟠伏金背鱗蝕屈不伸角疲巳見骨憤汚壤之乆蟄兮氣貫斗以横蜚覬雄斷於當世兮倒乾坤於一麾有微先識奕然肆爥兆精英之軼發䇿兹地之所屬剖幽植以中闢駢雄鋩而下伏玉浪無聲從匣涌出虹氣兮見紫天光兮漏碧横西山以載磨兮照澄瀾而動色始期我知兮終冺焉而莫伸匪横而佩兮蓄蒼地之修鱗退不當藁街兮梟立朝之大憝進不在兩觀兮血外戚之奸臣掩連環以怊悵兮寄風雨而長鳴彼司馬之奮䇿刃加頸以猶疑天子青衣兮磨牙髪髵公蔓其禍兮其將尤誰怒鬛奮兮躍雲濤而去之嗚呼至化揉變邈無遺音儵然而徠曷闚以尋吾謂夫棄於晉去於晉而將復試於今者與小松賦北風號空大雪飛注長林高木兮或亦爲之摧仆雖鴻鵠之健飛兮翅粘氷而不度獨寒松蓊然兮鬰蒼崖而自固若周公之排禍亂兮何獨立而不懼又如比干之事紂兮直犯雷霆之震怒若楸梧與楩楠兮媚風煙而自附何今日之梗莾兮窮本心而盡露葢夫粹美之氣蓄乎此山白玉如肪赤金如丹美璞良礦兮磊砢璀璨於其間合二寳之精剛兮又生此松於山顛故高節之特立宜殺氣之不可干嘗見美於仲尼謂不凋於歲寒猶稱伯夷與叔齊兮遂與賢人而並傳斵蒼雲以移植兮回佳玩於前軒辭丹林之煙霧兮濯玉井之波瀾茁然翠鬛三尺琅玕若蒼虬之飛來兮戯靈珠而不肯蟠顧得地以託根兮尚繁枝之未大當老霜之摶物兮固勁氣之踰邁雖鳳羽之未成兮葢已異山鷄之文采對秋桂於高蟾友靈桃於碧海竦脩幹以凌雲終孤心之無改
