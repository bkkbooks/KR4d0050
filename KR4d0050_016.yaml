body:
  text: 鄖溪集卷十六宋鄭獬撰論左氏論世之說者以左氏為丘明親受經於孔子而作傳自司馬遷劉歆班固莫不以為然豈漢之諸儒見論語有左丘明遂謂之左氏乎以與孔子同時則又以為受經而作傳以豫考之蓋左氏者與公羊穀梁相先後而俱出乎秦漢之世何用明其然耶質之孔子之經而知之也嘗試用聖人之意而問於子孔子之作春秋必據乎國史史之有缺文斷義疑誤而不可考者則將在書之乎削之乎則必曰將在削之云耳嘗以左氏之意而問於子經之有書夏五郭公者是為何辭則必曰左氏無說此乃秦火之後文久而有缺失也又問子其書辛卯君氏卒甲戌已丑陳侯鮑卒者如之何則必曰左氏之解以君氏為聲子也不言其姓以公故也其說陳侯之卒有二日者以再赴也陳侯疾病而國亂故再赴也然則其說為何如是則左氏為妄解矣豈有夫人之卒孔子輒改去其姓而謂之君氏乎豈有一國之君薨而臣子不詳其實而再赴乎然則所書亦必如夏五郭公者容其有缺失也是君氏者必為誤甲戌之下必當書某事而亡其文也此則左氏獨見秦火之遺文而未嘗見孔子完經完經尚不可及見安在其為丘明而親見孔子受經而作傳者乎左氏如見完經則必不為是解公羊穀梁亦承其缺文而强為之辭吾用此乃知左氏與公羊穀梁相先後而出乎秦漢之世矣吾之怪夫春秋之經至簡而其疑缺者已多左氏至繁而反完備豈獨經遭秦火而傳不焚耶秦書之不焚者蓋鮮以此又益知其出於秦漢之世也明矣或曰孔子作春秋必本古史史者春秋所以出也孔子既沒學者以經文簡無古史則不足以見春秋之迹故嘗存古史以備春秋本不以解經也及其後世則學者又旁取列國雜記卜筮詭譎之說而益附之亦頗為之解經以其史本出於左氏故總題為左氏云其說亦通然而要之不為丘明親見孔子受經者則決無疑矣公羊氏則曰名髙子夏弟子蓋周人也又曰為漢初人也穀梁氏則曰名赤亦子夏弟子周人也又曰名俶秦孝公時人也則左氏者何用獨知其為丘明也耶用古論古亦治天下今亦治天下古之民耳目口鼻飢渴飲食類今民也類則其心亦無以異也何古之能常治而今不能哉是今不用古也今或言古有堯舜禹湯文武周公之法可用者則必起而咻笑之是未睹古之可用也敢問之雍熙祥符間去今未逺也如以今日之治漸革而可以至雍熙祥符間耶人必曰可又以雍熙祥符間之治少進之可漸而至貞觀間耶人亦必曰可又以貞觀之治醇之以禮樂可漸而至周公文武禹湯堯舜之治耶人亦必曰可是今日之治獨能至雍熙祥符間而何不可至周公文武禹湯堯舜之治其遺於經者皆可考據非有竒祕之䇿甚難行之事邈然使後世不可及者也其所治亦皆務便民而已今舉天下之大憂不曰天下財賦之缺乏夷狄橫而不制禮樂弛而政教缺賢不肖之淆雜無大此數節者矣堯典至簡一事至數句至於命羲和凡百五十餘言趨天時務民耕最所重也其末乃咨鯀以治水舜亦曰棄黎民阻飢汝播時百穀是豈古之不憂天下賦財之缺乏耶舜命咎陶曰蠻夷滑夏冦賊姦宄汝作士又命禹曰有苗不共汝往徂征是豈古之不憂夷狄暴橫而不制耶五品不遜契為司徒典朕三禮伯夷作秩宗八音克諧夔以典樂是豈古之不憂禮樂弛而政教缺耶堯咨四嶽舜五載一巡狩三考黜陟幽明臯陶謨九德是豈古之不憂賢不肖之淆雜耶若是者正與今所大憂者合奚古之不可用也推堯舜而上以至黃帝神農伏羲之世今以為太古荒濶之教然見於易者所務亦非有竒祕之䇿甚難行之事使後世之不可及者也在伏羲則曰作書契為網罟在神農則曰為耒耜通貨財在黃帝則曰垂衣裳至於刳木為舟楫服牛乘馬斷木為杵臼為宫室弧矢棺槨兹皆太古之務亦在便民而已至於有巢氏之層巢燧人氏之鑽火亦不出乎便民也故自伏羲而來唐虞夏商周之法今皆行於世而失其迹也世俗止見世之不治則以為無古法遂謂之不可用古古法未嘗弊也其所以弊者乃其迹之變也或以謂古有井田今亡井田古有封建今亡封建古有肉刑今亡肉刑不可謂之有古法曰兹所謂迹之變也井田弊而為阡陌封建弊而為郡縣肉刑弊而為笞箠如無古法則今天下當不鑿田不建官吏不繩之以刑獄是三者皆具於世何為而無古法其不治者乃其迹之弊也善救弊者惟原其古聖人所以求治之意不必襲其迹期至於治而後已及至已至則亦堯舜禹湯文武周公之治也何為而古之不可用耶烏乎一為層巢天下即歸之號有巢氏一為改火天下即歸之號燧人氏一為網罟天下即歸之號伏羲氏一為耒耜天下即歸之號神農氏一服軒冕天下即歸之號軒轅氏利於民者民歸之惟以一器一物遂而天下從而君之况能兼用堯舜禹湯文武周公之成法乎則歸天下之民無頃耳古之未有法聖人開創之以為難今聖人已試之法皆完具精白惟其探取而行之耳奚其古之不可用也耶禮法論孔子作春秋常事不書變禮則書明聖人之典禮中國世守之不可以有變也甚矣浮屠氏之變中國也浮屠夷禮也古者建辟雍立太學以育賢士天子時而幸之躬養三老五更習大射講六經用以風動天下之風教而今之浮屠之廟蘿蔓天下或給之土田屋廬以豢養其徒天子又親臨之致恭乎土木之偶此則變吾之辟雍太學之禮而為夷矣古者宗廟有制唐虞五廟商周七廟至漢乃有原廟行幸郡國及園陵皆有廟漢之於禮已侈矣而今之祖宗神御或寓之浮屠之便室虧損威德非所以致肅恭尊事之意也此則變吾之宗廟之禮而為夷矣古者日蝕星變水旱之眚則素服避正殿減膳撤樂責躬以答天戒而今之有一災一異或用浮屠之法集其徒螺鼓呶噪而禳之此則變吾祈禳之禮而為夷矣古者宫室之節上公以九侯伯以七子男以五惟天子有加焉五門六寢城髙七雉宫方千二百步而今之浮屠之居包山林跨阡陌無有裁限穹桀鮮巧窮民精髓侈大過於天子之宫殿數十百倍此則變吾之宫室之禮而為夷矣古者為之衣冠以莊其瞻視以節其步趨禁竒邪之服不使眩俗而今之浮屠髠首不冠其衣詭異方袍長裾不襟不帶此則變吾之衣冠之禮而為夷矣自有天地則有夫婦則有父子則有君臣男主外女主內父慈子孝天子當扆羣臣北面而朝事之而今浮屠不婚不娶棄父母之養見君上未嘗致拜此則變吾之夫婦父子君臣之禮而為夷矣古者喪葬有紀復奠祖薦虞祥之祭皆為之酒醴牢牲籩豆鼎篚獻薦之具而今之舉天下凡為喪葬一歸之浮屠氏不飯其徒不誦其書舉天下詬笑之以為不孝狃習成俗沈酣潰爛透骨髓入膏肓不可曉告此則變吾之喪葬之禮而為夷矣故自古聖人之典禮皆為之淪陷幾何其不盡歸之夷乎使孔子而在記今之變禮者將操簡濡筆擇書之不暇而天下方恬然不為之怪朝廷未嘗為之禁令而端使之攻穿壞敗今或四夷之人有扣弦而嚮邊者則朝廷必擇帥遣兵以防捍之見一邉冦一獠民必擒捽之束縳之而加誅絶焉彼之來小不過利吾之囊篋囷窖牛羊大不過利吾之城郭土地而已而浮屠之徒遍滿天下朝廷且未嘗擒捽束縳而加誅焉反曲帣跪跽而尊事之彼之所利乃欲滅絶吾中國聖人之禮法其為禍豈不大於扣弦而嚮邊者耶豈莊子所謂盜鈎金者誅盜國者為諸侯者耶夫勝火者水也勝夷狄者中國也中國所以勝者以有曲禮也宜朝廷敕聰博辨學之士删定禮法一斥去浮屠之夷而明著吾聖人之制布之天下上自朝廷下至士大夫俾遵行之禮行而中國勝矣中國勝則為浮屠氏之說又何從而變哉舉士論孔子曰三人行必有我師以三人之寡而猶足有賢者而可師夫三人尚爾况為一邑者哉言偃為武城宰孔子曰汝得人焉爾乎武城小邑也孔子責其賢夫一邑尚爾况為一國者哉魏文侯得卜子夏田子方假干木而師之得魏成子樂羊李克屈侯鮒而臣之遂為顯諸侯夫為一國尚爾况為天下者乎故雖堯舜禹湯文武周公之為天下其聖智聰明已不可升級而望之矣然其吐哺輟沐圖見賢士乃甚於危迫之君若朝夕遂亡其天下者得非其任天下雖重必得賢士而共舉之則其沛然有餘力矣今天下之廣非若三人之寡一邑之小諸侯之國也而尊賢聘士之禮則簡缺不聞間或有詔書具文而已近之守臣亦頗薦山林之處士而朝廷忽焉如飄風之厯耳或重違大臣之請則其髙者乃得一助教次之豫數十帛下之寢不報矣此豈致賢之意乎彼且將包蓄閉結幅其股而疾去之漫浪乎曠山荒野之間伏草莽而不出矣今夫一舉進士經生其賜第者動千餘人間有窮老及被兵冦者悉推之恩澤又數百千人大禮之後公卿之子弟親戚臺省之吏胥與夫貴人之奴𨽻亦數千人大較五歲所得補官者無慮千人者盡以為才能而當補之乎苟欲例官之也數千人之衆則以例官之一山林之處士則稱銖量黍而差進之乃不得齒吏胥奴𨽻之末顧得一助教次之與數十帛下之寢不報何其棄薄如此耶今之助教至為賤不數也富民之輸錢則命之醫藥之工出入權貴之門者則命之遂而使處士與之同稱則孰不反唇而歎笑之是朝廷以富民醫藥之工待天下賢士者也彼且授之而未嘗辭處之而自若也彼其以道自任故卑之為助教又何辱尊之為宰相又何榮然而不足為處士之辱而適足為國家之辱於有道之士又何輕重乎哉夫國家以數千之衆尚例使之從政豈惜一幕官不為處士地乎唐之聘處士至以拾遺著作郎今易以一幕官蓋亦隘矣而靳靳焉不是為也或者以處士盜虛名而不果知其實用宜若不可開其漸夫致一士所以致天下之士以一處士盜名遂廢天下士可乎昔周公所執贄而見者十人還贄而見者三十人貌執之士百有餘人欲言而請畢士者千有餘人於是僅得三人焉周公之所得者止於三人然而三人非獨出於十人三十人乃出乎百人千人之間也如周公不能致千人則是遺百人者矣不能致百人則是遺三十人者矣不能致三十人則是遺其十人者矣是三人者又曷從而出哉又烏足遂定天下哉今進一處士而棄薄之則將何以致千人而取三人者乎惟其將有致焉則宜少厚之而已矣伯夷論特立之士有大功於聖之教桀然喬於百世之上者后世皆得而公傳焉司馬氏作史記序七十列傳非公其傳者歟而以伯夷首之善乎司馬氏之為史矣伯夷叔齊力於仁義有激於當世輔聖人之教得其深者也為之傳首豈謬哉孤竹君欲以位其子叔齊叔齊讓於兄伯夷伯夷曰父命也卒不受遂更相讓而俱逃之及武王順天下號義兵以伐紂天下無賢不肖皆曰武王是為恐恐然恐武之不勝獨伯夷排天下之義非之曰父死不葬謀及干戈非孝也以臣伐君非仁也武王不聽遂取商天下既已宗周伯夷恥不食其粟乃餓死嗚呼一國之君民之所奉亦已尊矣而伯夷不敢廢父之命甘於遁去天下之讓孰加焉武王既興聖賢皆為之助亦足以樹勳矣而伯夷不敢廢君之分而甘於餓死天下之仁孰加焉讓齊之心非為齊也而為萬世之為國者焉諫君之心非為武也而為萬世之為臣者焉故后世之為國者子奪於父弟奪於兄交挺白刃以爭繼立者必宿栗挫縮不敢耀芒角以其有伯夷之讓然也后世之為臣者幸君之亂以肆姦謀紾君臂而欲其位者必靦汗驚爆不敢出氣以其有伯夷之仁然也是仁節者得不謂有大功於聖人之教者歟如天之覆健然其髙也如日月之昭烈然其明也而萬百千世愈髙愈明義風洗然照人毛髮使爭子賊臣畏服之如是顧其功可較也昔堯既公天下以讓舜而夫子首之於書吳太伯讓於季厯而遷亦首之於世家春秋之說左氏者亦以隱公能讓而首之於春秋雖然堯大聖也則安敢以擬議以太伯隱公止於一讓後世乃稱之為至德為賢君遂以首之於春秋而况伯夷哉雖欲不為之傳首其亦可得乎噫目之久瞀忽開則大明耳之久瞶忽震則大驚當伯夷不生天下孰知讓國之為美歟伯夷丕死天下孰知伐君之為非歟伯夷生死之節盡之矣渾渾之俗其不大明而大驚也哉夫子嘗罕言仁而於伯夷曰求仁而得仁哉孟子學夫子者也而稱之曰伯夷聖人之清又曰聞伯夷之風貪夫亷懦夫有立志太公望從武王伐紂而親為之師者也亦曰義人也夫子謂之仁孟子謂之清太公謂之義嗚呼其為人也果如何哉武備論萃之象曰澤上於地萃君子以儲戎器戒不虞萃聚也物聚而必有攻齧其間者故畜兵以禦之虞舜之命臯陶曰蠻夷猾夏冦賊姦宄汝作士師以虞舜之世可謂治極矣猶且懼蠻夷冦賊之獷吾民是雖甚治之世不可以不戒也今通天下之地而守之嘗備西北而不為東南慮豈西北之害大而東南無徑旅强兵環伺羣集而然耶夫蠻獠之變窮閻猾夫之倉猝揭竿而起呼者其警豈下於西北耶而東南之郡縣固無深溝堅城之守徑甲强弩之敵士卒皆飢寒脆弱疾老而未嘗識戈矛之倒正雖屯禁兵皆單客浮寄無家室墳墓田疇之為纍聞譟聲則駭然而四走彼何顧藉而為之用命耶乃者如王倫輩一賊夫耳驅聚數十民跳踉於曠野荒澤之中而郡縣之吏民恐懼奔避鳥逝而獸伏其尚能有為者則或具醇醪美肉斂民之金帛以遺之如孱國之恭事强諸侯萬一冀其不為暴害耳尚何敢正睨賊輩乎而朝廷乃責其棄城而繩之以法不為之具而責其守豈其理耶凡事之未芽蘖則朝廷恬安而不為意及其猖獗一發乃遽起而為之謀事已則又解而散去非所謂無恃彼之不來而恃我之有待者也故往年儂智髙冦嶺南則為之備嶺南又聞其轉入蜀則稍為之備蜀賊已逃去則亦隨而隳罷此豈為持久計耶陜西河東河北繚邊之地及廣南之極徼其樓櫓拒敵之固蓄馬募士之方旗甲弓楯之積則或講聞之矣至於江南荆湖京東西兩蜀淮浙間則未嘗有及之者其郡縣之郛邑則或依荒籬壞垣溪谷山石以為之固雖有城塹類皆缺蝕之餘草樹之堙塞狐鼠之穿穴車馬牛羊之踐轢無丈尺之岨而樵兒牧豎之可踰其庫兵則皆塵久不治弓弩弛而不可發劍刀錮於室甲胄聫屬或隨擐而裂一日有緩急其尚能守而禦之耶是雖有太公之謀賁育之勇不得有為矣宜嚴敕守臣稍增葺之城不可卒具當完以歲月不過十餘年則所在有堅城矣課募匠工使盡其巧計其兵之多少而蓄之則又不過數年所在有利兵矣擇長吏以守之責鋭士以習之雖有攻齧乎其間者我有以待之矣或者謂朝廷方講治禮樂文章之具而未暇為城壘甲兵之謀將損國體而驚動天下之耳目嗚呼兹俗儒之論烏足識大易虞舜之所戒哉武侯論武侯曷為不能兼天下曰遭時然也夫時者雖聖與賢不可以違也聖與賢知時之不可違則亦因之以制變兹武侯之不能兼天下也武侯之得先主最晚於時魏已遷許孫氏已得吳天下之勢判矣故其說先主曰今曹操擁百萬之衆挾天子而令諸侯此不可與爭鋒孫權據有江東已厯三世此可與為援而不可圖也若進取荆益內修政理以待天下之變則霸業可成矣武侯之兆基發策已不能兼有天下者明矣然猶區區矯勵川蜀脆陋之民屢窺秦川者非不知魏與吳之勢猶前日也以不忘先主之顧託不計其死生險易惟義之存示不負漢於天下也故又曰先帝三顧臣於草廬之中由是感激今奬率三軍北定中原此臣所以報先帝之職分也於是蜀之土地廣狹不如魏民力衆寡不如魏才傑之多不如魏曹公雖死其遺臣老將尚存也武侯一出漢中張郃拒之而馬謖先敗再出散關曹真拒之糧盡而還又出斜谷司馬宣王再拒之武侯提孤兵以深入宣王扼其喉而不戰遺之巾幗宣王之不戰計得也武侯之糧屈勢格則將如之何尚何責其將略非長歟此終不能兼有天下者又已明矣夫以蜀不能取魏猶魏不能取蜀勢然也故雖聖與賢不可以違者時也湯不遭桀不能取夏武王不遭紂不能取商武侯安能獨兼天下乎然則以武侯之才治民治兵足以兼天下然其遂不能者所遭之時然也哉
