body:
  text: 鄖溪集卷十八宋鄭獬撰解四凶解堯果不能去四凶乎非不能也以有舜也堯之大憂在不得舜既已得舜則天下之事舉矣善人者將自進而惡人者將自誅亦何必堯親去之也於時堯老矣已老且倦則萬幾之大必有窳而不啓者乃咨嗟衆臣將求天下聖人而禪以天下之大位以持其窳而不起者乃得舜既攝治而四凶之惡適以暴發由是一取而鋤去之則四凶之去固在舜不在堯理然也必責堯之不能去四凶猶之責舜不堙水也堯之不去四凶以有舜也惡之未肆也而無舜則堯自去之矣舜不堙水以有禹也如無禹則舜自堙之矣故四凶之去舜事也能不能不在堯也聖人初作欲揭天下之大法必有首誅焉使天下懾然骨次而心螫則其鼓號令不須力而天下可服也周公相周則以管蔡為首誅而天下不為周公服者無有也孔子作魯司冦以少正卯為首誅而魯不為孔子服者無有也則舜之於四凶豈獨異周公孔子哉一誅惡而天下定聖人之機用深矣故曰堯之大憂在不得舜如得舜則天下之事皆舉善人者皆進而惡人者皆誅安在乎堯親去之也或曰有説者謂堯不自誅之而俾舜誅者堯權也堯將禪舜恐天下尚未服故豢而遺諸舜誅之用以威天下之未服者也曰奚有是耶是逆詐於聖人也使繼堯者有不能則或遺之以樹威今舜已能繼矣又曷席此為權耶借堯已自誅四凶舜乃即位天下果有未服者亦自能起而誅之矣未服者誅則天下亦自服舜矣舜之攝治三十年未聞有不服者也説者果有是是不以聖人期舜也辨黃叔度辨黃叔度之器汪汪若千頃波澄之不清撓之不濁信乎其廣且深乎則水若倍千頃而集漫然就圮矣奚睹其所謂澄之不清撓之不濁者耶曰然則稱之曰山川之高深歟日月之光明與天地之高厚與若是者則可以極叔度之器乎曰否舉山川日月天地而為之擬則信美矣然猶涉乎器也必欲極其論則曷若拂其器而處山川日月天地之外乎曰此何也曰此誠也非器之謂也誠也者常虛而亡形山川日月天地器之極也古之以器擬之者蓋有之矣而皆有形之極也猶不若是之隘者焉今稱叔度曰千頃之波吾為叔度羞之曰然則於叔度宜何言而後可也曰就林宗之論裁之宜拂其所謂干頃者止曰撓之不濁澄之不清豈不盡叔度之道耶雜著讀史酇侯入關即收秦圖籍以業高祖真王佐也天下既平懲秦之弊用清淨以安海內後世言漢相者稱蕭曹學者多咎參因循不能格君於王獨以強論格惠帝是不然此器有極也蕭曹之輔於漢可謂亡遺力矣而又責之以王譬之責旊以斫玉豈其任耶如舉以周召繩之則三代以還殆亡完人學者奚不顧覽哉哀帝捐天下元后屬莽以政于時宗室年德巉然在列矣乃立平帝年甫九嵗然則莽之篡心其芽於此乎自三代迄於秦漢世系年月不齊故司馬遷錯綜今古以為十表班固因之純用漢世亦為八篇然其古今人表吾不知其所作也善惡謬戾不足以傳信又無與於漢事固苟欲就其為八篇然則削之可也高后不履外闑橫制天下雖平勃之知縮栗不敢發乘隙際機乃用克定其操術有足以為憚者已及其封植産祿盤據根穴欲為久固而其亡益速悲夫私愛之溺人也禹既為舜用鑿地走水燥九州之土顔黧膚焦足病盩過廬而不入此豈一息之間忘天下哉固不忍其赤子無罪而趨溺地不若是禍民之源不塞聖人之得位其急當世之心如此孔子為布衣轍磨天下而不遇既窮且老乃贊易春秋載其道于後世苟能推而用之使天下盡蒙其澤是亦我之功不必身見之也聖人之不得位其待後世之心如此是聖人得不得皆未嘗忘諸民得則急當世恐其治之不至也不得則待後世欲其道之可傳也此非進退之際為公者邪進乎進以禹之志退乎退以孔子之心則庶乎學為聖人者矣聖賢之人秉天下之公議推仁恕以待物故其樂道人之善光華擬乎日月機智通乎神明措民治國同迹乎伊尹周公者不為過言也公議而已桀紂虐於民湯武起而誅之至其易世則桀紂之惡亡餘矣漢武鑱功四夷天下耗竭乃尊用賈豎更皮弊算緍錢專鹽鐵𣙜酒酤立平準稅舟車凡牟利之源皆自武帝始遂至於後世數百千載尚有以遵用之則其遺毒餘虐乃愈於桀紂桀紂之暴於民吾見其止也漢武之暴於民吾未見其止也昔成王聞管蔡流言而疑周公上下相隙豳詩所以隱憂也昭帝年十四上官飛書用間霍光而能辨其詐卒以誅讒而光得盡其忠則其君臣之際顯白交固賢於成王逺矣而光亡學術使昭帝之治不如成周者光之罪也惜夫書主父偃傳主父偃方困於齊梁間故人親戚皆厭棄之及為齊相乃以五百金謝之曰始我貧賤昆弟不我衣食賓客不我內門今迎者乃至千里與諸君絶矣亡復入偃之室嗚呼羶者蟻之所聚也羶盡則去趨冨貴惡貧賤此世俗之所同也又奚獨以為怪偃既顯用頗能移人主意故其賓客亦千數此豈盡慷慨服義慕高風而來者也冨貴之所趨貧賤之所棄有以異乎哉而偃且謝絶之者豈得以平生所拂鬱苟快其一時之志歟何見乎往而未睹其來也其後被誅果無一人視獨孔車收葬焉悲夫書文中子後王氏中説所載門人多貞觀時知名卿相而無一人能振師之道者故議者往往致疑其最所稱高弟曰程仇董薛考其行事程元仇璋董常無所見獨薛收在唐史有列傳蹤迹甚為明白收以父道衡不得死於隋不肯仕聞唐高祖興將應義舉郡通守堯君素覺之不得去及君素東連王世充遂挺身歸國正在丁丑戊寅嵗中丁丑為大業十三年又為義寧元年戊寅為武德元年是年三月煬帝遇害於江都蓋大業十四年也而杜淹所作文中子世家云十三年江都難作子有疾召薛收謂曰吾夢顔回稱孔子歸休之命乃寢疾而終殊與休事不合嵗年亦不同是為大可疑者也又稱李靖受詩及問聖人之道靖既云丈夫當以功名取冨貴何至作章句儒恐必無此也今中説之後載文中次子福畤所録云杜淹為御史大夫與長孫太尉有隙豫按淹以貞觀二年卒後二十一年高宗即位長孫無忌始拜太尉其不合于史如此故或者疑為阮逸所作如所謂薛收元經傳亦非也書賈誼傳屈平竄而死誼詆之曰何必懷此都也又著鵩賦以自開揚子雲亦曰何必湛身哉及誼傅梁懷王王墮馬死誼哭泣亦死子雲迫於莽投之閣此又何也士君子介窮屈憂急之際果難自置與惜誼死之不審所處也至欲創制度興禮樂厝漢於三代乃曰色尚黃數用五則吾曷知於誼也哉讀荀孟孟子之法先王荀子之法後王二子未為偏論也孟子之法先王必法其是者而去其非是者荀子之法後王亦必法其是者而去其非是者俱法其是又何先後之異哉據其時而言則唐虞商周俱欲其民之仁壽俱欲其賢不肖之辨是先王與後王俱可以為法也唐虞以禪商周以兵唐虞建官百商周數倍之唐虞以質商周極其文禮樂正朔器服名數各不同是先王後王又未可以為法也蓋孟子見當世之戕賊仁義謂古之為仁義者無出于堯舜故其言必以堯舜為法荀子犄其論特為孟子而發也乃有私意矣必格以聖人則無先王無後王惟擇其是者取之云耳孔子曰行夏之時乘商之輅服周之冕樂則韶舞孔子之于正朔與樂則法先王于輅冕則法後王不用虞夏之輅冕則亦不法先王不用商周之時正朔與舞則亦不法後王又何先後之同乎豫以謂二子法雖不同亦必俱法其是者也因牽就之使合于一又折之以孔子之言庸非通乎南子問或問孔子曰子見南子欲以行道有諸孔子見南子於聖人何害而謂之欲以行道則未之聞也孟子曰冨貴不能淫貧賤不能移此之謂大丈夫况孔子乎而一見南子何害謂之欲以行道則未之聞也曰然則子路何為不説曰子路以衛君與夫人俱為不善固若不可見者也故不説夫聖人者可行則行可止即止顔子曰仰之彌高鑽之彌堅瞻之在前忽焉在後宜子路之不説也夫承天下之重者莫若繼祖宗之社稷宜不可授人而堯舜更相為禪正天下之大義者莫若事君宜不可以有伐而湯武用兵君者不可以廢置也而伊尹放太甲君者不可以假為也而周公攝王此何也聖人之作可行即行可止即止又何害於堯舜湯武伊尹周公哉故公山弗擾與佛肸畔俱召子子欲往曰吾其為于偽反東周乎又欲居九夷又曰乘桴浮于海聖人之道不容于中國遂欲之夷狄乎然而禪舜禪禹伐桀紂放太甲攝王是亦聖人云耳從公山弗擾與佛肸之夷狄是亦聖人云耳其心豈少有靡哉詩不云乎左之左之君子宜之右之右之君子有之然則為聖人者則可如欲學為聖人則不可昔者魯人有學桞下惠者曰栁下惠則可吾固不可則孟子之不見諸侯譏枉尺以直尋豈非孟子為孔子之魯人也與晏子問或問太史遷稱晏子曰假令晏子而在余雖為之執鞭所欣慕焉何遷之獨嘉晏子也顧遷之所書俱不足欣慕之耶曰否遷有激云耳蓋晏子者嘗解左驂贖越石父以歸又薦其御者為大夫而遷之當武帝時坐李陵事被刑遂廢不用是時朝廷之大臣無有一人如晏子者為之振發之故特憤之曰假令晏子而在余雖為之執鞭所欣慕焉此非過言也痛知已之難逢雖異世而相慕兹所以勤勤而為之言也遷之著書見志不獨晏傳至於序伯夷叔齊屈原傳皆所以寄其悲焉耳班固謂遷之自傷悼猶巷伯之流有是夫論丙吉問牛喘丙吉不問鬭死而問喘牛因牛欲知天時説者謂吉知大體人而鬭死政教已可見牛雖不喘吉遂不知寒暑耶借若時過又欲以何術治之魏相有言憂不在胸奴而在殺人者豫謂魏相乃真知大體矣記畫淮陽王監兵有畫十餘軸而吳生之天王最為詭卓絹已塵舊其鬼神羽衛如隱見於濃煙黑霧間不見其筆墨迹自子之閲畫來未嘗見也次王維白衣老跨黃犢之一軸亦奇也立大石一軸李成畫也四幅海棠臨水旁飛花零落水上有二魚逐花者尤有意思又有水鴨紫莧三數軸皆徐熙畫也純淡墨畫竹樹黃雀者雖墨為之如具五彩云僧貫休畫皆能筆也鈐轄夏宫苑愛玩之以吳生之筆不可少髣佛乃取王維之跨牛老徐熙之水鴨紫莧命畫工模之後出以示豫雖神氣風力有不足者然其骨格猶王維徐熙之畫也使畫工自為之則不能豫觀之而歎以謂古之為政者可幾於為畫乎古亦有作之者有因之者若堯舜禹湯文武周公作之者也其國體治具典章文物精醇爛白後世無加焉孔子曰行夏之時乘殷之輅服周之冕使孔子用於世必改周公之制而自作之也繇周公而下莫如漢唐猶不能自作之乃模畫前世堯舜禹湯文武周公之餘迹而行則其所施設者尚得為善治也哉是猶今畫工之模寫前人之善本而猶足為能使其自作之則亦不為謬工矣始豫讀韓退之畫記愛其文尤工謂如禹貢周官然其言趙御史得國本而模之則退之之意無乃亦類于此乎又足以起豫因題之為記題石弄章子厚大夸石弄之奇而豫未之信也及往觀之然後知子厚之精於賞物然石之發露者才其牙角疑其藏伏于下者必益奇聊用卒夫搜之果得石門石壁上下屹屹又非子厚之所稱道者因欲窮治之使至其根踞而後止又將構亭於其上會豫易守東秦而不果也孰能繼豫之志窮山而作亭豫當為文以紀之且以快豫之夙懷也熙寧庚戌六月三日翰林侍讀學士户部郎中知青州鄭某題悔戒耳目之蔽有所不及動而為悔咎將誰執事變之來必求諸理審之復之有悖則止勿為愛奪勿為惡移猶曰未獲明者謨之往者悔之既已莫追來事方殷如何勿思悔不可數數斯害成今不汝戒汝則小人紀事故事命參知政事及樞密副使宰相封詞頭送當制舍人草詞畢復封送中書遂出誥治平四年九月二十五日豫當制是夕中使召入對於內東門别殿命草張方平趙抃除參知政事舊參吳奎出知青州三制賜雙燭送歸舍人院翌日具狀進詞草方降付中書出誥於時二府無有知者蓋上初攬大權宰相不得預聞故獨召舍人授旨撰詞自本朝以來未有乃自豫始也其后兩日上面授以翰林學士劉丞相生辰辭并序靈粹之氣湛酣磅礴乎乾坤之元積鬱而后發騰而上之則燦而為景星霏而為卿雲融而下之則潏而為醴泉霮而為甘露吁而為薰風動之則翔為鳯趨為麟植之則草為芝林為桂輝然而光則為渾金璞玉琅然而聲則為黃鍾大吕其寓於人大則聖次則賢藴為籌謀攄為文章皆其氣之所鍾歟然氣之渾流於無間如佐之以江山之怪麗挾之以五行之清淑衆美具并則偉然廓然所謂必有名於世者矣豫章之域廬陵屏其東駛江沄沄穹山盤盤澒洞開闔靈粹之氣所停蓄當秋氣高金德剛潔霜肅風厲與江山相透徹如層氷積玉倚疊乎雲霞之表而靈粹之氣繇是相與混合而一發之則出於其間者當如何也今丞相集賢公得靈粹之氣在豫章之域當季秋九月十八日載誕之辰故其聰明挺特傑才魁德為聖天子相臣宜矣於是日也皇帝有晏賜公卿更貺問士大夫爭前而拜壽者車闐巷馬塞門冠衣相戛磨而某也獨官於外不得肩佳賓之次以上千百壽輒撰成祝壽辭一篇謹遣詣黃閣之下其辭曰石可裂松可摧不敢為公夀也三台主輔相與天常存願公之夀如其星兮右提鉞左佩印不敢為公冨且貴也臯夔作輔相與舜同勳願公冨且貴如其人兮鄭氏世録鄭氏世居秦以財擅關中五代末高祖諱保雍行賈於湖湘間至安陸樂其風土遂去秦而居之安陸人喜以為長者之來吾鄉邑也有寓錢數百萬者積十餘年異日客過之乃其子也悉出錢豫之封題如故客辭曰先人殁已久豈有錢留此也強之固不受公施之浮屠氏以明不欺聞者俱賢二人以為難也公有三男子長損之軍事推官次嶼東頭供奉官季某不仕推官少時喜蒱博與客戲盡取其囊金客遂大困它日遇之則丐者也公惻然大悔立償其金于是終身不為戲故鄭氏世以行義聞于荆楚間供奉有才武姿貌偉然將兵秦隴間以二十騎徑至敵中奪其一障推官有子敏中既亡而絶其季亦亡嗣獨供奉二子長建中贈屯田員外郎次亦亡聞屯田舉進士喜賓客四方之來遊者傾所有以濟之星厯地理隂陽數術無不通覽供奉既沒而卜葬曰吾其有後乎遂生侍郎鄭氏自高祖以來既以財顯而俱好施里閭故客有于今嵗時祭于其家者曰無忘鄭氏也
