body:
  text: 鄖溪集卷十九宋鄭獬撰祝文華州西嶽等處祈雨祝文陽氣憤盈土已冒橛膏澤弗濡宿麥將槁丁夫倚耒一墢不起眇視雲漢心焉如焚兹民無辜將罹艱食惟神聰直綏佑一方爰修策祝祗祓以祈恭冀明靈俯歆精意霈之甘液沾漬農疇嘉種函活堅好成就以時潔祀敢忘美報五嶽四瀆四海等處祈雪祝文背歷冬辰延涉春序凍閉不密華霰未零永念災符如薄深谷恭禮端祝遙訴上靈䖍冀飛霙沛沾庶壤馳精延首日竚嘉祥諸廟謝晴文夫民報神以力而神食民以功惟刺史職在守土仰思所以事於神而俯思所以庇於民故旱乾水溢罔不究懷比屬霖雨將以害稼而不遑寧居是用遍祈於境內之神神饗其衷既貺之日雲隂解駁天地澄霽嵗穀告登室家胥慶既得以寬吏之責而敢不答神之貺神其照鑒以享厥誠尚饗景靈宫修蓋英宗皇帝神御殿興工告土地祝文聖考登真萬靈號慕增琳宫而嚴奉期雲馭以來遊穀日是諏庶工經始式修潔薦昭叩時靈庶孚錫於厖禧永圖寧於寶御太廟后廟創開水渠告土地祝文宫廟之嚴水絡弗治必資疏鑿俾無停流穀日載差僝工其始惟靈主土期於來相樽酒薦䖍是用致告舒國長公主宅上梁告太歲祝文邑賜蘭陵園開沁水維梁斯構我室用成甫冀明靈永綏福祉廣州南海謝南郊禮畢祝文宗社郊廟巨典甫成實賴明靈密資孚佑特馳軺使載欵嚴祠䖍薦忱辭用申美報開撥汴口祭汴口之神河侯之神靈津之神祝文巨河之壖決而東注漕舟是賴啓塞維時春氣發陳理當疏鑿神其綏閟獲此安流祭文祭英宗文噫嘻惟皇髙視萬古文類神宗武如太祖龍之初潛錙銖大業既躍而出震駭騰踏其謨淵淵其斷烈烈指揮乾坤掃除六合祭普寧郡太君文謹以清酌庶羞之奠致祭於普寧郡太君之靈惟太君育德禀操溫惠柔明圭璧之潔蕙蘭之馨婦道母訓咸播淑聲肅然閨閫示以儀刑乃有令子為時名卿盡厥孝養出於天成朝晡視膳莫敢遑寧自天沛澤寵數繁开疏封命號一時之榮既享備福又臻遐齡尚宜延永奄忽以傾嗚呼哀哉太君之子亷按百城乃叨屬部實仰威名遽聞斯變內鬱其情翩翩丹旐歸祔先塋聊陳薄奠以侑悲誠嗚呼哀哉尚饗祭劉丞相文沆昔年拜公光華溢顔體貌騫竦螭虎桓桓今公之去音容漠然柱天之氣藏於一棺愚自北行先域在陳亦冀見公少奉笑言未克走謁公問益勤明日出宴曲湖之濵衆客羅後華裾翠紳鼓簫駭發斾旌錯紛左右夾侍紅眉緑鬟公既下馬揖我於堂置之右座布席未安孰知倚伏忽若機翻公疾遽作俄而不還世亦有言朝暮悲歡公去何速少刻之間嗚呼哀哉陳氏纍纍驚走後先解衣買酒哭奠公前而况吾徒公恩丘山拊心一慟清血如瀾性命之際理固不疑感公之分安得無悲飄然丹旐歸舟何之蒼煙晚日長江之湄不如帆風送公以歸死生以訣永無見期嗚呼哀哉伏惟尚饗祭太常博士石君文玉山蟠薄或鋭或垤天骨聳擢一峯秀絶盛年登仕亟引歸籍望塞實副孰議孰失世之右豪或者趨之他人藐藐靳顔在眉焦手濡衣君獨勇為報有薄厚天胡自斯芃芃衆草幽蘭易衰逐逐羣連逸足先摧彼兩間者何有何無毫眉齯齒非鄙即愚印金瑞玉非欺即諛嗇之太甚於君何誅嗚呼潛夫某藉姻末嚮連㑹覯客舟俱西棊奕樽酒笑語永日益親益厚曠懷洞然不有畦畛平生知心一言而盡事物之變逢原可推夭夀之隙曽不逆窺才失一臂遽哭寢門古亦有然今復何言嗚呼潛夫春風如嘻春物如怡我為故人心焉獨悲臨江灑血君乎何之祭張郎中文嗚呼元常碩貌兮魁魁蒼豪兮龎眉衆以為夀兮乃止於斯一日疾兮惙然以衰髙宇濩落兮神將去之衆以為憂兮果如所期嗚呼哀哉謂之為夀則為妄焉謂之為憂已而信然豈禍之易驗兮福不可逆料於前嗟嗟元常兮至此以奚言蜀江兮翻翻蜀山兮聨聨道之逺兮不得棲於故原封之西郭兮何時而還哭奠以送兮去不可攀嗚呼哀哉祭程中令文士之處世恨不逢時既壽而貴則又何悲死生之分淹速有期猶旦及暮亦又何疑行狀右諫議大夫充天章閣待制知滄州兼駐泊馬步軍部署田公行狀曽祖可範祖守忠父仲宣皇贈光祿少卿本貫亳州鹿邑縣渦源鄉虞詡里公諱京字簡之其先蓋出於陳氏陳公子完奔於齊始受地更為田氏其後遂有齊國列於諸侯齊既滅其子孫之顯者多出於青冀之間而公之髙祖乃世居滄州至曽王父又徙於亳之鹿邑烈考舉明經多與四方賢士大夫遊妣郭氏樂安郡太君公生十六嵗而孤居喪有禮法不飲酒食肉盛寒不衣裘𥜗鄉里稱髙之初就鄉人宋炎為學得王黃州詩和之一夕成百篇炎見之嘆曰吾子千里足也天聖初登進士第補蜀州司法參軍還為祥符縣尉有能名居常自陋其位下不足以自發乃求試書判拔萃至廷試輒罷之雖然朝廷駸駸益知其才矣龍圖閣直學士王博文鎮秦州請公權節度推官秦為兵車之衝而公悉力處之儲芻粟至三百六十餘萬轉運使李紘至秦以為王公有賢從事矣㑹詔近臣舉賢材二公合薦之召對以嘗誤斷獄徙河中節度推官入大理為詳斷官再遷祕書丞知青州千乘縣趙元昊叛夏州天子求可捍邊者侍讀學士李仲容薦公召赴中書堂試以䇿畫遂中上第除通判鎮戎軍從宣徽夏守贇出陜西因見上陳方略上甚悅賜五品服遂為經略判官守贇還闕復參夏竦軍事初朝廷設六科以羅天下英豪有運籌决勝之目而獨無應者公以謂夷狄驕於豢養將有倔强而不制者乃草書數萬言求應是科及就祕閣試而題與賢良同公曰吾豈來此較記誦耶因罷去及賊冦邊雖見名使然其謀議率為巧說所壞不得究其功及上遣翰林學士朝宗慤賚詔問攻守之䇿衆言攻之便公獨謂賊久蓄謀一朝發之其計利害勝負固已精矣其勢非有以加勝於我則不止今朝廷息兵四十年將愚卒惰怯於兵鬭惟望敵內附為無事賊知其然故其入冦必聲言納欵乘我之懈而來來故必捷殆未可以力破也衆又言出近塞示之以威彼或畏而可降也公又謂賊未嘗少挫安肯坐為降計今驅不習之師置之散地犯賊鋭鋒此正兵家所忌兵出必敗公爭之不從竟用衆議聞上已而賊謀知之果遣黃延德叩延州乞降以竒兵出源渭遂敗大將任福於好水川例降通判廬州公雖有前議而朝廷莫得聞其後諸公頗有知者遂還為開封府推官再遷祠部員外郎保州兵亂以公為河北提㸃刑獄公案視河朔利病畫二十事上之復為開封府判官坐囚與吏鬭死出知蔡州連移相邢二州再為河北提㸃刑獄貝州妖賊入府取庫兵為亂上下倉卒不知所為公召吏人為檄募兵將討之而賊已大熾自刺史已下皆被執公遂縋城以出於時城外兵有隂與賊通者燒民居劫財以應賊公徑入一營得兵百餘乃梟其為劫者躬至諸營撫遏之衆皆不敢動又募得死士數百人然皆無兵持白挺與賊爭南關敗之殺數十人乃遁去盡督諸營兵出戰馳檄旁郡亦稍稍遣兵來遂圍其城賊不復敢出矣賊之始為謀欲連河北山東十數郡期以同日俱起㑹其黨有繫獄者賊懼遂先期而發猶欲斷河橋取北都以自居故屢出兵奪南關而輒為公破走之由此賊勢遂窮於一城中公之三子皆來奔軍中歡噪以報公曰寧知不為賊來乎止之軍門外參訊無詐然后見之公躬率諸軍攻城益急賊乃虜公家屬乘城以示公士卒皆却公即為書射城中曰吾獨知為國耳汝曹欲屠吾家者吾弗顧也叱諸軍益進羣弩俱發公之家死者四人是日城下兵皆為公涕下而公意自若也及賊平執政者以公不能預察賊左降監鄆州稅先是駐泊都監田斌者亦以不能捕賊待罪兵間及得城從諸將以入以功特遷宫苑副使而公獨被謫御史徐宗况資政殿學士范仲淹俱言公失察賊過輕忠節為重且有功不宜左遷乃移通判兖州復為淮南提㸃刑獄京西轉運再遷兵部員外郎大河壞汴口踰時不能塞而浸及京師敕公専治之中使督視旁午公乃揵薪實其上流引河入故道汴水遂無害京西舊嘗徙民稅之他州民重苦之公一切除去嵗不足則調緍錢以增糴之諸郡皆有餘粟滄州河决嵗饑民皆流亡詔公以直史館往蒞之公請得以便宜治事遂賜金紫至則斥其宿弊躬自儉約燕勞餉遺皆有尺度設科以均其賦役招徠流民為之給田除租稅於是去者皆來日至府請田為耕比三嵗增户萬七千使者上其治狀以為第一天子下璽書褒焉特遷工部郎中至和元年除天章閣待制陜西都轉運使關右盜鑄鐵錢甚惡法不能勝公更為大錢肉好精緻僞者莫能雜以一當三盡收其惡錢付爐官市易以為便特遷兵部郎中復知滄州公之再為治吏民愈愛之每臺使至輒相率遮道乞留惟恐公去公嘗謂敵騎出於廣信安肅定保間者皆畜塘水以遮其來徑獨滄孤居東北隅旁觜大海而無尺寸之險以拒冦乃圖其形勢且言首尾捍禦之略馳奏之嘉祐二年遷諌議大夫明年以疾求便郡除知頴州仍賜太醫護行未拜命而薨三月二十二日也享年六十七詔以其第五子君度為將作監主簿賻恤有加焉公為人慷慨重氣節嘗以功名自任既進矣輒復困折遭甘陵之變忠節尤顯著而見憎於執政者久之上益知其故乃賜一子官及為陜西轉運使宰相始以除目進上又曰田某忠義之士可便與待制遂除天章閣待制然終以此顯於天下蓋為善之效初雖有以害之其久也則愈逺而愈明終欲掩之而莫能也公嚴於御家勤於為政未嘗以燕墮自廢新物未薦輒不食列郡嵗時饋遺皆歸之公府薦士五百餘人至於再薦屢薦期用於朝廷而後已其後故多顯者少時與常山董士亷汾陽郭京為友善二人者俱以才氣聞於時而俱困不偶士亷又坐事失官公為之經營賙恤甚厚然而剛明少合嘗以吏事劾其監軍及公為滄州監軍乃為本道按察使者公既薨使者徑至郡鞭其吏卒求公所短而竟不得一毫人益知公清白矣所著文集二十卷奏議十卷應制集十三卷又習於兵戰歷等雜家之術著天人流衍通儒子十數書術者咸傳受之夫人何氏齊安郡君從公在北河落於賊中語其諸子曰汝父以忠義自守必不顧妻子輩今賊擾攘未可知我婦人至不得已惟有一死耳不幸賊并脅汝以死則田氏無種矣汝亟去就汝父無以我為念也諸子欲更相留夫人固遣之乃留其季子而三子者俱得出而夫人亦免於難六子長曰君陳定州曲陽簿次曰君俞陳州司户參軍次君平大理評事登進士第次君卿君彥君度皆守將作監主簿三女長適霍丘縣尉謝規次適進士羅護次幼將以某年月日葬於陳州之宛丘縣某鄉以齊安祔焉某與君平為同年生得公之家録條次之謹狀樞密直學士刑部郎中何公行狀公諱中立字公南其先池陽人避五代亂徙居宣城今為許昌人曽祖某祖某贈都官郎中考某職方員外郎纍贈尚書左丞妣趙氏文安郡太君康氏同安郡太君公即同安出也左丞號為知人既生公而喜曰吾有子矣及左丞將終之夕家人以貧為憂左丞指公曰是兒後二十年祿及家矣至初拜官正以左丞終之日果二十年公與諸兄講學鄉里時工部侍郎狄公領京西漕其子遵度以竒俊自處少所許可而獨與公為友狄公聞之召公與語曰吾子乃肯與之遊果為竒也遂以愛女歸之景祐元年登進士甲科授大理評事簽滑州判官㕔公事以親嫌改陳州晏丞相守陳言公文學宜備館閣再遷殿中丞簽署鄧州及歸遂召試充集賢校理丁太夫人憂服闋判登聞鼓院開封府推官判三司都理缺憑由司翰林葉公為三司使言公才不宜在散局即徙為度支判官皇祐元年同修起居注遷祠部員外郎知制誥判三班院三班差除皆武人不曉文墨胥吏輩得以持其可否公皆召之庭下明告之某人當除某處莫不厭伏而去明堂覃慶三班改官者千餘人公早暮課督吏人不數日而畢兼判審官院權發遣開封府先是盜取章獻神御服物久之不獲上督責益急公始視事有告某人疑為盜捕之則已嘗疑而置獄笞掠無狀遣之所司亦言其非公輒不聽窮其獄果為真盜罷尹糾察在京刑獄改龍圖閣學士秦鳳路馬步軍都部署經略安撫使言事者以公未嘗補郡不可為一路帥臣乃徙知慶州公上言臣既不能治秦安能治慶徒使邊人生心有以輕陛下之守臣也願還故官守汝墳詔不許公初至慶慶人未見其施設皆相觀聽以為之髙下有富賈夜飲相鬭者邏者得之乃用賂遂歸罪於他民公察之知其情按具服以謂並邊豪猾侵夜不禁復能行賂以自免不痛繩之後必生姦皆抵以峻法由是人大驚伏以為不可欺軍士有言急者公訊之乃告其隊長受賂爾公曰隊長誠受賂爾乃敢言之是下常得以持上不可以為軍即杖其背流之嶺南餘一切不問公之為治多類此約而不繁易而可行事無巨細必先破其根節而使衆理自析故不甚力而政成慶人皆宜之在鎮二年入判太常寺銀臺司祕閣遷刑部郎中嘉祐元年以樞密直學士知許州公以許為故鄉多故人親戚不願為之守改知陳州先是邊臣罷歸多得中朝要官獨公外補遂以為例公至陳而大水瀦於城下居人皆恐有卒醉呼於市曰水來公即命擒之斬以徇衆遂安是嵗移杭州明年七月二十四日卒於杭公署享年五十四公外疏闊而內精密果於决事尚亷節家未嘗畜財鄰州嵗時問遺皆歸之公府然而喜酒尤能劇飲雖為顯官與故人飲酒戲笑如布衣時公於慶陽有美政慶人畫像立生祠及聞薨皆相哭於祠下每至七日則又為公設浮屠齊盡百日乃止其見思如此夫人狄氏安樂郡君即侍郎棐之女也男十一人景元景先太常寺太祝景初景專將作監主簿景闓袐書省正字景俶以公遺命官其二弟今未仕景甫景倩亦正字景龍景安景輿皆蚤卒謹録如右謹狀先公行實公字武仲其祖妣傅氏妣王氏楊氏天水縣太君劉氏河間縣太君公河間之出也鄭氏富於財公専於為學不計生事家之所蓄或為親舊攜負而去絶口不問由是資益衰初為明經人或易之公怫然曰進士顧難哉即舉進士遂登天聖八年第主安州應城簿越州司法參軍改大理寺丞殿中丞知婺之蘭溪越之餘姚益之新都貧不能行求監楚之北神稅湖南安撫王絲薦簽書桂陽監判官㕔公事劉丞相沆鎮潭州以公攝長沙長沙民最喜訟號難治公處之若無事者轉運使聞其能過之曰願觀公決事公據按辦問訟者皆厭伏頃之而畢轉運大驚郴州宜章民執僞劵奪人田更數獄莫能辨俾公按之視劵即曰此僞也縣邑故為義章以太宗舊諱更為宜章今劵用宜章印而置田之嵗乃義章時也於是僞者叩頭伏公曰吾不忍自我致汝於死為推其已沒者為首而得減死焉三遷都官員外郎皇祐初為審刑詳議官蠻人入雍州龍圖閣直學士孫公沔討之請公行至嶺下後行者多以事避去惟公至雍州軍夜驚幾亂孫公執公手曰平時特以公為才乃真義士也以勞遷職方員外郎入權大理寺少卿殿直曹旦坐獄抵死公曰旦父瑛以戰死宜少貸之仁宗為之减死於時四方獄疑而不能决者率文致私以可哀憐狀以丐末減公以為此特州郡不明於法獄亡疑也請核其本情凡一切出於文致者皆勿用如此則法不失有罪矣詔以公議著於令潮州民為後妻所殺其子復殺之郡以疑獄聞有司莫能決或曰繼母如母是殺母也請如律公曰如之者有間矣昔文姜與弒魯桓春秋去其氏絶不為親也與弒焉猶絶之况身履之耶當其推刃之時母名絶矣是有罪者也律捕罪人不拒而殺之法當流衆大服皆以為不及也某氏死而世絶有母已適他族官將籍其産公以謂不為伋也妻則不為白也母是得罪於父者也此非有罪者不可以絶請以産歸母氏或者為不然異日得故案其所斷正與公同或者乃慚服其引比倫類如此者絶多有司皆記其事相傳以為法遷祠部郎中嘉祐元年五月壬午卒於官壽五十有六觀書無不記覽為詩清麗峭絶有唐人風格又善於箋尺諸公多請為之具草細字謹密自可以喜也雖精於刑名其為論嘗據經引義不為世俗吏苛撓專以文法故其全活者數百人然齟齬不得志所居職多不過期月輒罷去常往來留滯於江湖間者甚久故其所有不得盡見於行事云
