body:
  text: 鄖溪集卷二十宋鄭獬撰墓志銘南康郡王墓志銘太祖皇帝有八子諱德昭者為越懿王越懿王生冀康孝王惟吉康孝王生守節為丹陽郡僖穆王王即僖穆之子諱世永字文億母安定郡太夫人楊氏任城郡夫人魏氏王初補右侍禁年十嵗入謝章聖皇帝帝撫其背曰若亦誦書乎曰誦孝經經言何事曰忠孝之事也帝喜賜之珍果輒不食懷去帝問其故曰欲歸遺所親耳帝益竒之仁宗為太子初就學資善堂王入侍左右及即位纍遷東宫外作副使改左千牛衛大將軍趙元昊叛王求對便殿具陳可討狀因請自將兵以行帝壯之以飛白書世永忠孝及通天犀帶賜之慶厯間封諸王後遂拜惠州刺史改右屯衛大將軍光州團練使特封弋陽郡公於時水災有詔求直言王進十策一取士二禳災三除叛逆四富國五安民六強兵七省胥吏八去濫官九蠲苛政十備邊帝嘉納之至和初為瀛國公又遷登州防禦使嘉祐七年天子祀明堂以藝祖之後殆無顯者特遷隴州防禦使英宗初進蔡州觀察使上即位拜鎮南軍觀察留後熙寧元年二月已已薨於邸之正寢享年五十九車駕臨奠優贈昭信軍節度使南康郡王諡曰修孝詔宣政使內侍押班張若水治葬事三月丁酉殯於京城之北普濟寺娶王氏引進使陵州團練使贈上將軍克基之女封同安郡君子男十二人令圖左羽林大將軍壁州團練使令瑤右羽林大將軍袁州團練使令樞右羽林大將軍道州團練使令倩率府副率早卒令穀右羽林大將軍萬州團練使令繹右武衛大將軍渠州刺史令朔右武衛大將軍蘄州刺史令羽令闕並右千牛衛將軍三人幼卒女六長適東頭供奉官時觀次適左侍禁吳真卿次適東頭供奉官徐鎮次適左班殿直馮綱次適左班殿直樊中立一人幼卒孫男五人子張右武衛大將軍池州刺史子野子赤並千牛衛大將軍子昭右內率副率次未名曽孫女尚幼王孝於事親忠於事國喜經術通文章晝夜自飭厲若布衣生丹陽王有疾王刺背血出寫佛書疾遂平及仁宗不豫王率宗室候起居憂切誠至即詣浮圖灼臂聞者莫不歎服初東平吕造為其宫學官授以經義造既卒追畫其像居常瞻奉之其樂善如此英宗時勸督宗室為學常遣中貴人入宫視之學官薑潛方講周易疾暴作王於是攝齊升座為之代講聽者竦服中貴人以聞帝深嘆其好學王平生所著甚多歌詩雜文數百篇鈎考經傳為周易大義春秋纂例及諸邸恩華録又能通釋老星厯之學注金剛經祖師授衣圖六氣圖登真祕訣皆藏於家以熙寧二年二月某日葬於河南府永安縣先王之塋次銘曰泐辭刻石永志弗忘贈太尉勤惠張公墓志銘嘉祐八年十二月庚辰集慶軍節度使檢校司空知曹州張公薨於郡之正寢詔輟視朝一日賜其家黃金百兩內司賔致奠贈太尉諡曰勤惠明年二月甲申葬於開封府祥符縣鄧公鄉從先中令之塋次公諱孜開封祥符人曽祖贈太尉諱思謙曽祖妣安定郡太夫人陳氏祖贈太師諱守恩祖妣永安郡太夫人元氏考贈太師中書令兼尚書令隋國公諱景宗妣普寧郡太夫人蔡氏沛國夫人朱氏而公沛國之子也祥符四年中令從真宗皇帝幸汾陰奏補三班奉職時年十四繇奉職凡十有三遷至寧逺軍節度使人以其材選而不為速也真宗嘗召見而顧謂中令曰此兒異日必勝於爾選為太子春坊司祗候太子即位擢為供奉官閣門祗候天聖元年以內殿崇班出為陳州兵馬都監塞壞堤以止水害城廬得完降璽書褒異之改冀州兵馬都監轉東染院副使供備庫使加連州刺史恩州團練使定州潞州駐泊兵馬鈐轄徙知莫州又知貝州踰月知瀛州兼髙陽關駐泊兵馬鈐轄屯兵有龍騎者皆故盜剽猾不畏法長吏莫能制有隔垣盜婦人一叉者公即取斬之以徇舉軍震栗訖公之去無敢有犯者轉運使張昷之請罷貝冀上關員寮驍捷銀鞋錢章下瀛州公以為此界河司䇿先鋒北騎叩邊則此輩先登不可絶其常賜朝廷以為然其後獨奏罷保州雲翼銀鞋錢而軍怨不平竟殺其官吏以亂慶厯二年復知貝州於是元昊反西鄙用兵契丹乘我之隙遣使求關南地且將入冦乃用冨丞相弼往使而以公為副北人辭甚嫚而公與冨丞相合議卒破其謀復舊盟而還初丞相雖専使亦不得見國書行至關上公方自貝州往謂丞相曰萬里將命而使者不得見國書則若何致辭可發視之丞相曰公遂擅發國書耶公曰此公家事何懼即合其璽封而取視之果有可疑者丞相復馳奏京師易書而後行契丹得書由是有定議超遷西上閣門使公固辭以無功不敢竊厚賞仁宗許之然終以公有勞踰數月復授西上閣門使知瀛州六年改單州團練使勾當軍頭引見司明年除龍神衛四廂都指揮使并代馬步軍副都總管鐵錢更法民間失利惡少輩相聚譁呌叩府府閣門拒之上下恟懼左右曰事倉卒以兵自隨公笑曰是促其為亂耳索馬領數卒往諭以禍福即時散去是日非公并州幾危轉待衛親軍步軍都虞候遷濟州防禦使馬軍殿前都虞候加持節桂州虔州觀察使侍衛副都指揮使公為軍嚴而不苛視其勞逸而均使之至有犯立決而不可奪吏士樂其平而畏法虎翼兵閲習不中程本部指揮使問狀倨立不肯置對是夕十餘輩大噪趨指揮使將害之公擒獲即斷手斬於軍中然後以聞朝廷稱美以為有將帥之風遷昭信軍節度觀察留後馬軍副都指揮使自仁宗為太子時巳知公忠厚可屬以事及奉詔走北庭驟成竒功撫民馭兵所在稱治於是天子深倚重之會狂人遮公馬首出妄言事下有司訊繫實病心證逮明白而言事者用此汙詆不已公亦抗章願罷宿衛言於上曰臣首尾出入陛下盡知而惡臣者以疑似中臣臣不去則不解乃以寧逺軍節度容州管內觀察處置等使知潞州及辭仁宗諭之曰言者至欲殺卿朕不疑卿卿亦不當自疑也公俯伏流涕稱謝嘉祐二年移知陳州踰嵗知河中府騎兵缺帥朝廷以為莫如公者復召為馬軍副都指揮使加淮康軍節度使公五拜章懇辭不得巳就職言者猶指前事牽攣及宰相天子為之斥言者公惶恐連請補外天子顧不可留加賜檢校司空知曹州公再用再以毁去益為畏謹至所賜公帑不敢自名一錢最被仁宗知遇每與親舊語及被逐時事則漼然下泣曰主上實知我及聞仁宗崩愈自感悼嵗中得疾遂薨享夀六十七公本諱茂實字濟叔避上藩邸名乃更焉為人樂易氣貌甚和而忠徑有智略他人所畏縮而不敢為者公處之從容而可辦故其有所成就則卓然過絶於人尤樂善士往來門下者皆有恩意在陳州南頓令忤轉運使勢且得罪公日一往為請曰與其罪令不若罪長吏竟得解當世稱為厚德長者平生疏財俸四十萬率以其半給親舊未嘗藏蓄為後日計嘗曰異時但完一居貯數千卷書以教子孫足矣及公之薨如其言僅得一宅而未完也初娶趙氏天水縣君繼以王氏太原縣君劉氏同安郡夫人有子七人承説右侍禁閣門祗候承誼供奉官並早亡承詁侍禁閣門祗候諷內殿崇班諭諤並供奉官詢侍禁皆恂恂謹厚為公之良子弟女十三人長適內殿承制馬用舟次適供備庫副使劉昌孫並早亡次適侍禁杜諫次適殿直吳承祐早亡次適莫州軍事推官朝復次早亡次適安肅軍判官吳覃次適內殿崇班王正次適殿直馮維舉二人未行孫十九人偃侍禁任奉職億佾並殿直侁侍禁偕伉倚傑僅儉佑倜仲伸並未仕倩修偓並早亡女孫十三人長適河中府司法參軍錢正卿次適殿直馮補之並早亡餘在室公壯年居邊勇於立事其所條奏皆攻守形勢兵戰間事豫得其遺藁而讀之可喜也及其被毁書數十上繳繞終不能自解豫讀之又為之感動悲夫銘曰嗚呼張侯有發維果方其達時孰不在我綢繆東宫匪顓舊恩以材自售恥於衆奔羌人跳踔冦乘以譁拱手而談折其機牙破璽取書世聞公勇為國解鬭在公何恐北道載開塗者行歌濡血淋甲數功孰多在昔提師以威則克如畜嬌子安能事敵敢有狂呼截頸挂門諸軍屏息飛鳥不聞天子所毗爰持我師誰敢妄言以召羣疑再入復逐自公有辭公心如丹天子識之事為之已猶或殺身均德較義况於君臣公拜遺詔伏首下涕孤根易搖胡為久世大梁之西鄧公之野刻石幽墟以告來者尚書比部員外郎王君墓志銘太原王宗彥將葬其先大夫號泣於其親戚故人曰孰能哀余者為豫紀次先君之遺烈於是南陽張孰為之著其行事巳而又號曰孰能哀豫者為豫銘於先君之墟於是安陸鄭某為之考其世系與其官閥而志之君世居於濮州之鄄城諱惟恭者為君之曽王父諱紹勍贈太僕少卿者為君之王父太僕有子文震始仕而顯為主客郎中贈刑部侍郎即君之考也君諱仲莊字師禮為人醇厚而謹不為刻厲詭激以釣世譽於其父憂三年食蔬為會稽尉嵗凶羣盜伏山谷以術鈎致之無遺擢為義烏令鄰邑有訟不能決者部刺史嘗用君決之訟者皆言其平遂再遷大理寺丞知蘭溪縣民大飢鬻子而食君取粟於富室而飼之旁邑民皆來曰獨吾蘭溪有父母耳其後為大名府司録以緣坐降監江州鹽酒連蹇十年復知定陶縣遂卒於定陶享年六十八君嘗在下邑領縣卒四千治汴渠道經離驛一夫渴飲於河清營俄有營卒出唱曰渴飲者已戮死矣役夫大噪將劫營取之君趨往諭之曰爾何敢草草如此衆皆引去乃縳其唱言者置之法於時非君幾為亂君初用刑部蔭補郊社齋郎七遷至比部員外郎賜五品服初為仙遊簿又知下邑縣德陽縣監婺州稅妣馬氏扶風縣太君夫人羅氏會稽縣君生子宗彥宗道宗古二女長適龍泉簿汪湛次適山南東道節度推官張孰卜以嘉祐癸卯十月壬申葬於應天府宋城縣新興之原舉會稽而祔焉豫於君亦婚家也由是為之銘而不辭銘曰壯而致力滑軸以馳孰為盜侮孰為飢疲羣夫走呼躍馬止之縮首靡耳孰驚孰疑既老而衰卒困於羸埋石鑽辭亦維我悲禮賔使王君墓志銘豫守荆南府時君為湖北路兵馬都監熟知其為人夷易而有守謹於持法軍中稱其平本道使者合言澧陽及溪蠻相抵正控其出入道願得王某為之守遂知澧州君既至果以治狀聞澧之所最病者惟溪蠻與澧江溪蠻凡十二族入貢皆賜以劵錢酋豪嘗更相侵奪因而殺漢民朝廷為增劵以平之君以為蠻性貪騖一起爭則增劵異時復爭則將奈何乃與羣酋約籍其錢入於官至入貢則令主均與之蠻人大喜澧江水溢壞民舍君築長堤十三里明年水暴至賴以無害君既去方春時君民攜酒餗遊樂其下必相顧徘徊以為君之惠不可忘也轉運使課湖北守臣以君為第一罷歸行次會亭以疾終歸柩於京師豫往哭弔之其孤哭拜請豫銘豫曰由南郡而往豫知之矣由南郡而前子其録示我踰三月使來速銘乃考次其行事而論著之於是知君之始末可銘者不獨在澧陽也北平軍有羣盜二百餘掩捕無遺迹威州蠻入剽境上君提兵躍馬驅出之斬䤋數十朝廷知其名擢同兩浙路提點刑獄君氣貌柔仁遇人謹厚有禮至其當官行事難易無所擇故其所至為稱職君初以任子為三班借職監頓固斗門巡惠民河蔡河穀熟定武監押貝州駐泊纍遷供奉官選為閣門祗候邠汾巡檢絳州都監益彭威茂都巡檢監在京商稅三遷禮賔副使在兩浙時以纍降筠州都監又四遷至禮賔使享年六十四曽祖諱延嗣建雄軍節度副使贈左衛大將軍祖廷節樞密副承使贈太保父元祐趙州刺史贈左神武衛大將軍娶張氏鄭氏贈夀安縣君李氏三子允則左侍禁餘先亡五女左侍禁髙承吉供奉官髙遵道文思副使蔚世長比部員外郎趙昌齡皇兄左驍騎大將軍茂州刺史仲誘皆其壻也孫惟慎殿侍三班差使惟孫惟良未仕熙寧二年十一月甲子葬於開封府某縣某原君諱知和字逺夫開封人銘曰生也知其才殁也志其墓維金土之合嵗完所寢而乃去渾渾汴流西北絶漫漫幽宫存其處右侍禁贈工部侍郎王公墓志銘君諱某祖有功名在國史官至禮部侍郎贈太子太傅始徙於開封之浚儀父諱扶刑部貟外郎直集賢院君少時有竒操不肯從蔭補欲以辭學自奮於一時及舉進士輒黜於有司久之陳文惠公言君功臣之家有行誼不冝使終身為布衣乃補三班借職君辭不就親舊更相謂曰家世落寞如此尚擇祿耶乃受命初監秀州海鹽廣陳酒稅又監南京都商稅留守張文節見君步趨淹緩異之曰王使者豈儒者耶召與語驚曰公乃太傅公之孫耶吾固欲見子矣繇是竒待之置其所為文於座右士大夫來即出以誇示之及文節為宰相且欲用君未及而文節薨君遂不獲用於世雖然君不屑官所至懇心蒞職為端州兵馬監押攝郡事踰年民愛之及罷官相與泣涕遮道不得去京東大蝗詔發民塞河君為青州夀張縣以書抵安撫使陳恭公言民飢欲死又調以塞河且將迫而為盜則奈何請以諸掃兵夫代之朝廷為之罷役京東民歡呼連繞數千里不絶君之居下位所為猶如此使之居上位盡其材冝有以異於人者焉君為人樂愷而通達家無私蓄喜與豪偉之士遊在南都與濟陽石延年曼卿太原王洙原叔南陽張亢退夫會稽頴公實相從於尊酒間甚相樂其從諸公躡迹於貴仕曼卿雖潦倒猶一登文館而君最為連蹇不遇仕至左侍禁監通州利和鹽場以卒既卒之三十二年其子廣淵為兵部貟外郎直龍圖閣京東轉運使廣臨為左騏驥使河北沿邊安撫副使廣廉為太常博士河北都轉運司勾當公事連名贈君至工部侍郎遂舉君之喪葬於鄭州新鄭縣臨洧鄉賈村從先塋之次不享於其身而享於其後信矣夫初娶朱氏兵部貟外郎直史館台符之女追封大名縣太君繼室許氏水部郎中元豹之女封長安縣太君男七人廣延廣臣未仕二人早卒女四人長適進士林充國早卒次適著作佐郎董詵次復適充國亦卒次適汲縣令髙復孫五人得與鄭州司户參軍得君為進士承三班差使得凝郊社齋郎得象未仕孫女五人長適右班殿直孟在餘尚幼曽孫二人其葬在熙寧二年八月某日銘曰履之修屬乎已難其逢天所俾孰為亡惟有子鄭之原洧之水固無窮利於此户部侍郎致仕周公墓志銘周公姬姓秦奪之地遷於南陽彭城譙汝南古之傑德巨人多出於汝南後又徙渤海公之祖乃居青州遂為青之益都人曽祖諱仁貴世亂自匿不仕祖諱子元傳戴氏禮中其科為涇州司法參軍雍熙間胡騎剽州與田夫人俱歿忠義明白詔贈大理寺丞夫人仙逰縣君官其子圭某官是為公之考也仕至太子中舍纍贈兵部尚書夫人李氏常山郡太君公諱沆字子真天聖二年擢進士科主萊州膠水簿又主密州諸城簿遷鎮寧軍節度推官知濵州渤海縣荐者言其才召為著作佐郎公渾厚有氣節勤而敏於事初補膠州治文案穿陷根節已若宿吏邑令老疲不任事公除引之使就繩墨而未嘗暴辭氣人以為難其去渤海也民叩轉運使乞留天子聞之即詔還渤海公曰親老矣盍歸養故鄉乎辭不行監青州稅連以憂去職服除知秀州嘉興縣兵誅西羌擢同知鳳翔府再遷太常博士諸道初建轉運判官以察不法公首得之賀者踵門公方辭以親未葬遂知沂州歸葬於青已窆而召命至入開封府為推官纍奏事進退羣辨仁宗大異之及溪蠻出為盜兵拏而不復解求可以治蠻者近臣以公聞上大喜曰朕已識之矣必能辦吾事擢刑部貟外郎荆湖南路轉運使馳至徼下搜講賊計以謂僚人伏於窮山荒林絶險之間持盾出鬭僄如羣鳥之躍此兵雖壯大被鎧挾矛而刓鈍不可支故屢奔折不救此未易倒穴而誅獨可鈎致之耳乃募土豪鐫諭之繇是盤唐之族四百餘人携持而出伏於旗下餘黨悉解散遁去賊遂平湖湘間方恃公而召為度支判官議者謂奪之非宜復以直史館知潭州吏民相傳告譁呌以喜公即舊政益為久完策分屯衛士諸檔增置武吏以邏賊出入戍兵被瘴病十七入多物故乃請以嵗更士愈感奮為用居二年南方益堅固乃除河東路轉運使入為度支副使南越罹儂賊戕燬俾公為西路安撫使詔非賊所經厯不須行公謂不可使逺民不遍知天子意遂行不顧所至宣布德澤荒障茅草之鄉皆被天子涵育之恩還為龍圖閣待制改直學士河東河北都轉運使環慶路經略安撫使知慶州入判三班院銀臺司太常寺兼禮儀事契丹遣使來獻於時仁宗已厭世北人欲置幣於上前公遽以義折之北人辭沮卒授幣有司朝廷偉之以樞密直學士真定路安撫使知成德軍纍遷工部侍郎以疾願解成德印遂以户部侍郎致仕歸於青鄉里故人來謁必扶力具尊酒相勞道生平甚樂疾甚家人進藥揮去之遂不復召醫治平四年八月甲子終於正寢年六十九夫人王氏繼室劉氏彭城郡君子莘守將作監主簿早卒百藥大理寺丞常大理評事女適祕書丞榮安道次適滁州來安令江懋簡卒以其年十月甲子葬於益都縣永固鄉東鄧村袝先尚書之塋次文集二十一卷奏議十五卷其為治清簡不張鋩角議政必先屬官有未盡乃出已意酬問蹂至極當而後行之然嫉惡専斷則無所屈猾盜囊槖薰搜之無遺種淫祠怪神一切撤去學為浮屠而籍不應法者悉放為農焉嘉興于今三十年或問父老令孰賢必以公對在湖湘時詔以間田為官吏食租受田者皆不如詔自嶺以南皆被劾得罪罷去公移文屬部應受田者悉還之湖南一道獨不挂吏議當時稱其長者其施設巨細緩急各中文理如此自結髮至引年而歸操履醇潔老益不懈其可銘也哉銘曰周自豐鎬后稷之孫赦遷􅓆狐禠爵於秦漢嗣王公維號之存法曹孝廉俱出汝墳毁家見忠廷尉維仁維公自奮纍然布衣遂以仕顯白髮儀儀出入完潔曽莫我疵苟有可誅公發不疑度可掩覆孰能公窺長於治人古稱吏師湘南之功湘人歌之病知所止引車以歸于何考銘自公成德埋之幽墟維年維億
