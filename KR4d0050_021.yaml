body:
  text: 鄖溪集卷二十一宋鄭獬撰墓志銘衛尉少卿劉公墓志銘衛尉少卿劉公既卒之明年二月甲子將葬于潤州之延陵縣某原其孤凱列公之美行馳私奴趨京師請銘於著作郎鄭某於是考公之遺録而嘆曰嗚呼劉公可銘也夫公諱忠順字某贈刑部侍郎諱簡之子其曽大父諱崇魯仕江南李氏宣州觀察推官大父諱晟公以明經賜第補潭州攸縣尉江寧府句容尉丞相王欽若言公之能遂為句容令改大理丞知江州之德安資州之資陽縣三遷國子博士通判袁州權知建昌軍選為三門發運判官又三遷駕部員外郎連刺解坊邢三郡用三司使王拱辰薦入為度支判官出為䕫州路轉運使賜金魚紫袍又徙兩浙路遷主客金部司勳郎中知蔡州改衛尉少卿知泉州移福州坐失所舉奪卿罷歸延陵嘉祐四年上親享太廟復用為司勳郎中公曰吾老矣烏能以白髮凂外庭遂不起後二年以疾終於家享年七十有五公樂易而愛人君子人也為治寬而不廢察獄必盡其恕疑者嘗抵于輕初為資陽邑有史氏田自唐時以葬貧死者嵗久豪猾稍盜耕之滅冢萬餘公收掩遺骸盡斥耕者復取為葬田邑人懷感及在建昌暴水夜至壞民舍公募工操舟以援其溺處之署內朝哺夜眠如其故廬死弔祭藏瘞又以庫錢給其家發官粟及富民所畜悉以糶飢者活數十萬人其最後居䕫州以南川溱溪諸郡皆用黔中吏為守垂涎相殘類為不法惡民得以伏山林挾羣獠入劫無嵗無之公既至即出兵至境呼其酋人告之曰宜悉縛惡民送府我言於天子赦汝罪不則盡滅汝種酋人畏恐皆聽命公遂言羣獠為盜過在惡民可赦不問而南川繚邊獨不擇守臣宜詢用武人提兵以鄣南服朝廷用其議公又以天子之命召酋人宥之刲羊釃酒與之燕樂皆呼舞出誓言願世世保邊由是姦宄盡破壞逺民蘇息公之治狀類若此者多其槩主於仁愛宜其有厚報於富貴以遂其功晚而運蹇卒以窮廢家貧借屋以居旁無長物豫嘗憂之數遣書致問而公方飲酒嘯歌自放乎田野間其心休休然若據大厦味九鼎前有鼓鐘金石嘈嘈樂而不厭者則豫又為之釋然喜笑何其有餘裕哉公能為神仙引𨗳熊蹲虎躍之術顔髮甚壯嘗過宛丘以語豫而豫未之能志也悲夫娶長安縣君張氏子男夙故江寧府溧水簿凱漳州漳浦簿純忠州豐都簿統䖍州信豐簿長女早世次適都官員外郎臧論道次適南康軍星子令李賔王次在室銘曰恂恂劉公不劌其剛力於厚下有發惟臧還田壠丘義感過兒汝孰為弱方桴豫之汝孰為飢裹粟往飴蠻夫囓邊擕其符于支刈其孽牙靡耳以隨惟公有為俾民是宜胡然聱牙老於故居食無腴田處無完廬我施維豐我行維屯不饗於身利其子孫尚書都官郎中吳君墓志銘君諱僅字庶幾天聖五年進士擢第厯歸州推官定國軍節度推官大理寺丞知江州德安綿州彰明二縣饒池等州提舉鑄錢事通判婺州君亷悍於事無所顧避􅍶􅍶有芒角在彰明時韓丞相使蜀知君才郡縣寃訟多以屬君蜀人訴鹽井雖泉涸官猶捕繫責課入至壞産或榜死獄中不得免君請更法泉竭鹽不出則官閉其井人獲利焉嘉州王䝉正有美田居木川肥腴甲西蜀其祖方與昆弟居獨遺言付䝉正之父族人數訟不平官司莫能决君以為祖有昆弟在安得專為遺言柝其田均受之訴者感涕為君作生祠曰用以報吳君也是時䝉正連外戚氣勢能傾動人而君一斷以法韓丞相尤喜以為難也翰林宋公祁提舉在京諸庫務薦君為屬官羣司狃于廢墮上下蓋覆一切闊略不問以為大體君佐宋公為治披姦搜蠧窮其根穴收什包羅尺寸無所漏失主吏怵惕始知有公法老人至今有能言宋公時事者維君有助焉選知開封縣中貴人常遣吏持公移訴某事君曰中貴人誠貴重然所訴乃私事尚得為公移耶箠其吏遣之貴家遊觀多借縣民牛有干君者君曰吾家鄱陽乃有牛逺不能致奈何竟不與于是莫能有撓縣者君平生所持皆如此與人聱牙常不合而卒亦用此取困及為楚州愈厲刻自信不肯隨衆楚為東南衝舟車日叩境接聒不得休息前為守者率置民事專治賔客君輒謝罷孤坐聽民事賔客至者雖烜赫巨官餉之壺酒盤飱而已未嘗留連歌呼醉飲以結恩意往來者皆索莫遂得毁言又與提㸃刑獄持曲直相排擊由是被謫降監池州酒知君者為君咨齎而嘆息也以親嫌不之官歸京師朝廷復欲攜挈用君以君使江南督責有勞復君職任韓丞相為山陵使又以君營繕下宫還至汜水縣得疾卒嘉祐八年某月日也享年六十二君饒州鄱陽人曽祖延進祖承鑒考宗右厯三世不得仕至君登第由大理寺丞三遷至屯田員外郎由員外郎四遷至都官郎中服五品服追贈其考太常少卿妣某氏某縣太君男有官女嫁仕籍虞部員外郎周偕試校書郎劉凱大理評事章祐之祕書丞髙照皆其壻也初娶江夏黃氏又娶清河張氏廣平宋氏封德安縣君今夫人麻氏封金華縣君子四人知損某官知白某官知讓知和女一人尚幼其葬在饒州鄱陽縣懷仁鄉某原日用治平元年十月某甲子銘曰世之喑噎孰疵其為揭負而呼衆乃驚疑虎以鬭傷不如童麋嗟嗟夫子宜其阽危毁譽不公不獲於時告諸大幽俾觀我辭戶部員外郎直昭文館知桂州吳公墓志銘公諱及字幾道嘉祐中為審刑院詳議官於時仁宗春秋浸髙國嗣未立宦官猥多公歎曰吾於此豈得默耶即疏言古者重絶人之世故去肉刑不用今閹人多取他人子腐之蕃其黨是宫刑復用也傷絶莫甚焉宜稍為條禁則上天報貺宜有文王百男之慶蓋不夭胎不毁卵鳯凰至重其類也仁宗異之以為言者未嘗有此論也頃之諫官缺仁宗謂執政曰可除吳某時公巳丁中允君憂去職服闋即除祕閣校理月餘遂拜右正言於是公復言陛下未有太子朝廷羣臣相與為諱而不言陛下不於此時早定他日使異姓生心非至計也願擇宗室之賢者而立之天下知有所奉則孰敢有搖足而上下者哉仁宗由此感悟其後二年遂以主上入繼公又請責二府以實效去虗名苟簡之政用李吉甫裴垍故事俾選用天下豪俊有不職者斥罷之擇賢將帥以肅軍法而繩墮卒刺史縣令有治最者可褒進以勸良吏宫掖掃除之臣宜依開寶詔書三十無飬父者聽飬一子裁減諸司浮費更定任子令諸所論奏事甚多其家所藏藁尚存二百餘紙朝廷稱之然亦用此取嫉於人磁湖程氏以冶鑄世得一官言者以為幸請罷之公以謂程氏於國興利不宜罷與議者亦不合遂以工部員外郎出知廬州公既去朝廷究其事卒以公議為是而賜程氏官治廬之三月五峒蠻冦欽州邊兵屢戰沒乃進公户部員外郎直昭文館知桂州經略廣西事公至則搜其利害無所遺落瘡痍之士皆起以奮始築州城鑿甘棠水以注壕繚邊之地障塞完固蠻人納土請吏特摩安南皆來獻踰明年得暴疾以卒年四十九嘉祐壬寅九月某日也公初年十七中進士第為楚州鹽城簿邑人以少年視公公至邑與令爭民事可否令數絀伏邑人驚曰是少年簿可畏哉其後為福州候官尉知秀州華亭俱有能名候官民忮狠與仇家鬭自飲鼠莽而死仇家因抵法官司雖明知莫能辨蓋習之已久公折其獄仇家勿論活五十三人提㸃刑獄移其法於七郡被誣者皆得活而毒死者遂絶人謂公之德施於閩越無窮矣在華亭緣海築堤百餘里得美田萬餘頃嵗出穀數十萬斛民于今食其利大理寺嘗奏公為檢法官持法尤平三司請重鑄錢法至死判審刑者主之公獨爭為不可判刑恚曰立天下法豈由一檢法耶公曰法者天下法衆所不欲而執事獨欲之立天下法又豈獨由執事耶判刑者竟不能奪公得仕雖早而進用絶晚既用矣還復斥去遂至於死然其所施設亦可槩見嗚呼使豫之述止於是而巳乎公姓吳氏曽大父諱某大父諱某父諱某公在朝纍贈太子中允自曽大父以上居金陵至大父徙于通州而再世葬通至公之喪不克歸别葬于揚州廣陵縣某原其後遂為廣陵人乎初娶太常博士趙某之女再娶比部員外郎劉某之女為保寧縣君子寬甫太廟齊郎長女適進士李南季次適泗州盱眙簿趙覿一男二女尚幼其葬在治平乙巳某月日銘曰吳在金陵黜於世衰既極而復自公發之再世葬通祔土纍纍公歿桂林素棺南來鄉老引紼請公葬歸乃葬廣陵在淮右山孔子稱賢嬴博之間古有鼎銘維公方之不騫不滅萬世藏之尚書都官郎中王公墓志銘世之所謂長厚君子者豫嘗得而拜之及其死也豫嘗得而銘之今夫豫之銘王公也王公為外郎時在京師豫與常山董伋往拜而丈事焉王公之為人恂恂而謹雖對妾𨽻肅然有禮而加愛焉其為政尚恕民之飢者發粟以食之屬吏有過專為諱匿而終不肯發其所施設無甚異於人至其久則吏民習服而益親向之人謂公曰今之為吏者屹屹以為強揭揭以為察橫羅旁擊不較曲直攘取世俗之譽以取貴仕公亦以少厲爪距以自奮公笑曰人耳人耳奚異於我哉吾豈忍殺人以自售耶言者慙伏嗚呼非所謂長厚君子者耶公之初登進士第再調潭州司理參軍湘鄉有盜五人已具獄當死公覆之曰此非盜也窮之果然已而亦獲真盜醴陵富民殺人邑胥受賕執其佃客客被掠自誣服叩頭乞死公視之惻然取案熟讀有缺其日月而忘填者公曰吾無疑矣於是盡發其姦狀上官聞之爭薦其能及滿法當遷而得職官翰林胥公偃掌選言於上曰王某嘗活寃人宜有以進秩遂改大理寺丞知興國軍永興縣再徙潭州通判猺人為寇公調發糧餉師得宿飽安撫使以聞乃知臨江軍又移吉州信州七遷尚書郎中公時已老矣而新安太夫人猶在堂乞監同安靈仙觀以便安飬嵗餘太夫人卒公侍靈輿歸豫章白髮扶杖哀慕如孺子因得疾以嘉祐七年六月八日終於家享壽七十五諱固字伯充其先居南康之建昌五代兵亂徙於豫章之分寧自曽祖而來世以儒名家而未嘗得仕李氏既入朝公之伯祖某始舉進士禮部奏名第五於時太宗皇帝兼用才武取人見公狀貌眇然不稱所聞因罷去遂終身不復出伯父某亦以文學老於鄉里公以再世不顯因刻厲讀書終以成名焉曽王父諱某王父諱某考諱某以公贈光祿少卿母遊氏馮翊縣太君繼母章氏新安縣太君娶祝氏河南縣君男五人建中筠州司户參軍黃中太廟齊郎早世莘純中俱登進士第莘饒州餘干縣尉純中鼎州桃源令三女皆適士人孫十九人曽孫四人蕃衍成就其亦有顯者歟初河南之葬公自理穴曰吾將處此遂以其年九月某日葬於分寧縣仁義鄉􅀈頭原從其志也銘曰煜煜而燔者吾知其為光闐闐而震者吾知其為聲惟固守於內者不耀而鳴德既老而益成嗚呼何哉豈為善而不近名歿而可祀為鄉先生者耶殿中丞魯君墓志銘君諱宗顔字潛甫贈太保某之曾孫贈太傅諱某之孫贈太師諱某之子參知政事贈某官肅簡公諱某之季弟魯氏世為青州壽光人既仕而徙居於亳君與肅簡俱為進士肅簡既登科入朝浸以顯貴而君猶困於有司乃益治田為生事以佐其家故肅簡為大臣得以略去私計而專意於朝廷者君實有助焉肅簡深念之將致之於祿仕君固辭曰願進諸族之甚貧者肅簡益以為賢而君遂以布衣終于家享年四十六肅簡乃任其子有開為將作監主簿今為比部員外郎君用有開之恩亦贈殿中丞嵗時薦享君以殿中丞繼太師而北向有開朱袍銀魚奉祀諸孫執事拜伏趨走滿前魯氏榮之然君嘗居臨淮多施豫臨淮人見君出入皆敬愛之以為長者人也則雖不及享一時之報而終能被後世之澤也亦宜哉有開以某年某月歸葬君於鄭州之新鄭縣某原夫人邊氏封仙源縣君一女適少府監馬尋封扶風郡君孫四人皆良子弟也銘曰壅之後決其流必長鬱之後發出而愈光孰謂魯君不實其藏決之發之其出穰穰有子有孫頎頎在行既葬而銘千萬年無忘殿中丞鮑君墓志銘鮑公諱宗師字從聖再舉進士不中以䕃補常州司戶參軍久之用大臣薦改大理寺丞兩遷至殿中丞為人深默而不校泯然若與世相遺者然好讀書無所不記亦未嘗自言人叩問之則纍纍語不絶取書覆視無差者又能治官監睦州酒嘗攝獄官立為辨出寃死者三人為昌化令邑民誣訴于州按之無狀異日民復有犯公釋之或謂此氓嘗誣公者冝置以法公曰民雖妄幸巳辨矣吾何忍以私忿傷吾民邪其明恕多如此嘉祐七年例得蜀官貧不能具行求監廣州稅既到官日悲吟思歸遂欲解官去親舊勸止之踰二年竟得疾卒于廣州年五十六訃至江陵其甥鄭某哭問故設位奠哭之盡哀其季復遣使來曰從聖葬有期願以銘纍甥嗟乎吾舅常以友視我銘之也豈為私于吾舅邪蓋鮑氏出于夏禹之後或居東海泰山間鮑叔始見于齊而昭以文辭顯于江南公之先乃在㑹稽豈昭之裔邪然其五世祖君福佐錢氏王吳越及其子修讓俱為吳越相遂為錢塘人修讓生漢文為湖州刺史漢文生仁爽從錢俶歸京師家益衰漢文生當公之考也復仕至職方郎中贈諌議大夫以清名顯于世妣陳氏萬夀縣君公初娶林氏再娶傅氏今夫人亦傅氏其姊也封長安縣君子延早亡次遐年喬年一女適進士黃敏中卒之明年治平丙午正月甲子葬于杭州仁和縣亷讓鄉諌議之塋次公舉進士時與富丞相聯試席及丞相帥陕西欲公為陕官且將薦引之公終不肯往人服其有守銘曰我卜我吉利子斯室更萬千年兹銘不復出贈懷州防禦使河內侯趙公墓志銘公諱克賢貴出於宣祖皇帝之後其曽祖曰廷美贈秦王諡曰悼祖曰某贈某官考曰承詡右衛大將軍深州防禦使贈安德軍節度觀察留後閬中郡公妣曰崔氏博陵郡君公纍官至右監門衛大將軍嘉祐八年九月甲子以疾卒年二十一詔贈懷州防禦使河內侯以某年十月甲子從葬于汝隂縣某原秦悼王之瑩次銘曰既厚其生不侈以壽彼食藜藿白髮滿首有角去齧蹄者善走又豈必然於何歸咎贈陳州觀察使趙公墓志銘公諱克闢辨道宣祖皇帝之四世孫曽祖諱廷美是為秦悼王悼王生德彛是為頴川郡王頴川生承錫今為雄州防禦使即公之父也公生於冨貴家恂恂樂善未嘗以財為侈亦可尚也已纍遷左武衛大將軍建州刺史嘉祐八年八月某日以疾卒享年二十八皇帝為之不視朝詔贈陳州觀察使淮陽侯夫人陳氏陳留縣君先公而亡一女尚幼以其年十月某日從葬于汝州之汝隂縣某原秦悼王之塋次銘曰淮陽維膚維履不汙冝老於紈襦黎顔而居厥室惟虗一女芚如福不漸世公乎巳乎郡主趙氏墓志銘萬年郡主趙氏太祖皇帝之曽孫永興軍節度使越懿王諱德昭之孫威德軍節度使冀康孝王諱惟吉之子妣為譙國夫人杜氏初封福安縣主年十八嫁今濰州防禦使向侯傳範後四十二年以疾終于京師敦義坊之私第享年六十康孝幼為太祖所愛育于禁中龍輿出則抱之于前民間號公孫太子至真宗時乃出就外邸而主亦生于禁中故其恩禮與宗室諸女絶等矣真宗書其小字賜之語其家曰此女無以妄與人于是得向侯歸之向侯故丞相魏國文簡公子數治大府有雅才所與遊皆一時賢士大夫而其自待顧重于繩墨間猶布衣之士也而主亦能以禮法自約結事姑以孝謹娣姒稱其順妾御撫以仁蒸祭賔友烹溉肴醴之煩縟必親履之而不厭猶寒家之婦也是以能承向氏之家而不失魏公之世者以此初上為頴王時娶后于向氏有詔向侯主婚主悉力佽助無所遺及進見或謂主可因此時有所謁主曰寧有是耶皇恐稱謝而巳先帝亦欽歎之及有疾上屢遣使挾大醫診視既卒哀惻久之錫以黃金贈賵加等使者臨奠給一品鹵簿以殯于資福浮圖舍熙寧元年八月庚申遂葬于開封縣褒親鄉豐臺里先塋之次子男三人縝國子博士縡右侍禁繪太子右贊善大夫早卒女六人二人早卒次適隴西李侔次適譙國曹諶俱后族也二人尚在室孫男九人女七人銘曰卦于家人風自火出內嚴不犯乃能化物詩之肅雍首乎王姬其教自上四履且儀皇祖之孫有嫟其美嬪于濰州丞相之子授于公宫我承我師賓豆祭簋罔不祗祗壼德以成有發孰咎濰州之聲韡韡並茂天子維姑先帝維姊中宫維尊叔祖之妣厥初逮終既多受祉哀榮之享實亦絶擬翟車畫扇出送國門秋風八月遂葬髙原白玉為泥黃金為土我辭在碑愈久彌固宋夫人墓志銘夫人宋氏其先安陸人自伯祖庠為仁宗宰相遂居京師今為開封人曾王父諱在中王父諱世基贈殿中丞父京今為尚書比部員外郎母劉氏安定郡君治平三年歸于皇叔右監門衛將軍宗史為吳王之孫而定王允良之子夫人既歸二年以熙寧元年三月丙子以疾卒壽十九嵗明年二月十七日葬于河南府永安縣銘曰夫人宋氏安陸之先乃自相國開封以遷世不家食佩紱再傳而生夫人幽間靜專厥配維何定王之子翟車以歸亦維得止雍雍其儀進饋維時姑嫜則喜盥服是冝賓客有奉蒸嘗禴祠黽勉夙夜曽匪憚為天豈不聰胡嗇之壽既實而獲則又奚咎大化拘拘或亟或徐要之終極同於一墟傅夫人墓志銘試將作監主簿向紘之夫人傅氏生於慶厯之丙戌終于治平之丁未為婦二年有二嬰兒踰明年熙寧之戊申八月庚申葬於開封府開封縣汴陽鄉豐臺村其曽大父某某官大父某贈某官父求今為龍圖閣學士刑部侍郎其將葬也向氏之族甚哀之屬豫為之銘夫人無墮容無慢德其行巳也約其趍事也敏其處家也睦上焉者有以愛之下焉者有以敬之向君由是無內顧之憂而其所履之實如是是可銘也已銘曰結帨兮如歸童容兮倭遲馬巳返兮幾時挽素紼兮忽束之汴之流兮祈祈左有隴兮挾以馳日出艮兮奮參旗吁嗟夫人兮藏于斯
