body:
  text: 鄖溪集卷二十三宋鄭獬撰五言古詩雜興三首女媧鍊五石上補天之缺如錮黃金液萬古無由裂堯舜首制度巨防髙􅏭嵲後世日破穿通為萬鼠穴譬彼果蓏蟲熟爛恣攻嚙豈無良工手一起為施設非若天之難前輩有夔卨苟或不關心女媧亦為拙塊泥封兩耳師曠亦為聾離朱揑兩目觸面不得通折弓斷其臂安得為逢蒙白日照六合光耀當天中苟為物所蝕齯齒猶成童君子誠其意默通大化工所以虞舜明不在雙重瞳秦皇按長劍殺人如刈草何獨李斯輩竟以丞相老漢元服儒衣收諫如蓄寶何獨蕭望之誅鉏恨不早滄海飛天波枯澤淤行潦劉纍嬰其喉蛟龍不為暴魯士固多賢親師仲尼道至於出處間惟有顔生到感秋六首落日在髙木輝輝淡秋容白雲起天鏡飛去忽無蹤雨蘚爛漫紫幽徑誰相從孤慮如有根糾結生心胸良時忽巳晚撇耳過晨鐘事業餘濩落撫巳真何庸投箸不能食却立倚長松酒敲百萬兵此憂不可攻短松青鐡幹童童三尺餘花實少姿媚獨與寒心俱暴霜時侵凌奮怒張雄鬚長楸擁腫材旁蔭可容車秋風一夕來解剝惟朽株物性在堅柔何必長短殊楸葉巳泥滓松幹猶青膚無煩問髙下且辨榮與枯我思洞庭橘赤金三寸圓磊落火齊珠綴樹團紫煙病肺燥不治噓吐氣欲燃玉醴埋九地鑿井不得泉我欲涉洞庭採橘秋雲邉駭浪破我舟蛟龍怒騰騫安得萬里風吹落墮我前日車輾東井一陰穿土生死草出飛火殺機從此萌况及八月秋大昴騰光精氣勢日發勵乾坤露峥嶸萬木赤立死百蟲相弔鳴菲菲黃菊花幽叢發孤英採擷對樽酒悲歌不能傾所悲陽德消日與羣陰爭林杪一蟬噪翛翛涼風來清響斷復連裂耳增餘哀浩露洗明月珠樹涼璀璀蛻飛各有時詎能人力裁儒生守文字舌腐猶蒿萊空腸貯古書獨立誰為媒咄哉丈夫氣胡為久徘徊軒軒蒼角鷹殺氣凌髙秋一息一萬里獨與長風逰獵騎走霹靂落臂無虗投古冢白鼻狐立死不得留飛霜未殺草擁翅寒胡愁畜力以待奮仁如林中鳩今兹順天誅狡穴破姦謀美哉青骹姿識時誰與儔秋聲蚯蚓如嘒管逢時土中鳴秋蟬抱枝死不敢鼓秋聲聼者何無厭忽如鳴秦筝大雨漂九土曠蕩空太清回次媯川大寒地風如狂兕來自黑山旁坤維欲傾動冷日青無光飛沙擊我面積雪沾我裳豈無玉壺酒飲之氷滿腸鳥獸不留迹我行安可當雲中本漢土幾年遭殺傷元氣遂隳裂老陰獨盛強東日拂滄海此地埋寒霜况在窮臘後墮指乃為常安得天子澤浩蕩漸窮荒掃去妖氛俗沐以楚蘭湯東風十萬家畫樓春日長草踏錦靴緑花入羅衣香行人卷雙袖長歌歸故鄉大寒呈張太博寒風怒蓬勃排戶入吾室沙灰漲天黑白日赤黃色捉衣擁肩坐心脾寒憀栗須臾天氣變陰黯如塗漆跳空雨雹飛四走珠璣出數子方歎驚共怪天公逸先生携書來昂頥杖飛策乃召二三子環坐與之席呼童令取酒盤飣雜梨栗酒行寒氣除春陽生四壁先生説大義馳騖何纎悉洞徹人精神兩耳飛霹靂老語植根節九牛不可屈堯眉與舜目緬若曽相識如當夜黑中光耀見赤日退思聖賢業所積在劘剔韋皮畫山龍塊泥亦瓦礫人固有識智非如物之植而不自刻苦晝夜如刀尺年齒方壯健男兒宜努力方今太平民尚未獲蘇息誰能拱兩手看人樹勳績迫晚風雪出省詠張公達紅梅之句雪花障路飛飄濕紅杏韉歸馬碧蹄疾踏破白玉田攬轡獨長想物境真可憐朝紱未挂身豪逸倚少年結客上髙樓珠箔遮碧天燒酒紫煙沸割炙白膏鮮美人挪素手笑㺯琵琶絃醉眼生亂雲不省到家眠俊逰或如失倒指還摻然薄莫出華省下馬燈巳燃強笑破老顔寄恨揮華箋玩世張公子嗜酒真神仙拋擲詠紅梅負伊清樽前公逹詩云紅梅花下一樽酒拋擲清香是負伊再讀再三歎心斷空悁悁起豫如繭絲織愁成短篇雷震四月老陽盡蟄雷方發聲七月連大雨碾天三日鳴夜或發狂震卧者皆起驚奔電曄然作忽如烈火明髙樹大百尺霹倒燒其根往往光曜中時見怪物形飛雹大如指萬弩相奔傾椎擊鳥雀羣掩地交縱橫雷者主號令為天之常經奮豫既過時及此何匉訇無乃號令失安得四時平春秋書震電推之在五行天道儻可信使我心不寧冬日同仲巽及府寮逰萬夀寺兼有龍山之約峻阜如蟠虹蓄泄氣象靈紺宇隱紅樹繚若畫在屏聫騎轉城角沙步俯回汀野寺對寒水白壁敞雲扄嶛深松桂黑地古莓苔青朱橘擁繁梢懸綴黃金鈴橫梯出虗閣古像銅青熒眺聼揖秋境豁露無藏形清氣換俗骨蕭爽毛髮醒汲泉煮露芽却坐竹間亭髙談落四座金石朗衆聼脫落見逸調驟如馬在坰眇然遺組紱太山一浮萍落景不我顧簷角出寒星燕客未渠央歸鞍安得停歲宴幸豐樂楚人飽且寧蟋蟀刺褊陋及時灑子庭傳聞落帽山風涼久凋零巳釀白玉泉連車載百瓶行期一佳賞相與快煩冥直宿省中娟娟海棠花小蕊春來瘦斑斑青竹枝踈葉未生就碧砌畫欄干雨斷黃昏後厭酒未能眠時拾殘花嗅奉使過居庸關鐵山五十里􅘀獸不能踰兩壁如夾城行人貫衆魚巨關隔元氣寒暑南北殊一夫扼其鍵萬馬不能趨石氏窺三川荒唐誰與謨不能仗大義割地事丐奴封樹未拱把敵騎巳長驅後嗣竟銜璧白衣拜穹廬自此失天險一柱折坤輿世宗有英氣手撼崑崙墟關南下六城卧病歸東都太祖得天下僣竊即為誅右顧取蜀漢左顧平荆吳欲藏百萬縑萬里購頭顱可用一赤組坐使縳單于竒䇿祕九地白日忽西徂壯士折其弓慟哭望鼎湖先帝務養民束帚不忍除歲時遺繒絮天府藏丹書桑柘入燕山牛羊卧平蕪我行謬使節踏氷出中塗路傍二三老幅巾垂白鬚喜見漢衣冠叩首或欷歔不能自拔掃百年落鬼區天數終有合行上督亢圖酹酒弔遺民淚濕蒼山隅湖上秋影落西湖渌波淨如眼搖船入芰荷船裏清香滿花深不見人但聼歌聲逺還從過船處折倒青荷傘為採秋芳多不覺飛霞晚回船未到堤更引金蓮盞湖上遇雨老龍怒相搏快雨忽噴灑天公白羽箭竦竦射萬瓦電眼窺人屋狂雷震欲下直疑惡溪山掃除重造化頃之蒼雲裂天光出縫罅變怪忽寂寥乾坤似新畫秀靄翠堪包清風健可跨林影走羣龍溪聲回萬馬更無一塵飛清光尉平野沙路淨無泥侵涼宜早駕髙堂應念歸屈指期到舍入采石始飲秦淮水巳湔京洛纓自嫌塵土迹恐汚江山清太虗淡秋影霜物尤疏明擬問白雲公貰此秋嵒耕汴河曲朝漕百舟金暮漕百舟粟一歲漕幾舟京師猶不足此河百餘年此舟日往復自從有河來宜積萬千屋如何尚虗乏僅若填空谷歲或數未登飛傳日逼促嗷嗷衆兵食巳憂不相屬東南雖奠安亦宜少儲蓄奈何盡取之曾不留斗斛秦漢都關中厥田號衍沃二渠如肥膏凶年亦生榖公私富囷倉何必收珠玉因以轉實邉邉兵皆飽腹不聞漕汴渠尾尾舟銜軸關中地故存存渠失淘斸或能尋舊源鳩工鑿其陸少緩東南民俾之具饘粥兹豈少利哉可為天下福寄題辰州沅陽館張侯守辰溪作館清溪上峻趾擁崇岡跋海鰲足壯石嶝盤山回逰人出屏障林壑互蔽虧昏明各異狀辰溪俯洞夷登臨少佳况不知自何人於此廢真賞窪池失蛟龍破屋藏魍魎如持萬黃金棄之在汚壤張侯一芟掃耳目復清曠坤倪伏詼譎閃倐見氣象素壁照清秋簷牙屹相望啼鳥共徘徊飛雲自來往擕樽聼鳴泉便可傾佳釀煙披舞袖潤谷應歌聲響客醉未容歸明月纎纎上幽懷儻自得所適即為放兹地雖陋僻境靜猶足尚壯士偃旗眠落日惟樵唱緩帶一來逰清風日蕭爽戍雍州兵符下西州將軍催部伍鳴鑼張大旗早發雍州戍家家送出城走哭遮行路雍州萬里餘北人那可去毒草見人搖雄虺大如樹二月瘴煙發薰蒸劇甑釡病者如倒林十才起四五偶有脫死歸扶杖皆病僂逃生既不暇安能捕冦虜跳踊一蠻來取之易攫鼠顧彼有土人揮金可召募狃練得精卒亦足為爪距妻兒蓄里閭於心必愛護較之勇怯間相去猶豚虎一朝有緩急伸縮用臂肢何必遣戍兵觳觫就死所願留中州人無填嶺南土留侯廟留侯仗竒䇿十年藏下邳徂擊秦始皇獨袖紫金椎兹為少年戲聊夸遊俠兒退學黃石書始見事業竒兩龍鬭不解天地血淋漓攝袖見髙祖成敗由指麾重寶啖諸將嶢關遂不支斥去六國謀輟食罵食其卒言信布越羽以為騎馳餘䇿及太子四老前致詞立談天下事坐作帝王師功名竟粳粃撥去曾亡遺往從赤松逰世網不能羈韓彭死鐵鉞蕭樊困囚纍榮辱兩不及孤翮愈難追陳留本故封道左空遺祠兩鬼守其門帳坐盤蛟螭威靈動風雲飄爽回旌旗我來謁祠下文章竟何為長嘯咏髙風三日不知飢遊清涼寺野思不可收瞥若孤雲生船頭插芳草間踏飛花行春江搖夕陽緑波鱗鱗明更欲待潮歸髙城聞鼓聲夜半夜半羣動息髙車始停輪白日苦不沒役死天下人黃金埋九地家家惡賤貧安得充所欲不蹈通衢塵記夢赤城老仙翁面發日月華獨立石巖下手把蟠桃花授我碧簡文竒篆蟠丹砂讀之不可曉翻身凌紫霞蘇刑部自湖北移漕淮南先公道義交晚得蘇公佐俾豫往拜之兄事安敢墮漂忽十五年日月如旋磨近佩荆州符吏牘方自課蘇侯乃外臺庶幾容謬懦若獲巨木陰似翳桑下餓相約待秋深事隙得髙卧風灑渚宫涼碧溪絶塵涴穿林或倦行拂石還分坐夙懷詎髣佛幽事信坎坷除書走馬來換節長淮左嗟豫踽踽逰有唱期誰和楚老遮郭門扳留知不可别酒雖無歡歸帆幸少垜蘇侯賢大夫厯數今誰過議論抵廟堂有力莫能破挺如白玉圭稜角不可挫大匠斫明堂宜居左右個猶馳使者車挾䇿均萬貨淮人久焦枯蘇息在咳唾傾酒吐長言遙為淮人賀送吕稚卿郎中奉使江西赤蛟卧淺水頭角不可藏天公果見之叱起南山傍吳侯蓄竒才投刃誰能當百吏如羣鴉簿領埋屋梁據案即時決眸子愈精光不試巨鰲足包裹百鍊鋼如何若漫浪華省亦為郎日署百十字支頥對修篁酒醒晚意悶睡美春味長間甚却索寞相遇必壺觴平子亦疏放爾我兩相忘君領勾院事絶簡與豫友張公逹為鄰舍尊酒過從相得甚樂也昨日鳳凰下詔書五色行特賜黃金魚付以十州強江山亦畏威指顧隨低昂乃知飛龍廄放出真乘黃一秣一萬里爭路看騰驤此行况秋色碧江襟袖涼啄黍黃雀肥鰣魚如截肪願加數匕飯以慰長相望送元待制絳知福州常公廊廟姿龍節殿南區鑿開文章源儒學比蜀都儀儀天章老秀色發東吳相望三百載還擁朱轓車風帆入天境雲際如飛鳬到郡省風俗少住使君旟邦人愛文字小吏亦詩書歐生死北土仙山失璠璵魁怪遂橫行聖人惡奪朱願公正禮法引之君子塗騤騤萬馬羣必有真龍駒它時楊得意自可薦相如送岷山楊道士逰廬山獨鶴志萬里不肯安故林排翮下岷山浩蕩窮幽尋初來識京師魏闕鬱蕭森講書勤萬乘賜服照華簮羣公作詩贈却轉清淮潯振䇿寄靈隱採芝宿孤岑明月落西湖澒洞萬頃金遂斷浙江潮噴薄白日陰芙蓉滿越國耶溪秋水深欲追二老迹赤城窈嶔崟海月入長嘯山風吹醉襟回橈姑孰溪相逢慰豫心緑髮頎而長蕭灑見球琳共飛秋浦帆飄若雲間禽捨我入廬阜煙蘿極登臨瀑布㵼天來飛雪寒涔涔手攀清桂枝側聼白猿吟倚石讀周易臨流揮素琴於此可忘老身世隨浮沉若見荆州客為傳金玉音
