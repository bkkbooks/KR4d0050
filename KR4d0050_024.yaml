body:
  text: 鄖溪集巻二十四宋鄭獬撰五言古詩陪程太師宴栁湖歸鳴珂曉日動畫旗春風斜馬蹄碧玉砧踏破黄金沙夾路盡高栁屹如紺璧遮草軟藉遊人樹暖啼嬌鴉長湖畜元氣飛亭挿蒼霞開樽適逸調笑言醉方譁人意重於春酒香濃勝花所嗟無壯士挽住白日車上馬横䭾歸不省歸到家淮陽有此境足為天下誇要路諳機穽㹞㹞爭齒牙願公且留鎮所得懽無涯巻袖倒大白秀髮欹烏紗時與東風期一來賞春花春日陪楊江寧宴感古作昔聞顔光禄攀龍宴京湖樓船入天鏡帳殿開雲衢君王歌大風如樂豐沛都延年獻嘉作邈與詩人俱我來不及此獨立鍾山孤楊宰穆清颷芳聲騰海隅英寮滿四座粲若瓊林敷鷁首弄倒景蛾眉掇明珠新絃採梨園古舞嬌吳歈曲度繞雲漢聽者皆歡娛鷄棲何嘈嘈㳂月沸笙竽古之帝宫苑今乃人樵蘇感此勸一觴願君覆瓢壺榮盛一作盛時當作樂無令後賢吁稚卿約郭外之遊舉世尚刻飾趍時獨放達醉眼掛飛雲孤心貯明月大匠坐高堂羣材就剞劂楩楠即赤霄容此蟠根屈平明萬馬趨玉鎻開雙闕晴雲暖不收飛遶龍旗濶堯眼八采眉下燭天光發鸞鵠出閶門穏路平沙滑簾額見春輝竹隂揺省闥萬事攪乾坤紛紛卷巾髮安得黄金箆靜把塵相刮屈指待春遊烟沸喉咽渴擁樹雪花消中庭潤於潑臘酒寒未壓玉醅猶可撥東風自愛花已入香梢活醉友好相尋烟郊緑如抺無為世網牽直把名韁脫白浪漂山來意在秋毫末險徑雖可通驊騮中一跋兩耳厭俗論乍喜春泉聒躍馬攜金樽風雨不可奪懷顧子惇託身事權門譬如狎彫虎餧之得其欲弭首迺無怒苟或咈其心騰爪必傷汝權門愛曲從破殻出毛羽一語不相酬隨手覆塵土禍福非不明焦爛猶奔赴聳動㑹稽山山前有直路鑄金不作鈎斷木寧為矩終嵗守衡茅藜藿甘辛苦贈朱省郎蕭灑不覊性本自出塵埃棄去萬物累徤翅天地回白髮朱省郎嶻嶪稱高才春風如故人昨日天涯來置酒畫堂晩勸我白玉杯調笑脫俗態高談若風雷歸來碧窻靜殘照寒徘徊豈知丈夫志力劈青雲開孤坐淚横臆慷慨無良媒世事如轉蓬竟日千萬回捩翅凌赤霄欲拉高山摧誰可料前途使我孤心哀送方元忠京師惡塵土兩足没至踝狂風暴然作塞天赤如赭事牽或出門復又無驢跨垢汗黏透衣留遲固不暇走歸掃一室凉泉急傾灑琢琢客扣門置帽嬾出迓呼童揖客進客語驚隣舍自夸已得計歸舟即日駕風塵久厭苦喜此脫去乍淮影貯蒼山飛峯皆倒掛霜月秋暉明乾坤曝圖畫往往窮谷間賢豪伏其下去而從之遊精麤得陶冶剖發露光鋩爬羅無縫罅豨膏滑兩軸直縱飛黄靶庶以卒吾業孰能籌周捨余云子語徤决去不可且伊昔同壯遊清罇固屢把病酒常至午醉歸每及夜朋輩俱飲豪斗酒快一冩窮甚或見怜怪極亦遭罵爾來五六年退縮但嗟訝老意漸相期懽心早已謝買得東臯田束衣即歸稼簞笥苟非道萬石安能藉期子在高秋行當秣吾馬夜坐寄正夫月落如玉虹飛過梧桐枝開懷待歸風如與佳人期白雲嬌娞嫷緑樹凉參差安得餌瓊華慰此終夕饑扶溝白鶴觀有蘇子兄弟贈黄道士詩二闋縣令周原又以三篇紀之邀余同作道士黄初平愛酒老不衰二豪留醉墨蕭洒白雲辭流鶯境寂寞無復落花枝空餘鳯凰字猶得周郎悲哭渭夫二兄生平抱直氣鬼神不敢干乃從異物化使我涕泗瀾昔之初拜兄申申從太原府公頗好事鑿地種琅玕築學百餘室吾徒得所盤嘈嘈誦古書隣家嫌聒煩間日課辭章據義相譏彈兄時處乎中竦竦如長竿負氣頗剛簡未嘗媚語言與衆不相合節角難為刓而獨顧我喜謂如椒在蘭璞玉逢礪石圭璧不為難離合雖屢更於義則相完應舉來京師覊旅誰為歡投篋寄兄舍乃同在家安我常劇醉歸吐嘔几席間獨兄在我旁撫眎夜不眠雖非共飽乳此意何踈親向雖聞兄病已云不能飡日惟飲醇酒無乃酒為患昨暮得報書遂死不復還擲書一痛哭痛甚連心肝恨我有此身不生雙羽翰摶風一飛去瀝酒哭其棺起坐空嘆泣偪臆何由寛攬筆作此詩顛倒不成篇焚之寄地下兄乎其來觀送趙書記赴闕草頭烟霏霏草影揺斜暉殘花猶綴枝故人何日歸不惜殘花飛惟惜故人稀酒到君莫辭淋漓從滿衣勉陳石二生精金埋深山鑿土不難得大貝貯蒼海破浪亦能識山趨猛虎穴海入長蛟室必意往取之投軀不少惜仁義藏遺書堯孔聖人迹不觀不知道觸塗暗於漆上無猛虎畏下無長蛟逼汚辱不及身燦燦嵬山璧金貝豈飽腹盜窺恐易失纍纍畜滿家僅能一身佚孰謂遺書貧猗頓莫能易其源固不貲可為天下澤二子齒甚少蚤莫宜加力剖剥見光鋩拄天一千尺勿逐籬下雛自跨鳯凰翼雄聲落衆耳白日飛霹靂偏親况在堂雪縷初垂白泪眼望榮歸一書千萬億夜燈綻寒衣秋風吹素壁胡為不奮飛跳躍在泥磧北闕掛賢科將相嘗曾厯五犗垂巨鉤往往長鯨食學飽遂騫翔青雲無物隔右顧玉堂人左揖金鼎客廣庭羅皷鍾朱門畫幡㦸嵗時獻親壽腰金光照席慈顔春雲披此樂直無敵是為烈丈夫後世稱盛德榮辱固在人孰云非我職別小女一別寸腸破再別𤣥髮衰人生無百年那堪長別離萬事從委蛻漆園眞誕辭去去復何言東風雙淚垂詠竹寄元忠寄臥丞相廬東軒富脩竹如對古賢人高標鎮浮俗露氣沃人清烟色沾衣緑丹鳯何時來瘦損琅玕玉對雪寄一二舊友呈張仲巽宗益運判少年喜風雪走上百尺樓買酒不論錢貰却紫貂裘相從盡豪客樓下繫紫騮雄心視宇宙萬事葉沉浮欲騎鳯凰去肯顧萬户侯誤奏上林賦白衣對冕旒一釣滄海空遂跨六鼇頭去年辭紫微龍節得荆州渚宫羙遊觀絳帳壓清流風雪不異昔亂眼玉花稠日月翻兩車俄驚十五秋故人如飛雲零落不能收老意雖未伏酒量已難投弔影對明燭金樽誰獻酬隔年得一書何足解沉憂安得縮地術來此醉相留故人不可見敢忘貧賤遊答吳伯固伯固讀我詩掉頭吟不休明日踵我門作詩還相投初讀頗怪駭如録萬鬼囚筆墨又勁絶湧紙花光流想其揮掃時天匠無雕鎪倒下百篋珠滑走不可收嗟余文字拙瑕纇多瘡疣迺如醜老婦見此明鏡羞美言反見誦倫擬非其儔扶樹腐木茂使之凌崐丘又欲唱其宫使我商以謳相搏如風雷直與郊愈侔子趨則甚易於我寧得不力敵氣遂作聲應律乃酬譬如楚漢翁書地爭鴻溝我才非子對何足當戈矛幸子時見過高吟消百憂酬王生兩日立我門再拜求我詩我詩非美粟安得充君饑十年誦周易滿腹文王辭文王不可見使我空涕洟客舟滄江落日動宿鳥歸故山託巢在高木朝去夕必還客舟逐南風大雪留楚關何日掃吾廬種秫鄖溪間陳蔡旱萬頃無寸苗旱氣白於水桑葉虫蝕盡蠶未三眠起挽舟如挽山何縁出泥滓滯寃何足言耕夫將餓死村家臨水夾踈篁蕭然一環堵稚子戲芳草小婦舂黄黍為生雖甚微猶足安吾土應笑馬上人衣濕朝來雨收麥小麥深如人澶漫不見地一苞十餘莖一莖五六穗實粒大且堅較嵗增三倍芟穫載滿車纍纍犢銜尾大挈置之場巃嵸丘陵起婦姑趂天色撲抶喧隣里貧者攟其餘翁嫗攜稚子農家兹有獲卒嵗可無餒去夏水漂屋汩竄幸不死以得補所失囷圌可儲峙云問麥之收豐飽何因爾得非長官賢政化順天理無乃農夫勤蚤莫事耘耔兹蓋天公仁雨澤以時至消滅賊與蠡隴畝皆稠穊嗟嗟爾之民無忘天公賜羌奴豢飽則蹄齧羌奴敢肆行蚊䖟失驅逐螻蟻遂縱横古先謀士帥令誰可將兵廟堂攬羣䇿還許訪書生古井百尺青梧桐下有寒泉井分明古鏡中照見梧桐影朝汲水花清暮汲水花冷願持沆瀣盃逺寄蓬山頂老樹老樹十百圍赤日不滿影廟貌畫鬼神燄閃見光景閭里頗驚動豚壺日叩請小巫口吟呀祝奠屢折罄安敢議剪伐惟恐罹灾𤯝烏雀不敢巢繁隂實脩整豈有物所憑隂姦設機穽吾聞夏后氏液金鑄九鼎窟穴盡發露䕫羊皆逺屏自從九鼎亡草木亦有幸松竹鉏蘭種松竹意嫌蘭易衰土氣不變惡物性先自欺勁竹見破節直松生曲枝嗟嗟松與竹空使幽蘭悲菊菊花初抱葉始見春光來緑蓓今著花又見秋風回高天不容土白日安可栽一世如大瘧寒暑還相催使我明鏡匣羞為蒼顔開流年可奈何獨有金螺杯閑秋無丈尺付與令剪裁况茲佳節近秋日宜樓臺菊花又密閙爛若金縷堆如何不自樂行繞空徘徊秋風不惜花即見飛蒼苔惟此一樽酒萬事皆塵埃瘦馬瘦馬如束薪寒沙粘緑髮我非九方臯謂有大宛骨渴引寒泉飲饑剪青芻秣如何得甘豢輙爾事蹄齧朝來試錦韉衝踏行步濶起立高於人一頓金覊脫圉人雖有恩亦懼來奔蹶古稱去害羣吾寧痛鞭撻咄哉爾何心無乃忘本末慈烏行鵶鵶林中雛日晚猶未棲口銜山櫻來獨向林中啼林中有鵶父昔生六七兒一朝棄之去空此羣雛悲意謂父在林還傍前山飛山中得山櫻欲來反哺之繞林復穿樹疑在葉東西東西竟無有還上高高枝高枝僅空巢見此涕沾衣復念營巢初手足生瘡痍朝飛恐雛渴暮飛恐雛饑一日萬千回日日銜黍歸今我羽翼成反哺方有期如何天奪去遂成長別離山櫻正滿枝結子紅琲肥而我不得哺安用自啄為嗟嗟我薄祜哺之固已遲尚有慈母恩羣雛且相隨蝦蟆積雨腐萬物吾廬亦頽壓蝦蟆何無厭短腹猶呼渴吾欲攜兩股擲之滄海濶懼其渴太甚跳去食明月題杭郡閣案此首從玉壺清話補入雨影横殘虹秋容映隂日寒江帶暮流曉角穿雲出峰藏翠如織宿鳥去無跡封書寄所懷聊託金門翼採鳧茨案此首從宋文鑑補入朝攜一筐出暮攜一筐歸十指欲流血且急昨前饑官倉豈無粟粒粒藏珠璣一粒不出倉倉中羣䑕肥故人梁天機家岢嵐即五臺山之南也余馳使雲中道出山後跂望不及因成拙句以寄之君家在山南我行在山北山如碧連城千里萬重隔我行君不知乘氷赴異域異域無春風未晚日先黒思君應在家游衍甘眠食復恐為薦書去謁天子國寒雲在山頭應見真消息我欲訊寒雲雲飛攀不得我馬不行空如何度山側相望兩不知立馬情何極
