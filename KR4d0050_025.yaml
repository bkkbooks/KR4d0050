body:
  text: 鄖溪集巻二十五宋鄭獬撰七言古詩春日樹頭啼鳥喚眠覺無數柳綿飛入袍亂花遶屋水光動碧虹漏窻春日髙乳雀趁飛玉蛺蝶嬌鵶啄落金櫻桃倚欄正欲破閒悶聴得酒聲鳴小槽二月雪戊戌二月二十六忽見大雪漫空來長老驚嘆共相語非時有雪誠怪哉陽爻四畫巳出地至今百蟄不聞雷怪得氣候斗暄暖便疑赤帝來相排黒風倐起捲滄海白日黯黯如煙煤湏臾大雹雜猛雨滿地走迸瓊與瑰隂氣蓄怒固未巳即時飛雪相傾頽青靈何處避威侮蒼鳯停車寒毰毸天地萬物失光彩草樹僵凍成枯荄凌暴春工太酷烈似恨百花先時開隱公三月亦雨雪仲尼春秋書為灾是時魯國行謬政天心可用人理推我疑此雪不虚應必有沴氣戕栽培去年六月已大水居人萬類生魚顋當時夏税不得免至今里正排門催農夫出田掘野薺餓倒只向田中埋方春鳥獸尚有禁不許彈獵傷胚胎而况吾民戴君后上官不肯一掛懷豈無愁苦動天地所以當春隂氣乖只消黄紙一幅詔敕責長吏湏矜哀蠲除餘租不盡取收提赤子蘇饑骸沛然德澤滿天下坐中可使春風回通州雨夜寄孫中叔黒雨噴薄隂雲驅昏林號風秋聲麤海氣熏煮怒不泄彭彭十月推雷車濕衣憫黙瞠無睡起對樽酒誰為娛此心豈復有雙羽一夜飛去不可拘昔與子同入京師借屋共寄西城廬愛我議論有可採攜草就我誇染濡錬出五色補天漏拈筆蘸墨縱横塗子云朋友當如是脱然意快如獰駒京師天子之所宅樓殿堆疊騎天衢瓦光流碧滑欲走繢畫顛倒横相舁東風薫濃一千里黄蜂胡蝶飛蘧蘧髙樓張旗鬭煮酒沉香滿榼金真珠玉盆一飲醉不醒落花滿衫行相扶未幾子去遊西洛嗟我出門獨騎驢晩落塵埃兩袖淚望子不見風吹裾三月殿前試不中青冥失計遊五湖撫劔東南看滄海大江正值秋風初我疑海神怒天熱直欲上薄東日烏乾坤頓撼壯人意掲竿便欲尋狂奴九月歸來已霜蚤肥膏紫蠏溶金酥南窻燈火夜可喜篋中巻册聊鋪舒讀倦抱膝一吐氣契濶各在天一隅相别於今二百日飛鴈南來無北書游從驩喜似舊否洛下為學安稳無雖然貧窘少倚賴空膓慎勿多悲吁聖賢獨立以待用提出日月還唐虞天地當中貫一柱孟子所謂大丈夫躁兒跳躍不足數插趐强欲飛蟾蜍縱子不遇乃至死勉之學為荀楊徒荆江大雪長鯨戯浪噴滄海北風吹乾成雪花漫空頃下不暫住三日不見金老鴉天工鬭巧變物境玉作荆州十萬家湏臾堆地厚一尺直疑天漏亡由遮白頭老栢最崛强壓折鐡榦紛鬖髿竹屋夜倒不知數但聞走下雷霆車南方瘴土本炎熱經臈猶生碧草芽忽遭大雪固可怪凍兒赤立徒悲嗟青錢滿把不酬價斗粟重於黄金沙此時刺史頗自愧起望霽景殊無涯有民不能為撫養安用黄堂坐兩衙和仲巽荆州大雪黒雲撲下一天雪開簾正見花飄颻渌罇覆按不能飲緬懷白髪同心交拈毫竄紙聊自戯不覺大語驚連鼇呼兒謄本寄之去豈敢有意夸雄豪諺稱抛磚引鳴玉遂䝉老手來相嘲且言本出將家子慣看飛雲連沙起常騎快馬臂蒼鷹走屠赤豹裂青兕燕山崛岉鬱天起玉闗石壁俱天壘昔纓漢冠為漢民今埋胡沙作胡鬼欲㩦熊虎十萬師獨以一箒掃羣螘左鈐休屠批谷蠡直出龍沙五千里嗚呼君言豈不偉單于聞之湏怖死莫羞茜袖雙鬢華盤屈肺肝生嘆嗟君不見東海老翁含兩齒投竿起載文王車又不見荆州長史年七十手提九鼎還唐家窮通變化不可測蟠蛟寧久藏泥沙况君著意經營久竒䇿峥嶸爛星斗殿前即日拜将軍縳取單于不引手我實讀書枉用心伊臯功名竟何有待君金甲破虜歸且作長歌傾賀酒杭州喜雪呉兒經年不識雪忽驚大片遮空來黒帝不分苦荒拙六花一夜隨風開平明掃徑招佳客座上豈無鄒與枚荆州新釀潑醅熟清光透徹黄金杯冬日示楊季若梁天機天河忽側飛雹傾丁丁屋瓦相敲鳴撲衣寫下白玉粒脚底踏碎真珠聲官舍髙屋苦濩落此時不易孤客情頴侯恰寄玉泉釀乳花甘滑琉璃清紅糟淮白復脆美佐之緑菘作呉羔縱談往舊雜嘲戯大笑觴倒金酒觥間以罰令却寂黙四座睥睨如伏兵人生㑹合即為樂况子歸意凌青㝠赤尾鯉魚在泥滓行見兩翅穿鱗生跳身聳鬛望東海蒼崖枯涸埋層氷明年春風掃地起一起萬物皆光明出城寄梁天機春風徘徊來何時花光還破小桃枝不因出城見花樹春到人間殊不知昔年逢花便買酒㸔花走馬猶嫌遲花傍不醉不肯去醉到春歸花已飛誰憐官紱少風味入春未拈金酒巵豈惟花少醉亦少當時故人今更稀淮揚大水淮揚水暴不可言繞城四面長波皴如一大瓢寄滄海十萬生聚瓢中存水之初作自何爾舊堤有病亡其唇劃然大浪劈地出正如百萬狂牛犇頃之漂泊成大澤壮士挾山不可堙居民竄避争入郭郭内衆人還塞門老翁走哭覔幼子哀赴卒為蛟龍吞豈獨異物乃為害惡人行劫不待昏此時蝦䗫亦得志撩鬚睥睨河伯尊附城廬舍盡水府惟見屋脊波間横間或大雨又暴作直疑缾盎相奔傾溝渠漲滿無處泄往往床下飛泉鳴只恐此城澒洞徹城中坐見魚頰生豪子室中具大筏此筏豈便長全身朝夕築塞漸排去兩月未見車間塵且喜餘生尚存世資儲誰復傷漂淪京師乃處天下腹亦聞大水來扣閽至於河朔南兩蜀長江大河俱騰掀豈惟淮揚一彈地洪濤乃撼半乾坤臣聞九疇天公書三十六字先五行兹謂水德不潤下蓋與土氣交相爭願召近臣講大義使之搜鑿災害根下書遣使巡郡國曠然一發天子恩家貧溺死無以葬賜以棺轊收寃魂蠲除租賦勿收責寛其衣食哺子孫開發倉庫收寒餓庶幾瘡痏無瘢痕不爾便恐委溝壑彊者趣聚蠺蝨羣伏藏山林弄㓙器今可先事塞其源朝廷固當有處置賤臣何者敢僭論元元仰首望德澤惟願陛下無因循行次漢水寄荆南漕唐司勲漢水渺渺東南流蕭蕭雨打杏花洲欲託雙鯉寄書劄不知幾日到荆州荆州故人日漸逺到時緑草滿沙頭爭得報章來闕下鳯林北去不通流憶陪諸公㑹張侯之第姚黄魏紫雖絶品不言不笑空天斜不如共訪張公子自有三枝解語花主人耳熱更促席坐客眼亂忘歸家扁舟一夕若風雨悵望落日沉寒沙山陽太守見招值病以長句謝之山陽大都天下誇長淮蟠山無垠涯春風萬里漢東來流輝泱漭不可遮繞城樓臺滿空紫瓦光碧滑流成波東園花草趁姿媚真珠蓓蕾黄金芽太守政閒日無事隼旟聊駐朱輪車寳明簮裾盡賢彦金盆㵼酒成飛花山河喧咽歌管外舞裾繡畫金縷霞都人來從無居人飛塵雜㳫何繁華固知太守為民意與民驩然無怨嗟明日邀我復同遊我已病酒醉在家伏枕不得從車塵坐見落日啼棲鴉還汪正夫山陽小集汪子文章何偉竒如觀天子乘輿儀怛然暴見殊驚疑舌拄上齶兩目癡定神屏氣試引窺漸識羽衛行相隨金吾佽飛開中逵横刀執矟鐡馬馳畫斾赤白盤龍螭大角一百二十支鐃皷嘲轟雜横吹繡幡絳幢何紛披䍐罼鈹㦸開黄麾屬車􅨴轔霹靂移侍郎御史冠峩危圓扇孔雀雙趐垂辟邪白澤飛麟麒金輅赤馬火鬛鬐飄飄鳯蓋翳華芝水光鐡甲羽林兒二十四仗驅熊貔長殳濶劔梢魍䕫團花綘袖武士衣大小不同雖異宜要之盡是聖賢為竒服怪玩一不施斥之所以尊皇威汪子之文正類斯一十五軸紛葳蕤爛光直欲紙上飛長篇短篇傾珠璣題説論序及賦詩篇雖不同皆有歸要之孔子韓退之留讀旬日不知疲大渇適得甘露飴我欲誦記留肝脾惟吾老鈍無記持又無小吏操筆揮或可寫留慰朝饑二者不遂其齎咨今復奪去心黭黟室中斗覺無光輝靈寳不可留洿池風雨送還滄海湄嗟我居陳踰歳時兩耳無聞如塞泥遂恐聾聵不可醫子來乃得時攻治摐金伐石鳴皷鼙氣豪却似相凌欺因子文章張我師使我發此狂簡辭梁卦孫過飲手搓兩眼睡巳足落花滿床紅飄颻山鳥不須報春曙清明自放端門朝夜來賔客偶過我呼奴留客解金鑣花枝顛倒插翠㡌酒杯傾潑淋春袍更深客去我亦醉畫簾殘燭香初銷俛仰之間乃陳迹酒醒夢斷還無聊白雲已抱日光落春水自共東風揺聖賢勞心當萬事吾徒掃榻頻相招好花欲盡速來飲為君倒甕傾春醪和人柳溪三月二十七春叢已半空細草著露作團緑落花擁溪相壓紅南北遊人歸未歸日斜飛絮撩東風汪正夫云巳厭游湖上顧予猶未數往遂成長篇寄之君已厭折湖上花我猶驅迫坐兩衙湏知樂事屬閒客日日攜觴不在家况君才力自少對取次落筆成天葩春風湖上與之敵豪放麗絶無以加幽巖絶壁無不到欲縁雲漢尋天槎頃屬勝游不得往猶如野馬絆在車眼看紅英零落盡長條已被緑葉遮春芳雖晚猶得在山丹正好紅相誇終當擺去百事役與君共躡南山霞雖老猶能沃金葉卞娘送以雙琵琶巳教樓下排花舫醉倒碧山春日斜寄題明州太守錢君倚衆樂亭使君何所樂樂在南湖濵有亭若孤鯨覆以青玉鱗四面擁荷花花氣揺紅雲使君來遊攜芳樽兩邉佳客坐翠裀鄞江鮮魚甲如銀玉盤千里紫絲蓴金壺行酒雙美人小履輕裙不動塵壯年行樂湏及辰髙談大笑留青春遊人來看使君遊芙蓉為檝木蘭舟横簫短笛悲晩景畫簾綉幕飜中流貪歡尋勝意不盡相招却渡白蘋洲日落使君扶醉歸遊人散後水煙霏紫鱗跳復戱白鳥落還飛豈獨樂斯民魚鳥亦忘機使君今作螭頭臣遊人依舊歳時新空餘華榜照湖水更作佳篇誇北人為題小靈隱修廣師法喜堂浮屠藏家多在山飛舟跨海煩往還不如廣師開此堂清曠不减山中間前有怪石天所鑱莓苔糢糊蒼鬼顔我時跨馬來扣闗訪師對石終日閒代人上明龍圖兇徒盗覆甘陵城白日堂堂梟呼鳴生靈十萬陷死地長刀大㦸交縱横留都丞相統河北雷霆四馳諸侯兵鐡林舍圍三十里甲光如水魚鱗明風霜曠野苦暴露未得䑕子腥吾烹天子憫惻覽羣議冠蓋滿朝賢公卿安得破賊如裴度開封大尹宜其行公拜稽首出就駕畫斾獵獵蟠虬獰沛然德澤隨車來一煦萬物皆發生士卒奮怒爭以死遂窮巢穴誅根萌平賊之功無與讓當見大軸歸老成夔臯拱列帝舜坐願補日月歌太平題闗彦長孤山四照閣湖山天下之絶境羣山繞湖千百重碧笋四插明鏡外此閣正落明鏡中緑波一穗掃沙尾擁門盡是紅芙蓉清香斷處接蒼靄緑蘿攀樹登髙峯當軒不置忩與檻湖光山翠還相通側耳似聞天上語接手便欲飜長空忽疑躍入畫屏上但覺毛髪生清風光景動蕩失天地直與顥氣爭雌雄君何容易得此處著意鑱鑿由天公西湖雖然多佳境游人到此景遂窮昔日郎官退居此足踏藤履手攜笻時陪金壺宴親舊船飛兩檝如歸鴻溪魚鮮白玉膏脆林果紅熟燕脂濃揮弄清泉倚蒼石當時即是神仙翁又况諸子盡奮發緑袍照爛時相從我來登覽但歎息有家不得居江東至今此景常入夢尚有清氣留心胷屢䝉書尾追拙唱强臨紙札誠難工湖山有靈必見笑便與棄擲無留蹤直湏收拾買鄰舍兄乎異日能相容
