body:
  text: 鄖溪集卷二十七宋鄭獬撰七言律詩昔逰小旗短棹西池上青杏煮酒寒食頭緑楊隂裏穿小巷閙花深處藏髙樓紫絲絡馬客欲起錦袖挽衣人相留逢春倚醉不自醒明朝始對春風羞夜懷獨倚青桐聼鼓聲參旗歷落上三更涼風卷雨忽中斷明月背雲還倒行賴有清吟消意馬豈無美酒破愁城是非人世何須校方外曾師阮步兵獨逰馬後獨擕一壺酒林間更解紫綸巾飛來白鷺即佳客相對好花為美人萬事易忘唯劇醉四時難判是殘春吳兒曾識陶彭澤又見羲皇一散民野步留著雲扉儘晚關穿林踏破紫苔斑虹霓渴雨欲下澗魍魎避人還入山石觜露煙孤歷刺溪腰纒草緑灣環野僧有意待明月獨倚一笻松竹間清明郊外桃葉青青杏子肥清明雨後舊花稀草翻蝴蝶日將晚門掩鞦韆人未歸春艷濃堪燒美酒湖光緑好染羅衣柳條滿插金車上一路香塵去似飛驟寒四擁蒼雲拂浪驚北風飛下海濤聲水搖氷骨凍未得雨作雪花開不成玉匣寶刀鋒欲折鐵衣戰騎力還生杏梢柳葉無聊賴為祝鳴鳩探晚晴晚發關山燭前行客捲征衣路轉平林入翠微家在白雲鄉裏住人從明月嶺邉歸來時未見梨花破别後方驚燕子飛緑樹連隂十三驛從今歸夢到家稀宿白雪驛春酒味濃殊不解繞廊倚柱獨徘徊蒼山碧樹共沉寂明月斷雲相往來細雨忽飄溪外去好風却傍竹間回朝來巳有西歸燕為問庭花幾日開再至會稽自憐多病趂朝稀合引朱轓東路歸名姓未通丹陛下夢魂已過浙江飛人生如意即為樂世事驚心漸覺非正是春風催酒熟蝤蛑霜飽蛤蜊肥金陵道中六國相排一局棊岸頭百草野煙微樹深啼鳥自相失山靜晚雲猶未歸濡口潮回殘照滿石城春盡亂花飛周郎屈指圖天下誰道江南玉鱠肥汴河夜行汴流長恐日夜落夜行愁殺刺船郎櫓聲驚破老龍睡船底觸翻明月光大兒燈下尋難字小女忩間學剪裳自笑病夫無所事一尊身世兩相忘下第後與孫仲叔飲萬里青雲失意深畫樓酒美共登臨不羞獨落衆人後却是重辜親老心一缺不完非折劒至剛無屈是精金男兒三十年方壯何必尊前泪滿襟江上蘆葉蕭蕭江上秋鰣魚清酒解消憂雲才散後月當浦潮欲來時風滿樓好景未應輸白鷺飛塵終不到扁舟晚來天卷蒼霞盡萬頃玻璃爛不收次韻汪正夫對雨雨氣飄蕭動竹齋驚秋髙思若為裁壯心雖被愁催去歡意須慿酒借來雲腳一從邊地合風頭半是海潮回長汀從此傷搖落獨有騷人最費才雨餘飛雨淙淙萬弩奔雨餘氣象變朝曛長虹挂雨出青嶂落日翻光燒赤雲得水跳蛙惟召閙投林棲雀自求羣欲尋方外無窮樂更滿梨花四五分水館繞舍清流淙碧玉塵懷開闊灑然醒窗櫺風入秋氣活橋腳倒撑天面清露濕風標紅芰老雨生鱗甲伏龍腥將書借取琴髙鯉從此橫騎入杳冥春盡二首春盡行人未到家春風應怪在天涯夜來過嶺忽聞雨今日滿溪俱是花前樹未回疑路斷後山才轉便雲遮夜間絶少塵埃汚惟有青泉漾白沙禁籞平明帳殿開華芝初下未央來人間彩鳯儀韶曲天上流霞滿御杯花近赭袍偏燦爛魚窺仙仗亦徘徊蓬萊絶景何曽到自愧塵蹤此一陪松陵道中蕭蕭落日荻花林秋浪陂陀快醉襟江上碧峯偏入眼沙邉白鳥最知心百分美酒酬雙鬢一覺髙眠敵萬金聞道鱸魚屬張翰飛帆欲過五湖尋次韻丞相柳湖席上湖上春深不見沙畫橋飛影入晴霞園林到處消得酒風雨等間飛盡花令罰艷歌傳盞急詩成醉墨落箋斜蘭亭樂事無絲管待與羲之子細誇早朝馬上口占赤城橫絶六鰲頭夾道欄干覆御溝殘月畫樓雙闕曉涼風緑樹萬家秋聨飛羣鵠愧豪彥醉卧落花思舊逰御史臨班望天陛紫雲飛繞翠雲裘早朝花鬛斑虬駕早朝玉欄宫殿壓雲濤九州畫地中原壯萬象橫天紫極髙日月輝明留闕角龍蛇蟠結動旌旄羣仙遙望蓬萊拜五色非煙繞赭袍恭和御製賞花釣魚輦路鮮雲五色開一聲清蹕下天來水光翠繞九重殿花氣醲薰萬夀杯繡幕煙深紅匼匝文竿風引緑徘徊蓬山絶景無人到詔許羣仙盡日陪題垂虹橋寄同年叔楙祕校劉孜字叔楙原父之弟時為吳江尉乘虹橋又名利往橋三百闌干鎖畫橋行人波上踏靈鰲插天螮蝀玉腰濶跨海鯨鯢金背髙路險截開元氣白影寒壓破大江豪此中自與銀河接不必仙槎八月濤檇李亭間抱琴書檇李逰仙壇古屋一笻留驛橋通市人沽酒湖水依城客放舟葵扇桃笙聊却暑蘋花楓葉巳知秋坡翁仙去詩聲在寂寞林塘卧白鷗月波樓古壕鑿出明月背樓角飛來兔影中野色更無山隔斷大光直與水相通溪藏畫舫青紋接人住荷花碧玉叢誰把金魚破清暑晚雲深處待歸風題淮隂侯廟漢髙不得淮隂將天下雌雄未可知力勸君王回蜀道便擕諸將破秦師故人斬首誠非䇿女子隂謀遂見欺終使英雄鑒成敗未圖功業自先疑初春欲為小飲先寄運使唐司勳運判張都官人生長與賞心違莫遣樽前笑語稀老去未羞花插帽醉來不怕酒淋衣免聽畫鼓催朝去且駐金鞍待月歸休道東風猶早在落梅巳撲翠苔飛九日登有美堂點檢東山窈窕娘直須醉倒為重陽山光湖水一時好酒面菊花同色黃便好共謀長夜飲未應排出少年場傷時感舊知何限還憶荆州落寞鄉次韻張公逹逰西池醉漾蘭舟不忍歸斜陽已落碧雲西天開銀漢水初滿春入武陵人自迷殿倚鼇頭連繡幕橋飛虹影度金堤遊人不惜殘花地無限落紅粘馬蹄吕稚卿公孺唐彥範詔並賦遊西池亦成斐句青翰龍舟雲外橫黃金殿閣鏡中明波光柳色恰相似酒味人心俱有情醉灑珠璣留滿紙晚騎鸞鳯下層城遊人應解笑狂客隔水映花聞語聲同彥範謁仲巽飲之甚樂仲巽且有北歸之期情見卒章輒用寫呈明珠堆滿赤金盤未買花前笑倚欄特地尋春難約伴等間擕酒却成歡人生試把從頭算世事何煩著眼看莫怪夜深猶換燭它時相望在長安再和海棠亂插滿雕盤為愛繁梢更繞欄顧我有情還惜别問君未去且留歡錦裀只就花邉卧紅袖偏宜燭下看若背荆州容易去故人於義未為安逰金明池萬座笙歌醉復醒繞池羅幕翠煙生雲藏宫殿九重碧春入乾坤五色明波底畫橋天上動岸邉逰客鑑中行金輿時幸龍舟宴花外風飄萬嵗聲盆池緑髮柔莎碧甃連湛如蛟穴貯寒泉誰將寶鏡遺在地照見浮雲浸破天數鬛逰魚才及寸一層緑荇小於錢待將閙物都除却放出秋蟾夜夜圓李都尉瑋芙蓉堂堂上芙蓉花最饒開時不見玉欄橋來從洛浦見羅襪生在楚宫俱細腰何處仙人來跨鳯夜深明月好吹簫剩收秋蕊為佳釀醉入飛雲解畫橈東園招孫中叔花路橫梢已礙馬斷無人迹賞年芳緑楊成穗點著地胡蝶作團飛過墻不奈夢回多黯欎長因酒後得凄涼期君待與春翁約買取東風任醉鄉次韻元肅兄汴口阻風風阻浪頭如駴馬險於天塹欲催車却隨宿雁留寒渚深羡飛雲籋碧虗對酒客懷真土梗滿船生計只圖書世無勇奡擕之去不得連鰲作鱠魚次韻元肅兄三題汴渠夜泛汴渠夜泛亦快意月射長波如斷氷不見湘靈揮寶瑟空教水怪避犀燈煙雲疊影相虧蔽星斗翻芒互降升好蓄金錢多買酒滿船載去覓嚴陵雨夜懷唐安歸心日夜逆江流官柳三千憶蜀州小閣簾櫳頻夢蝶平湖煙水已盟鷗螢依濕草同為旅雨滴空階别是愁堪笑邦人不解事區區猶借陸君留蜀人舊語謂唐安有三千官柳四十琵琶濕螢依草沒梅宛陵詩過魏都憶把貂裘買玉壺重來不敢解金魚當時曽謁將軍府今日還乘使者車歌管漸非人去後樓臺依舊雪消初韓門弟子偏怊悵泪滿潮陽耆舊書勸客飲誰解西回滄海波且聽白苧數聲歌人生所得只如此世事到頭無奈何酒海莫教空濩落金堆安用欎嵯峨古今共是一丘土只有劉生得計多初入姑蘇會飲涼風飄灑入髙閣滿城緑樹飛雲濤渴來夢吞滄海濶醉後眼挂青天髙湘江姹女碧瑶佩金谷謫仙紅錦袍吳兒柔軟不慣見應笑儂家詩酒豪江正夫飲遐舉家留佳什僕酷愛其金斗玉泉之句輒次髙韻相逢漸向白頭年世路諳來盡付天六印雖多終是客一壺才倒即為仙穿天入月捉詩句捶鼓插旗飛酒船長願醉眠渾不醒虗名安用俗兒傳次韻梁天機見寄一聽秋聲鬢已凋孤心驚起拂星杓輪囷自分為蟠木濩落寧堪作大瓢新篋唱酬詩草滿舊衣傾潑酒䀶消髙篇已許臨佳菊更作欄杆護翠條往年與劉元忠諸公尋春夜歸今茲卧病感而成篇巳醒又醉倦逰客乍雨却晴寒食天共繫紫騮芳樹下却隨紅燭落花前層城已報黃金鎖外苑猶貪碧草眠明月春風依舊好竹溪散盡酒中仙喜吳幾道遷右正言知諫院精金喜入陶鎔手玉鑑直須明主知志士本來能許國古人所恨不逢時漢成不用朱雲劍舜帝嘗聞大禹辭莫道孤居無感激挼挲兩耳聽京師戲學張水部贈河南少尹河南少尹鬢如絲甪里先生是吏師花下放衙因試酒竹間留客為尋棊年勞只許抄書數月俸長留買藥資已説開春須上表終南山下乞分司施君作詩贈謙師亦求拙句乃作五十六字綴其後聞道天台謙上人溪魚野鳥共忘形林間無事結跏坐石上更安圓覺經定處只應山鬼護講時還有海龍聽何年蠟屐緣雲徑一叩靈仙不死庭送曹比部赴袁州船頭獵獵兩旗翻六月江風灑面寒一日却稱新太守十年曽是舊郎官中間憂患誠為甚向老風情亦未闌紫背蛤蜊白醪酒開尊長解憶長安次韻元肅兄見喜知荆州二首踰年謬掌鳯凰詔擇日拜章藝若庭擁節笑歸江漢國飛帆醉拂斗牛星留連物景詩千首凖擬交親酒百瓶共採芳蘭晨事畢不妨兒姪夜橫經西風原上鶺鴒鳴喜見朱旗畫獸獰塵袖漸拋秦地逺雲帆聊作楚江行人家掩映寒塘水秋物鮮明緑樹橙欲表新阡在鄖國不同張翰浪逃名余以襄事乞守荆州憶泛西湖四面青山紫繡圍平湖萬頃碧羅衣風搖酒面金鱗活月弄波光玉篆飛醉客半眠紅燭下畫船行唱採蓮歸十年衣袖遮塵土惆悵飛雲滿翠微次韻石秀才淮上偶作出汴忽如魚脫網長淮萬里斷煩囂白雲已抱日光轉碧浪更和天面搖自此乘槎須犯斗誰能鞭石解為橋玉京醉客無消息不及蓬山兩信潮酬盧載三百年來無作者杜陵氣象久焦乾縱吟一夜鬼神哭開卷滿天星斗寒渾脫無蹤疑造化塵泥有意汚波瀾傷懷刻句無人會寄與江南庾信看舟次蕪湖却寄維揚刁學士柳葉初黃未解飛東風還與賞心違縱逢春處花期少自過江來酒病稀平子解酬青玉案秋娘能唱縷金衣揚州二十四橋月長憶醉乘明月歸夏夜淮上寄隨子直天面玻璃滑欲流淮光浮動浩難收夜涼明月都如水雨後清風却似秋幾日重來還把酒一回相憶却登樓窮愁著得新書就好寄雙魚碧海頭曹伯玉駕部琰相會於姑孰既别得書及詩因以拙句奉寄東風綽約過前溪碧草纎纎苦未齊春到好花隨處有醉來佳客不相擕髙眠未博黃金印秀句如鐫白玉圭倒指驛程今甚處畫船應過楚江西君將退居故有髙眠之句素風堂頴水纎纎清露石仙翁於此買煙村唐朝三百盛冠蓋丞相幾家餘子孫耀世文章雖已逺傳家清白至今存由來人物能相繼又見芝蘭秀一畨致政李祠部畫省仙翁緑鬢斑林間髙挂兩朱轓更無歸計買泉石欲以清名遺子孫間作好詩消白日都將生事付清尊嗟豫憂病為疏濶不得擕笻奉笑言尊酒還成世外名二千石印一毫輕驥雖老去壯心伏鶴自病來仙骨清祠部以病引退今益清健林下已能忘嵗月人間何必仕公卿淮陽塵土無佳賞每見山翁眼乍明寄長沙燕守度魏都南館相逢日鬭向春風倒一尊連夜花門駐歸騎即時席上插降幡雲藏夢澤煙蒲老秋卷湘江雪浪翻聞道玉厨新釀熟莫將餘瀝酹潺湲送頴川使君韓司門喜君又佩魚符去駟馬雍容朱兩轓自昔諸侯頴隂國太平宰相魏公孫水邉日落旌旗暗花外風髙鼓角喧到部行春應未晚緑村正是杏梢繁次韻程丞相牡丹曽倒金壺為牡丹矮床設座繞花壇有人偷插玉叉上到夜更留銀燭看醉裏春風遺翠帽歸時寒月送雕鞍如今蘭棹催西去惆悵明年誰倚欄寄關彥長景仁黃金斗印未垂腰繞舍湖山弄翠濤飢鳯羽毛寒不鎩卧龍頭角老方髙樽前襟抱生平盡醉裏文章氣格豪休論升沉向衰俗功名到底屬吾曹次韻酬項城姚子張到縣感事膠西童子近之官坐按春秋討隱桓子張善春秋休歎折腰向彭澤猶勝索米困長安來篇喜見萬金字厚報恨無雙玉盤莫就白雲買煙艇磻溪久已棄魚竿送郭元之東下梢梢十幅健帆風大醉長歌下浙東甲乙未能求將相詩書多是誤英雄百年盡寄間心外萬事都拋冷笑中白面書生少竒䇿不知誰建太平功送隋孝亷之官桐廬萬乘君王曽降詔弊裘瘦馬入咸秦太平䇿略三千字天下英豪二十人隋君用詔書特起試䇿同時舉者二十餘人自合乘時攀日月如何隨衆走風塵桐廬主簿官雖小百里之間亦有民賀張公逹暮春寄宋使君獨繞欄杆正惜春不堪西望隴頭雲弄煙細柳才三尺著地殘花厚一分梁苑草深平似尉秦關山暖翠如薰騎鯨李白時過我未引金尊先説君再和使君擕酒送餘春縹眇髙懷倚白雲新曲旋教花下按好題只就席間分阮公醉帽玉山倒謝女舞衣沉水薰自笑塵埃滿朱紱良辰樂事兩輸君寄題沖雅虗心亭髙僧酷愛翠雲枝雨後新隂翠入衣為恨煙溪生處逺自尋雲徑斸將歸有時風雨鬭不解只恐蛟龍活欲飛好向繁梢結秋實丹山正是鳯凰飢張寺丞次山見訝久不致書兼惠佳篇輒用奉答數日看花生怕遲杭州更有亂花圍為貪擕酒尋春去不及修書趂雁歸且擊壯懷期篆鼎莫緣華髮便沾衣來詩有二毛之歎誰知寂寞寒山外萬里蒼鷹正苦飢叔髙有壯志而少有知者奉詔赴瓊林苑燕餞太尉潞國文公出鎮西都都門秋色滿旌旗祖帳容陪醉御巵功業逈髙嘉祐末公至和中首陳建儲之䇿精神如破貝州時白居易獻裴晉公詩云聞説風情筋力在只如初破蔡州時匣中寶劍騰霜鍔海上仙桃壓露枝公之子近有登瀛之命昨日更聞褒詔下别看名姓入蒸彛送程公闢給事出守會稽兼集賢殿修撰越州太守何瀟灑應為能吟住集仙雪急紫濛催玉勒公奉使方歸紫濛北方館名也日長青瑣聽薰絃一時冠蓋傾離席半醉珠璣落彩箋自恨君恩渾未報五湖終負釣魚船寄程公闢念昔都門手一擕春禽幾向苧蘿啼夢回金殿風光别吟到銀河月影低舞急錦腰迎十八酒酣金盞照東西何時得遂扁舟去雪棹同君泛剡溪送公闢給事自青州致政歸吳中公闢即程師孟青瑣仙人解玉符秋風一夜滿江湖曽歌郢水非凡曲未掃旄頭負壯圖公昔北使憤然屢抑敵人終日望君天欲盡平生知我世應無扁舟應約元宫保瀟灑蓮涇二丈夫按元宫保即錢唐元章簡公絳蓋嘗寓居于蘇州鄖陽道中白馬春風緑草長行人踏破碧溪光隔山啼鳥自相應臨水幽花應更香壠上驚飛青尾雉桑間間立蒨裙娘白頭關吏還相問不信相如是故鄉豫去安陸二十六年矣送石中允象之致仕歸新昌鳯凰山下網羅疏翠翮搖空去有餘陶令已拋彭澤印謝敷今作會稽居碧峰四向晚吟處啼鳥數聲春醉初更放魚舠鑑湖上芙蓉香裏卧看書吳比部瑛致仕歸蘄陽蘧公四十已知非長揖公卿卧翠微結綬才還雙闕下上書便乞故鄉歸伏轅赤驥相隨老出網𡨕鴻自在飛應向黃梅訪逋客白雲飄灑紫荷衣送宋屯田之湖南轉運判官緑綬郎官笑白頭更擕龍節領諸侯摶風初擊三千水投刃方排十二牛行色未拋京洛地先聲已壓洞庭秋漢家刺部官雖小一鑑寒氷照八州送陳睦赴河中幕紫皇初放第三榜中有英豪絶世無君之先公與豫先大夫同年登科天廄本生騏驥子雲霄又得鳯凰雛今君又取甲科不須虎鬭終全趙自是龍驤首破吳廷試君本第一雖作蓮花帳前客丹臺到了姓名殊南歸呈王樂道漸少塵沙眼漸開駸駸歸騎不須催春風自過燕山好寒色還從易水回歸雁却飛天北去白雲應傍日邉來行行上苑花如綴共獻君王萬夀杯聞南陽吕諫議誨長逝子文三仕去何頻一卧南陽竟沒身明主自應容直道皇天何事殺忠臣拄天力屈空留草貫日心存不化塵黃壤不知人世事為君慟哭楚江濱哀蘇明允豐城寶劍忽飛去玉匣靈蹤自此無天外已空丹鳯穴世間還得二龍駒百年飄忽古無奈萬事凋零今已殊惆悵西州文學老一丘空掩蜀山隅傷賈老世事一毫不挂眼放懷只用酒為年巳從車後擕一榼更向杖頭留百錢顧我曾傳丹鼎訣疑君便是紫芝仙忽如蟬蛻不復見雨壞茅齋八九椽樊秀才下第平時愛子多集句此日金刀得剪裁自謂羅中先得雋豈知天外巳遺才爐開遂失黃金礦石劃猶藏白玉杯獨倚西風倍惆悵却憂車馬到門來張李二君獲薦喜而成篇兼簡岑令蔣椽榜帖初傳見姓名喜來把讀繞欄行長風又送二龍去二君俱嘗為解頭明月已看雙桂生羣玉聚來俱是寶真金鍊出始為精省試七千人而解二君雖知自是文章得須待秦臺寶鑑明勉學者繞座羣書如纍玉夜燈忘睡晝忘飢文章須用聖賢斷議論要通今古疑孟子豈無仁義國荀卿猶作帝王師太平岐路安於掌好跨大宛萬里馳自貽烏巾笻杖白雲夫寄謝黃公舊酒壚懶性惟看髙士傳歸心空展舊山圖病來瘦骨支離在老去歡情積漸無啼鳥落花應怪問緑塵何事滿金壺衰疾大夢為生固有涯屢攻衰疾可驚嗟時於耳竅嘯秋蚓併向目睛飛黑花門外挂羅同翟尉座隅占鵩類長沙豫病輒有眼疾支離猶食三鍾粟買取溳溪好住家山中桃花春入關山亦未遲苧蘿山下見西施不羞白髮欺雙鬢且對清尊插一枝縱落不隨流水去儘開惟有白雲知何須惆悵無人賞自有春風二月時同賈運使昌衡章職方俞王推官輔之賞梅花前留客解金鞍揀遍繁梢盡折殘翠帽插來無處著玉盤收取與人看無言有意空相對欲去重來更繞欄把酒殷勤須會取風頭只待作春寒雪中梅臘雪欺梅飄玉塵早梅鬭巧雪中春更無俗艷能相雜惟有清香可辨真姑射仙人氷作體秦家公主粉為身素娥已自稱佳麗更作廣寒宫裏人菊寶釘萬數擁寒枝寂寞幽香蝶亦稀未把玉欄移得去直須翠帽插將歸定逢野客尋常折忍逐秋風取次飛好佩一樽相就飲醉來從遣露霑衣
