body:
  text: 鄖溪集巻二宋鄭獬撰制皇伯章德軍節度使濮國公宗樸可檢校左僕射同中書門下平章事充彰徳軍節度使濮國公制門下朕膺符赤伏之靈繼序炎精之烈圖本支之盤固倚形勢之挾維示天下以强則周世饗懐柔之治教天下以睦則堯民陶於變之風繄我宗藩推尊帝室雖懋帥旄之寵未參公衮之華孚告大庭踐敭顯命具官某器含亷静徳履端純聳俊望以髙騫奮䧺才而獨秀玉符傳瑞拜於上將之壇金輅啟封胙以先王之國肆予纘武霈灑湛恩豈於懿戚之賢獨被褒章之晚是用載涓剛日特峻彛儀秩兼揆路之榮位躡宰庭之貴衍疏真食増煥隆名於戲盟載册書尚推同姓之長賜均寳玉况如伯父之尊立愛自親承流及逺恊成美化勉著休聲可皇兄宿州觀察使宗懿可封濟國公制朕惟聖祖神宗之子孫頎然而在列者咸得以分茅胙土以世相及所以明親親褒進有徳以示宗寳之蕃盛皇兄具官某神宗之後而安懿王之長子友愛之徳稱於其家乃以東方之社建爾於歴陽用繼先王之餘烈爾其悉心務徳迺惠迺順以作藩輔無隳我之休命可皇伯集慶軍節度使檢校尚書左僕射兼御史大夫上柱國虢國公宗諤南郊加食邑功臣制門下圓陛薦嘉禮接三神之奥端闈孚號澤涵一氣之和下漸乎跂行喙息之微逺暨乎卉服穹居之長矧予懿属為世顯侯宜煥發於宸章用鋪昭於靈祉皇伯具官某惠心孚物雋徳兼人嶷如屏翰之强鬱然宗室之望方欽柴而展寀嘗委佩以相儀雝雝來止之容翼翼盡恭之意輔成鉅典宜茂沈恩既有嘉册以啟金輅之封豈無顯號以賁龍旂之績兼倍増於書社併敷告於治庭於戲上帝之嚴維烈祖是侑上天之貺維伯父是膺不獨講明惠之文又以著展親之義勉思率履以光寵名可皇弟左武衞大將軍建州刺史克闢贈觀察使右監門衞大將軍克貴贈防禦使並封侯制朕惟兄弟飲酒之飫升堂而相樂所以明恩義之厚况夫奄忽長謝得不為之慘怛出涕而又思有以褒其遺美而賁之幽壤庶乎以極哀榮之致焉皇弟某生于予家信厚而自立靖恭以持位足享耆耋而忽先朝露與物而代去朕甚悼之其以廉車禦侮之優秩並開侯社用申襚典之重九原可作汝其歆受可皇姪克温可贈洺州防禦使追封廣平侯制勅王者惇睦九族以致萬國之和朕惟本支之隆驩然接存之愛靡不篤也惻然哀往之禮靡不厚也所以廣親親之道而率之天下也具官某承世徳之楙參時哲之良威儀穆于内朝行義推于宗屏謂享遐福以榮天枝忽聞訃音用震黼扆加兵防之贈禭啟侯社之追封緬惟幽途歆我愍典可皇姪世儀可贈郢州防禦使追封富水侯制勅王者推親親之道所以厚天下之風也予傷本支慿世系之慶列宗藩之英務學自篤休有文雅之問樂善亡厭居逺華靡之習茫乎孰宰命至奄謝禭以兵防之秩苴以侯社之封泉途可榮尚克歆命可皇姪宗魯可贈徐州觀察使追封彭城侯制勅王者立愛自親始所以教天下之睦朕于骨肉之義粲而不殊故寵有以厚存而哀有以飾終也故具官某表儀宗藩肅雍朝禁遽兹奄忽良用䀌傷襚以亷車之制徹兹侯社之封營魂有知歆予追惻可皇兄左衞将軍開州刺史仲行贈䖍州觀察使南康侯制詩有之死䘮之威兄弟孔懐而予之伯氏奄先朝露乘代而逝豈有不懐者哉具官某信厚自修動而不踰禮方期耆齒以藩王室天報不腆遽聞傾殞臨朝撫几為之哀愴秩以廉車之雄爵以通侯之貴併為優數以襚其殁親親之厚兹予所以懐之也可景靈宮使昭徳軍節度使開府儀同三司檢校太尉兼侍中上柱國金鄉郡開國公曹佾南郊加食邑制門下朕撫皇器之初攬紫庭之議在漢則即位而見祖於唐則踰年而命郊欽維真廟之紹休亦建㤗壇而肇祀肆余昧徳敢廢彛經載探越紼之文恭勅射牲之典維天錫羡與爾共縻具官某體醇茂之姿涵夷雅之量燕山紀伐廟藏累世之勲沙麓儲靈家擅外姻之貴適黄鍾之萌氣飭蒼輅以報天陽燎升而精意孚俎豆徹而美祥兆溢為嘉澤燦若褒章有懿號以茂功有豐租以陪邑於戲寳鼎神策靈符方賜於漢庭乘馬路車顯命宜褒于申伯兹實上穹之况匪曰冲人之私元舅勿辭徃踐寵數可皇弟㤗寧鎮海等軍節度使檢校太尉中書門下平章事岐王顥南郊加食邑制門下辰臨測景之圭躬即禮神之囿積燎乎髙丘而事君之義顯薦鬯乎太室而事親之教行既歆予以絜誠又錫予以嘉福函蒙四海發育萬靈顧肹蠁之來成敢積重而専有具官某徳隅嚴峙仁範渾深雝雝鴈序之和韡韡棣華之秀属初禋之受紱陪朝踐以奠觴維天地所以享一德之誠維祖宗所以懐大孝之美實資顯相遂厎嘉成豈無展玉之恩固有錫膰之澤増茂功於盟府衍多賦於爰田光我邦家莫如兄弟於戲白麟㳺畤已膺元狩之符丹鳳鳴山更進岐陽之律震靈光而下浹揚孚號以肆行勉圖磐石之勲共起安瀾之治可皇伯祖鳳翔雄武等軍節度開府儀同三司守太保兼中書令判大宗正事東平郡王久弼起復制門下居䘮不可凌節雖重於親憂於義有以斷恩亦先於王事維内朝之雋老冠王室之英藩將圖磐石之勲宜講墨縗之制載班顯册特涣豐恩皇伯祖具官某信厚禔身靜専毓徳蓋出神明之裔最為戚属之尊樂善不厭服東平之茂矩事親稱孝資髙宻之純誠保有令名藹聞衆聽属兹鉅痛纍爾戚容甫周卒哭之期盍舉從權之禮進登帥閫兼衞周廬凡在寵名悉其舊次於戲漢廷作鎮方推劉氏之宗魯國奪䘮何必徐戎之急蓋展親於天族庶修睦於民彜服我褒華永資夾輔可太原府兵馬鈐轄制大鹵之西北與羌夷接其俗勁悍聞桴鼓之警則攝弓而起惟恐其後羌騎憚之不敢南向而馳故朕常擢土人之豪傑為之將領以禦侮佚具官某忠義奮發習於武事甞用才氣雄於邊鄙經略使某奏課來上茂績著焉不有甄擢何以勸後乃以左帑之使俾轄戎事修爾戈矛以同王之所仇焉可帥臣制立秋而鷹隼擊秋分而微霜降遣師命將仗鉞而行所以順肅殺之氣而成暴亂之誅也具官某策勲王府忠勇無前更踐㑹藩兵政咸肅惟鬼輿之分涇水上游西控朔方以捍羌衆乃進以團結之任為朕藩屏若闐然鼓之使赴敵之士爭死先驅不見白刃之險者此其素習也秋風至矣暴揚我威武以謹察夫為暴慢者焉可夏竦制朕夙設右府以制武師考諸典刑蓋六卿司馬之任本之輔相為三事大夫之崇眷遇惟勤尊顯兼極具官夏竦學貫文武識通天人明足以斷大疑知足以任大事被遇先聖首中異科慷慨名卿之言雍容近輔之秀逮朕紹服歴踐柄司材謀逺出於諸臣論議有補於當世進退一節勤勞百為略平函夏之交則裔夷執玉綏靖大河之北則邊堠戢戈威名憺聞民譽允洽是用斷自朕志召登機衡遏流議於風波定成契於金石仍中軍之旄鉞兼上宰之印章褒進寵名加陪賦邑寵光渥縟恩意敦隆於戲為君之難知臣匪易任惟勿貳初必有終圖用舊人朕既稽於前憲肇謀王體爾當究於治功俞往欽哉秪服休命可罷夏竦制若時名器之重惟兼將相之隆雖中外之勢殊而股肱之體合以爾耆德挺揚大廷具官夏竦學通古今材憲文武造形之識符蓍策以前知决慮之精若利兵之必斷蚤經謀於二府嘗宣績於四方事勞實多夷險同致比付樞機之務載勤夙夜之心顧備罄於猷為抑久煩於志力宜從休秩庸厚老成往分留鑰之都進視帥垣之秩褒功衍食並峻等威於戲進而属之鈞衡以爾才且舊退則極於寵禄俾爾夀而昌遇臣之恩在予無愧可夏竦樞宻使制出殿藩垣是謀長帥入經王務實賴近臣矧夫帷幄之嚴蓋均衡弼之選宜孚廷告庸對朝僉具官夏竦業茂經綸學通精祲早事聖考嘗更要途肆朕纂承愈益親近向分推轂之寄且著撫邊之勤偃息便藩倐忽罙嵗眷言右府思任舊人庶資經國之謀以務戢兵之要地官還秩井賦敦封賜號褒功併推異數於戲勞師用武未免於邊虞務徳懷戎日恢於廟略勉圖忠藎庸答恩華可除韓琦制惟幾成務聖人所以體至神以爵舉賢羣士所以濟大業矧夫樞筦之任均於廊廟之謀必詢僉言審用材傑迺揚顯號以示至公具官韓琦器識精深機神爽邁早繇俊造之選擢升髙妙之科列於爭臣寘諸禁掖不汲汲於榮寵能謇謇於誠心嚮以羌人弗賔西疆謀帥往䕶諸將以寕一方入經帷幄之猷出領翰垣之寄嵗月洊易事勞居多宜輟司於計文且來遵於宻命優其視秩崇以褒功加地益封並隆彛數於戲萬機論政實圖朝夕之咨右府本兵尤重安危之計毗予治者維爾力之可樞宻承㫖左監門衞將軍任承睿可樞宻都承㫖制朕舉天下之機事統之西府而諸曹就列必有属長以奉乎㫖命以汝持身蒞職稱為㢘敏殆歴三朝至于耆艾閲其勞舊宜有以序遷褒寵之澤爾其祗服無怠可瓊州監押李文仲酬奨可内殿丞制本道使者言汝䕶兵於瓊管海夷錯居安而不擾秩滿第課請如甲令加賜夫惟信賞必罰確若金石朕方執此以礪世焉其勿從可乎可大理寺丞蘇軾可殿中丞制汝以髙文大册伏對於大庭忠言俊氣直出諸生之右宜擢之不次絶羣而進尚可嵗月之累耶夫奏言試功大舜之所以治也凡汝所言者朕既得之而其所試者今又載於有司稍遷以通籍勉爾志業以需不次之澤可大理寺丞致仕朱臨可殿中丞制爾以文中科不顧斗粟之禄去而歸故鄉從容乎湖山之樂不亦髙乎屬兹均澤進秩一等此赦令也而爾之齒甚壯尚不欲攖之以吏職者亦將遂爾之雅操焉可三司使制某官某朕嘗以為翰林之職髙文大册為當世宗工甞任以開封尹桴鼓稀聞為三輔第一更履内外可謂有成績矣今三司使既已進輔大政當擇能者以為代考之於羣臣無以易卿者方朝廷功役衆興常賦蹶而不能給天下之利其必有遺落而不收者矣爾其専思熟計發明大册撥其利源而更濬之使夫金錢紅粟流衍乎路衢而積滿乎府庫以足縣官之費可不為大功也邪勉哉其恭承朕之明命可兵部尚書可三司使制古者諸侯各食其賦故司㑹之職為簡而易舉由漢而來天下斗粟尺布之出納一歸于大司農則非夫聰明彊力深通夫儒術者居之則百利之源或幾乎涸矣具官某雅徳淑問溢於當時大事能斷先帝器之向以大司馬之任總治七兵而戎容武節赫然四馳今大司農缺遴選於衆毋易於汝者方朕之踐阼賜予之廣陵寢之役大費並出爾其通有無之數均發斂之期上以實吾國下以裕吾民俾夫萬貨之多其出如泉源其積如丘山糞壤之間皆有餘幣則朕馮几以觀天下富庸非汝之力邪可三司判官制五首朕嘗考郡臣之能籍其髙第者志之以備臺省乃得某明智自將深於應務某忠樸不阿長於持正此皆朕之髙第者也今司㑹缺員釋此而不取更欲外求耶爾其徃佐度支鹽鐡之職謹守財賦無虚朕之命籍焉可荀子有言儒術行而天下富然後昆蟲萬物生其間可以相食養者不可勝數也今舉四海之積藏之於公府僅能當嵗計或不足則斂之於民豈操其術者非邪以汝明白有知數深於古今治亂乃用咨擇任為大司農之屬官調其度量演其籌筴以深思致天下之富焉可食出於田貨出於山澤財用之源也暴征之則下竭薄取之則上不給量其出入之度以操其術者在吾司㑹之府焉以汝才數周敏過絶於人將漕淮右京師之積有羡今用以佐吾司㑹必能演籌筴調其盈虚上積於公府下溢於民室以副吾之選擇焉可舊制三司屬官缺大司農得以擇其能者而次補之今三司使某言爾之才明白強力長於治劇可用為屬官夫大司農朕之所舉也所舉惟其賢則賢者必能推其類而進之安可不聽大司農之言哉可朕嘗用某官為三司使思得才能强濟之士以佐其治迺下丞相府俾擇其人丞相言爾通敏無滯可用為判官惟朕既能選三司使而無廢職今丞相乂能擇其屬官則天下之大計可以無憂矣可四廂指揮使制二首漢以中郎將掌三署郎執㦸宿衞於殿廬今虎旅之都帥猶漢之中郎將爾嘗以忠謹佐騎兵環徼道而侍夙夜有勞宜用次補以副衞將軍之職昔楊惲為郎將罷山郎移薦舉髙第三署郎莫不自厲爾其嚴法令明白善惡以率其不恪庶乎朕期爾於楊中郎也可今之提虎旅以直嚴更之署者猶漢之左右羽林之制武服之臣最為要官某沉毅而斷通於兵制攝弓撫劍以障河隴之戍蓋有能名俾陞刺部入掌羽衞擁虎㦸以䕶建章勉圖忠效富貴之漸行來逼人矣可功臣後制三首朕之烈祖被戎衣以取天下其躡風雲而起者皆豪傑不世之士竒謀偉跡鏤於丹書嗚呼古矣朕不可得而見也思見其子孫之賢者將尊榮之以繼其風烈某沈毅忠宻出入禁闥逮事先皇帝功効明白而滯於使列既已久矣其増以部刺史之秩以旌其能爾其修慎勉力以纂其祖功如召虎之於召伯也不亦美乎可王公大臣之後竟零落而不聞者朕甚憫焉故於郊祀赦書俾求其嫡系且將推禄以及之如聞爾等修潔皆為佳公子此真朕之所欲得也無以一命為薄爾其勉圖忠力髙爵厚禄朕所不敢私吝也可粤十一月甲子朕躬執籩豆以見烈祖神宗於大廟伏思創業之際二三佐命元老其后世廢絶亡一人在禄籍者朕蓋傷之是用申命俾求其後乃得爾等並以一命俾之登仕昔楚王思子文之功曰子文無後何以勸善朕亦將勸臣下之為善者也可祁州防禦使知代州劉永年可鄜延路副總管制髙奴之屯帶甲百金之士十餘萬以捍西羌屬之才武兼䕶一道折衝制勝以贊夫元帥而左右之以爾具官某忠厚有謀事至而能斷析符代北風聲懾乎外境属兹易帥宜用進褒夫厚而不能使愛而不能令譬如驕子不可以用此正今日之通患也爾其勵之以勇肅之以威進退死生在我而已豈非善耶可
