body:
  text: 鄖溪集卷四宋鄭獬撰制三司鹽鐵副使衞尉少卿陳述古可光祿卿充河北都轉運使制大河之北蟠亘數千里北與匈奴接雖無事時束其弓甲而藏之然官吏有治否糧餽有虚實槩於一道可無督視廉按者哉具官某名家之雋高材勁邁事無劇易沛然而有餘遂用佐吾大農以蕃衆貨海王之國厥賦出焉按籍醻庸俾陞於大僚維是北道皆以屬汝攬轡而行朕何爲而顧憂哉可天章閣待制可都轉運使制漢之麒麟天祿以藏圖籍於内禁今實中祕之書悉貯於天章閣博求道德經術之士以待制命兹實儒林之佳選以爾辭學中科治行明茂嘗任諫列數進忠言有仲山甫補袞之美遂用佐吾大司農以計國用財貨流衍厥政用乂醻庸有典乃陞爾以圖籍之選夫關隴之右宿兵數十萬拱手以待哺爾其爲朕將漕以飽吾師仗節而西吾何爲而西憂哉可逐便人高師說可檢校水部員外郎深州團練使制朕既即位解其衆故思與天下更新於其敗累而失職者皆得敘進於有司而加之秩命則於汝之久斥其可獨遺耶可莊宅使康州刺史折繼祖可本州團練使制折氏世爲守臣以障西夷忠孝顯著編在令甲乃祖乃父咸被褒寵今爾繼祖開爽有計數控服部族偃旗而息先皇帝時既有俞命而使者剡章又列其治效請賜爵秩服維先皇帝之俞命敢不恭承哉夫不規近利以存遠略此正汝之所務而朕之所取也勉終來譽以嗣汝之先烈可秦鳳路鈐轄左騏驥使向寳可皇城使再任制魏侯廟廷之饗上功席前行次功席中行無功者處後秦人奪氣不敢窺西河者以賞罰素具也幕府言爾提兵絶塞明習事機艾旗斬馘數履行陣更書甫及宜有以褒擢朕甚嘉之增秩留任併示醻庸爾其率勵壯猷行取銘鼎之勲奚特饗於前仃而已哉可京苑使王易可皇城使制朕列師屯於坤維擇爾爲之偏帥其行也進律一等以爲戎列之雄維爾之明果夙建武節屢擁麾符咸以治績聞今付以蜀郡之兵兼䕶西道蓋亦重矣夫威克厥愛乃能濟務董齊士衆爾其勉之可内藏庫使曹佺可皇城使制朕聞曹冀王用兵破數大國而不妄殺一人故其子孫蕃大佩紱而朝者比諸將之家爲尤盛非隂德之然耶惟爾忠謹自脩涖官稱治重以母后之近屬累日計勞遂冠乎使列然則大勲之後自以材能不獨以外家私恩進秩也可皇城副使石守正可儀鸞使制羣司之置使所以宅才武之臣序遷次而明陞黜與夫尚書諸曹郎相等用課最而至此者亦已爲通顯矣以爾祗靖愿慤赴功以敏比課於有司法當增秩躐等而進庸示我之嘉寵可皇城副使知安肅軍兼權兵馬鈐轄張德志可儀鸞使仍落權字制易水之南敵之往來道設障屯師以塞其衝汝用才武被選俾守其軍壁畜馬訓士邊烽不作蓋勤已久矣朕方圖汝功而引章自言按籍增秩庸正使列勉力殊績以取不次之賞可宫苑副使兼閤門通事舍人鄭餘懿可西上閤門副使制朕日御法宫以朝大丞相及百執事而閤門諸使列侍於紫庭之下以贊其進退拜跽陟降之數濟濟翼翼其有儀也哉具官某出於名胄蔚有才美久服禁省習貫乎朝廷之儀朕圖爾勞俾介諸使列而四方之侯伯及蠻夷荒忽之君時而來享亦將以觀禮矣爾其愼哉思稱厥職可亓贇責授崇儀副使制連兵拒敵遂能搴旗而勝者非郡帥之合謀共力而成耶而汝早以忠勤勇奮收功於蠻徼已嘗經吏議廢官之久方且結綬而復進又以不協聞豈其未思耶昔之引車以避怨者蓋先國事而後私仇爾其遠鑒古人之烈以自圖焉可崇儀副使荆湖北路駐泊王知和可六宅副使制荆楚之間剽疾而易擾今雖弭伏無事而於湖之北常屯勁兵以壓其未萌乃以汝風力開壯往䕶其師既已就職士氣增倍鈞考功狀宜有以進秩勉圖忠績朕豈久滯汝於逺方哉可勒停人賈師雄可如京使制日者付汝以邕管抗辭不行於時獠奴窺邊方責任於守臣遂挂吏議已更癸酉赦令言者又稱其材不宜久擯於田隴間朕亦惜之其還汝舊服將究其用夫國有騏驥之馬以一蹶而遂弗乘者非知馬者也今取而乘之矣奮轡疾馳亦惟汝之致力焉可左藏庫使張承衍可文思使制某出於公侯之後不溺於流俗恭以持位敏以赴功大河之衝往䕶師衆今有司會課於歲當遷陞之使名用伸寵擢勉爾壯猷用明我之嘉惠可左藏庫副使三陵都監馮易簡可文思副使制諸陵園寢皆有令長而都䕶之職按行守衞以督不恪汝掌其治今已歲成松檟茂遂藩垣完葺亦能舉其職矣躐等以遷用酬爾之嘉績可西京左藏庫副使梁寔可文思副使制存則竭其能沒則撫其後此古之褒元功繼絶世以爲内恕之至也維爾之父著籍中省歴踐有勞今其淪亡遺章徹聽請澤加於爾我有茂恩逝者不昧亦知朕不忘其家世也可西京左藏庫副使冀徳可文思使制勑自闢新疆戰多屢上䕶輸效級復應優科躐進使聨時惟厚賞盍圖報稱更懋功名可西京左藏庫副使劉宜孫服除可舊官制士大夫當擾攘時捐家徇國故以墨衰從事今四海内外無鳴弦之警則金革之士有親喪者皆得釋位而去取以重風化之本而伸孝子之志而爾以才武在列䕶兵於常山遭罹内憂銜恤三年亦可以復籍矣還爾舊次勉奮忠力以圖其報焉可文思副使柴貽忠可左藏庫副使制揚子雲稱眞僞實則政核然則考績者所以實其眞偽者也爾忠謹自顯服於武事蓋有明效載在閥閲苟無褒進則何以示吾考績之公哉可文思副使青州駐泊于莘可左藏庫副使制列使之有介視命居次乃如文昌外郎累閥閱而至此者豈非美官哉爾廉能顯幹通習戎政駐兵藩府士卒豫附樞庭言其歲次可遷左帑增秩往拜嘉命虞氏陟明之典於是乎在可秦鳳路鈐轄康慶可供備庫使制朔騎之不踐吾境鷙擊之士無所暴其材則外閫之屬帥能以畏愛循治之亦足以有功矣閱歲已久計兹閥閱之最宜用遷秩爾其修斥候明約束無恃彼之不來得非善師者乎可内殿承制渭州都監趙元張濟可供備庫副使制齊莊公設勇爵以褒驍雄先鳴之士今朕之名使列亦所以待材武之臣維爾忠力致果有志於事功數䕶戎律訓濟有方比其歲功宜有褒進勉圖報塞以明我勇爵之得人可内殿承制鎭戎軍巡檢趙元可供備庫副使制爾以忠愿沈壯䕶兵於近塞以爲支軍之帥於其無事時能簡練約束俾麾下之士常若大敵之至固可以書最矣夫履平則見功難要險則爲效速奚必屬鞬躍馬推白刃而蹈之然後議遷乎可右衞大將軍致仕李繼忠男守仁可供備庫副使制耆艾之臣引年而家居豈無優澤以成夫去位之美者哉爾父某既以解紱得遂乎安佚露章來上請加賜其子可無從乎列使維介躐次以遷爾惟佩服忠教無忘延賞之慶可客省使制由閤門使而上至客省使結綬而列大庭者謂之横行非若羣司有使可計級而至也以爾端敏開濟治兵有文理久委戎節暴見功烈今又登最可用以掌客之秩恩優爵厚汝惟務稱其報可中書舍人可宣州觀察使制漢以丞相史出刺郡國後爲部刺史以六條察二千石之不法者則今之觀察使蓋亦源於此乎淮海之域古丹陽之地長山大湖挾維左右必得文章侍從之老以爲之師帥誰其尸之無以易汝某官某純德奥學擢之西掖典治辭命之行風飛雷厲俾朕號令能信於天下者惟爾之能宛陵易帥乃以魚符犀節俾奠南土昔吾丘夀王爲東郡都尉年歲不熟多盜賊璽書讓之以爲不稱在上前時以汝廉明慈惠必能綏服江表朕將以璽書褒美之以詘夫漢武侍從之臣出守而有不能者焉可觀察使可節度觀察留後制古者擇諸侯之賢者以爲方伯故屬有長連有帥卒有正皆所以考察諸侯而爲之黜陟則今之觀察使蓋源於此乎某官某長材大略勇而有義提兵捍邊士卒豫附歴補雄藩尤著風績朕將究其才用以遂功業披圖列地莫如宛陵其以龍節麟符往帥西土欽哉按部一道無忘方伯之職焉可駙馬都尉可越州觀察留後制先皇帝以汝敦敏質重雖出於鼎門而有古寒士之操重以章懿之旁屬遂屬以愛女肆朕之初德澤漸於四海况其藩戚者哉廉車舊節改奠淮康而御史堯俞以爲賜薄宜如本朝故事章下丞相亦以爲宜如御史章豈惟丞相御史之爲言蓋朕所慊然者亦久矣其以會稽之節俾爲留務上以副先皇帝念親之意下以慰言者之職朕亦釋然無慊矣可東上閤門使果州團練使李定可遥郡防禦使制防禦使主治兵師以折衝乎四方雖不賜旄鉞蓋亦古之連帥之職焉以爾忠勇有謀臨事而斷屬兹遴選俾總戎於關南就部之初吏士增氣今樞府又言其功狀計歲校能宜居此美秩夫邊防之機忽如脫謹之持之思稱我褒嘉之意焉可如京副使閤門通事舍人石宗尹可南作坊副使制大昕而朝臚傳乎紫庭之下俾予之列辟進退拜立翼而有儀者維爾之能樞府會其課閱歲宜遷維使介於武爵差高仍職上閤俾宿業焉可兩府制四首門下太一躡階天柱乃三公之象端門左掖東蕃居四輔之星維皇極之建官憲乾文而列耀若時雋老久緝庶工雖高鼎席之勲未冠槐庭之拜掲兹魁柄屬我宗臣具官某德表碩膚智資大雅茂山甫將明之業遵平陽畫一之謀自踐疑丞再罹艱棘截然獨立倚以爲平議不旋踵而王室安計不移晷而天下定億載之期彌紹太平之望將符顧虚位於冢司尚屈尊於次輔褒章爲晚羣聽以疑舍舊德以弗圖殆元勲之無勸宜煥大庭之號載陞祕殿之嚴俾正上台永綏帝載於戲文武是憲久資申伯之謨堯舜其心更祝阿衡之志弼成大化以格休期可門下帝尊六相大封爲司馬之官周建三公吕望乃太師之職惟天兵之密議兼相府之開榮我有耆朋實孚異數籌講帝文之化暴揚神武之威宜誕綸言進登袞路具官某沈機善照偉度絶隣投刀無大􅀈之難決策若建瓴之易在昔烈祖已擢冢司掃聚螘之妖氛格安瀾之嘉治再魁宥密旋復艱虞大雪凋年識寒松之獨茂疾風摶海知勁草之不傾載錄懿勲特揚褒冊進上公之衮服開大國之苴茅功號加隆食封增衍於戲上將上相天官所以面朝宜民宜人君子於焉受祿兼寵名之至渥優哲輔以能膺對掌國鈞永綏王室可門下古者講仁義以訓師尊詩書而謀帥濯征淮浦則召公由是燀其威薄伐昆夷則南仲於以奮其武豈貴乎扛鼎抃牛之絶力必資乎輕裘緩帶之深謀祭遵所以雅歌臨戎安石所以弈棊制勝兹有雋老夙蘊壯猷載築齋壇俾專將閫具官某傑才絶出賢業素優試之以疑而愈明擾之以繁而益辦老於器使爛著能名勁節自完足以當漢庭之大事沈謀不再足以破朔騎之先聲眷秦谷之价藩控西羌之右地戎車千乘鐵馬萬羣無如老成付以方面賜許田之帥節䕶隴北之師屯於戲後有纛旄前有鈇鉞恭於命則有明賞慢於令則有顯誅用此勵於三軍遂可圖於百勝無隳兵律以暢皇靈可門下仗鉞專征外則重齋壇之拜秉鈞熙載内則專宰府之司蓋文武之至權并勲賢之兼處咨余耆哲倚在藩維將震疊於皇靈宜褒華於異數具官某高才俊烈偉度沈雄計數燭乎蓍龜忠勁動乎金石夙專戎律嘗冠軍鋒草木服其威名龍虎祕其遠略曏緣謀帥首副僉言敞玉帳以建牙擁繡旗而行部獨居方面盡䕶屯師自將萬兵舉得伐謀之算不破一甲坐收靜勝之功邊燧絶煙胡馬遁迹宜甄茂賞以報膚公俾聨公鼎之榮仍領帥旄之寄於戲宰相國之柱石示鎭安於四方將軍王之爪牙庶折衝於萬里寵名兩極嘉命併新副我疇咨勉圖忠報可知開封府制二首開封典治京師其浩穰爲天下之極故其選任亦宜有才能之傑者乃勝其任焉某精敏廉白屢更蕃府奏刀游刃􅈕綮之間愈利而不鈍宜可以尹吾開封矣昔趙廣漢張敞輩爲京兆尹顯名漢世其後寥寥莫有能及者非夫浩穰之劇尤難其才者邪爾其奮勵方略無俾前人之迹由此而遂絶焉可漢析長安以東爲京兆以西爲右扶風以北爲左馮翊然俱治長安中雖號爲繁劇其地分而治狹則亦易於爲力矣今開封環京師千里之畿歸於大尹較之前世蓋亦難矣以爾廉明通敏所至有方略課爲諸郡最乃以延閣之清選往司内史昔趙廣漢嘗欲得三輔而兼治之以快究其能今爾兼治之矣其究明方略以攄廣漢之宿憤焉可翰林侍讀學士右正言馮京改翰林學士知制誥權知開封府制勑學士職清地顯而開封典治京師非夫忠厚仁恕而有文學政事之能孰可以任此具官某造行直方受材博敏踐更中外休顯有稱論思禁林尹正畿甸詢謀惟允其往懋哉可知成都府制眞宗皇帝嘗用張詠守蜀有異政其施設方略後世莫能更其法凡言蜀治者必以詠爲首由詠而來高才傑德之臣不少矣而卒莫能繼朕將圖之乃考羣臣之次以爾某嘗守江陵囂訟屏息元元便安再守金陵厥治如江陵觀其成績必能爲朕守蜀若夫西控戎落東湊中國其防兵杜漸之術詠已得之矣至於漸摩風俗俾之醇篤興行禮教躋之於君子之塗者爾其深思之兹朕所以任卿之專也可參知政事吳奎可資政殿學士知青州制舜咨十有二牧柔遠以安近此則治外之臣也九官濟濟共熙帝載此則治内之臣也在舜之世都俞俾乂疇賢德而進之豈重内而輕外哉具官某天資渾厚善建嘉謀游刃所投衆理必解初發策於大廷遂摶風而逺列薦登二府國所倚毗頃以親憂執喪草次以哀致毁羸疾癯然尚何攖之以庶政不遂其安養者乎麟符虎節陞華祕殿俾偃藩於青社以輔相天下之業去而奠一方顧不易爲力哉汲黯雖病可以臥治爾其專精神近醫藥補完靈氣期於夀康則朕之眷懷豈忘汝於外可龍圖閣直學士吏部郎中唐介可樞密直學士知瀛州制入則更直諫垣以嘉言鯁論闓切於上出則獨專方面以惠澤美政漸潤於下我有能臣履踐衆職兹有内外之效焉具官某事上以忠臨下以恕撓之以繁而見其斷試之以難而見其明治行燦然暴於衆聽俾直樞府往帥乎南關夫北朝之事汝皆累黍而熟計之矣然政事修完常在閒暇時今遼遠之人沒齒不聞鳴鏑之聲可謂閑暇矣均爾賦役明爾法禁厲兵畜馬先事而預防之夫如是誰敢侮之哉可朝奉大夫提舉杭州洞霄宫章衡可知滁州制勑某早以藝文亟更華要比疇勞久登列禁嚴而弗圖其終以墜厥服浸更歲月法應甄收起於詞館之閑錫以州符之重往欽厥止尚永無愆可給事中集賢院學士吕溱可龍圖閣直學士知杭州制宣王之命申伯之詩曰我圖爾居莫如南土古之擇國以授其臣顧不厚哉錢塘雄富甲天下兹實朕之南土汝嘗擁節而守之再以命汝得無宣王之意哉具官某材高行美蔚然獨秀富貴自致不爲權利所訹垂翅既久將有漸陸之進乃以延閣之拜俾往涖焉錢塘之故老喜汝之來壺漿相攜將爭道以候汝矣若是者朕何爲而憂東南哉可溪洞永晤可襲知富州制南荒之險五姓所盤處而向氏屬州亦得世其爵今永昭不幸淪謝而羣議以汝爲代其可廢哉惟忠以事上惟惠以綏下無驁無肆以服我之休命可知雄州制朕之藝祖嘗任李允則守關南匈奴息謀不敢飲馬於長河朝廷倚之如伏百萬之兵何其得將臣之至此哉故朕常思得如允則者以爲關南守以爾沈厚有謀爲五虎臣授律提師凜然有將帥之風必能爲吾安邊守境折衝方面之難庶乎朕有以繼美於藝祖矣仍進秩某官以寵其行可兵部郎中知潭州制昔黄霸守潁川詔令使民咸知上意今長沙之域土廣民稠比歲榖不登雖敕長吏賑給其重困而德澤之政或未盡發以爾某廉潔守節明於治道嘗在豫章有異等之效故擢以七兵郎俾牧長沙爾其寒者衣之饑者哺之道朕愛民之心於其下令知朝廷徳澤之厚無有遠邇則朕尚何憂乎長沙也哉可知洪州制豫章據大江之西爲一都會陳蕃嘗爲之守解榻以禮徐孺子想其遺風餘烈固足以爲二千石師矣具官某清心以勵俗美行以表物按節右蜀課爲第一入佐計府霈然有餘今豫章更守屬在茂選進爾右曹以守鍾陵爾其希慕先哲裁爲善政鍾陵賢士有如徐孺子者其薦諸朝朕將以束帛聘之豈特解榻而已哉可樞密副使陳升之可觀文殿學士知越州制鄭武公爲司徒緇衣頌其美此自外以入輔也申伯奠南國崧高歌其功此自内以出封也予之宥密碩徳之老解機軸以開藩蓋有成周褒功之數奚出入之爲異乎具官某器業精深通於治國之體贊道樞極先帝所以倚屏逮予之初謀不旋踵而天下之業已定勲望益高執徳益下衷言懇懇請辭西府維會稽之甸邦湖山挾維乎左右夀親白髪採蘭而爲養是足以成其雅志優游而致樂矣文昌左轄兼榮祕殿出封加等是以成周之法焉可登州防禦使向傳範可齊州防禦使知滄州制邊燧不作六十餘年桑果之畦交植於南北故於牧圉之臣朕常擇其忠厚有謀者付以折衝之任焉景城缺帥將圖其人差籍較能無易於汝具官某材高器閎有將帥之略設施經畫動有美效今易其使節俾守兹土夫景城齊地也東負大海而北與匈奴接風俗渾厚有魚鹽絲枲之饒惟鎭靜可以懐殊俗惟明厲可以破姦黨足食足兵且使知教兹朕所以命汝之意也可知廣州制交廣之地距京師幾萬里其民俗與山獠雜居固未嘗見天子旗旄之美車輿之音則其聲教之所偃薄徳澤之所漸漬由上國而施四方蓋亦有近者詳而遠者略矣故朝廷常擇文武近臣爲之綏撫乃以爾俊老碩徳智足以破羣疑才足以服不譓休聲茂烈著於衆聞付以麾符俾守南海爾其宣布我惠澤發明我威烈俾萬里之民涵仁泳義如在朕京師則朕何有南顧憂乎可户部副使太常少卿燕度可右諫議大夫知潭州制湖湘之南溪蠻剽悍而易擾阹而馴之則亦弭伏至其失御遂出而嚙邊其禍亦不細得無肅乂廉治之帥爲之良牧者哉以爾具官某醇明忠厚通於世務更踐要劇芒刃愈出俾副大農厥功茂焉宜加賜諫議大夫魚符犀節往甸南服内以惠斯民外以柔殊俗朕方端扆面朝以遲爾之奏課矣可棣州防禦使知鄭州王仁旭可博州防禦使知滄州制朕惟眞宗皇帝以長轡逺御控服匈奴六十餘年灌其烽燧而滅之得善師不陣之術今無棣東瀕於海北與敵境相踵可謂兵車四衝之地也屬兹謀帥考之羣公咸曰莫如某者沈勇忠實老於戎服可屬以疆場之事朕其俞哉夫安不忘戰治不棄兵爾其訓吏士謹斥候無恃彼之不來而恃我有以待之斯足以爲善守者矣可慈州寧鄉縣令王良臣可河陽節度推官知洛州曲周縣制汝以慈惠敏肅爲朕墨綬吏民皆宜之既有成績則當敘進河陽大府也從事屬官也寵此新命而尚俾之治邑者蓋朕之美錦不欲使未學者製之耳可同谷令李敦復可節度推官知乾寧軍乾寧縣制董生謂縣令民之師帥是自古未有遺民而可爲治者也爾以高第選爲邑長吏奉詔宣化薦者言其最程功考實稍遷以郡從事而猶與之邑者是不敢遺吾之民也可郎官可赤縣令制王渙爲洛陽令摘發姦伏京師疑其有神算及渙之去連詔三公選令皆不稱職蓋夫神州赤縣浩穰之都非神明之牧則不能致治以爾某清方以厲俗明斷以肅物更履事任而皆著美績郎闈久次衆惜其滯材今特試以劇邑批大卻導大窽非庖丁之刀不能解也昔子産謂惟有德者可以寛服人其次莫如猛爾其勉修厥德以務寛猛之中庶乎姦黨震慄而善人伸矣可
