body:
  text: 鄖溪集巻五宋鄭獬撰制開封府判官制少尹缺選之於朝朕得二人焉惟某辭學自奮嘗擁節湖外有澄清之效惟某文中甲科嘗請麾晉疆有慈惠之稱並為遴柬孰謂不然京兆之政有成有不成則亦惟吾二人之左右焉可不欽哉可孫長卿可開封府判官制勑某都邑郡國之首京府市獄之淵雖繄尹正之明亦賴僚職之敏協相以濟用祛其煩以爾才通而明行安且美詳試藩政其治愛人而不煩糾䖍邦刑所察應條而輙舉吏文無害囚繫用稀比奉更書委居計局睠言劇府㑹缺佐員用圖彊濟之材輒涖浩穰之地足舒芒刃且脱米鹽善承上官勿誤庶獄可度支郎中知都水監丞事孫琳可本官充開封府判官制京師浩穰於天下為劇關治其府事必須材勝而力餘乃可以稱之具官某明敏强濟通於文理丞屬水曹以勤任職厥功懋焉今用以佐吾京師之政為官擇人孰有不稱者哉可開封府推官司封員外郎李壽朋可開封府判官制京師雖號天下劇非如漢世之京兆洛陽豪猾犯禁都市殺人之為暴蓋吾民安於太平涵毓徳澤之深能自引於網羅之外耳故朕亦擇通敏不擾於文理者使關治其政而汝閎雅俊厲果於任繁擢於衆才佐京師有治功夫庖丁之刀愈久而芒刃不鈍兹朕所以因舊職而遷汝也可滕甫服闋可依前太子中允集賢校理三司鹽鐵判官制昔子夏既祥而御琴油然而成聲以謂聖人之制不敢過也仲尼是之學者紀之惟爾甫才氣豪邁嘗中科等已陞朝綴而親闈棄養解紱而去霜露既易哀疚有殺亦可以紆紳而復仕矣允正校讐皆爾之舊乃易以計庭之劇司寵命惟新其佩服無懈可荆湖刺史制荆江之南比嵗不登旱土如赭民流冗於道路朕甚哀之乃下丞相府擇良二千石以綏疲瘵丞相以爾寛惠不苛嘗守湘水有善政民于今稱之是用進爾以七兵副郎徃奠南土捐瘠之民待爾而活召父杜母之謡毋久虛朕之傾聽可侍從可刺史制子謂由也果賜也逹求也藝皆可使之從政則朕之禁闥之臣某之開敏而斷某之深博而通並以風力謀議在朕左右露章丐郡其不可以從政也哉淮西天平藩翰相維厥田上上樹桑蓺麻足以為衣矣深耕力種足以爲食矣既富而敎仁義之政出焉可不勉歟可諸衛將軍可鄭州刺史制圃田朕之右内史也當秦洛之交蜀漢之衝驅車秣馬四馳而並出安得通敏强力之臣為朕守此乎以爾某髙才俊偉早厲武經忠勇之節動乎金石嘗提虎旅宿衞周廬俾朕奠枕而安者惟汝之力可謂有夙夜之勞矣其以麟符犀節朱幡之車出奠乎滎澤夫約已以亷足以檢下􅊩事以恭足以有感御民以恕足以得衆兼此三者以治鄭則庶乎子産之髙躅彼游於鄉校者又何議焉可武臣可刺史制甘陵之盜汝甞擐甲援旗破其巢穴圖其功次擢處使列功懋賞厚可謂相值矣容管之戌據瘴海之南蠻獠含毒時出爲盜揆能授職汝其爲朕扞禦而綏服之甘陵之賞行復至矣可邊郡刺史制朕緬懷燕代之北亷頗李牧之爲將其風烈凛然雖千百嵗而聳人耳目如前日事於是趙南距强晉北却匈奴幾霸天下夫安得頗牧爲朕將帥哉昔文帝有一魏尚而不能盡其用及廹於匈奴乃拊髀而歎息馮唐激而譏之今朕之用汝可使後世無復遺恨矣可遥郡刺史制本朝原唐制以置使列至於職効尤異則又以部刺史之秩兼之在於武選號爲通顯以爾秉忠勵操明於方略秉障於外敵人絶警考之功狀宜有以酬之南粤方州寄之左魚凌霄之漸由斯而始也可入内内侍省供奉官蘇利涉等可如京使遥郡刺史制爾以銀璫左貂出入禁闥小心忠密並司劇要積其勞閥累擢使介今兹遷外可無増秩以嘉爾之夙夜乎欽哉往踐無怠予之寵命可刺史制瀕海之地積潦猥至大田之稼化爲腐壤憂吾民之不粒食且將離南畝而去矣惟得良刺史可用綏安勞來俾之安堵如故聞某官某向守姑蘇以愷悌之政得其民心乃以祠曹副郎俾領某郡符可謂得人瀕海之民亦必相屬而喜天子爲我擇良刺史今其至矣可閤門使可刺史制飛黄之駿秣之閑櫪則奮鬛長鳴其心固巳馳乎流沙之西燕山之北矣惟吾之虓勇之臣固嘗搴旗俘馘明著功效而久留京師典治内閣固不宜以閑櫪處之大河之北瓦橋之戌實障匈奴乃進爾以刺史之任而往蒞焉飛黄之駿其得以展其絶足矣可太常丞集賢校理竇卞充開封推官制强察所以督奸猾刻者爲之則立威以示名寛裕所以厚惸弱弛者爲之則慢禁以養望惟閎博獨邁之君子有志於斯民者乃合是二說而中取焉京師獄市劇天下而汝辭學髙第才美浸以顯發請守於絳遂以殊績聞是必通於二說而優爲之夫强察而不苛則民服寛裕而不弛則民愛兹朕所以遲汝之報可太子中允郝戭可奉寧軍節度推官制翰林公著言爾顏髪尚壯解紱而亟去者丐一命以及其親耳夙懐不就遽失榮養銜血草次捧土培墳鄉閭士子悉師其行義今以外除宜用甄擢夫旌一善人而天下勸兹正朕之所欲聞何愛一郡從事以褒善人乎需其課成又將増秩以進之夫如是天下其有不勸者哉可三司後行孫有慶可曹州司馬制汝祗事計庭頗為幹敏苦於疾恙願解所職今兹引去得無一命以榮汝之歸耶可皇兄仲銳等服闋可舊官制創鉅者其日久痛甚者其愈遲縗衣苴杖寢苫乎堊室豈將放爲無窮之哀乎文與情稱再期而後釋此人道之至隆也爾公族之秀執䘮得禮祥祭既徹方委珮而登朝宜申嘉詔俾服舊次勉圖令名以盡顯親之美可皇弟右監門衞大將軍克頠可遥郡刺史制王者之於宗族尚恩而不責義所以睦其本根廣天下以愛也具官某生于王家有此爵號向以微累久能自脩其賜以郡刺史之秩徃哉祗踐永服我光寵可皇姪右千牛衛將軍叔諏服除可舊官制人子之於親有三年之愛故其亡也蔬食飲水以致其哀亦三年而後復今汝執喪與時為變於禮已得矣旣冠而佩其可不還於舊次乎可太子中舍張玘服除可舊官制子夏既除喪予之琴衎衎而成聲蓋孝子之於親雖有終身之戚而霜露既遷不可不俯就之具官某修辭慎行逹於從政適以内憂解紱而去今祥祭既徹固可服於舊籍春坊内舍汝其祗踐可將作監主簿劉士爕服除可舊官制爾以外艱釋位而去既以禫除宜復舊秩服我明命無忘厥修可勒停人前秘書丞蘇畋可復舊官制汝罹於深文久而不得解上書自訟俾有司覆實遂從末減已更赦令還汝朝紱汙累湔去可以伸眉於後矣可左司郎中知制誥張瓌可左諫議大夫依前職制漢之諫大夫常選通才蹇正之士故其忠言鯁論以開悟世主之聰明後世鮮及焉今以汝明於古學髙簡而有亷隅久次掖垣脩其詔令數處駮議抗而不撓於嵗當遷乃進以為諫議大夫代王者之訓言兼争臣之美秩朕於帷幄之臣可謂徳懋懋賞矣可太子中允集賢校理趙彥若可太常丞依前職制金馬石渠是為蓬山藏室殫見洽聞之士於此而登公相者班班而出以爾之博學强記守之以醇固沈酣乎書林蓋已久矣丞貳奉常兹爲次補摶風而翔則在爾之所勉焉可太常博士詹彦廸服除授舊官制居親之喪苴杖而倚廬至痛極也而聖人以期斷故既祥而練冠中月而后禫周旋四時之變蓋亦久矣今汝之銜泣三年於喪已除固可以出而從政奉常撰禮維其舊次履忠率職往其欽哉可東宫傅制二首長於齊不能不齊言長於楚不能不楚言是習於齊楚之俗而能也居而與正士遊則耳聞仁義之訓目視詩書之文行而中和鸞處而覽諷誦少而漸漬長有成徳則雖有邪僻暴慢之逰不復能奪矣具官某徳美膚敏白髪不懈在先皇帝時以髙文大冊入直禁闥嘉謀大猷遂參國論肆予冲人信倚如一今吾子出居春坊而思得師保之賢以輔成其徳則耆艾明哲無如卿者其爲吾以禮義道習之夫周公爲傅召公爲保周召之事業爾嘗讀其遺書而學之矣宜用以爲法則朕尚何有慮耶可成王在襁褓則以周召爲之保傅况吾子年浸及冠美質將就其不為之擢叙賢哲以為之輔道者哉具官某材茂行潔爲時偉人强學深博足以謀王猷而斷國論純忠明勁足以勵羣辟而鎮浮俗屬在老成以為保傅夫天下安危繫於太子太子之邪正繫於保傅然則天下之安危未成於太子而其萌芽已形於保傅矣可不勉歟可絳州防禦判官潘旦可太子中舍致仕制某壯而竭其能今其齒衰矣亦將以休息而佚吾之老者焉乃命爾以春坊内舍之秩俾榮歸于郷里几杖安養不亦優裕乎可録事參軍崔中立可太子中舍致仕制年未至于耆耄而以疾引去兹亦異夫行而不知止者焉宜賜秩俾休于家綏爾眉壽以服我之明命可王中庸可國子監丞致仕制强有力焉則仕疾不能而辭去奚汝之裕于進退哉然朕憫汝之任職未久遽聞其告歸宜加優秩以遂其頥養可西頭供奉官劉正顔可清道率府率致仕制某以蔭補官積其勤勞遂列于近廷今齒將逾七十而以老告歸是亦有知足之義焉春坊候率用示優渥汝其往哉以佚其餘年可右騏驥使麥知微可左驍衞將軍致仕制汝以謹信出入禁闥銀鐺左貂簉于諸使亦已寖顯矣而年力未衰乃以親老為辭致其君事而去朕甚嘉之其以衞將軍之秩俾休于家庸示朕之優于近臣也可左監門衞大將軍鳯州團練使宋緒年八十特除致仕制古之八十安養于家一子不從政况身服戎務領緹騎以備環列者邪朕誠憫其耆耄以左衞之師解紱而去焉往踐嘉命退爲逸老豈不優裕哉可致仕制爾結綬登仕三十餘年今以黄髪告歸朕尚得以吏職煩爾哉然朕聞之越山之下蓋嘗有美遁先生處焉既致吾政而去亦將與之游乎往矣朕厚爾以秘省之秩又除其一子官庶幾天下知朕之優佚老也可致仕制古者大夫年至而請老藏其車蓋以傳之子孫朝廷稱其賢鄉里榮其禄今爾以白髪耆徳拜章告歸慨然有古大夫之風節朕甚嘉之其賜以某官之秩禄其一子俾就養焉其不爲朝廷之稱而鄉里之榮乎可大臣致仕制某守節秉義白髪不懈先皇帝屬以大任遂長樞府忠言嘉謨著于事業可謂王者之佐天子之老矣數引禮經以年告歸誠愊懇懇至於三四顧朕不可以少留耶乃遂其美志以成一世之髙其以春坊師保用優其秩勅有司上其子若孫若近親朕將録焉昔董生退居膠西漢有大議使使者就其家問之今朝廷將有大疑不可斷之謀亦用咨爾舊徳矣爾其近醫藥善食飲以輔爾之靈氣不可遂忘吾朝廷之慮可龍圖閣直學士右諫議大夫韓贄可給事中制天子之視朝給事中平尚書奏事古之大儒抗節而不撓者多爲之故劉向以博洽聞而龔勝以質直顯兹二者可謂名卿矣今以汝贄履道秉義白首不倦早司諫列數有忠言出領藩府所居稱治於其序擢乃賜以給事中之秩左右諷議其不爲朕之名卿與可父琇贈祕書少監特贈給事中制出而䇿輕車坐而累華茵鳴鍾而鼎食此爵位之至美而時來而可爲也啜菽飲水三釜之粟以盡其歡此孝養之至微而親没而不可見也雖然禄養之與親常不相逮則崇秩厚禮以賁泉壤猶足以伸霜露之感而追南陔之思也某官某父某脩忠履信隱徳於下積厚流長載有令嗣乃登司㑹奮其功庸髙門之慶非自爾而來耶考其風烈宜用褒進青門夕拜古之尊官歿而有知蓋亦榮耀於九泉矣可樞密直學士周沆父圭贈尚書右僕射制論思宥密之臣詭辭造膝與予共濟大事者非其先烈緒餘義方之訓所致乎推本燕翼不爲褒賁則勸善之典於此缺焉具官某執徳不囘以道爲樂豐報自天慶鍾後嗣迨予承統澤漸幽隱宜以文昌右揆以襚於九原俾夫天下之爲父者以忠敎子亦將有勸乎可觀文殿學士知杭州胡宿可贈太子太傅制柳莊死衞侯脱祭服而襚之君子謂之親賢况夫舊徳之老嘗輔先帝彌綸萬機之業者乎宜申顯命以極哀榮之典具官某秉忠履潔白首不踰邃謀密議亹亹而荐至擢貳樞筦膚公參乎帝載而雅操素尚蕭然自逺懇解繁務得請呉藩庶乎湖山之樂足以資靈氣而毓眉壽如何不淑遽委大化而去朕甚痛之得無褒賁以慰其已沒蜜章緺綬春宫道徳之傅用以告第不侈於柳莊之襚乎可職方員外郎吕希道父翰林侍讀學士右司郎中公綽可贈尚書户部侍郎制仁皇帝時丞相之子孫能自奮於世累富貴而不傾者惟吕氏比諸家爲最顯何其積善之爲多耶具官某父具官某丞相齊公之後淹通雅正深於文學嘗侍先帝誦古史有闓切諷諭之勞未能究其用先時以歿今其子又以治行方爲尚書郎履其平而趣吾見其進也則襚章蜜印將重累以告其廟詎止於此而已乎可三司使給事中蔡襄祖恭贈尚書工部員外郎制物莫不本於天而人莫不本於祖故自天子至於適士皆有祖廟天子則尊其所自出推而配天適士止於王考而時祭之夫以適士之卑其澤猶及於祖禰則吾之大司農之世而獨不䝉顯命非所以進賢者勸有功以爲後嗣之勸某官祖某行誼甚髙鬰而不顯畜其大源遂昌於厥孫肆朕之初廼以夕郎真拜大司農迹其餘慶之來宜用追賁其以名曹起部外郎之秩往告其第超躐彛等其不爲尊顯也哉夫王侯之貴其世或堙沒而無聞而名卿大臣多出於布衣之後蓋其積善之效乃有以致之矣可集賢校理裴煜父可贈尚書都官郎中制椎牛而葬不如雞豚之爲養蓋痛夫榮禄不逮乎其親也朕既承先帝之業灑其天澤在庭之搢紳得無襚服蜜章以榮其先烈者哉具官某父某隱徳于身積而不發及有令子將大其門疏恩累秩宜以中都郎告其第雖不及雞豚之樂其猶足以慰曽子北向之悲乎可樞密直學士兵部郎中秦州蔡杭贈禮部侍郎制孔子哭舊館而哀遂脫驂馬以賻之蓋夫感深則哀至哀至則賻厚而予有雋艾之老逺歿乎秦隴如之何不撫几投餐惻怛而零涕優申襚典以寄長懐者哉具官某髙才經務有匪躬之節先帝初潛傾屬已異遂攀日月矯翼而横飛曩以上邽謀帥仗鉞西行號令隱然見漢將之風采方資碩畫共乂王家維天不弔奪之太速夫先帝之所咨謀可謂舊徳矣予聞其喪而傷之可謂哀盡矣特襚以小宗伯之秩不爲賻之厚乎然而孔子之志予竊取之矣可
