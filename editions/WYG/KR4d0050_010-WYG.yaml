body:
  text: 鄖溪集巻十宋鄭獬撰口宣白溝驛撫問大遼賀同天節人使及賜御筵口宣有勅卿等恭修禮聘来慶誕辰適臨封館之初載錫賔筵之盛兼申慰諭并示眷慈都亭驛賜大遼人使賀正畢御筵口宣有勅卿等寳鄰修聘文陛㑹元顧還玉以成儀俾加籩而錫燕體兹至意諒洽多歡瀛州賜大遼人使却回御筵口宣有勅卿等鄰歡畢講使傳旋歸已次上開將逾畫壤宜頒嘉燕庸慰遐征賜大遼賀同天節人賜入驛御筵口宣有勅卿等肅將鄰聘来慶誕辰已祗見於王庭宜宣慈於賔席庶臻樂衎庸示睠懷賜大遼賀同天節人使回北京御筵口宣有勅卿等旋軫鄰邦解鞍留府屬炎風之侵欝渉長道以良勤宜錫燕私用申寵眷賜大遼賀正旦人使入見訖歸驛御筵口宣有勅卿等肇履嵗元来修鄰聘已奉造庭之對適居授館之安宜賜燕私用符睠矚賜人使朝辭歸驛御筵口宣有勅卿等展幣成儀旋車復命方違顔於震極爰申貺於賓筵宜用拜嘉副兹將意賜人使回至瀛州御筵口宣有勅卿等肅馳歸馭甫望鄰封方少憩於征車宜寵頒於燕席眷言行邁庸示均慈北京賜大遼賀同天節人使御筵口宣有勅卿等誕辰啟節鄰聘備儀眷言使傳之華適戒别京之次特申燕賚庸示榮恩班荆館賜大遼賀正旦人使到闕御筵口宣有勅卿等恭修鄰聘來奉嵗朝飭使傳以載馳俯都城而暫舍特申燕賜庸示寵嘉北京賜大遼賀正旦使副御筵口宣有勅卿等巧厯推元寳鄰修聘方擁旜於北道聊稅鞅於别都特示燕私用勤行邁雄州賜大遼賀正旦人使御筵兼撫問口宣有勅卿等肅講鄰歡荐朝嵗首適乗軺之及境宜折爼以均慈兼諭詔言併申嘉矚閤門賜宗樸告勅口宣有勅卿宗藩所倚聖考維嘉屬天祚之丕承首皇支而惇叙已孚大號宜服褒章閤門賜起復皇伯祖允弼告勅口宣有勅卿王庭夾輔天族儀刑茂資屏翰之忠式變苴麻之制徃膺褒册祗服内朝賜大遼賀正旦人陳春幡勝春盤等口宣有勅卿等將命鄰邦修歡正嵗適春元之肇建嘉節物以彌新彩蘤彫盤併申寵錫雄州賜大遼賀正旦人使却回御筵兼傳宣撫問口宣有勅卿等建旃来聘促轡言歸顧仁境之相望即使車之亟邁載申燕貺用表恩私賜宗樸第二表不允斷来章批答口宣有勅卿進褒近戚孚告大庭雖需奏之屢辭豈俞音之可輟無稽成命以鬱僉言賜皇伯祖東平郡王允弼生日禮物口宣有勅朕熙隆邦教惇叙藩宗矧維耆哲之尊夙茂挟持之望屬兹誕日載渙醇恩俾爾夀臧以符善祝二月一日賜宰臣曽公亮生日禮物口宣有勅夾鍾變律甫及初交大昴淪精誕生碩哲載將蕃錫俾衍多祥期輔王家永熙天厯賜檢校太尉兼侍中曹佾生日禮物口宣有勅卿貴極珥貂雄兼授鉞屬林鍾之炎序啟蓬矢之嘉祥特厚賚恩以綏夀祉賜皇伯彰徳軍節度使同中書門下平章事宗樸生日禮物口宣有勅嵗屬窮隂日臨下浹維靈源之發秀誕英戚以稱賢特示珍頒用申夀祝恩州賜大遼皇太后賀正旦人使茶藥口宣有勅卿等修睦鄰歡展儀嵗聘方祈寒之増冽涉長道以良勤將輔至私宜申稱貺賜黔州觀察使涇原路副都總管盧政赴闕茶藥口宣有勅卿等荐膺召節還衛周廬逺冐寒威已趨圻甸特申彌賚庸示眷懐賜盧政赴闕生科口宣有勅卿夙駕戎軒祗趨召節載凌風露已及闕廷爰有分頒備兹牽餼勤歸之寵宜用欽承賜永興軍韓琦茶藥口宣有勅卿辭榮宰席總帥咸京究民政以初頒履天和而滋茂爰加珍錫兼諭至言賜觀使留後賈逵赴闕茶藥口宣有勅卿召從帥閫入衛王宫夙驅戎乗之嚴載冐征岐之阻特頒品劑庸示眷隆恩州賜大遼皇太后賀同天節使副茶藥口宣有勅卿等逺馳使傳来講鄰歡顧衝渉以在途宜便蕃而申貺珍芽靈劑併示眷懐恩州賜大遼皇帝賀同天節使副茶藥口宣有勅卿等恭持鄰聘来慶誕辰屬春律之載暄渉征塗之彌永特申珍貺庸示殊私撫問河北西路㳂邉臣寮口宣有勅卿等比膺朝選分幹邉陲屬年籥之戒寒飭使軺而申問再加勤瘁庸示眷懐撫問西京永興軍并陕西轉運司臣寮口宣有勅卿等遵職於外服勞在公適嵗紀之戒寒飭使華而申勞永言盡瘁彌屬予懐撫問宣徽南院使郭逵口宣有勅卿顯膺温詔出總中權屬朔琯之凝寒擁戎旃而就道特馳使指爰示恩私勉爾邁征體予至意撫問判北京臣寮口宣有勅卿維時雋徳久殿留都晏嵗乗寒衆祥来輔諭言斯及嘉矚彌深撫問陜西安撫使韓琦已下口宣有勅卿等夙被朝僉出膺邉寄維窮冬之紀序視吉履以協祥簡在服懐特申詔諭撫問南京張方平口宣有勅卿解紱宰庭寢苫里閈載維巨創特遣諭言副此注懐無為過毁撫問涇原鎮戎軍路臣寮口宣有勅卿等夙膺朝委分蒞邉衝服官次以良勤集春祺而増厚因兹命使諭以詔言撫問判永興軍韓琦口宣有勅卿輟從公鼎出拊侯藩乗春籥之布元味道腴而均粹載申勞問彌渇儀刑撫問邠寧環慶等路臣寮口宣有勅卿等並膺朝寄分蒞邉衝屬當嵗律之和益茂春祺之嚮載嘉盡瘁特示諭言雄州撫問大遼國賀同天節人使口宣有勅卿等並講鄰歡恭趨誕節馳使軺而載逺授境舍以惟寧特示諭言用申嘉矚撫問判河陽富弼口宣有勅卿鈞衡舊徳屏翰元臣載乗春律之和彌集天祺之茂時申諭問庸示倚毗雄州撫問大遼國賀正旦人使口宣有勅卿等甫届嵗元来修鄰聘顧遵途之方永屬渉境之云初特示拊存用昭嘉矚撫問判大名府韓琦口宣有勅卿宰府元臣留都重寄茂履陽春之季諒綏吉禄之蕃特示拊存用昭眷倚賜判汝州富弼赴闕詔口宣有勅卿國之耆雋朕所倚毗宜解紱於近藩亟騰裝於便道特馳召節日佇朝儀閤門賜岐王顥加恩告勅口宣有勅陪獻郊宫協成嚴祀均釐屏翰首被褒恩孚號維行宜拜而受賜景靈宫使曹佾加恩告勅口宣有勅禮成大報恩洽外親宻露至誠懇辭嘉命顧渙恩之已及豈私請之能從賜新除宰臣富弼辭恩命不允批答口宣有勅朕稽於僉論斷自深𠂻必圖任於老成可倚成於大政毋煩懇避徃拜恩章賜富弼斷来章批答口宣有勅卿奮績三朝更柄二府顧孰踰於舊老宜入冠於中階無徇謙辭以稽羣望賜使相宗樸辭恩命第一表不允批答口宣有勅肆朕繼文若時均澤維戚藩之尊屬祗宰席之褒章無執撝謙即宜祗踐賜大遼賀正旦人使銀鈔鑼唾盂子錦被褥等口宣有勅卿等建旃来聘適慶於元正授館甫寧宜推於珍賜用昭嘉矚至可欽承賜大遼賀同天節人使生餼口宣有勅卿等乗軺荐至授館甫安眷言跋履之勞爰備餼牽之錫即宜欽受以副眷懐賜文武臣寮并大遼賀同天節人使錫慶院御宴口宣有勅卿等奉觴稱夀載逢誕月之祥酌醴御賓宜錫需雲之宴均兹衎樂示我寵懐賜大遼賀同天節人使鈔鑼唾盂子被褥等口宣有勅卿等協講鄰歡恭循使範適解鞍而暫息顧授館以初寧爰示賚頒庶資服用召翰林學士王安石入院口宣有勅卿賢具素優徳名絶出行潔而才茂學深而志通嘗奮髙文入司雅誥適佩符於藩府宜促駕於鋒車更宜禁林發潤天藻攄忠嘉之閎論補宻勿之沈謀副我虗懐服兹優數今差某官召卿入院充學士賜宰臣以下錫慶院罷􅄆同天節道塲酒果口宣有勅卿等共傾精懇肅設净筵慶甲觀之誕祥獻華封之夀祝醇醪甘實宜示燕私賜宰臣以下大相國寺􅄆同天節道塲香合口宣有勅卿等以朱明啟序誕慶標辰䖍依妙覺之慈共祝延洪之筭載嘉忠恪宜示分頒班荆館賜大遼賀正旦人使到闕酒果口宣有勅卿等講修歡䀻渉冐寒威適稅駕於都城宜肆筵於候館醇醪珍實併示寵頒賜大遼賀正旦人使内中酒果口宣有勅卿等夙馳使傳繼講鄰歡方朔吹之届寒宜醇醪之寵錫副之珍實併示隆恩同天節錫慶院宴賜文武臣寮并人使酒果口宣有勅玉虹紀節湛露均歡有溢爵之芳醪有加籩之甘實并為珍賜用示渥恩賜大遼賀同天節人使内中酒果口宣有勅卿等旅朝丹陛恭薦夀觴顧嘉事之甫成講兩儀而用享珍苞良醖併示寵頒就驛賜大遼人使朝辭後酒果口宣有勅卿等建旃来聘展幣甫成旋軫于歸遵途兹始載錫珍醇之品用申優渥之恩賜大遼賀正旦人使却回班荆館酒果口宣有勅卿等修歡甫畢復命載歸飭使傳以遵途俯都門而留燕清壺甘實爰示寵頒就驛賜人使射弓例物口宣有勅鄰聘荐修使華増美方屬憂國之制猶存賔射之儀特賜恩頒用申寵待賜富弼轉官對衣鞍轡馬口宣有勅卿懇辭衮鉞復奠藩垣適開揆路之榮宜享康侯之錫内閑良驥上褚兼衣特遣使華徃申君賜賜宗樸生日禮物口宣有勅卿内朝之雋近戚維尊屬朔琯之窮隂誕靈源而毓秀特優珍貺以祝夀祺表英宗皇帝大祥永厚陵奏告表四氣回薄忽如過隙創鉅未已奄及首除馳心神闕摧咽奚勝河北地震奏告表五行大經沴而為震咎在匪徳兹民何辜彌嵗驚虞靡獲寧處惟神聰直庇祐一方載遣使軺恭造靈館冀䝉涓伏憫此淪胥延首馳心遲聞善應隂廹陽伏地乃震揺跨河以北迄今不寧咎匪自他發於𣺌徳俾兹黎庶日虞䧟騫敢祓齋誠仰干神造冀䝉孚佑以獲静安隠惻於懐曷勝懇禱宣祖永安陵太祖永昌陵等處帝后為改年奏告表䖍遵遺訓紹履真圖稽㕘五始之文叙建一元之法誕兹鴻號表以初年載擇榖辰敢忘祗告英宗皇帝小祥奏告永厚陵表欽承遺業藐然在疚起居出入思見慈顔日月駛馳俄及祥練泣望神寢哀哽奚勝同前内中奏告表白雲在望何處攀龍落景不留忽如犇駟改練冠而遵變傃玉座以含哀恭惟尊諡皇帝駿命溥將休光淳烈世傳禹跡之異人畏軒丘之威屬祥祭之来承推孤心而永慕同天節内中奏告真宗仁宗英宗皇帝表赤煒首序炎律應期辰推上浹之初天祚誕彌之吉欽惟三后對越上靈綿𤓰瓞之蕃支錫岡陵之茂祉祗承寳系䖍奉珍圖載臨震夙之辰適紀長贏之序惟在天之靈徳流奕世之休光饗此治安實由燕翼永昭陵二月旦表氣冐於夘日躔在奎驚濡露以變辰感堅冰而入薦恭惟尊諡皇帝休功奕世大業格天皇威不冺於軒臺盛徳空傳於舜樂阻趨晨闕増極孝思南郊禮畢奏謝諸陵帝后表躬執籩豆祗見上帝嘉薦翼翼熙事告成神靈顧饗隤祉如茨實賴先烈畢兹禋祀東嶽帝生日奏告㑹聖宫三清玉皇聖祖九曜嶽帝佑聖真君表岱嶽炳靈魯邦作鎮司春元而毓物竦震位以極天適膺載誕之期敢致潔誠之告即臨珍館肅展齋儀仰祈隆鑒之靈来集龎洪之祉永延宗祏庇此羣生年節上永安陵等處諸皇帝表維帝出震以王次春屬雲陛以朝元瞻神軒而阻謁恭惟尊諡皇帝功包太極治洽鬼方越靈徳以在天震休光而奕世逖懐丕烈彌劇時思同前諸后表三陽作嵗萬寳萌春茂臨初吉之辰阻奉上丁之謁恭惟尊諡皇后堯門益聖軒曜儲祥咏美化以攸存望徽音而已逺履端伊始結慕彌深年節上南京鴻慶宫等處諸帝表攝提建嵗太簇統元允屬履端聿懐追孝恭惟尊諡皇帝堯仁未逺禹跡空存地經清蹕之遊世奉靈宫之薦靡遑躬謁倍積遐思冬節上永安陵等處諸后表象見珠躔氣萌玉琯覽初爻之来復仰慈範以如存恭惟諡號皇后徳懋嬪虞功隆翼夏􅊬真遊之永閟潔時薦以空陳進牘馳誠彌増怵惕同前諸帝表斗移子位日御巽維對越上靈永懐聖烈恭惟諡號皇帝澤漸萬世威存百年厭黄屋之深居從白雲而逺駕徒瞻神闕増積孝思冬節上南京鴻慶宫等處諸帝表晷長南表氣動黄宫方協序於天元益追懐於祖武恭惟諡號皇帝享隆駿命燕翼大猷冀真馭以少留敞靈宫而如在與時茂對結慕増深皇帝南郊禮畢謝皇太后表臣某言恭嗣寳圖首嚴大事即髙丘而展采違慈幄以増懐奠玉已燔回鑾在駕顧協成於祀典實仰賴於母儀内竭深𠂻曷勝忭賀楚國保寧安徳夫人景氏等賀南郊禮畢表執籩豆以薦嘉肇成毖祀罄舟車而兼覆均浃歡心屬我休辰載敷縟典恭惟皇帝陛下事親以孝移忠之教行治民以仁好恕之風洽惟上穹之對越適大報以告成靈禧簡簡以下孚精意顒顒而上格龎恩霮䨴羣動歡呼臣妾等仰芘嚴宸久㕘内掖竊觀熙事彌忭丹𠂻左右直御侍邢氏等賀南郊禮畢表郊丘昭報適觀聖饗之能海㝢均歡並荷神禧之被矧兹内掖彌浃柔悰恭惟皇帝陛下如日繼明體天行健法宫親事已諧萬國之雍和吉土就陽載洽三靈之眷祐至誠孚格縟禮備成臣妾等㕘列禁庭親逢聖旦欣愉允切鼔舞奚勝請皇帝聼政第一表上穹降禍大行皇帝奄棄萬國天覆地載㒺不攀號中謝恭惟皇帝陛下長發其祥敷聞在下遂奉綴衣之遺訓以傳神器之至公羣元有歸大業斯定惟是庶政未親省覽凡百在公無所禀承中外羣心不勝傾望冀上顧宗廟之重少節哀疚之情從順變之禮文行先朝之故事勉臨聼斷以慰邇遐請皇帝聼政第二表嘗露封章懇祈臨政未䝉俞可彌負兢惶中謝恭惟大行皇帝昭示至公深惟大本惟神器之至重得聖子以能傳四海於是有歸萬化所以無曠天下顒顒而想望號令羣臣懇懇而思見威儀而陛下泣血特深銜哀過毁狥禮文之常制廢庶務之大經凡在事機未垂聼鑒伏望上遵遺訓俯順羣情屈孺慕之至懐為生靈之盛福時臨便殿躬攬大權庶使朝廷皆有矜式請皇帝聼政第三表臣等屢貢血誠冀回天聼羣心傾望未賜允俞竊以為民立君庶政不可久曠以日易月後王所以制宜雖哀慕之無窮豈聼覽之遂廢滯務積而不發大號鬱而未宣羣臣惶惑無以禀命而况大行在殯山陵未修凡百事機動闗奏請必資宸斷方敢奉行伏望皇帝陛下逺稽故事近奉遺音以列聖之基業為懐以先皇之付託為重俯從大計少屈孝思躬攬權綱以御天下臣等叨榮在列義所不安銜泣叙言期於得請賀明堂禮畢表三星居火角之次載考於乾圖五帝列太㣲之庭並隆於國祀罄精𠂻而贊見極厚禮以告成清風翔而羣靈回叶氣流而嘉福應中賀恭惟皇帝陛下纘興聖緒躬履炎符祗栗著事天之誠明發懐思親之感詔季秋而錯事即衢室而告䖍並斥繁儀咸資故實蓋聖人為能以享帝必盡乎至誠惟嚴父莫大於配天用追乎来孝嘉幣升而既奠純犧奉以告牷禮容雜乎天光恭意見乎玉色兹實希濶之典屬我昌明之朝中外䝉休人神胥悅臣等備觀熙事獲庀攸司傳清蹕以言還望赤墀而増忭賀皇太后立皇后表作嬪京室將嗣於徽音恭事慈闈庶成於孝養詔言所被民頌交騰中賀恭惟皇太后殿下坤道静専母儀光大早茂降媯之徳遂成翼夏之功佐佑皇猷發揮鉅典念瑶齊之曠祀舉寳册之隆文治必自家蓋有太任之成法化行於國將復周南之正風臣等備列明庭欽聞嘉命忻愉之極忭蹈攸深賀皇帝立皇后表芝函發詔蘭殿圖儀形治國之髙風尊俔天之懿徳凡居履蹈罔不歡愉中賀恭惟皇帝陛下寳厯在躬至仁撫世武繼文而受命舜協帝以重華思格治平實資内輔乃詳求於鉅典俾刋著於徽章玉璽燦乎瑞文金車賁乎法從翬衣進受永承宗廟之祠麟趾来游行應闗睢之化臣等恪居朝次側聼皇猷觀慶禮之將行溢羣心而交忭賀尊皇太后表誕告天庭聿遵於先訓奉榮長樂増大於鴻名舟車所通罔不相屬中賀恭惟皇帝陛下仁如天覆聖與日躋適當纂業之初彌切顯親之志首圖懿號躬上慈闈即深詔於有司俾㕘求於故實差擇元辰之吉鋪宣寳册之文行展盛儀用昭前烈聖人至徳孰加孝治之風天下羣心得奉母儀之訓臣等猥緣盛際獲綴通班方側聼於制音竚竦觀於典禮欣榮踊躍倍萬常鈞
