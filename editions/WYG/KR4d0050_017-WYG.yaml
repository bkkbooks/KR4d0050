body:
  text: 鄖溪集巻十七宋鄭獬撰論治具論為治之具有化有教有政有刑如一氣之變萬物隨之以生以死而不見其巧者化也民生之愚不能自反徐而牽之於善道教也開其利害判其曲直一歸之於繩墨者政也猾强不制乃為之斧鑿為之鞭笞以刻轢酷楚其肌膚支體者刑也是四者天下之民所以仰而為治也是古之堯舜禹湯文武周公之所盡心也今夫朝廷之出一令建一亊天下嘈然聚議其得失而又逆知其後日之行與不是不可謂之能化也天下之民朝而出作暮而入息莽如山林之鳥獸草木一不知其飢飽肥瘠寒燠是不可謂之能教也彊者鬬智者欺天下之猾亂狙詐者百出是不可謂之能政也惟其斧鑿之用鞭笞之罰具於律令者吏習誦而從事焉又未能盡心也郡縣之吏旦而坐髙堂之上民之鬬撃盜賊欺誣殺人者日集於庭或誅或竄或笞遣之其能辨白黒敢推撃束縳胥輩者已出露頭角號為能吏矣至於怯軟貪冗老昏而病疲者則又有所不能焉當免而笞當竄而誅重輕之權或移於子弟猾吏豪民之手善民瘖瘂而無所訴用刑之失猶如此又豈暇議政教之羙乎夫天下之所寄者内則宰相也外則郡縣長吏也宰相佐天子講治於内而郡縣長吏奉行治於外使天下靡靡而入於善是宰相與郡縣長吏之職也今長吏之臨治以如是是天下之無化與教與政而獨有刑且未能盡心焉宜朝廷之思所以化之教之政之刑之之本原擇賢長吏而俾致於民焉為治之術亦可謂有具矣責任論古之擇人也才其任之也專其持之也久故稱治焉此可為士而不可為大夫此可為大夫而不可為卿為公一眡其能否上下而槩充之昔者舜以伯禹能平水土故為司空以棄能植百糓故為后稷以臯陶能平刑故為士益能通山澤故為虞伯夷能禮故典禮䕫能樂故典樂終舜之世未嘗有二事乃不曰伯夷禹汝復為稷播百糓棄汝復為虞順予草木鳥獸伯夷復典樂以教胄子如此紛紛之更為也武王牧野之戰講兵行師則曰太公望其人也周公不與焉天下既巳定周坐明堂起制度則曰周公其人也太公望不與焉周公雖聖人至與學兵之精深固周公有不如周公且有不如况衆人也耶今求其為師為司空有如周公伯禹者耶求其為稷為士師為秩宗為樂有如契后稷皋陶伯益伯夷䕫者耶周公伯禹為大聖人無有也契后稷皋陶伯益夷䕫為大賢人亦無有也大聖賢人不世出固不可求然自朝廷文武之公卿及百執事郡縣之廉察牧守下至一命黄綬之吏不知幾百千萬人而盡得其才不才之擇乎至其為大理者果不可移之為太常乎為吏部者果不可移之為禮部乎為筦庫簿書之小吏果不可移之為牧守公卿乎又能畢其能而任之乎固無有此也用一中人之材或連踐數賢人之職未能領其綱紀文書而巳復遷去之甚者纔三嵗餘或朞月而罷惟較其資厯之深不考其虗實之效因循頽靡一切為苟且是豈古任人之意耶以周公之聖不敢兼太公望之事以稷契臯陶之賢不敢兼伯夷后䕫之職終其身而無二事今無周吕之才而使之盡周吕之事無稷契臯陶之智而使之一稷契臯陶之務又僕僕然亟遷也欲其磨心出力以濟天下之務難矣夫統羣才而進之者天子也佐天子而議當否者宰相也平其衡銖累而較之此可為士不可為大夫此可為大夫不可為卿為公俾其才不才之用任之以專持之以久專之而無擾也久之而無易也專之無擾則名分定而職業修久之無易則思慮一而政事明夫如是是天下之治可由此而出矣備亂論備天下之亂者古今大勢可見已而未能有善備者也始周之諸侯相禽獵剖而為六國卒併於秦以諸侯之亡周也乃為之備諸侯一剗其根蘖而郡縣之遂令天下無一繩之維諸侯則不作而其末乃有布衣之禍故髙祖不由尺土暴起於風埃之中五載而成帝業漢以郡縣之亡秦也則又為之備郡縣而又裂其土地以封諸侯王盤踞過强卒用不終而布衣則不作其末乃有外戚之禍賊莽窺其隙遂盜有漢璽及光武之再開闢以外戚之亡西京也則又為之備外戚乃不復委重宰相而尊用臺閣三公拱袂而守虗器外戚則不作而其末乃有閹䜿之禍積其殘暴酷烈而終之以董卓天下遂暌而為三魏氏以閹䜿之亡漢也則又為之備閹䜿痛埽刈之一歸其房闥之役閹䜿則不作而其末乃有强臣之禍故司馬父子襲據大柄更四世而禪其國晉氏以强臣之亡魏也則又為之備强臣而培植其宗族雖愚兒懦子皆付以大國强臣則不作而其末乃有宗室之禍朝而為帝暮而為囚五胡乗之遂荒中國瀰漫横流以至於唐太宗乃頗究覽失得而為之大備焉及其末也則又有藩鎮之禍梁唐晉漢周皆以藩鎮而更為帝夫厯世之亂考其所以備之者不為不至窒一穴穿一穴何禍亂之不息也蓋未嘗取天下之公制而獨以巳之私者備之耳成湯周武以諸侯得天下而商周未嘗輙廢諸侯豈非用天下之公制者邪惟其公也故後世之長久繇秦而來獨汲汲備其私者又矯之過嗚呼不得聖人之法而備之奚有不速弊者邪漢封論漢封之失不在髙祖而在文帝何以言之髙祖初起擾攘之中於時天下惟習知有六國之弊而不知周公五百里之封故其王侯崛起各擅一國包山跨河無復疆畛臧荼得燕魏豹得魏韓王得韓諸田得齊趙歇張耳得趙韓信英布得楚更貪互奪惟恐土地之不廣甲兵之不雄髙祖知其勢之不可削也亦欲無盡乎英雄之用乃手裂而盡付之故其追項羽於固陵期諸侯不至用留侯計捐睢陽以北至榖城以予彭越捐陳以東傅之海以予韓信乃能致二人而遂克羽當此之時髙祖豈暇議周公五百里之封哉及其巳平則宗室子弟類皆稚孺頎然老壯餘楚代耳且恐後世一日有隙漏則非强大諸侯無以鎮壓之故又封其同姓各數十城盤踞天下十分之七其後吕氏果欲為亂而天下堅重卒不可揺此髙祖因用天下之勢而為之封庸何有失哉然髙祖非不知其未有弊也以存漢之計大而諸侯之禍未即發也故其封吴王濞召而相之曰若有反相天下一家慎勿反然而髙祖竟封之此其為慮可見矣韓彭軰既巳誅夷吕氏又滅則變而通之豈不在文帝乎於時賈誼欲裂其國以分封子弟俾之久而可傳且拉其脊而折之文帝竟不能用拱手而成七國之禍由此磐石遂􅑶矣使賈誼之䇿行則雖有王莽何由為盜哉夫惟髙祖善用其勢惟賈誼善識其變然而不能遂救者文帝也漢封之失不在髙祖而在文帝孰謂不然哉五勝論五勝之説出於三代之衰乎始於商周建正而用子丑説者由此而推之以周木徳商水徳引而上之則舜為土堯為火帝嚳為木顓頊為水少昊為金黄帝為土炎帝為火太昊為木至於正朔亦或不同又曰周火徳秦水徳漢土徳從其所勝與前復大逆鄒忌賈誼劉向皆持其説子曰行夏之時蓋斥商周建正之非也書言堯舜禹為詳而未嘗言改正朔詩春秋言周為備而未嘗言五勝以董仲舒之博學猶曰舜改正朔易服色其餘盡循堯道不知仲舒從何而得之豈其未見古書而出於䜟緯乎班固又叙帝世言周遷其樂故易之繫辭有所不言尤為謬戾漢諸侯王論鼂錯為漢削諸侯尊王室遂覆其宗忠矣語智則未也幸而漢勝之借呉楚得天下其禍於漢也可勝言哉揚雄以愚論者不究其成敗多譏雄者故著云漢諸侯王類多覆溢大者以畔誅小者以姦亡累迹而發然漢未嘗為擇賢師友以剴切誨導成就之也呉楚既滅創艾繩削内外相伺立為讐賊過若毛氂發為山丘此谷永所以痛切中山所以増欷也至其惡積禍至則皆歎息悔恨其前之不得為善思有以洗心革行亡由也故厲王之遷乃曰吾以驕不聞過故至此梁王亡亦曰傅相不以仁義教臣也是可哀也觀諸王之所為桀紂不甚於此然而無令其獨被惡名宜責漢之不為置賢傅相以誨導之云耳兩漢論西漢之亡也天下咨嗟涕泣而思之其雄豪而起者莫不爭趨為劉氏光武因之遂再有天下東漢之亡也民皆解散而背去之鳥駭土委為袁氏為曹氏為孫氏劉備僅能竄伏於蠻蜀以一彈丸地自鄣力蹶不能爭漢土卒亡焉二漢之亡一起一廢其故何哉亦質乎民而巳矣請言之西漢之初髙祖入闗除秦苛法如提民於沸湯燎爐之中濯之以清泠之泉於時天下蓋巳識漢矣至於文景昭宣用仁恩以結天下廼去肉刑定箠令减口賦三十而税一假民田賜民爵女子牛酒老者絮帛孤獨鰥寡皆有振給四方有一水旱一災異則又為賦池籞發倉廪除民租下詔遣使以循撫之其所以哺乳涵養之意徳澤踰於三代雖元成之間權綱狃為姦倖而亦未嘗有虐政殘民也故其亡也天下咨嗟涕泣而思之光武所以能一呼而集天命至於東漢則不然惟光武顯肅三世為治和帝之後政奪母氏閹䜿遂盛二家之親戚賔客黨類布滿郡國其府第園池之夸侈歌童舞兒車服之玩權貴之貨賂一金之費皆剽奪於民豺狼相付予積百餘年其所以刻剥斵喪之酷則又踰於桀紂民將挾矛操矢而攻之又何思之有故其亡也天下皆解散而背去之此其不復能再興也一起一廢庸非在於民乎故君者所以為養也民者所以為報也養之深則報之厚養之淺則報之薄凡自三代而來其國之亡有久有速者皆以其養之深淺報之厚薄常相符焉養之深報之厚則其存天下也必乆養之淺報之薄則其亡天下也必速漢民之報於漢厯四百年至其殘極而後去之其所以為之報之者亦已盡矣傳曰木之將顛本實先撥西漢之亡本猶在也故再有天下東漢之亡本巳撥矣故暌而為三國然不務深養其民而責民之報厚且久乃自書契而來未之聞也説天説柳子厚作天説謂天之元氣隂陽壊則人由之生譬之果蓏癰痔草木之敗逆而蟲生焉功者自功禍者自禍是天與人絶不相預焉嗚乎亦怪辯矣哉劉禹錫又作天論繁枝葉而扶其説是二子者困廢於時謂天不相其道故云耳俾二子而充其欲必不有是言夫天之可以形得者惟其行日月羅星辰蒸風雲躍雷雨陽燠而生植隂寒而歛殺者耳至其漠然不可窺其隙者是必有命於其人者焉堯舜之際以聖禪聖可謂燦然矣而堯曰天之厯數在汝躬汝終陟元后舜亦以命禹湯武以徳桀紂以賊用至仁伐至不仁亦可以無疑矣而湯曰有夏多罪天命殛之武王曰商罪貫盈天命誅之孔子伐於宋孟子讒於魯聖賢出非其時宜乎為困矣而孔子曰天生徳於予桓魋其如予何孟子曰使予之不遇魯侯者天也此豈聖人造託於天以詐世乎蓋亦有教存乎其中矣强桀之臣欲負力而覬非望者苟能自反之必懼曰蓋亦有天之厯數云耳昏慢之君將肆欲乎天下苟能自反之必戒曰天儻或命有徳者代予云耳趨進之士皇皇而無所合苟能自反之必安曰予之不遇乃天處之云耳然而其命之者不可以有窺也其道至大以簡非如君上之有爵賞刑罰也非如父兄師友之撫憐而告語之也今欲以一痛疾一呻呼而覬天之渠渠然仁且哀之既不為動遂舉謂天不與人相預設天果能聴之則天下之人號呶狂走將挾其長短曲直以辯訟於天則天之擾擾固多事矣其將竭蹷奔趨應對之不暇尚何有髙逺而不測者邪孔子曰道之將行也歟命也道之不行也歟命也由周公而上聖賢得其用者蓋亦天云耳由孔子而下聖賢不得其用者蓋亦天云耳是聖賢之進退廼不在天與故君子者勉而學問修而忠信履天下之正道居幽屈而不疚以待夫天命者焉易曰樂天知命故不憂又曰居易以俟命然則不修而務信天者非也修而務不信天者亦非也修之者在我也貴之賤之在天也不修而務信天則怠修而務不信天則妄怠與妄君子不由也今二子外其天事而一推之人則逹者必矜其才智厲其吻齒力排而前曰在人而已天何預我哉其窮者又將不忍其狷憤變易其操守亦力排而前曰在人而巳天何預我哉烏乎以二子之博學溺而為伾文則信其説之駮而不免於世焉孔子曰不怨天不尤人若二子者其怨天者歟其尤人者歟險説或問聖人尚險歟曰尚險易有之王公設險以守其國或者曰此非險也言機也託云險耳曰天險不可升天有機而不得升乎地險山川丘陵為地之機乎或者曰險者豈可設歟曰擇土建國非設而何或者曰呉起有言在徳不在險記者傳美之曰兹陋説也文侯方磨牙與羣虎裂食天下起激之云耳或者曰周公豈不大聖人與其營洛邑曰使有徳者易以昌無徳者易以亡顧為非邪曰孰謂周公有是言乎周公之營洛以廣畿地而備制度耳故兼豐鎬以為千里周公欲後世之易以亡則七年渠渠安用制作邪制作所以繼後世也周公不欲後世之速亡也明矣哉或者曰周公曷為不都洛曰是所謂聖人尚險也奚獨周公邪古之為天下者皆推擇其雄山大川之形勝者而為之國故唐虞都蒲或都平陽夏都安邑或在太原商遷於汲又遷相文武在豐鎬秦漢固闗中據上游以制天下兹聖賢之意巳故古之能兼天下者常在中國呉之亡也而晉取之陳之亡也而隋取之以劉裕之雄入闗破姚秦卒敗而返尺土不得收古之為國畧可較矣或者曰然則險愈於徳與曰非是之為也徳者行於巳險者外禦之耳中材之君有地有險易以守也今有人蓄百金之篋置之通衢曰吾有徳以守之安用室宇垣墻為衆人且知其不可百金之篋然耳况為天下者邪震説天雨作其聲肱肱然以逺聞者雷也裂然疾而暴作者震也天之所以為威也物之幽伏頑處强悍而不能自達者是肱肱然不足以鼓其間於是裂然暴作而時一震之天下之人起而􅌶然畏之曰威也然則非蚤暮習而日見之也非漠然寂寥曠而無之也日有之則玩焉不足以為畏也無之則怠焉不足以為畏也其與古之震天下者合歟夫忞忞之政潰潰之俗其久瞶而久眊也不裂其耳目而一震之則不肅唐堯之老天下事有倦而不起者舜作而震於崇山震於三危震於羽山震於幽州當舜之時合震者四天下􅌶然畏之曰舜威也紂之不道諸侯肆行文王作而震之震於宻震於崇震於昆夷當文王之時合震者三天下􅌶然畏之曰文王威也孔子斥而季氏僭魯有不震者焉望之殺而恭顯進漢有不震者焉後之世不震者相躡矣如欲作而震之則莫如法舜與文王使天下蹵然而改聴矍然而改眎一開耳目之弊然后主威尊而號令行易曰震來虩虩笑言啞啞其舜與文王之謂歟虎説安陸故多虎或躍而入郭里民設穽以逐之虎避去入山民即山復為穽虎遂窮而逺遁今亡虎矣天之生物與人迭為盛衰天下平治之久生齒大繁暴害天物亡休息異時漢溪多魚矣不售則反棄諸河今財充釡而巳是川澤不足以勝網罟異時南山多薪矣凡民得樵焉今相鬬於叢薄間是山林不足以勝斧斤異時夢澤多稻矣鄰里不相求今持劵而徃無所貸矣是田疇不足以勝食故古之聖人於物也養之有道取之有時獺祭而魚梁入隼擊而罻羅用故物與人相資而不相竭後世亡法故物與人迭盛而迭衰自唐末五代兵滿四海生靈苟活於白刃間廬聚不見㸑烟是時山林川澤得以休息而物大出為暴若海潮之溢於是魚蟲鳥獸羣行而奪民之居虎豹厭食若人矣是非盛衰相勝而有時哉善持之者不欲其有所勝而有所害若安陸之虎既窮而不得自託於山野民既巳勝矣然亡使其復躍入郭則甚善
