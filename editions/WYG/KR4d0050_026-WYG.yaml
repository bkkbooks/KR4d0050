body:
  text: 鄖溪集巻二十六宋鄭獬撰七言古詩上李太傅陳人嘗傳李太傅云作太守来此州頃遭暴水拉隄出設施畫略排横流大偷嘗欲宂隄腹掩之即日斷其頭至於小猾幸民禍鈎羅姓名皆不留太傅諱士衡天聖中守陳是嵗蔡水溢而居民袁氏者夜以繩齧堤太傅即掩誅之盡遷今所謂袁家口是也又水盛恐其善泅者乗之為盜乃浮𤓰扵河募民投取之得一𤓰輙賜以巵酒由是盡得善泅者而藉縻之陳人恬恬但眠食恃公牢固如山丘今兹水暴瀦外郭眼見盜賊何由仇况我方在艱阨中竄奔日懼蛟龍求烏乎不見李太傅使我涕淚成沈憂次韻程丞相重九日示席客湖光飛出洞庭秋拍手齊看山公遊墨雲抱日離東海蒼霞穿漏紅光浮我公重惜此佳節擕賔留燕停鳴騶城角直穿一氣外碧鱗縹緲飛髙樓晩花纎麗金靨閙平莎䝉宻緑髪稠手把玻瓈笑當坐飄然逸氣凌雲遒湏㬰大巻出新作鐵網色住鯨與虬四座傳觀賞佳句絲管不發清歌留茱茰著酒紫香透芙蓉挿髻雙眉修後堂新壓菊花釀傾在玉盆凝不流美人再拜勸公飲一飲可忘今古愁誰謂長戈可駐景誰謂萱草能忘憂斯言寥闊不可考樂事湏向尊前求霓裳法曲古来絶小槽琵琶天下尤只此醉鄉有佳境此境不與人間侔公之佳妓善霓裳法曲而胡琴尤絶酬余補之見寄吾友補之㑹稽家髙眉大眼稱才華入京共收大學第姓名頭角相撑磨髙樓管絃相與雜黄金酒面溶成波罇前軒昻如孤鷹四顧不見雀與蛙試招紙筆恣揮掃縱横噴薄不可遮我疑君心如春風呵吐草樹皆成花忽然驚爆險絶句旱天霹靂雷霆車我輩觀之瞪兩眼汗流滿面空長嗟眀年南北别君去落照滿帆秋風斜天涯朋歡少披豁還如穴鰋跳泥沙兩耳喧聒久厭苦思君便欲飛僊槎前時得君山陽書副之長句封天葩筆墨勁徤愈精絶鐵繩鈕縳虬爪牙有時風雨恐飛去嘗自宻鎻金鴉义嗟我文字苦慳短才力不敵兩角蝸下筆欲答輙自止如君一句已可誇持此聊且謝勤叩念君不見愁無涯酬隨子直十五兄通州窮並大海涯厥壤不毛坤徳虧床下矍索穴蟛蜞我初来居常吟悲見君顔采方伸眉眸子清徹鬢垂頥中懐洞然無由岐鐫鑱文字干有司古書細抄指生胝弟妷鳬鴈行纍纍脱衣易粟飴其饑慈祥孝友鄉里推前者天子親饗祠黄紙赦書疾風馳掛羅山林網逸遺守臣奉詔敢言遲外臺使者爭薦之野廬供餼禮所宜白袍大袖何紛披来居太學森蘭芝世俗譏議喜瑕疵蒼蠅往来工讒詞椎鑿璞玉生瘡痍猛虎不如墻下貍聽者雖眀豈無疑紫薇羣公文章師發以鉅策健筆隨鋪紙吐論語亦奇綴名紙末何其卑藻火為裳誠倒施赤驥不得黄金羈編之下櫪耳羸垂令我包羞心鬱伊一舸東入長淮湄勿言顯發遂無期青衫猶足慰妻兒海陵得君七字詩重謝觧謗稱相知我雖有言如鈍錐説之不入何能為願子加餐善自持髙山峩峩寸土基前塗如壁不可窺榮落窮通各有時戲酬正夫汪子怪我不作詩意欲窘我荒唐辭自顧拙兵苦頓弱安敢犯子之鼓鼙子之文章既勁敏屢從大敵相摩治左立風后右立牧黄帝秉鉞来指麾蚩尤跳梁從風雨電師雷鬼相奔馳頃之截首挂大斾兩肩塜塟髙峩危如何韜伏不自發欲用古術先致師遺之巾幗武矦策司馬豈是尋常兒應須敵氣已衰竭然後鐵騎来相追回戈坐致窮龎伏得非欲學韓退之嗟我豈敢與子校唯圖自守堅城陴况兹憂窘久廢絶空餘衰老扶瘡痍開巻舊守或不識豈能有意爭雄雌朝来據鞍試矍鑠是翁獨足相撑支檢勒稍稍就部伍亦欲一望将軍旗曹公東壁不羞走周郎未得相凌欺便湏持此邀一戰非我無以發子奇送蔡同年守四明尚書蔡公在廊廟器業文章第一人繡墪賜坐議大政天子稱之社稷臣渥洼遺種出驥子纔生七日超其羣蔚如長松倚絶壁灑落不雜人間塵東風共醉杏花下滄波浩蕩天地春近者諸公薦御史宰相未識真麒麟却借朱袍下南國畫船醉眠官不嗔吾徒對酒共歎息破車快犢誠難馴陳蕃髙才雖少對辟書聊慰汝南民溪山見君亦須喜飛雲遮路迎車輪朱雲風采久寂寞豈宜逺處滄海濵送仲㢲歸闕下老驥不妄行蒼鷹不虚擊髙車折軸棄路旁蠒栗犢兒負其力指麾萬事自有理不湏破海驚霹靂君不見張侯白頭郎仗節雍容在南國事如倒山落面来談笑當之不遺策往時夸者欲驚俗揭浪翻風一千尺屢成大獄沸如糜六月飛霜觸白日張侯不矜亦不倚老驥蒼鷹稱其徳洞庭之北十二州吏民帖帖甘眠食有詔奪歸不得留正值風雨花狼籍離思浩蕩入青春楚澤荆山淡無色此行况是赤縣官君新除府畧提舉賢者宜令天子識公雖已老心尚存今不急用真可惜但用河南張漢陽何必東山謝安石送人東上騏驥太俊不得馭塵埃尚走髙陽翁奇文泣下鬼神血髙議鑿開天地聾平眀仗劔背我去老蛟奮鬛歸江東送李處士南歸駕車跨馬聲嘈嘈長劍濶佩横滿朝塵埃走趨顔髪老先生久客得無勞夜来氣味有秋色歸心鬬與秋風髙揭竿跨浪好歸去扁舟爛醉眠雲濤大小不能薦天子遣詩有意徒嘵嘵題名碑石琢之已成求章伯益友直先生篆額老匠隳山斬蒼石偃然巨璞長於席鋭鑿飛椎日鑱擊金錞嘲轟滿虚室白沙礲就大禹圭紺滑自同青玉色兩螭攫挐相鬭立欲求大篆冠其額先生絶妙不湏言引墨為我一落筆蟠屈玉筋入石壁吾曹名氏遂輝赫異物不復容侵蝕赤尾鯉魚問消息丐我數字得不得讀朝報天子曉坐朝眀光丞相叩頭三拜章乞還相印避賢路願為天子專城隍上恩深厚未聞可丞相退讓聞四方濃書大紙批聖語鳴騶却入中書堂滯客五月不雨至六月河流一尺清泥渾舟人擊鼓挽舟去牛頭刺地挽不行我舟繫岸已七日疑與緑樹同生根忽驚黒雲湧西北風號萬竅秋濤奔截斷兩脚不到地半夜霹靂空殺人湏㬰雲破見星斗老農嘆息如銜寃髙田已槁下田痩我為滯客何足言感懐北風哭夜星辰寒竹籬敲戞鳴琅玕老蟾痩噤失光采天地凍合魚龍乾嘅然憶歸幾千里長江大山交屈蟠湘水東去注不極我心夜夜如鳴湍弟兄起居諒懽適髙堂綵衣翩飜飜嗟我摧頽落滄海兩腋恨無雙飛翰逺方就學何所得數年短髪才勝冠何時拂袖得歸去春風笑滿南陔蘭木渠木渠逺自西山来下漑萬頃民間田誰謂一石泥數斗直是萬頃黄金錢去年出穀借牛耕今年買牛車連連湏知人力奪造化膏雨不如山下泉雷公不用苦震怒且放乖龍閒處眠安得木渠通萬里坐令四海成豐年道傍稚子稚兒怕寒床下啼兩骭赤立仍苦饑天之生汝豈為累使汝不如鳬鶩肌官家桑柘連四海豈無寸縷為汝衣羡爾百鳥有毛羽冰雪滿山猶觧飛買桑出持舊粟買桑葉滿斗纔換幾十錢桑貴粟賤不相直老蠶仰首将三眠前日風雨乖氣候凍死箔巻埋中田蠶不見絲粟空鬴安得衣食窮嵗年題正夫小齋栽新竹竹皆雙植斵開俗境栽新竹滿地冰圓映玉膚髙梢爭出翠鳯尾孤根對植蒼龍鬚雨聲曽洗越溪石風影冩成湘水圖獨有素娥留夜月與君相對倒金壺捕蝗翁嫗婦子相催行官遣捕蝗赤日裏蝗滿田中不見田穂頭櫛櫛如排指鑿坑篝火齊聲驅腹飽翅短飛不起囊提籯負輸入官換官倉粟能得幾雖然捕得一斗蝗又生百斗新蝗子只應食盡田中禾餓殺農夫方始死獐猿翠樹不從青嶂出蟠根却向屏中生黄獐引脰探緑葉老猿䕶雛枝上驚獝然相顧見異態誰言野物能忘情我来賞激繞屏下亦疑此身林中行自古畵工無畵者今得絶筆方傳名吾廬昔在鄖溪上滿溪桃花春水眀曽隨麋鹿藉芳草更倚白雲聽嘯聲省中畵屏蘆雁髙堂傾動長江流黄蘆羣雁滿滄洲掃開長安塵土窟冩出江南煙水秋兩雁斜飛入空濶四雁顧慕横沙頭髙風拉折蒼玉榦蘆花雪盡無人收赤日飛光不敢近但覺爽氣屏間浮嘗聞畵龍入神變坐馳雲雨天地逰只恐此雁亦飛去瀟瀟萬里誰能留黄雀啾啾黄雀竹間飛日晚復歸枝上棲雪粒盖地三寸玉地膚凍裂不作泥錦韝公子臂蒼鶻快馬踏下黄雲低馬前紫兎躍白草老拳下批饑兒啼啄鮮裂血飽腹去可憐黄雀空死饑五言排律和御製賞花釣魚曉日開閶闔春風滿未央水揺天仗影花雜御衣香覆檻紅梢接連鈎紫鬛長千鍾浮帝酒五色染天章鄒馬摛嘉頌䕫龍拜夀觴金輿歸晩處正在五雲傍程丞相生日大昴光芒正荆河氣象渾始知真相出遂見本朝尊漢地汝陽國程侯司馬孫精剛得金氣深厚體乾元申甫生周嶽臯䕫拱舜軒山河歸妙算社稷繫昌言九鼎羣生重洪鑪一氣奔羣雛忌鵰鶚衆草失蘭蓀慷慨提千騎扶揺下九閽秦闗春草短洼水暮雲屯詩必曹劉敵兵湏衛霍論談餘珠委積筆落鳯騰鶱秀髪煙霞外丹心金石存未歸真宰柄猶倚大師藩日月回龍角星辰㑹紫垣氣凌金節潤風入繡旗飜歌筦傾南國簮裾拜慶門飛黄下天廐縹酒賜堯樽固有神靈䕶應知福祿蕃蟠桃三結實未見老雲根後閣四松丞相當時植幽襟對此開人知舟檝器天假棟梁材錯落龍鱗出襹褷鶴翅回重陰羅武庫細響靜山臺得地公堂裏移根澗水隈吴城夢寐逺泰嶽嵗年催轉覺飛纓謬何因繼組来幾尋珠履蹟願比角弓培栢悦猶依社星髙久照台後凋應共操無復問良媒夜意卧北斗柄直挿西月角横風吹病骨醒秋入壮心驚騏驥老方健太阿靈有聲山河寄功業樽酒識平生豺虎湏探穴朝廷可息兵山西少勁氣天外縱長庚自古輸成算誰人觧請纓干戈五十萬何日到燕城出城塵土滿城黒出城雙眼寛山川秋氣惡風雨晩潮寒物象颯以變泥汚不可蟠英豪重節概兒女感衰殘霜老琱弓勁風焦畵鼔乾蛟螭正無頼好擲六鰲竿五言律詩晩晴人間久厭雨最快是初晴驟見碧林影喜聞歸鴈聲乾坤一蘇醒耳目兩聰明寄語浮雲意休来汚太清乍凉雲湧海潮黒軒窻涼氣侵清風醒病骨快雨破煩心噴薄紫荷盖飄颻青桂林作詩招醉友方外一相尋淮西道中夾道栁梢長竹橋風影涼行人殘照裏歸路白雲傍泉淺帶土味嵓深聞草香到家花已盡杏頰擁枝黄舟泊鳴櫓觧雙纜寒蒸江氣昏春雲兼雨重晚水帶潮渾小市魚蝦集空亭燕雀喧一尊得濃睡行計不湏論江行碧草巳堪剪長江二月頭林深藏宿雨岸豁聚春流潮背燕支浦山横桑落州松醪欺客病易醉苦難投雨後江上船泊碧鑑裏清風晩思長江臯過㣲雨秋色滿斜陽浮野山光動侵衣水氣涼好尋紫溪叟共醉碧荷香雲中憶歸何日燕南去平生此別稀定知花已發不及雁先歸寒日連雲慘驚沙帶雪飛雲中風土惡換盡別家衣臨淮大水大水沒樹杪渉冬原隰平蛟龍移窟宅蒲稗出縱横壊屋久不補汙田晩更耕接春恐流散何策活蒼生邇英閣早直緑樹蔭脩廊雲深別殿涼星文開帝座玉色泛天光大典尊周孔名家盛漢唐時講春秋讀漢唐二詩自憐携釣手持筆翠旒傍朝退朝退洗雙耳厭聞人是非不知春意晚時有燕聲歸散木還容老孤雲亦倦飛趨時自踈闊不是學忘機閒居二首空庭羅雀網應似翟侯居多病惟尋藥忘機不著書僧来留石鼎人在典金魚惟有南窻睡春来分不踈不從山下住若箇似山家留地教移竹開門自掃花林踈容鶴卧溪淨怕雲遮落日杖藜去塍頭看稻牙閑悶閑悶萬千縷金刀不可裁逢人心不記見酒眼方開亂夢無時斷殘春數日回東風固相惱時送落花来晩悶晚悶牢難破秋懐勇未降何人歸楚國竟日憶溳江鼠跡排書簏蟲絲網酒缸江都章未報枕手卧南牕小軒鑿見碧天影秋光注小軒消閑惟蠧簡破悶有金尊怪石中邉透老松鬚鬛繁人生有佳尚塵土暗朱門不出髙卧即經旬林間掛葛巾野雲閑照水山鳥自啼春釀酒期佳客開書見古人莓苔漬雙履不識洛陽塵憶在晉陽憶在晉陽日曽為痛飲家披衣投宿酒把燭覔殘花莫觧玉驄馬且留金鈿車壮逰今不復愁卧鬢将華送周宻學知真定府白髪漢中郎旌旗下建章雪通沙路潤春入塞雲黄地勢井陘口天文大昴旁平時巻金甲壮畧寄壺觴送恵思歸杭州湖上秋風滿歸懐豈易寛身隨秦樹老夢入浙江寒為客久應厭到家貧亦安石房舊書在重拂綠塵看送盛寺丞蕭相闗中守元瑜鄴下豪秋風嘶白馬路草照青袍地入參旗近河連積石髙當年兵戰處尊酒屬吾曹送張景山知康州遂溪張太守懇意乞南州家在白雲下郡當滄海頭旌旗瀧水晚風雨瘴山秋觧却淮西印輕為萬里遊擇甫初授蔡州確山知縣也贈任某寂寞任夫子窮山秋氣寒塵埃雙鬢白金石寸心丹不悔窮經老所嗟行道難太阿終亦斷寜久匣中蟠寄汪正夫汪子清徹骨竦如秋竹竿髙名九鼎重俊氣一峯寒議論今誰對文章古所難青蠅變白黒無汙碧琅玕寄陸憲元陸子處乎順雖窮志愈剛劍埋金不蝕圭折玉猶方古意閑中見浮名静外忘行藏吾自得可笑接輿狂李道士金鼓破南粤山中冷不聞是非同一馬富貴自浮雲吐納龍虎氣遨遊麋鹿羣朝来問丹訣已酌凍醪醺次韻酬張擇甫別後正春孟溪頭黄栁牙相思滿芳草獨自照殘花晚樹秦川闊黄雲瘴海賖上樓無別望歸路向西斜留別汪正夫夫子青雲士聲名孰與齊心經時事老顔向俗人低氣象必衝斗風雷猶蟄泥行看萬里志聊爾謝羣鷄正夫方舉賢良贈儀真宻禪師渾淪老學佛到處説支郎施君自號渾淪男子盛談宻禪師為淮南禪宗斷臂求諸法浮杯徧十方自栽雙栢樹獨坐一繩床惟有林間客時来扣竹房即事簡友人門巷徧芳草相期春醉稀可憐雙燕到還似故人歸幽鳥隔溪語落花穿竹飛誰知静者樂石上脫朝衣久不得孫中叔信秋風起天末之子在窮途久客住應悶故鄉歸得無清淮不到渭晚樹自沈吴願寄一樽酒與君消壮圖眀皇四海不揺草九重藏禍根十年傲堯舜一笑破乾坤羌貊皆冠冕豺狼盡子孫潼闗兵已破㑹憶老臣言晉陽宫基金屋無寸瓦蒼然老樹青海枯露龍穴火盡見坤靈自惜流血處扵今土氣腥廢興千載事過耳一飛霆題招提院静照堂招提去山逺還似在山家晚日惟歸鳥春風自落花空談銷劍火醉墨灑天葩更欲拏舟去清溪月正華題處士居髙卧太湖石自嫌名利腥網羅當道路鴻鵠出青㝠氣貯秋琴淡心蟠古劔靈我来閑劇論山鬼不湏聽王氏園車馬少行跡鄰僧為掩門飛泉鳴似雨老竹瘦於孫幽鳥静相語晩花寒亦繁主人雙綬重遊客倒金樽簡夫別墅靜境清無敵門前繫鹿車買山慿野客覔竹到鄰家棊為尋圖勝書因借本差平時非厭仕所樂在桑麻簡夫北墅先生已到舍稚子未歸樵草晩牛羊病場登雀䑕驕孔顔雖困魯䕫契未忘堯自笑非逋客煩君重見招挽程中書令三首社稷方為繫乾坤豈不容廟堂遺劍履風雨失蛟龍漢将蓮花幕周人馬鬛封小羌猶慢禮先折太阿鋒舊愛霓裳曲飜聞薤露謌賢人今已矣天道竟如何泉下一抔盡人間萬事多空餘幕中客冩淚劇懸河湖上千條栁山翁舊日栽自從春水綠不見相車来眀月何湏好餘花忽更開平生歌舞地零落濕蒼苔挽仁宗皇帝辭五首恭儉同堯舜憂勤固損年悲風来萬國白日下中天薄𦵏遵周室初陵兆洛川至仁推廟號百世不能遷四海一眀鑑舟車萬里通名王花賜綬戰士錦韜弓孝武曽疲戰眀皇亦召戎爭如四十載終始太平中付託神靈器子孫千萬年果為天下福遂得聖人傳已定無疆業方成顧命篇眀朝無一事脱屣或登仙歌舞西陵望衣冠渭北遊應從天上樂不為世間留龍去鼎湖晩鴈飛汾水秋羣臣淚横臆空拜翠雲裘曽從西池幸宫花落未稀日隨黄繖轉雲繞赭袍飛臨水樓臺在傷心歌管非都門舊行處却望夀山歸挽吴宣徽育平生負髙節至死寸心丹眀主雖容進孤臣豈易安神歸嵩嶽黒人哭洛川寒不識平津面臨風亦涕汍大策三千字朝廷耳目醒髙名動牛斗直氣破雷霆美行皆成法閑談盡可銘悲哉真玉樹風雨一飄零傷田肅秀才慟哭遂滅性誰言天道長未收雙寶劍已失一飛黄稚子遥虚祭孤棺寄異鄉可憐江夏守不得薦黄香石榴髙枝重欲折霜老裂丹膚試剖紫金椀滿堆紅玉珠根雖傳大夏種必近僊都題作江南信人應賤橘奴貢麟麟本出中國無聞貢海濵豈将逺方獸煩我太平民烹割羅牲餼奔趨掃路塵漢髙甞聘士此禮屬蠻人
