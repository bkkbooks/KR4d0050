body:
  text: 鄖溪集巻二十八宋鄭獬撰五言絶句齊山晚歸飲散齊山晚夕陽秋浦紅不須鞭五馬十里聽松風出都次南頓駐馬綠隂下離人正憶家可憐桃李樹猶有未開花酴醿清香無物敵粉葉自成圍白玉瓏璁髻真珠纓絡衣題僧文瑩所居壁西湖頻送客緑波舟檝輕春入蘿徑静浪花翻逺晴七言絶句詠史漢地龍蛇始遘迍曹公崛起定經綸隂謀用盡得天下誰道彼雛解笑人魏生被責灌將軍股慄如何不自陳若使當時有英氣肯為丞相掃門人漢家行賞盡論功禍福于人豈易窮解把舊恩酬項伯獨將大義斬丁公讀蜀志曹公屈指當時輩天下英雄數使君髀肉消來還感泣争教漢鼎不三分莊鵾辭海初離安陸詩歸路漸驚紅葉老舊山已落白雲深莊鵾聊欲辭滄海越鳥終須憶故林下第遊金明池騎殺青都白玉麟歸來狂醉後池春人間得䘮尋常事不避郎君走馬塵久泊餘杭關外水涸不能行晚雨甚快解舟有日矣初看紅芰小開頭今見青房結子稠深謝晚雲憐滯客故飛凉雨送歸舟書屏翠篠疎明臨晚水紫葵㸃綴落晴沙山雞對卧緑蒲葉野鴨争銜黄荇花夷陵張仲孚顒以荆州無山為戲輙書二絶使君終日倚朱欄緑樹髙樓掩映間自有碧江無限好荆州佳境不須山雨後飛雲冉冉回碧天都似鏡初開只應峽口多山處不見秋光萬里來再賦如山小堂草草屋三間暇日徜徉養夀閒掲榜如山還自笑何人不老似青山客意已换春衫别後衣此心長共白雲飛髙堂夀酒年年事趂取榴花及早歸讀司馬君實撰呂獻可墓誌一讀斯文泪㵼襟摩天直氣萬千尋知君不獨悲忠義又有兼憂天下心讀李英公傳李宻被誅猶不負文皇顧命更何疑豈將當日奔亡後比得當年富貴時曉凉銀河垂角斗星稀曉簟微凉夢破遲落月半庭人未起好風揺動碧桐枝三月三月江南梅子青春遊已過畫船横酒懐索寞人初倦已喜金盃弄水聲夜寒欄干徙倚未能眠雲破初開碧玉天滿地雪花寒不掃恨無明月對嬋娟晚晴漸覺沙頭碧草乾開簾更把晚雲看波光月色俱清絶應有新花怯夜寒雪晴一抹明霞暗淡紅瓦溝已見雪花溶前山未放曉寒散猶鎖白雲三兩峯秋晴雨洗秋空明似水瓦光浮動碧差差好風晴日虚忩净正是幽人養病時塵埃袖裏金鎚白㲲袍塵埃自古出英豪胷中憤氣蟠不得一夜虹蜺萬丈髙明月一環明月午初停自挂虚忩不可扃恰見梧桐一雙影緑隂漠漠覆中庭聽泉為愛飛泉灑雪凉無縁移近曲欄傍直須買斷清溪住引取寒聲繞卧床湖上湖山只合住真僊家在鄖溪未有縁欲把金錢三百萬萬松嶺上買雲眠採江江上雲亭霽景鮮畫屏展盡一山川遲遲欲去猶回首目盡孤烟白鳥邊江行五絶馬當之西絶險處青山獨出無四鄰且繫畫船楓樹下行人去賽小姑神三日禁船官不容波如連屋萬千重莫向長江争道路如今風雨屬蛟龍清明村落自相過小婦簪花分外多更待山頭明月上相招去踏竹枝歌快帆美滿送船去忽值髙沙船不行只道今朝風色好不知還有暗灘生西江廟前飛來鳥紫金作翅尾畢逋翻空趂船接紅果銜去却哺林中雛觀濤怒濤沃日為之隂下有蛟龍不測深若比人間惡風浪長江風浪本無心水淺舟滯解悶十絶聞道春流下斗門扁舟應得解南村欲看竹箭開新漲更挿楊枝記舊痕正愛春波妥妥長微吟倚棹落花傍狂風忽送蛟龍雨翻動一天星斗光柳枝拂水萬千縷水去栁枝還却回不似桃花愛飄蕩等閒流出碧溪來壩上春流滑滑來行人相語笑相催解舟直入碧天去天上晚雲行處開小鳥羣飛獨木隂笑聲騷屑如鳴琴見人接翅却飛去還入前村楓樹林稚子持竿坐芳草魚兒跋尾出浮萍㑹稽巨犗沉猶脫滄海驪龍睡不醒酒徒不復少年時白髪狂歌亦未衰更與春風酬一醉好花猶有兩三枝青天萬里放醉眼啼鳥一聲傷客心携手尋春春盡日此時真直萬黄金春水駸駸抺舊㾗兒童乘浪戲青雲去如跳鯉忽驚散來似遊鳬還作羣斗城縹緲浮雲裏歸路坡陁碧草斜北極巳看龍虎氣神州漸近帝王家登第後作文闈數戰奪先鋒變化須知自古同霹靂一聲從地起到頭身是白雲翁公病中嘗夢浴玉龍池驚見體生鱗角而寤探花粉蓓團梢相並開醉中走馬探花回春衫不惜露痕汚直入閙花深處來上朝秋風御路冠蓋滿曉月畫樓鐘鼓遲卧聽傳呼丞相入可憐正是上朝時翰林夜直召草富丞相制中使傳宣學士家君王令草侍中麻紫泥金印才封了蓮燭燃殘一寸花夜宿秘閣金馬藏書大帝家繞簷鳴玉滴氷牙晚雲不動寒風斷殘雪時飛三兩花乞郡曉日銀臺再上書相君何日奏丹塗紫皇有意憐衰老乞與揚州第五符省中栽花凌晨上馬晚方回不省好花開未開誰把金錢買花樹帶將春色入城來試院中懐公逹黄衫自掌貢闈𤨏强刷塵心酒一杯天上謫仙如見憶可能騎取老鯨來被恩出使鏡湖清淺越山寒好倚秋雲刮眼看萬里塵沙巻飛雪却持漢節使呼韓予時求㑹稽郡出北關去年此地送行客俯仰之間迹已陳今日復來相别處使君却是北歸人過十丈山慣向長安事朝謁滿衫塵土厚於泥行人若愛青山好何不暫時留馬蹄白雲道中翠璧連環三百里行人不柰愛山何莫辭下馬尋雲逕前到淮西塵巳多過三十六洞草深樹宻不見溪但聞地底溪聲迴忽從山口渡流水始知此溪山北來蒼山連環不斷頭溪聲繞山無時休後溪已穿緑樹去前溪却向山前流髙溪却㵼低溪水溪裏分明見白沙夜來山上暴風雨溪口流出紅桃花離蔡州風吹醉面出南州兩行紅裙立馬頭已過落花時節晚不須再拜苦相留離雲中一首南歸喜氣滿東風草軟沙平馬足鬆料得家人相聚說也知今日發雲中漢使離北庭常限正月四日入涿州飲馬桑乾流水渾燕山未晚已黄昬衣襟猶帶長安酒不分江湖浣舊㾗回至涿州來時正犯長安雪今見春風入塞初為問行人多少喜燕山南畔得家書五松山李白嘗遊此今有寳雲寺天上仙人謫世間醉中偏愛五松山錦袍已跨鯨魚去惟有山僧自往還秦淮秦氏無過一再傳欲圖萬里據秦川漢家只在芒山下却謂金陵五百年四海龍蛇日沸騰秦皇萬世欲相承漢家王氣芒山起却事東巡鑿秣陵淮上桐栢山中草木靈淮源潏潏繞山鳴誰人鑿出渾河水汚却長波萬丈清車蓋飛雲不放船長疑水府貯神仙淮靈須信疎慵甚欲住荆州不計年自天竺遇雨却回靈隠月桂峯前快雨飛林間避雨亦沾衣才晴便出西山路却共斷雲相趂歸舟行次南都遇雨雨聲飄斷忽南去雲勢旋生從北流料得凉風消息近蕭蕭只在栁稍頭老火燒空未易收忽驚快雨破新秋晚雲濃淡落日下已似楚江南岸頭自靈隠回謁孤山勤上人獵獵長松十里風歸時路與北山通陶濳今日無餘事更過虎溪尋逺公贈冲雅師善草書姑孰上人溪上居碧松揺雨晚凉初誰將六角竹枝扇來問羲之覔草書赤壁帳前斫案决大議赤壁火船燒戰旗若使曹公忠漢室周郎争敢破王師早起頭疼宿酒未能解獨怕曉寒簾捲遲懊恨桃花愛飄蕩夜來壓折海棠枝送禪雅歸姑蘇秋風江上白雲飛江氣飄蕭欲灑衣正是荷花滿吳國詩人靈徹故山歸嘲范蠡千重越甲夜成圍宴罷君王醉不知若論破吳功第一黄金只合鑄西施湖上晚歸江梅向臘雪初飛莫向花前酒數稀為報玉堂批詔客夜來乘月北山歸柳湖晚歸碧天寫入柳湖底天上醉遊春日斜便留畫舫入城去不忍馬蹄踏落花舟中睡起銅盤緑水浸紅蕖風巻紗㡡睡足初金殿故人如借問為言病酒嬾修書重到城東有感三首曽訪花翁醉玉壺重來花下盡平蕪東風繞袖應相識記得當年舊酒徒好春初滿杏園花十里曽携載酒車今日黄雲衰草地不堪更送賈長沙李子思謫官又於此相别也仙桃移在玉欄初紅抹臙脂嫩㸃酥聞道飄零落人世清香得似舊時無逄賈老買得虚名東路歸自憐鷗鳥本㤀機吾師不用苦迎送亦是當時一布衣贈徐登先生鬢髪如黧眼正青鍊來玉骨巳通靈我來欲問金丹訣三日林間醉不醒柳湖席上呈夏宫苑千條萬條楊柳絲好花不過三兩枝淮陽多牡丹然竒絶者每圃不過數枝今日樽前為君飲明朝酒病終不辭阻風遊銅陵䕶法寺白浪浮江打白沙江頭緑竹對僧家春風也似玉京好一樹殘紅山杏花正夫草巻巳就余例亦奏牘今得絶筆琳琅之寳出荆山合作珪璋與佩環楚澤白茅最微陋何縁亦在貢書間送王殿直玉尺新裁白紵衣楊花紛泊滿衫飛少年不怕風塵惡汚却鄣泥走馬歸一尊聊寄洞元師既到山中春未遲料得醉眠巖石上曉風零落小桃枝洞元道士酒中仙散髪人間五十年醉後不知山月上竹間横枕一琴眠送曉容龎睂蒼面已衰翁猶踏天衢塵土中收得閒名好歸去鮮魚白酒醉秋風寄郭祥正天門翠色未饒雲姑孰波光欲奪春怪得溪山不寂寞江南又有謫仙人寄題峽州宜都縣古亭古人已逐秋草沒明月空隨秋浪翻安得古人似明月長來此地對金罇戲言寄霅溪使君唐司勲水精宮殿從來小霅上號水精宮寂寞蓬萊不可遊㑹稽號小蓬萊十萬人家明鏡裏神仙都㑹是杭州出金陵却寄蔣山元師不及林間紅鶴羣飛泉却得夜深聞風帆又絶秦淮去回望北山空白雲招余補之赤泥圓印木蘭酒欲飲無人共把杯只隔春江一潮信可能閒訪故人來憶南中兄弟河上青青榆葉稀湘童何日報南歸可嗟不及衡陽雁兄弟相將作隊飛遺興勉友人人生三萬六千日二萬日中愁苦身惟有無心消遣得有心到了是癡人傷王霽欲鍊此心成古鏡清光直透太虚明朝來一灑故人淚依舊塵埃滿匣生稚子稚子誰憐衰病餘戲殘鬭草繞庭除朝來竟學黄家畫畫破新傳幾本書田家數畝低田流水渾一樹髙花明逺村雲隂拂暑風光好却將微雨送黄昬汪正夫為人撰墓誌有中金之贈因以二絶戲之飄然才思是真仙鳯字仍留碧玉鐫换得黄金滿書篋可能獨具買山錢寳字竒文刻夜臺黄金論價未當才諸生可是無豪氣不就韓公乞取來病中丞相新詩懶未酬一編藥録在牀頭何時病骨健於鶻直與秋風萬里遊病來翻喜此身閒心在浮雲去住間休問遊人春早晚花開花落不相關謝病自縁謝病慙朝紱漸有心期訪舊廬為問桃花巖下客有田肯貰子真無昔日昔日揮毫多壯思半天拂下鳯凰兒夜來雪灑松窓急開巻先逢白髪詩藍橋送客回謁張郎中都無歌管伴金杯草草藍橋送客回寒雨飄零不成雪剡溪閒訪戴逵來酬公逹小吏扣關聲啄啄山夫驚落手中杯不知天上何縁到袖裏擕將明月來哭重伋兼穰令古劒沉來不可尋白沙堆下葬黄金憑君莫向大江哭泪入黄泉寃更深自嘲樂府休翻白苧歌樽前已怯巻紅螺壯心雖欲未伏老争柰秋來白髪何嘗酒病髪搔來不滿簪一樽聊復灑煩襟只應從此歡心减不及年年酒味深飲醉小鍾連罰十玻瓈醉倒南軒爛似泥睡起不知人已散斜陽猶在杏花西巽亭小飲花開花落何須問勸爾東風酒一杯世事正如滄海水早潮才去晚潮來酒寄通州吳先生徃年醉倒先生家今寄緑酒滄海涯此酒到時春已晚猶應趂得賞殘花酒寄郭祥正第一荆州白玉泉蘭舟載與酒中仙却須捉住鯨魚尾恐怕醉來騎上天次韻程丞相觀牡丹滿車桂酒爛金醅坐繞春叢醉即回争得此花長在眼一朝只放一枝開碧凉繖下罩羅敷只恐晴暉透錦襦醉倚玉欄問春色此花勝得洛中無第一名花洛下開馬䭾金餅買將回西施自是越溪女却為吳王賺得來陳人常賫金就洛中市花一圃或至千餘緡絲頭黄芍藥揚州絶格巳為稀北土花翁載得歸白玉圓盤圍一尺滿堆金縷淡黄衣招同僚賞雙頭荷花為愛荷花並蔕開便將荷葉作金杯桃根桃葉俱殊色且看相携渡水來酬張仲巽見督龍山之遊渚宫曾燕菊千枝落日須將急棧追料得山花也相愛使君來晚不嫌遲倒尊擲㡌愧新詩後日歡遊亦可追自是東風多逸興不關南郡出遊遲梁天機約重陽見訪而汪正夫簡報書齋叢菊輙有小蘂因書一絶呈正夫簡報菊叢生小蘂枝頭應似撥氷醅故人有信來相訪好祝秋風及早開重九後見新菊年年時節菊初開滿挿花枝倒酒杯今日秋風欺病客惟將白髪上頭來江梅杭州别乘有餘才戲作佳篇寄我來已教吳娘學新曲鳯山亭下賞江梅雪裏梅武皇未識長卿才多向吳王故國來誰見江南佳賞處月中詞客雪中梅和汪正夫梅少陵老杜獨憐才長句還如鐡馬來酒味漸佳春漸好苦教陸凱詠寒梅世上庸兒苦忌才脫身曽把虎鬚來他年若隠吳門去從此真仙不姓梅江南江北謫仙才為愛湖山特地來願得春寒過三月尊前留得臘前梅禁林自笑老無才覔得杭州刺史來飲散慿欄却怊悵不堪憶著故園梅好花賦與本天才料得靈根天上來應為長安惡風土故教北地不栽梅妖花爛熳敵清才鄴騎還驚寳玦來鄭國枉教蘭作佩定應不識楚江梅座中豪客洛陽才醉舞春風拂袖來明日却尋歌管地中庭空有折殘梅麗賦多傳楚客才新詩還自楚江來雪痕未漲龍池水風信先飛庾嶺梅探花最費庾郎才欲把琱盤折取來不奈雪花苦相誤梢頭無處認真梅詩入雞林白傅才當年曽佩左符來尊前依舊江山好不見章臺驛使梅劉蕡直氣壓羣才却束塵衣取次來開府剛腸破金石可能刻意賦寒梅欲酬彊韻若為才昨夜歸時趁月來寂寞後堂初醉起金盆猶浸數枝梅好花有意似憐才時泛清香入袂來待得繁梢都結實莫將細核比楊梅流俗休教見美才不如長入醉鄉來江南蚤是多風雨莫向花前唱落梅江南還有謝娘才試數春期幾日來綵勝未隨釵上燕玉臺先挿鬢邊梅木秃風摧正為才幾將擠䧟九淵來見君說著須酸鼻何必尊前更食梅窮通繫命不由才富貴偏宜老後來花草猶教有先後慿君試看北枝梅姑射仙人冰作體秦家公主粉為身素娥自已稱佳麗更作廣寒宫裏人落梅醉墨紛紛盡雅才等閒携酒探花來笙歌已散遊人去更逐東風拾落梅竹經時不到紫雲溪新筍斕斑青玉枝生怪南山惡風雨夜來長得碧龍兒氷骨清疎緑玉君連環髙節粉花紋截來好作仙翁箒獨倚扶桑掃白雲鸞節朝元昨日歸玲瓏玉佩解雲衣幾多碧玉鳯凰尾鬭向秋烟不肯飛鷺鷥小屏飛鷺雪䙰褷窓影初揺晚竹枝獨倚枕函無一事無何鄊裏覺來時食魚憶新開湖栁條穿頰一雙鯉鱗挿金錢腰尾長何日酒泉飛白浪湖邊先問把罾郎曽擊畫船湖北樹船家新撇白醪醅紫荷蓋下黄金尺只就罾頭買得來頃年嘗與董伯孫數子獵兎抵馬欄今日重來解鞍佛舍見髙儀之題云躍馬飛鶻至此追念疇昔因紀一絶兼呈儀之昔年甞臂海東鶻醉客髙飛鐡馬羣今日見君題壁處自憐曾是舊将軍浚溝廟蜥蜴或云能知風雨不歸大海不藏山碧瓦朱欄緑樹閑應待老龍纔睡著便偷雲雨落人間雨雪雜下雨鬭雪聲相雜下飄蕭宻勢灑空來北風有意待寒臈只放飛花一半開楚江雲暖凍未得雪粒飄來著地稀恰似小園寒食後梨花零亂雨中飛詞初春好亊近江上探春囬正值早梅時節雨行小槽雙鳯按凉州初徹謝娘扶下繡鞍來紅靴踏殘雪歸去不須銀燭有山頭明月長短句雞冠蜀山雞啄我黍呉童截其冠持之埋在土西風吹得一枝生峩向秋烟飛不去蓼花蓼花開如赤組誰織成銀漢女黄金機白玉杼費盡朝霞千萬縷佚句附東飛江雲北飛燕同寄青春不相見夜來過嶺忽聞雨今日滿溪俱是花
